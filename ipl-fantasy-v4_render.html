      async function createNewMatch(
        label,
        t1,
        t2,
        isIPL,
        setPrimary,
        matchType = "ipl",
        liveMatchId = ""
      ) {
        const mid = "match_" + Date.now();
        const matchNum = (await getDocs(collection(db, "matches"))).size + 1;
        await setDoc(doc(db, "matches", mid), {
          label,
          t1,
          t2,
          matchNum,
          isIPL,
          matchType,
          revealed: false,
          locked: false,
          finalized: false,
          players: [],
          stats: {},
          teams: {},
          liveMatchId,
          createdAt: serverTimestamp(),
        });
        // Add to activeMatchIds and optionally set as primary
        const currentIds = metaGame.activeMatchIds || [];
        const newIds = [...new Set([...currentIds, mid])];
        const update = { activeMatchIds: newIds };
        if (setPrimary) update.currentMatchId = mid;
        await updateDoc(doc(db, "meta", "game"), update);
        if (setPrimary) currentMatchId = mid;
        adminSelectedMatchId = mid;
        // Pre-populate activeMatches so the match tab is visible immediately
        // before the Firestore snapshot listener fires
        activeMatches[mid] = {
          match: { label, t1, t2, matchNum, isIPL, matchType, liveMatchId,
            revealed: false, locked: false, finalized: false, players: [], stats: {}, teams: {} },
          players: [], stats: {}, teams: {},
        };
        syncDerivedState();
        toast(
          `Match created! (${matchType === "ipl" ? "IPL" : matchType === "domestic" ? "Domestic" : "International"}) Loading players…`,
        );
      }

      async function removeActiveMatch(mid) {
        if (!mid) return;
        // Check if match is in activeMatchIds OR is the currentMatchId
        const isInActiveList = (metaGame.activeMatchIds || []).includes(mid);
        const isCurrentMatch = mid === currentMatchId;
        if (!isInActiveList && !isCurrentMatch) {
          toast("Match not in active list", "err");
          return;
        }
        if (!confirm("Remove this match from active list?")) return;

        // Remove from activeMatchIds array
        const currentIds = metaGame.activeMatchIds || [];
        const newIds = currentIds.filter((id) => id !== mid);

        // If removing the current primary match, clear it
        const updates = { activeMatchIds: newIds };
        if (isCurrentMatch) {
          updates.currentMatchId = "";
        }

        try {
          await updateDoc(doc(db, "meta", "game"), updates);
        } catch (e) {
          toast("Error removing match: " + e.message, "err");
          return;
        }

        // Update local metaGame cache immediately so re-render reflects removal
        metaGame.activeMatchIds = newIds;
        if (isCurrentMatch) {
          metaGame.currentMatchId = "";
        }

        // Unsubscribe the match listener so it doesn't re-add the match after deletion
        if (matchUnsubs[mid]) {
          matchUnsubs[mid]();
          delete matchUnsubs[mid];
        }
        // Also remove from local activeMatches map
        delete activeMatches[mid];

        // If removed match was selected, switch to another active match or null
        if (adminSelectedMatchId === mid) {
          const remainingIds = [
            ...new Set(
              [...(newIds || []), metaGame.currentMatchId].filter(Boolean),
            ),
          ];
          adminSelectedMatchId = remainingIds[0] || null;
        }

        syncDerivedState();
        refreshView();
        toast("Match removed from active list");
      }

      // ── Finalize match → save to season ──
      async function finalizeMatch() {
        if (
          !confirm(
            "Finalize this match? Points will be saved to the season leaderboard.",
          )
        )
          return;
        const btn = document.getElementById("finalizeBtn");
        btn.textContent = "Saving…";
        btn.disabled = true;
        const activeMid = getActiveMid();
        if (!activeMid) {
          toast("No active match selected", "err");
          btn.textContent = "✅ Finalize & Save to Season";
          btn.disabled = false;
          return;
        }
        // Block onSnapshot re-renders for the duration of finalization to prevent
        // intermediate flashes (season updated but match not yet finalized)
        skipNextRefresh = true;
        try {
          // Always fetch FRESH data from Firestore — never use in-memory cache here.
          // If admin just hit "Save All" then immediately "Finalize", the onSnapshot
          // may not have propagated the latest stats into activeMatches yet.
          const [matchSnap, stSnap] = await Promise.all([
            getDoc(doc(db, "matches", activeMid)),
            getDoc(doc(db, "season", "totals")),
          ]);
          if (!matchSnap.exists()) throw new Error("Match not found");
          const freshMatch = matchSnap.data();
          const stats  = freshMatch.stats  || {};
          const teams  = freshMatch.teams  || {};
          const match  = freshMatch;

          // Guard: prevent double-finalize from corrupting totals
          // (allow re-finalize only from the finalized state — "Update Finalized")
          if (freshMatch.finalized && !confirm("Match already finalized. Re-save updated points?")) {
            btn.textContent = "♻️ Update Finalized";
            btn.disabled = false;
            skipNextRefresh = false;
            return;
          }

          const members = Object.keys(allMembers);
          const totals = stSnap.exists() ? stSnap.data() : {};

          members.forEach((name) => {
            const t = teams[name] || {};
            const pts = memberMatchTotal(t, stats);
            if (!totals[name]) totals[name] = { total: 0, matches: [] };

            const existingIdx = totals[name].matches.findIndex(m => m.matchId === activeMid);
            if (existingIdx !== -1) {
              // UPDATE: Subtract old points, add new ones
              const oldPts = totals[name].matches[existingIdx].pts || 0;
              totals[name].total = (totals[name].total || 0) - oldPts + pts;
              totals[name].matches[existingIdx] = { matchId: activeMid, label: match.label || "Match", pts };
              console.log(`[Finalizer] Updated ${name}: ${oldPts} -> ${pts}`);
            } else {
              // NEW: Just add
              totals[name].total = (totals[name].total || 0) + pts;
              totals[name].matches = [
                ...(totals[name].matches || []),
                { matchId: activeMid, label: match.label || "Match", pts },
              ];
              console.log(`[Finalizer] Added ${name}: ${pts} pts`);
            }
          });

          // Write season totals + finalized flag together before releasing the refresh block
          await setDoc(doc(db, "season", "totals"), totals, { merge: true });
          await updateDoc(doc(db, "matches", activeMid), { finalized: true });

          // Remove finalized match from activeMatchIds and clear currentMatchId if needed
          const remaining = (metaGame.activeMatchIds || []).filter(
            (id) => id !== activeMid,
          );
          const updates = { activeMatchIds: remaining };
          if (currentMatchId === activeMid) {
            updates.currentMatchId = remaining[0] || "";
          }
          await updateDoc(doc(db, "meta", "game"), updates);

          // Reset selected match synchronously so the next refreshView shows a clean state
          adminSelectedMatchId = remaining[0] || null;

          stopAR();
          // Release refresh block — next onSnapshot will show fully-consistent state
          skipNextRefresh = false;
          
          (function launchFireworks(){
            const fw = document.createElement('canvas');
            fw.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;pointer-events:none;';
            fw.width = window.innerWidth;
            fw.height = window.innerHeight;
            document.body.appendChild(fw);
            const fctx = fw.getContext('2d');
            const FW_PALETTE = ['#FF9933','#138808','#0066CC','#f59e0b','#cc0000','#004ba0','#3a0ca3','#ff6b00','#ff69b4','#00bfff'];
            const fwParticles = [];
            const fwRockets = [];

            function fwRandColor(){ return FW_PALETTE[Math.floor(Math.random()*FW_PALETTE.length)]; }

            function spawnRocket(x){
              fwRockets.push({
                x, y: fw.height,
                vy: -(fw.height * 0.018 + Math.random() * fw.height * 0.004),
                vx: (Math.random()-0.5)*2,
                color: fwRandColor(),
                exploded: false,
                peakY: fw.height * (0.15 + Math.random()*0.3),
                trail: []
              });
            }

            function fwExplode(r){
              const count = 40 + Math.floor(Math.random()*21);
              for(let i=0;i<count;i++){
                const angle = (Math.PI*2/count)*i;
                const speed = 2 + Math.random()*4;
                fwParticles.push({
                  x:r.x, y:r.y,
                  vx: Math.cos(angle)*speed,
                  vy: Math.sin(angle)*speed,
                  color: r.color,
                  alpha: 1,
                  decay: 0.012 + Math.random()*0.008,
                  gravity: 0.15,
                  sparkling: (i%3===0),
                  prevX: r.x, prevY: r.y
                });
              }
            }

            function fwTick(){
              if(!fw.parentNode) return;
              fctx.fillStyle = 'rgba(0,0,0,0.18)';
              fctx.fillRect(0,0,fw.width,fw.height);

              fwRockets.forEach(function(r){
                if(r.exploded) return;
                r.trail.push({x:r.x,y:r.y});
                if(r.trail.length>8) r.trail.shift();
                r.trail.forEach(function(pt,i){
                  fctx.beginPath();
                  fctx.arc(pt.x, pt.y, 1.5*(i/r.trail.length), 0, Math.PI*2);
                  fctx.fillStyle = r.color;
                  fctx.globalAlpha = 0.4*(i/r.trail.length);
                  fctx.fill();
                });
                fctx.globalAlpha = 1;
                fctx.beginPath();
                fctx.arc(r.x, r.y, 2.5, 0, Math.PI*2);
                fctx.fillStyle = '#fff';
                fctx.fill();
                r.x += r.vx; r.y += r.vy;
                if(r.y <= r.peakY){ r.exploded=true; fwExplode(r); }
              });

              for(let i=fwParticles.length-1;i>=0;i--){
                const p=fwParticles[i];
                if(p.sparkling){
                  fctx.beginPath();
                  fctx.arc(p.prevX, p.prevY, 1, 0, Math.PI*2);
                  fctx.fillStyle=p.color;
                  fctx.globalAlpha=p.alpha*0.3;
                  fctx.fill();
                }
                p.prevX=p.x; p.prevY=p.y;
                p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity;
                p.vx*=0.98; p.alpha-=p.decay;
                if(p.alpha<=0){ fwParticles.splice(i,1); continue; }
                fctx.beginPath();
                fctx.arc(p.x,p.y,2,0,Math.PI*2);
                fctx.fillStyle=p.color;
                fctx.globalAlpha=p.alpha;
                fctx.fill();
              }
              fctx.globalAlpha=1;
              requestAnimationFrame(fwTick);
            }

            for(var _fi=0;_fi<4;_fi++) spawnRocket(fw.width*(0.2+Math.random()*0.6));
            setTimeout(function(){ for(var _fi=0;_fi<4;_fi++) spawnRocket(fw.width*(0.2+Math.random()*0.6)); },400);
            setTimeout(function(){ for(var _fi=0;_fi<4;_fi++) spawnRocket(fw.width*(0.2+Math.random()*0.6)); },800);

            fwTick();
            setTimeout(function(){ if(fw.parentNode) fw.parentNode.removeChild(fw); }, 5000);
          })();

          toast("Match finalized! Points saved to season table ✅");
        } catch (e) {
          skipNextRefresh = false;
          toast("Error: " + e.message, "err");
          btn.textContent = "✅ Finalize & Save to Season";
          btn.disabled = false;
        }
      }

      // ── Abandon Match (No Result — keep accumulated points) ──
      async function abandonMatch() {
        const activeMid = getActiveMid();
        if (!activeMid) { toast("No active match selected", "err"); return; }
        if (getMatch(activeMid)?.finalized || getMatch(activeMid)?.abandoned) { toast("Match already finalized or abandoned", "err"); return; }
        if (
          !confirm(
            "Abandon this match?\n\nPoints earned so far will be saved to the season table.\nBatters currently on 0* will NOT receive a duck penalty.",
          )
        )
          return;
        skipNextRefresh = true;
        try {
          // Fresh read from Firestore — avoids stale cache for point calculations
          const [matchSnap, stSnap] = await Promise.all([
            getDoc(doc(db, "matches", activeMid)),
            getDoc(doc(db, "season", "totals")),
          ]);
          if (!matchSnap.exists()) throw new Error("Match not found");
          const freshMatch = matchSnap.data();
          const rawStats = freshMatch.stats || {};
          const teams = freshMatch.teams || {};

          // Deep-copy stats and auto-protect any batter on 0* (was playing when match stopped)
          const stats = {};
          const firestoreUpdate = {};
          Object.keys(rawStats).forEach((p) => {
            const s = { ...rawStats[p] };
            if (s.batted && (s.runs || 0) === 0 && !s.notOut) {
              s.notOut = true;
              firestoreUpdate[`stats.${p}.notOut`] = true;
            }
            stats[p] = s;
          });
          // Persist the notOut flags so stats in Firestore are accurate
          if (Object.keys(firestoreUpdate).length) {
            await updateDoc(doc(db, "matches", activeMid), firestoreUpdate);
          }
          // Save points to season totals
          const members = Object.keys(allMembers);
          const totals = stSnap.exists() ? stSnap.data() : {};
          members.forEach((name) => {
            const t = teams[name] || {};
            const pts = memberMatchTotal(t, stats);
            if (!totals[name]) totals[name] = { total: 0, matches: [] };
            if (!totals[name].matches.some((m) => m.matchId === activeMid)) {
              totals[name].total = (totals[name].total || 0) + pts;
              totals[name].matches = [
                ...(totals[name].matches || []),
                {
                  matchId: activeMid,
                  label: (freshMatch.label || "Match") + " 🌧️",
                  pts,
                },
              ];
            }
          });
          await setDoc(doc(db, "season", "totals"), totals, { merge: true });
          await updateDoc(doc(db, "matches", activeMid), {
            finalized: true,
            abandoned: true,
          });
          const remaining = (metaGame.activeMatchIds || []).filter(
            (id) => id !== activeMid,
          );
          const updates = { activeMatchIds: remaining };
          if (currentMatchId === activeMid) {
            updates.currentMatchId = remaining[0] || "";
          }
          await updateDoc(doc(db, "meta", "game"), updates);
          adminSelectedMatchId = remaining[0] || null;
          stopAR();
          skipNextRefresh = false;
          toast("Match abandoned — points saved 🌧️");
        } catch (e) {
          skipNextRefresh = false;
          toast("Error: " + e.message, "err");
        }
      }

      // ── Export CSV ──
      function exportCSV() {
        const members = Object.keys(allMembers);
        const rows = members
          .map((name) => {
            const sd = seasonTotals[name] || { total: 0, matches: [] };
            return {
              name,
              teamName: allMembers[name]?.teamName || name,
              total: sd.total || 0,
              matches: sd.matches || [],
            };
          })
          .sort((a, b) => b.total - a.total);
        if (!rows.length) {
          toast("No data to export", "err");
          return;
        }
        const allMatchIds = [
          ...new Set(rows.flatMap((r) => r.matches.map((m) => m.matchId).filter(Boolean))),
        ];
        const allMatchLabels = allMatchIds.map((id) => {
          const m = rows
            .flatMap((r) => r.matches)
            .find((x) => x.matchId === id);
          return m?.label || id;
        });
        const header = ["Rank", "Name", "Team", ...allMatchLabels, "Total"];
        const lines = [
          header.join(","),
          ...rows.map((r, i) =>
            [
              i + 1,
              r.name,
              r.teamName,
              ...allMatchIds.map((id) => {
                const m = r.matches.find((x) => x.matchId === id);
                return m ? m.pts : "";
              }),
              r.total,
            ].join(","),
          ),
        ];
        const blob = new Blob([lines.join("\n")], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "ipl_fantasy_season.csv";
        a.click();
        toast("CSV exported!");
      }

      function bindAvailSelects() {

            const name = sel.dataset.p;
            const status = e.target.value;
            const activeMid = getActiveMid();
            if (!activeMid) return;
            const update = {};
            update[`playerStatus.${name}`] = status;
            // Auto-sync playingXI stat: playing→true, impact→false (nominee), notplaying→false
            if (status === "playing" || status === "impact") {
              if (!playerStats[name]) playerStats[name] = {};
              const isActuallyPlaying = (status === "playing");
              playerStats[name].playingXI = isActuallyPlaying;
              update[`stats.${name}.playingXI`] = isActuallyPlaying;
              playerStats[name].isImpact = (status === "impact");
              update[`stats.${name}.isImpact`] = (status === "impact");
            } else if (status === "notplaying") {
              if (!playerStats[name]) playerStats[name] = {};
              playerStats[name].playingXI = false;
              update[`stats.${name}.playingXI`] = false;
              playerStats[name].isImpact = false;
              update[`stats.${name}.isImpact`] = false;
            }
            // Sync DOM checkbox so subsequent Save/Save All reads don't overwrite
            const xiCb = document.querySelector(
              `.sic[data-f="playingXI"][data-p="${CSS.escape(name)}"]`,
            );
            if (xiCb)
              xiCb.checked = playerStats[name]?.playingXI ?? xiCb.checked;
            try {
              await updateDoc(doc(db, "matches", activeMid), update);
              // Update local playerStatus immediately
              playerStatus[name] = status;
              toast(
                status
                  ? `${name} → ${status === "playing" ? "🟢 Playing XI" : status === "notplaying" ? "🔴 Not Playing" : "🔵 Impact Sub"}`
                  : `${name} status cleared`,
              );

              toast("Error updating status: " + e.message, "err");

      }

      async function saveAllStats() {
        const btn = document.getElementById("saveAllStatsBtn");
        if (btn) {
          btn.textContent = "Saving…";
          btn.disabled = true;
        }
        try {
          const statsUpdate = {};
          const activeMid = getActiveMid();
          if (!activeMid) { toast("No active match selected", "err"); return; }
          // Collect all stat inputs
          document.querySelectorAll(".si").forEach((i) => {
            const p = i.dataset.p,
              f = i.dataset.f;
            if (!playerStats[p]) playerStats[p] = {};
            let val = parseFloat(i.value) || 0;
            // Normalize overs notation (e.g. 3.7 -> 4.1)
            if (f === "overs" && (val % 1).toFixed(1) >= 0.6) {
              const full = Math.floor(val);
              const b = Math.round((val - full) * 10);
              val = full + Math.floor(b / 6) + (b % 6) / 10;
            }
            playerStats[p][f] = val;
          });
          document.querySelectorAll(".sic").forEach((c) => {
            const p = c.dataset.p,
              f = c.dataset.f;
            if (!playerStats[p]) playerStats[p] = {};
            playerStats[p][f] = c.checked;
          });
          // Clear API eco so calcPoints recalculates from manually entered overs/runs
          Object.keys(playerStats).forEach((p) => {
            delete playerStats[p].eco;
          });
          Object.entries(playerStats).forEach(([p, s]) => {
            statsUpdate[`stats.${p}`] = s;
          });
          await updateDoc(doc(db, "matches", activeMid), statsUpdate);
          toast(`✓ All player stats saved!`);
          // Refresh grid to show updated points
          const grid = document.getElementById("statsGrid");
          if (grid) {
            grid.innerHTML = renderStatsGrid("");
            bindSave();
            bindAvailSelects();
            triggerCountUp(); // Fix 3 — animate pts display after re-render
          }
        } catch (e) {
          toast("Error: " + e.message, "err");
        } finally {
          if (btn) {
            btn.textContent = "💾 Save All";
            btn.disabled = false;
          }
        }
      }

      function bindSave() {
        document.querySelectorAll(".btn-save").forEach((btn) => {
          btn.onclick = async () => {
            const p = btn.dataset.p;
            const data = { ...(playerStats[p] || {}) };
            document.querySelectorAll(`.si[data-p="${p}"]`).forEach((i) => {
              let val = parseFloat(i.value) || 0;
              const f = i.dataset.f;
              // Normalize overs notation (e.g. 3.7 -> 4.1)
              if (f === "overs" && (val % 1).toFixed(1) >= 0.6) {
                const full = Math.floor(val);
                const b = Math.round((val - full) * 10);
                val = full + Math.floor(b / 6) + (b % 6) / 10;
              }
              data[f] = val;
            });
            document.querySelectorAll(`.sic[data-p="${p}"]`).forEach((c) => {
              data[c.dataset.f] = c.checked;
            });
            delete data.eco; // force calcPoints to recalculate from entered overs/runs
            playerStats[p] = data;
            btn.textContent = "Saving…";
            btn.disabled = true;
            const _saveMid = getActiveMid();

      async function fetchMatches() {

          toast("Enter API key first", "err");

          '<p class="muted" style="font-size:12px">Fetching matches…</p>';

        try {
          // Step 1 — currentMatches (live + recent ~48hrs)
          const r1 = await _cricFetch(
            `https://api.cricapi.com/v1/currentMatches?apikey=${key}&offset=0`,
          ).then((r) => r.json());
          if (r1.status !== "success")
            throw new Error(r1.reason || "API error — check your key");
          const current = r1.data || [];

          // Step 2 — collect series IDs
          // KEY FIX: also load cached series IDs from Firebase so they persist
          // even after games drop out of the 48hr currentMatches window
          let seriesIds = [];
          if (isIPL) {
            const fromCurrent = current
              .filter((m) => isIPLName(m.name))
              .map((m) => m.series_id)
              .filter(Boolean);
            seriesIds = [...new Set([...fromCurrent, IPL_2026_SERIES_ID])];
          } else {
            const fromCurrent = [
              ...new Set(
                current
                  .filter((m) => !isIPLName(m.name))
                  .map((m) => m.series_id)
                  .filter(Boolean),
              ),
            ];

            // Load previously cached series IDs from Firebase
            const cachedIds = metaGame.cachedIntlSeriesIds || [];

            // Always-include series IDs — these are hardcoded so they survive the 48hr window
            // Add any series here that you want to always appear in Find Matches
            const knownActive = [
              "30845b53-91bc-4dbe-9e91-01319213e61f", // SA tour of NZ 2026 (NZ vs SA T20I series)
              "3124eb82-0ba8-4c90-9d1f-11dbdf2e5e42", // PAK tour of BAN 2026
              "efd776f5-506a-48eb-a97b-7d872537ed76", // AUS Women tour of WI 2026
              "d5c0239d-9840-417b-ad8f-865cc3927ff4", // NZ tour of BAN 2026
            ];

            // Merge new + cached + known active, save new ones back to Firebase
            const merged = [
              ...new Set([...fromCurrent, ...cachedIds, ...knownActive]),
            ].slice(0, 15);
            if (fromCurrent.length > 0) {
              // Save newly found series IDs so they survive the 48hr window
              const updated = [
                ...new Set([...fromCurrent, ...cachedIds, ...knownActive]),
              ].slice(0, 15);
              updateDoc(doc(db, "meta", "game"), {
                cachedIntlSeriesIds: updated,
              }).catch(() => {});
            }
            seriesIds = merged;
          }

          // Step 3 — series_info for each series → full fixture list including upcoming
          const seriesData = await Promise.allSettled(
            seriesIds.map((sid) =>
              _cricFetch(
                `https://api.cricapi.com/v1/series_info?apikey=${key}&id=${sid}`,
              ).then((r) => r.json()),
            ),
          );

          // Merge + deduplicate
          const seen = new Set();
          const allMatches = [];
          current.forEach((m) => {
            if (!seen.has(m.id)) {
              seen.add(m.id);
              allMatches.push(m);
            }
          });
          seriesData.forEach((r) => {
            if (r.status === "fulfilled" && r.value.status === "success") {
              (r.value.data?.matchList || []).forEach((m) => {
                if (!seen.has(m.id)) {
                  seen.add(m.id);
                  allMatches.push(m);
                }
              });
            }
          });

          // Filter by match type — strict for IPL
          let filtered = isIPL
            ? allMatches.filter(
                (m) =>
                  (m.name || "")
                    .toLowerCase()
                    .includes("indian premier league") ||
                  (m.name || "").toLowerCase().includes("ipl"),
              )
            : allMatches.filter((m) => !isIPLName(m.name));

          const domesticKeywords = [
            "plunket shield",
            "sheffield shield",
            "ranji trophy",
            "csa provincial",
            "legends league",
            "kalahari",
            "super smash",
            "vitality blast",
            "the hundred",
            "ford trophy",
            "four day franchise",
            "county championship",
            "under-19",
            "u19",
            "invitational",
            "provincial",
          ];

          if (!isIPL && !isDomestic) {
            // International — exclude domestic competitions, keep bilateral/ICC only
            filtered = filtered.filter((m) => {
              const name = (m.name || "").toLowerCase();
              return !domesticKeywords.some((d) => name.includes(d));
            });
          } else if (isDomestic) {
            // Domestic — keep only domestic/club/provincial competitions
            filtered = filtered.filter((m) => {
              const name = (m.name || "").toLowerCase();
              return domesticKeywords.some((d) => name.includes(d));
            });
          }

          filtered.sort((a, b) => {
            const rank = (m) =>
              m.matchStarted && !m.matchEnded ? 0 : !m.matchStarted ? 1 : 2;
            if (rank(a) !== rank(b)) return rank(a) - rank(b);
            const da = new Date(a.dateTimeGMT || 0),
              db2 = new Date(b.dateTimeGMT || 0);
            return rank(a) === 1 ? da - db2 : db2 - da;
          });

          if (!filtered.length && !isIPL) {
            // No results from series_info — auto-run series search with known active tours
            list.innerHTML =
              '<p class="muted" style="font-size:12px">Searching current international tours…</p>';
            try {
              const autoQueries = [
                "South Africa tour of New Zealand 2026",
                "Pakistan tour of Bangladesh 2026",
                "West Indies Women Australia Women 2026",
              ];
              const autoResults = await Promise.allSettled(
                autoQueries.map((q) =>
                  _cricFetch(
                    `https://api.cricapi.com/v1/series?apikey=${key}&offset=0&search=${encodeURIComponent(q)}`,
                  ).then((r) => r.json()),
                ),
              );
              const autoSids = new Set();
              autoResults.forEach((r) => {
                if (r.status === "fulfilled" && r.value.status === "success") {
                  (r.value.data || []).slice(0, 2).forEach((s) => {
                    if (s.id) autoSids.add(s.id);
                  });
                }
              });
              const autoSeriesData = await Promise.allSettled(
                [...autoSids].map((sid) =>
                  _cricFetch(
                    `https://api.cricapi.com/v1/series_info?apikey=${key}&id=${sid}`,
                  ).then((r) => r.json()),
                ),
              );
              const autoSeen = new Set(allMatches.map((m) => m.id));
              const autoMatches = [...allMatches];
              autoSeriesData.forEach((r) => {
                if (r.status === "fulfilled" && r.value.status === "success") {
                  (r.value.data?.matchList || []).forEach((m) => {
                    if (!autoSeen.has(m.id)) {
                      autoSeen.add(m.id);
                      autoMatches.push(m);
                    }
                  });
                }
              });
              let autoFiltered = autoMatches.filter((m) => !isIPLName(m.name));
              const dl = [
                "plunket shield",
                "sheffield shield",
                "ranji trophy",
                "csa provincial",
                "legends league",
                "kalahari",
                "super smash",
                "vitality blast",
                "the hundred",
                "ford trophy",
                "under-19",
                "u19",
                "invitational",
                "provincial",
              ];
              autoFiltered = autoFiltered.filter(
                (m) =>
                  !dl.some((d) => (m.name || "").toLowerCase().includes(d)),
              );
              autoFiltered.sort((a, b) => {
                const rank = (m) =>
                  m.matchStarted && !m.matchEnded ? 0 : !m.matchStarted ? 1 : 2;
                if (rank(a) !== rank(b)) return rank(a) - rank(b);
                return (
                  new Date(a.dateTimeGMT || 0) - new Date(b.dateTimeGMT || 0)
                );
              });
              if (autoFiltered.length) {
                renderMatchList(autoFiltered, list, key, false);
                return;
              }
            } catch (e2) {
              console.warn("Auto-search failed:", e2);
            }
            // Still nothing — show hint with quick search buttons
            list.innerHTML = `
        <div class="no-matches-hint">
          <div class="nmh-title">No international matches in live window</div>
          <div class="nmh-body">Use <b>Search Series</b> below to find upcoming games:</div>
          <div class="nmh-examples">
            <span class="nmh-ex" onclick="quickSearch('South Africa tour of New Zealand 2026')">NZ vs SA 2026</span>
            <span class="nmh-ex" onclick="quickSearch('Pakistan tour of Bangladesh 2026')">BAN vs PAK</span>
            <span class="nmh-ex" onclick="quickSearch('England tour 2026')">ENG tours</span>
            <span class="nmh-ex" onclick="quickSearch('India tour 2026')">IND tours</span>
          </div>
        </div>`;
            return;
          }

          if (!filtered.length && isIPL) {
            list.innerHTML = `<div class="no-matches-hint"><div class="nmh-title">No IPL matches yet</div><div class="nmh-body">IPL 2026 starts <b>28 March</b>. Fixtures will appear here automatically.</div></div>`;
            return;
          }

          renderMatchList(filtered, list, key, isIPL);
        } catch (e) {
          list.innerHTML = `<p style="color:var(--red);font-size:13px">${e.message}</p>`;
          toast("Error: " + e.message, "err");

      async function searchSeriesMatches() {
        const key =
          document.getElementById("cricKey")?.value.trim() ||
          metaGame.cricApiKey;
        if (!key) {
          toast("Enter API key first", "err");
          return;
        }
        const query = (
          document.getElementById("seriesSearchInp")?.value || ""
        ).trim();
        if (!query) {
          toast("Enter a series name to search", "err");
          return;
        }

        const btn = document.getElementById("searchSeriesBtn");
        btn.textContent = "Searching…";
        btn.disabled = true;
        const list = document.getElementById("matchesList");
        list.innerHTML =
          '<p class="muted" style="font-size:12px">Searching series…</p>';

        try {
          const r = await _cricFetch(
            `https://api.cricapi.com/v1/series?apikey=${key}&offset=0&search=${encodeURIComponent(query)}`,
          ).then((r) => r.json());
          if (r.status !== "success")
            throw new Error(r.reason || "Series search failed");
          const series = r.data || [];
          if (!series.length) throw new Error(`No series found for "${query}"`);

          // Fetch series_info for top 5 results
          const results = await Promise.allSettled(
            series
              .slice(0, 5)
              .map((s) =>
                _cricFetch(
                  `https://api.cricapi.com/v1/series_info?apikey=${key}&id=${s.id}`,
                ).then((r) => r.json()),
              ),
          );

          const seen = new Set();
          const matches = [];
          results.forEach((r) => {
            if (r.status === "fulfilled" && r.value.status === "success") {
              (r.value.data?.matchList || []).forEach((m) => {
                if (!seen.has(m.id)) {
                  seen.add(m.id);
                  matches.push(m);
                }
              });
            }
          });

          if (!matches.length)
            throw new Error("Series found but no matches listed yet");

          matches.sort((a, b) => {
            const rank = (m) =>
              m.matchStarted && !m.matchEnded ? 0 : !m.matchStarted ? 1 : 2;
            if (rank(a) !== rank(b)) return rank(a) - rank(b);
            return new Date(a.dateTimeGMT || 0) - new Date(b.dateTimeGMT || 0);
          });

          const seriesNames = series
            .slice(0, 5)
            .map((s) => s.name)
            .join(", ");
          list.innerHTML = `<div class="ss-result-label">Results for: <em>${seriesNames}</em></div>`;
          renderMatchList(matches, list, key, _matchType === "ipl", true);
        } catch (e) {
          list.innerHTML = `<p style="color:var(--red);font-size:13px">${e.message}</p>`;
          toast("Error: " + e.message, "err");
        } finally {
          btn.textContent = "Search Series";
          btn.disabled = false;
        }
      }

      function renderMatchList(filtered, list, key, isIPL, append = false) {
        if (!filtered.length) {
          list.innerHTML = `
      <p class="muted">No ${isIPL ? "IPL" : "international"} matches found.</p>
      <p class="muted" style="font-size:12px;margin-top:6px">
        ${isIPL ? 'Try searching by series name below (e.g. "IPL 2026").' : 'Use "Search Series" below to find matches by name.'}
      </p>`;
          return;
        }

        const live = filtered.filter((m) => m.matchStarted && !m.matchEnded);
        const upcoming = filtered.filter((m) => !m.matchStarted);
        const ended = filtered.filter((m) => m.matchEnded).slice(0, 5);

        let html = "";
        if (live.length)
          html +=
            `<div class="match-group-label">🔴 LIVE NOW</div>` +
            live.map(matchOptHTML).join("");
        if (upcoming.length)
          html +=
            `<div class="match-group-label">🕐 UPCOMING</div>` +
            upcoming.map(matchOptHTML).join("");
        if (ended.length)
          html +=
            `<div class="match-group-label">✓ RECENTLY ENDED</div>` +
            ended.map(matchOptHTML).join("");

        if (append) list.innerHTML += html;
        else list.innerHTML = html;

        const activeMid = getActiveMid();
        list.querySelectorAll("button[data-id]").forEach((b) => {
          b.onclick = async () => {
            const mid = b.dataset.id,
              mname = b.dataset.name;
            const t1 = b.dataset.t1 || "",
              t2 = b.dataset.t2 || "";
            const t1img = b.dataset.t1img || "";
            const t2img = b.dataset.t2img || "";
            const fantasyEnabled = b.dataset.fantasy === '1';

            // Guard 1: exact CricAPI ID already loaded
            const exactMid = Object.keys(activeMatches).find(
              (id) => activeMatches[id]?.match?.liveMatchId === mid
            );
            if (exactMid) {
              toast("This match is already loaded — switching to it.");
              adminSelectedMatchId = exactMid;
              syncDerivedState();
              refreshView();
              return;
            }

            // Guard 2: same teams already loaded but with a DIFFERENT API ID
            // (CricAPI sometimes changes match IDs — detect by team name comparison)
            const firstWord = (s) => (s || "").toLowerCase().split(/[\s,]+/)[0];
            const t1key = firstWord(t1), t2key = firstWord(t2);
            const fuzzyMid = (t1key && t2key)
              ? Object.keys(activeMatches).find((id) => {
                  const em = activeMatches[id]?.match;
                  if (!em || em.finalized) return false;
                  const et1 = firstWord(em.t1), et2 = firstWord(em.t2);
                  return (t1key === et1 && t2key === et2) ||
                         (t1key === et2 && t2key === et1);
                })
              : null;

            if (fuzzyMid) {
              const existingLabel = activeMatches[fuzzyMid]?.match?.label || "this match";
              const doUpdate = confirm(
                `"${shortName(existingLabel)}" is already loaded but has a different API ID.\n\n` +
                `OK → Update its live ID to the new one (fixes fetching)\n` +
                `Cancel → Load as a separate match`
              );
              if (doUpdate) {
                await updateDoc(doc(db, "matches", fuzzyMid), { liveMatchId: mid });
                await updateDoc(doc(db, "meta", "game"), { cricApiKey: key });
                adminSelectedMatchId = fuzzyMid;
                syncDerivedState();
                refreshView();
                toast("Live match ID updated — stats will now fetch from the new ID.");
                return;
              }
              // Admin chose to load as separate match — fall through
            }

            // Prevent double-click from firing twice
            b.disabled = true;
            b.textContent = "Loading…";

            await updateDoc(doc(db, "meta", "game"), { cricApiKey: key });

            toast("Creating match and loading players…");
            const isIPL = _matchType === "ipl";
            const matchType = _matchType;
            const newMid = "match_" + Date.now();
            const matchNum =
              (await getDocs(collection(db, "matches"))).size + 1;
            await setDoc(doc(db, "matches", newMid), {
              label: mname,
              t1,
              t2,
              t1img,
              t2img,
              matchNum,
              isIPL,
              matchType,
              revealed: false,
              locked: false,
              finalized: false,
              players: [],
              stats: {},
              teams: {},
              liveMatchId: mid,
              fantasyEnabled,
              createdAt: serverTimestamp(),
            });
            // Add to activeMatchIds, set as current
            const currentIds = metaGame.activeMatchIds || [];
            const newIds = [...new Set([...currentIds, newMid])];
            await updateDoc(doc(db, "meta", "game"), {
              currentMatchId: newMid,
              activeMatchIds: newIds,
            });
            currentMatchId = newMid;
            adminSelectedMatchId = newMid;
            // Pre-populate activeMatches so the match tab is visible immediately
            // before the Firestore snapshot listener fires
            activeMatches[newMid] = {
              match: { label: mname, t1, t2, t1img, t2img, matchNum, isIPL, matchType,
                liveMatchId: mid, revealed: false, locked: false, finalized: false, players: [], stats: {}, teams: {} },
              players: [], stats: {}, teams: {},
            };
            syncDerivedState();
            refreshView();
            await loadMatchPlayers(key, mid, newMid);
            // Re-enable button in case admin stays on this screen
            b.disabled = false;
            b.textContent = "Select";
          };
        });
      }

      function matchOptHTML(m) {
        const status =
          m.matchStarted && !m.matchEnded
            ? "🔴 LIVE"
            : m.matchEnded
              ? "✓ Ended"
              : "🕐 Upcoming";
        let timeStr = "";
        if (m.dateTimeGMT) {
          // Append Z to ensure UTC parsing — API returns without timezone suffix
          const d = new Date(
            m.dateTimeGMT.endsWith("Z") ? m.dateTimeGMT : m.dateTimeGMT + "Z",
          );
          const tzShort =
            new Intl.DateTimeFormat("en", { timeZoneName: "short" })
              .formatToParts(d)
              .find((p) => p.type === "timeZoneName")?.value || "";
          const dateStr = d.toLocaleDateString([], {
            weekday: "short",
            month: "short",
            day: "numeric",
          });
          const timeLocal = d.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });
          timeStr = ` · ${dateStr}, ${timeLocal} ${tzShort}`;
        }
        const hasSquad = m.hasSquad;
        return `<div class="mopt">
    <div style="min-width:0;overflow:hidden;flex:1">
      <div class="mopt-name">${shortName(m.name || "Match")}</div>
      <div class="mopt-st">${status}${timeStr}</div>
      ${!hasSquad && !m.matchStarted ? '<div class="mopt-warn">⚠ Squad not announced yet — you can still select and add players manually</div>' : ""}
    </div>
    <button class="btn-sm" data-id="${m.id}" data-name="${m.name || "Match"}" data-t1="${(m.teamInfo?.[0]?.name || m.teams?.[0] || "").replace(/"/g, "")}" data-t2="${(m.teamInfo?.[1]?.name || m.teams?.[1] || "").replace(/"/g, "")}" data-t1img="${m.teamInfo?.[0]?.img || ""}" data-t2img="${m.teamInfo?.[1]?.img || ""}" data-fantasy="${m.fantasyEnabled === true ? '1' : '0'}">Select</button>
  </div>`;
      }

      async function loadMatchPlayers(key, mid, firestoreMatchId) {
        if (!key || !mid) return;
        try {
          // 1. Direct fetch using Match ID (prevents lag from list endpoints)
          const url = `https://api.cricapi.com/v1/match_info?apikey=${key}&id=${mid}`;
          const res = await _cricFetch(url);
          const data = await res.json();

          if (data.status === "failure") throw new Error(data.reason);

          let players = [];
          const matchData = data.data;

          // Strategy: Try teamInfo (roles included) -> fallback to squad (names only)
          if (matchData.teamInfo && matchData.teamInfo.length > 0) {
            const t1img = matchData.teamInfo[0]?.img || "";
            const t2img = matchData.teamInfo[1]?.img || "";
            if (t1img || t2img) {
              await updateDoc(doc(db, "matches", firestoreMatchId), { t1img, t2img });
            }
            matchData.teamInfo.forEach((team) => {
              (team.players || []).forEach((p) => {
                players.push({
                  name: p.name,
                  team: team.shortname || team.name,
                  role: mapRole(p.role),
                });
              });
            });
          }

          // Fallback to match_squad if teamInfo was empty
          if (players.length < 5) {
            const squadRes = await _cricFetch(`https://api.cricapi.com/v1/match_squad?apikey=${key}&id=${mid}`);
            const squadData = await squadRes.json();
            if (squadData.status === "success" && squadData.data) {
              const teamsData = Array.isArray(squadData.data) ? squadData.data : [squadData.data];
              teamsData.forEach(team => {
                (team.players || []).forEach(p => {
                  players.push({ name: p.name, team: team.teamName || team.name || "Team", role: mapRole(p.role) });
                });
              });
            }
          }

          if (players.length > 0) {
            const targetMid = firestoreMatchId || getActiveMid();
            if (!targetMid) { toast("No active match to load players into", "err"); return; }
            await updateDoc(doc(db, "matches", targetMid), { players });
            toast(`Loaded ${players.length} players for match`);
          }
        } catch (e) {
          console.warn("Squad load failed:", e.message);
          toast("Squad load failed: " + e.message, "err");
        }
      }

      async function autoFetchStats(showFeedback = false) {
        const key = metaGame.cricApiKey || "e2ecd022-a7a9-4855-a6c3-386ea4e83786";
        const activeMid = getActiveMid();
        if (!activeMid) return;
        const activeMatchData = getMatch(activeMid);
        if (!activeMatchData) return;
        const mid = activeMatchData?.liveMatchId;

        if (!mid) {
          if (showFeedback) toast("No live match ID found", "err");
          return;
        }

        try {
          const scRes = await _cricFetch(`https://api.cricapi.com/v1/match_scorecard?apikey=${key}&id=${mid}`);
          const scData = await scRes.json();

          // Scorecard unavailable: fall back to match_info for live score/status only
          if (scData.status !== "success") {
            const reason = scData.reason || "Scorecard unavailable";
            // "not found" = match hasn't started or CricAPI genuinely has no fantasy data
            const infoRes = await _cricFetch(`https://api.cricapi.com/v1/match_info?apikey=${key}&id=${mid}`);
            const infoData = await infoRes.json();
            if (infoData.status === "success") {
              const fallback = {};
              if (infoData.data?.score?.length) fallback.score = infoData.data.score;
              if (infoData.data?.status) fallback.matchStatus = infoData.data.status;
              if (infoData.data?.matchStarted) fallback.matchStarted = true;
              if (infoData.data?.matchEnded) {
                fallback.matchEnded = true;
                fallback.matchResult = infoData.data.status || '';
              }
              if (Object.keys(fallback).length) await updateDoc(doc(db, "matches", activeMid), fallback);
            }
            // Only mark fantasyEnabled=false persistently if API explicitly says so,
            // not just because scorecard isn't ready yet (pre-match "not found" is temporary)
            if (!reason.toLowerCase().includes("not found") && !reason.toLowerCase().includes("no data")) {
              if (showFeedback) toast("CricAPI: Fantasy stats unavailable. Manual entry required.", "err");
            } else {
              if (showFeedback) toast("Match hasn't started yet — will auto-fetch when live");
            }
            return;
          }

          const started = scData.data?.matchStarted;
          let ended = scData.data?.matchEnded;

          // Kill-switch: stop if already finalized (admin saved to season)
          const currentMatch = getMatch(activeMid);
          if (currentMatch?.finalized) {
            stopAR();
            console.log("Match finalized. Auto-refresh stopped.");
            return;
          }

          // When match ends: save result metadata but keep polling so all points
          // (including 3rd-umpire decisions) are captured before admin finalizes.
          // Polling will stop only when admin clicks Finalize (finalized check above).
          if (ended) {
            console.log("Match has ended. Continuing to fetch until admin finalizes.");
            const _matchEndUpdate = {
              matchStatus: "Match Concluded",
              matchResult: scData.data?.status || '',
              matchEnded: true,
              currentBatsmen: [],   // clear live crease display
              currentBowler: null,  // clear live crease display
            };
            // Only overwrite score if CricAPI returned actual data — never reset stored scores to []
            if (scData.data?.score?.length) _matchEndUpdate.score = scData.data.score;
            await updateDoc(doc(db, "matches", activeMid), _matchEndUpdate);
            if (showFeedback) toast("Match concluded — still syncing stats until you finalize.");
            // Fall through to process scorecard stats (no stopAR — keep polling)
          }

          // CricAPI sometimes pre-populates the scorecard with announced playing XIs before
          // the first ball is bowled (matchStarted:false, scorecard entries with b:0 r:0).
          // Only treat a scorecard as "live" if at least one batsman has actually faced a delivery.
          // This prevents pre-match lineup data from being parsed as real stats.
          const _sc0 = scData.data?.scorecard || [];
          const anyBallBowled = _sc0.some(inn => (inn.batting || []).some(b => (b.b || 0) > 0));
          const hasLiveScorecard = _sc0.length > 0 && anyBallBowled;
          if (!started && !hasLiveScorecard && !ended) {
            if (showFeedback) toast("Match hasn't started yet");
            return;
          }

          const data = scData;
          const overSummaries = data.data?.overSummaries || []; // Extract Over Summaries for Phase Scores
          const nl = {};
          matchPlayers.forEach((p) => {
            const cleanMain = p.name.toLowerCase().replace(/[^a-z\s]/g, '').trim();
            nl[cleanMain] = p.name;
            (p.altnames || []).forEach((alt) => {
              const cleanAlt = alt.toLowerCase().replace(/[^a-z\s]/g, '').trim();
              nl[cleanAlt] = p.name;
            });
          });
          const nlKeys = Object.keys(nl);
          console.log(`[Poller] Pool has ${nlKeys.length} match keys for ${matchPlayers.length} players`);
          
          function robustMatch(raw) {
            if (!raw) return null;
            const clean = raw.toLowerCase().replace(/[^a-z\s]/g, '').trim();
            if (!clean) return null;
            
            // 1. Exact match
            if (nl[clean]) return clean;
            
            // 2. Contains match
            const hit = nlKeys.find(k => k.includes(clean) || clean.includes(k));
            if (hit) return hit;
            
            // 3. Initials + Last Name (e.g. "R Sharma" matches "Rohit Sharma")
            const parts = clean.split(/\s+/);
            if (parts.length >= 2) {
              const firstInitial = parts[0][0];
              const lastName = parts[parts.length - 1];
              const initHit = nlKeys.find(k => {
                const kp = k.split(/\s+/);
                return kp.length >= 2 && kp[0][0] === firstInitial && kp[kp.length - 1] === lastName;
              });
              if (initHit) return initHit;
            }
            
            // 4. Last name match (at least 4 chars)
            const lastWord = parts[parts.length - 1];
            if (lastWord.length >= 4) {
              const lastHit = nlKeys.find(k => k.endsWith(lastWord));
              if (lastHit) return lastHit;
            }
            
            return null;
          }

          const sc = data.data?.scorecard || [];
          let updated = 0;
          const statsUpdate = {};

          // FALLBACK: If scorecard is empty but match is live, try match_info for the overall score/status
          if (sc.length === 0 && !ended) {
            console.log("[Poller] Scorecard empty, fetching match_info for fallback score...");
            const infoRes = await _cricFetch(`https://api.cricapi.com/v1/match_info?apikey=${key}&id=${mid}`);
            const infoData = await infoRes.json();
            if (infoData.status === "success") {
              const infoScore = infoData.data?.score || [];
              const infoStatus = infoData.data?.status || "";
              if (infoScore.length) statsUpdate["score"] = infoScore;
              if (infoStatus) statsUpdate["matchStatus"] = infoStatus;
              if (infoData.data?.matchEnded) {
                ended = true;
                // Mark ended but keep polling until admin finalizes (consistent with scorecard path)
                await updateDoc(doc(db, "matches", activeMid), {
                  matchEnded: true,
                  matchResult: infoData.data?.status || '',
                  matchStatus: infoData.data?.status || "Match Concluded",
                });
                // Fall through — don't stopAR or return
              }
            }
          }

          // Accumulate batting, bowling and fielding across innings before applying
          // (handles super over: same batsman may appear in main innings + super over innings)
          const batAcc = {},
            bowlAcc = {},
            catchAcc = {};
          sc.forEach((inn) => {
            (inn.batting || []).forEach((b) => {
              const raw = (b.batsman?.name || b.name || "")
                .trim();
              const m = robustMatch(raw);
              if (!m) return;
              const n = nl[m];

              // Always mark playing XI status — player is confirmed in the lineup
              if (playerStatus[n] !== "playing")
                statsUpdate[`playerStatus.${n}`] = "playing";

              // Guard: skip batting record for players at crease but who haven't faced a delivery yet.
              // CricAPI lists all batting-order players in the scorecard from the moment the innings
              // starts — opening batsmen show "0* 0b" before they face their first ball. Writing
              // batted:true + runs:0 + balls:0 for these players would pollute the stats grid and
              // cause incorrect early-match point calculations (showing ghost "batted" entries).
              const ballsFaced = b.b || 0;
              const runsScored = b.r || 0;
              const dismissed = b.dismissal &&
                !["not out", "retired hurt", "retired ill"].includes(
                  (b.dismissal || "").toLowerCase(),
                );
              if (ballsFaced === 0 && runsScored === 0 && !dismissed) {
                // Player is in batting order but hasn't faced a delivery yet — skip entirely.
                // playingXI is only granted by admin manually confirming via the status dropdown,
                // or when the player actually bats/bowls/fields. Lineup appearance alone must
                // not grant the +4 bonus (would create ghost points at match start).
                return;
              }

              if (!batAcc[n])
                batAcc[n] = {
                  runs: 0,
                  balls: 0,
                  fours: 0,
                  sixes: 0,
                  batted: false,
                  notOut: false,
                };
              batAcc[n].runs += runsScored;
              batAcc[n].balls += ballsFaced;
              batAcc[n].fours += b["4s"] || 0;
              batAcc[n].sixes += b["6s"] || 0;
              batAcc[n].batted = true;
              // notOut: empty/null = not out; "not out" = not out; "Retired hurt" = not out; anything else = dismissed
              batAcc[n].notOut = !dismissed;
              updated++;
            });
            (inn.bowling || []).forEach((bw) => {
              const raw = (bw.bowler?.name || bw.name || "")
                .trim();
              const m = robustMatch(raw);
              if (!m) return;
              const n = nl[m];
              if (!bowlAcc[n])
                bowlAcc[n] = {
                  wickets: 0,
                  overs: 0,
                  runsConceded: 0,
                  maidens: 0,
                  lbwBowled: 0,
                };
              bowlAcc[n].wickets += bw.w || 0;
              const realOv = toRealOvers(parseFloat(bw.o || bw.ov) || 0);
              bowlAcc[n].overs =
                Math.round((bowlAcc[n].overs + realOv) * 1000) / 1000;
              bowlAcc[n].runsConceded += bw.r || 0;
              bowlAcc[n].maidens += bw.m || 0;
              // Store API eco for single-innings (T20/ODI); multi-innings recalculates below
              if (bw.eco != null) bowlAcc[n]._lastEco = bw.eco;
              if (playerStatus[n] !== "playing")
                statsUpdate[`playerStatus.${n}`] = "playing";
            });
            // catching array: catches, stumpings, lbwBowled (per bowler), run-outs
            (inn.catching || []).forEach((c) => {
              // 1. Check Catcher for Catches/Stumpings/Runouts
              if (c.catcher?.name) {
                const rawC = c.catcher.name.trim();
                const mC = robustMatch(rawC);
                if (mC) {
                  const nC = nl[mC];
                  if (!catchAcc[nC]) catchAcc[nC] = { catches: 0, stumpings: 0, runOutIndirect: 0 };
                  catchAcc[nC].catches += (c.catch || 0) + (c.cb || 0);
                  catchAcc[nC].stumpings += c.stumped || 0;
                  catchAcc[nC].runOutIndirect += c.runout || 0;
                }
              }
              // 2. Check Bowler for LBW/Bowled points
              if (c.bowler?.name && (c.lbw || c.bowled)) {
                const rawB = c.bowler.name.trim();
                const mB = robustMatch(rawB);
                if (mB) {
                  const nB = nl[mB];
                  if (!bowlAcc[nB]) bowlAcc[nB] = { wickets: 0, overs: 0, runsConceded: 0, maidens: 0, lbwBowled: 0 };
                  bowlAcc[nB].lbwBowled += (c.lbw || 0) + (c.bowled || 0);
                }
              }
            });
          });
          Object.entries(batAcc).forEach(([n, bstats]) => {
            playerStats[n] = {
              ...(playerStats[n] || {}),
              ...bstats,
              playingXI: true,
            };
          });
          Object.entries(bowlAcc).forEach(([n, bstats]) => {
            // Use API eco directly for single-innings; for multi-innings use accumulated totals
            const inningsCount = sc.filter((inn) =>
              (inn.bowling || []).some((bw) => {
                const raw = (bw.bowler?.name || bw.name || "").toLowerCase();
                const m = robustMatch(raw);
                return m && nl[m] === n;
              }),
            ).length;
            const eco =
              inningsCount <= 1 && bstats._lastEco != null
                ? bstats._lastEco
                : bstats.overs >= 2
                  ? Math.round((bstats.runsConceded / bstats.overs) * 10) / 10
                  : null;
            const { _lastEco, ...cleanStats } = bstats;
            playerStats[n] = {
              ...(playerStats[n] || {}),
              ...cleanStats,
              eco,
              playingXI: true,
            };
            updated++;
          });
          Object.entries(catchAcc).forEach(([n, cstats]) => {
            playerStats[n] = { ...(playerStats[n] || {}), playingXI: true };
            if (cstats.catches > 0) playerStats[n].catches = cstats.catches;
            if (cstats.stumpings > 0)
              playerStats[n].stumpings = cstats.stumpings;
            if (cstats.lbwBowled > 0)
              playerStats[n].lbwBowled = cstats.lbwBowled;
            if (cstats.runOutIndirect > 0)
              playerStats[n].runOutIndirect = cstats.runOutIndirect;
            updated++;
          });
          // Save match score + status + over summaries alongside player stats
          const scoreArr = data.data?.score || [];
          const matchStatus = data.data?.status || "";
          if (scoreArr.length) statsUpdate["score"] = scoreArr;
          if (matchStatus) statsUpdate["matchStatus"] = matchStatus;
          if (overSummaries.length) statsUpdate["overSummaries"] = overSummaries;

          // Extract current active players from scorecard (Live Batsmen & Bowler)
          // Skip for ended matches — currentBatsmen/currentBowler were already cleared in the match-end update
          if (sc.length > 0 && !ended) {
            const curInn = sc[sc.length - 1];
            if (curInn.batting) {
              const notOutBatsmen = curInn.batting.filter(
                (b) =>
                  !b.dismissal ||
                  ["not out", "retired hurt", "retired ill"].includes(
                    (b.dismissal || "").toLowerCase(),
                  ),
              );

              const mapped = notOutBatsmen.map((b) => {
                const rawName = b.batsman?.name || b.name || "";
                const hasAsterisk = rawName.includes("*");
                const cleanName = rawName.replace("*", "").trim();
                const apiStrike = b.strike === 1 || b.strike === "1" ||
                  !!b.is_striker || !!b.isStriker || !!b.at_strike || hasAsterisk;
                return { name: cleanName, r: b.r || 0, b: b.b || 0, _apiStrike: apiStrike };
              });

              // Preserve manual override: if Firestore already has a strike flag set, keep it
              const prevBatsmen = (activeMatchData?.currentBatsmen || []);
              const manualStrikerName = prevBatsmen.find(p => p.strike)?.name;

              const activeBatsmen = mapped.map((b) => {
                // Priority 1: API provided a strike flag
                if (b._apiStrike) return { name: b.name, r: b.r, b: b.b, strike: true };
                // Priority 2: Manual override in Firestore still matches a current batsman
                if (manualStrikerName && b.name === manualStrikerName)
                  return { name: b.name, r: b.r, b: b.b, strike: true };
                // Priority 3: Balls-mod-6 heuristic — batsman with odd balls in current over
                // is likely on strike (only apply if exactly 2 not-out batsmen and no other signal)
                return { name: b.name, r: b.r, b: b.b, strike: false };
              });

              // If no strike flag was set by API or manual override, apply balls heuristic
              const anyStrike = activeBatsmen.some(b => b.strike);
              if (!anyStrike && activeBatsmen.length === 2) {
                const ballsMod = activeBatsmen.map(b => b.b % 6);
                // The one with an odd-ball count mid-over is more likely on strike
                if (ballsMod[0] !== ballsMod[1]) {
                  const strikerIdx = ballsMod[0] > ballsMod[1] ? 0 : 1;
                  activeBatsmen[strikerIdx].strike = true;
                } else {
                  // Identical or no signal — default to first batsman
                  activeBatsmen[0].strike = true;
                }
              }

              statsUpdate["currentBatsmen"] = activeBatsmen;
            }
            if (curInn.bowling) {
              // Find the bowler currently in an over (e.g., 3.1, 3.2 overs)
              const activeBowlers = curInn.bowling.filter(
                (bw) => (bw.o || bw.ov || 0) > 0,
              );
              if (activeBowlers.length > 0) {
                // Priority 1: Bowler with fractional over (currently bowling)
                const inProgress = activeBowlers.find(
                  (bw) => (bw.o || bw.ov || 0) % 1 !== 0,
                );
                // Priority 2: Last bowler in the list (most recently active in chronological lists)
                const bw = inProgress || activeBowlers[activeBowlers.length - 1];

                statsUpdate["currentBowler"] = {
                  name: bw.bowler?.name || bw.name,
                  w: bw.w || 0,
                  r: bw.r || 0,
                  o: bw.o || bw.ov || 0,
                };
              }
            }
          }

          // Auto-lock when scorecard confirms match has started (at least one batsman faced a ball)
          if (
            !activeMatchData?.locked &&
            !activeMatchData?.finalized &&
            sc.some((inn) => (inn.batting || []).length > 0)
          ) {
            const lockUp = { locked: true };
            if (!activeMatchData?.revealed) lockUp.revealed = true;
            await updateDoc(doc(db, "matches", activeMid), lockUp);
            toast("🔒 Match started — teams auto-locked");
          }

          // Always fold player stats into the update object before deciding whether to write
          if (updated > 0) {
            Object.entries(playerStats).forEach(([p, s]) => {
              statsUpdate[`stats.${p}`] = s;
            });
          }

          const hasUpdates = Object.keys(statsUpdate).length > 0;
          if (updated > 0 || scoreArr.length || hasUpdates) {
            await updateDoc(
              doc(db, "matches", activeMid),  // use captured ID — not getActiveMid() which changes if admin switches match
              statsUpdate,
            );
            console.log(`[Poller] Success! Synced ${Object.keys(activeMatchData?.playerStatus || {}).length} players for ${activeMid}`);
            const grid = document.getElementById("statsGrid");
            if (grid) {
              grid.innerHTML = renderStatsGrid("");
              bindSave();
              bindAvailSelects();
            }
            const cd = document.getElementById("arCountdown");
            if (cd) {
              const prev = cd.textContent;
              cd.textContent = "✓ updated";
              setTimeout(() => {

          return;

        stopAR();
        arSecs = secs;
        autoFetchStats();
        arInterval = setInterval(() => {
          autoFetchStats();
          arSecs = secs;

        arTimer = setInterval(() => {
          arSecs = Math.max(0, arSecs - 1);
          const el = document.getElementById("arCountdown");
          if (el) el.textContent = `next in ${arSecs}s`;

      // ── Sticky Score Pill ──
      function renderScorePill() {
        const mid = getActiveMid();
        const match = getMatch(mid);
        if (!mid || !match.label) return '';

        const isLive = match.locked && !match.finalized;
        const isDone = !!match.finalized;
        const badgeClass = isLive ? 'sp-badge-live' : isDone ? 'sp-badge-done' : 'sp-badge-open';
        const badgeText = isLive ? '● LIVE' : isDone ? 'FINAL' : 'OPEN';

        const scores = match.score || [];
        const t1Key = resolveTeamKey(match.t1 || (match.label || '').split('vs')[0]);
        const t2Key = resolveTeamKey(match.t2 || (match.label || '').split('vs')[1]);
        const t1Img = match.t1img || (t1Key ? IPL_TEAM_LOGOS[t1Key] : '');
        const t2Img = match.t2img || (t2Key ? IPL_TEAM_LOGOS[t2Key] : '');
        const t1Name = t1Key || (match.label || '').split('vs')[0]?.trim().split(' ').pop() || 'T1';
        const t2Name = t2Key || (match.label || '').split('vs')[1]?.trim().split(' ').pop() || 'T2';

        function scoreStr(teamKey) {
          const row = scores.find(s => {
            const inn = (s.inning || '').toUpperCase();
            return inn.includes(teamKey) || (resolveTeamKey(s.inning || '') === teamKey);
          });
          if (!row) return '';
          return `${row.r || 0}/${row.w || 0} (${parseFloat(row.o || 0).toFixed(1)})`;
        }

        const s1 = scoreStr(t1Key);
        const s2 = scoreStr(t2Key);
        const shortLabel = match.label ? match.label.split(',')[0] : '';

        return `<div class="score-pill" id="scorePill">
  <div class="sp-team">
    ${t1Img ? `<img src="${t1Img}" class="sp-logo" onerror="this.style.display='none'">` : ''}

      // ── Dynamic ambient background injector ──
      function injectTeamAmbient(match) {
        const tc = getTeamColor(match);
        // Safe hex→rgba: handles 3-char (#rgb) and 6-char (#rrggbb), ignores non-hex values
        const hexToRgba = (hex, a) => {
          if (!hex || hex[0] !== '#') return `rgba(59,130,246,${a})`;
          let h = hex.slice(1);
          if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
          if (h.length !== 6) return `rgba(59,130,246,${a})`;
          const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
          return `rgba(${r},${g},${b},${a})`;
        };
        const primary = tc.primary || '#3b82f6';
        const secondary = tc.secondary || '#6366f1';
        document.documentElement.style.setProperty('--team-primary', primary);
        document.documentElement.style.setProperty('--team-secondary', secondary);
        document.documentElement.style.setProperty('--team-glow-a', hexToRgba(primary, 0.55));
        document.documentElement.style.setProperty('--team-glow-b', hexToRgba(secondary, 0.45));
        // Directly paint the blob elements for instant vivid color
        const b1 = document.getElementById('auraBlob1');
        const b2 = document.getElementById('auraBlob2');
        if (b1) b1.style.background = hexToRgba(primary, 0.55);
        if (b2) b2.style.background = hexToRgba(secondary, 0.45);
      }

      function fmtName(n) {

        return parts[0][0] + " " + parts[parts.length - 1];
      }
      function mapRole(r) {
        if (!r) return "BAT";
        const rl = r.toLowerCase().trim();
        if (rl === "ar" || rl.includes("all")) return "AR";
        if (rl === "wk" || rl.includes("wk") || rl.includes("wicket")) return "WK";
        if (rl === "bowl" || rl.includes("bowl")) return "BOWL";
        if (rl === "bat" || rl.includes("bat")) return "BAT";
        return "BAT";
      }

      function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const easeOut = (t) => 1 - Math.pow(1 - t, 3); // cubic ease-out
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          obj.innerHTML = Math.floor(easeOut(progress) * (end - start) + start);
          if (progress < 1) {
            window.requestAnimationFrame(step);
          }
        };
        window.requestAnimationFrame(step);
      }

      function triggerCountUp() {
        const items = [];

          const end = parseInt(el.dataset.countUp);

          delete el.dataset.countUp; // Remove immediately so re-calls are no-ops
        });
        // Stagger animations to avoid 20+ simultaneous rAF loops freezing Android
        const stagger = items.length > 8 ? 30 : 50;
        items.forEach(({ el, end }, i) => {
          setTimeout(() => animateValue(el, 0, end, 600), i * stagger);
