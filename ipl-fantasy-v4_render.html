      // ── Match History Tab ──────────────────────────────────────────────

          (sd.matches || []).forEach(m => {

              // Parse team keys from label (works even when match is no longer in activeMatches)
              // Normalise separators: em-dash/en-dash/hyphen → ' vs ' before splitting
              const _lbl = (m.label || '').replace(/\s*[–—]\s*/g, ' vs ');
              const _t1raw = _lbl.split(/\s+vs\s+/i)[0]?.split(',')[0]?.trim() || '';
              const _t2raw = _lbl.split(/\s+vs\s+/i)[1]?.split(',')[0]?.trim() || '';
              const cached = activeMatches[m.matchId]?.match;
              const t1Key = resolveTeamKey(cached?.t1 || _t1raw);
              const t2Key = resolveTeamKey(cached?.t2 || _t2raw);
              const t1img = cached?.t1img || (t1Key ? IPL_TEAM_LOGOS[t1Key] : '');
              const t2img = cached?.t2img || (t2Key ? IPL_TEAM_LOGOS[t2Key] : '');
              const _fn = (session.isAdmin && !session.name) ? `openAdminMatchSummary('${m.matchId}')` : `openMatchSummary('${m.matchId}')`;
              return `<div class="hlist-card" onclick="${_fn}">
                <div class="hlc-logos">
                  ${t1img ? `<img src="${t1img}" class="hlc-logo" onerror="this.style.display='none'">` : '<div class="hlc-logo-ph"></div>'}
                  ${t2img ? `<img src="${t2img}" class="hlc-logo" onerror="this.style.display='none'">` : '<div class="hlc-logo-ph"></div>'}
                </div>

      window.openMatchSummary = async function(matchId) {
        const tabBody = document.getElementById('tab-body');
        if (!tabBody) return;
        tabBody.innerHTML = `<div class="loading-state"><div class="ls-spinner"></div><p>Loading match…</p></div>`;

        let match;
        // Use active cache if available (avoids unnecessary Firestore read)
        const cached = activeMatches[matchId];
        if (cached?.match?.finalized) {
          match = { ...cached.match, stats: cached.stats || {}, teams: cached.teams || {} };
        } else {
          try {
            const snap = await getDoc(doc(db, 'matches', matchId));
            if (!snap.exists()) { toast('Match not found', 'err'); switchTab('history'); return; }
            const d = snap.data();
            match = { ...d, stats: d.stats || {}, teams: d.teams || {} };
          } catch(e) {
            toast('Could not load match', 'err');
            switchTab('history');
            return;
          }
        }

        tabBody.innerHTML = renderMatchSummaryView(match, matchId);
      };

      function renderMatchSummaryView(match, mid, backFn = "switchTab('history')") {
        const stats = match.stats || {};
        const pool  = match.players || [];

        const t1 = match.t1 || (match.label || '').split(/\s+vs\s+/i)[0]?.split(',')[0]?.trim() || 'Team 1';
        const t2 = match.t2 || (match.label || '').split(/\s+vs\s+/i)[1]?.split(',')[0]?.trim() || 'Team 2';
        const t1Key = resolveTeamKey(t1);
        const t2Key = resolveTeamKey(t2);
        const t1img  = match.t1img || (t1Key ? IPL_TEAM_LOGOS[t1Key] : '');
        const t2img  = match.t2img || (t2Key ? IPL_TEAM_LOGOS[t2Key] : '');
        // Pick the brighter of primary/secondary so dark-primary teams (GT #1B2133) still show colour
        const _lum = (hex) => { const h=(hex||'').replace('#',''); if(h.length<6) return 0; return 0.299*parseInt(h.slice(0,2),16)+0.587*parseInt(h.slice(2,4),16)+0.114*parseInt(h.slice(4,6),16); };
        const _brightCol = (key, fallback) => { const tc = key && IPL_TEAM_COLORS[key]; if(!tc) return fallback; return _lum(tc.primary) >= _lum(tc.secondary) ? tc.primary : tc.secondary; };
        const t1col  = _brightCol(t1Key, '#2563ff');
        const t2col  = _brightCol(t2Key, '#f59e0b');

        const scores = match.score || [];
        const inningScore = (teamKey) => {
          const row = scores.find(s => resolveTeamKey(s.inning || '') === teamKey);
          if (!row) return null;
          return { r: row.r ?? '–', w: row.w ?? '–', o: parseFloat(row.o || 0).toFixed(1) };
        };

        const fmtOv  = (o) => { if (!o) return '0'; const f = Math.floor(o), b = Math.round((o-f)*10); return b>0?`${f}.${b}`:`${f}`; };
        const fmtSR  = (r, b) => b > 0 ? ((r/b)*100).toFixed(1) : '–';
        const fmtEco = (r, o) => { const ov = toRealOvers(o||0); return ov > 0 ? (r/ov).toFixed(2) : '–'; };

        const srClass  = (r, b) => { if (!b) return ''; const sr=(r/b)*100; return sr>=150?'hsc-hi':sr<100?'hsc-lo':''; };
        const ecoClass = (r, o) => { const ov=toRealOvers(o||0); if(!ov) return ''; const e=r/ov; return e<7?'hsc-hi':e>9?'hsc-lo':''; };

        const teamOf = (name) => {
          const p = pool.find(x => x.name === name);
          if (!p) return null;
          return resolveTeamKey(p.team || '') || normalizeTeam(p.team || '') || null;
        };

        // Strict filter: faced ≥1 ball = actually batted (eliminates DNB / full squad members)
        const getBatsmen = (tk) => Object.entries(stats)
          .filter(([n, s]) => teamOf(n) === tk && s.balls > 0)
          .sort((a,b) => (b[1].balls||0) - (a[1].balls||0));

        const getBowlers = (tk) => Object.entries(stats)
          .filter(([n, s]) => teamOf(n) === tk && toRealOvers(s.overs||0) > 0)
          .sort((a,b) => toRealOvers(b[1].overs||0) - toRealOvers(a[1].overs||0));

        // Fallback when pool has no team assignments: split stats by batting vs bowling dominance
        const _anyTeamAssigned = pool.some(p => !!(resolveTeamKey(p.team||'')||normalizeTeam(p.team||'')));
        const _statsExist = Object.keys(stats).length > 0;

        const runsClass = (r) => {
          if (r == null) return '';
          if (r >= 100) return 'hsc-r-ton';
          if (r >= 50)  return 'hsc-r-fifty';
          if (r >= 30)  return 'hsc-r-warm';
          if (r === 0)  return 'hsc-r-duck';
          return '';
        };
        const milestoneBadge = () => '';
        const haulBadge = (w) => {
          if (w >= 5)  return '<span class="hsc-badge hsc-badge-fifer">5W</span>';
          if (w >= 3)  return '<span class="hsc-badge hsc-badge-haul">3W</span>';
          return '';
        };

        const batRow = ([name, s]) => {
          const fld = [
            (s.catches||0)>0    ? `${s.catches}ct`     : '',
            (s.stumpings||0)>0  ? `${s.stumpings}st`   : '',
            (s.runOutDirect||0)+(s.runOutIndirect||0)>0 ? `RO` : ''
          ].filter(Boolean).join(' ');
          const sr = fmtSR(s.runs, s.balls);
          const r = s.runs ?? null;
          const isDuck = s.batted && !s.notOut && r === 0;
          return `
            <div class="hsc-bat-row${isDuck ? ' hsc-row-duck' : ''}">
              <span class="hsc-col-name">
                <span class="hsc-batter-name">${name}${s.notOut ? '<span class="hsc-no">*</span>' : ''}</span>
                ${fld ? `<span class="hsc-fld">${fld}</span>` : ''}
              </span>
              <span class="hsc-col-r">

      function isOverseas(playerName) {
        if (OVERSEAS_PLAYERS.has(playerName)) return true;
        // Fuzzy: match on last name only when ≥6 chars (excludes common surnames like Khan, Singh etc.)
        // Compare last name to last name to avoid "Ravindra" matching "Ravindra Jadeja" via Rachin Ravindra
        const n = playerName.toLowerCase();
        const playerLastName = n.split(" ").pop();
        for (const op of OVERSEAS_PLAYERS) {
          const o = op.toLowerCase();
          if (o.includes(n) || n.includes(o)) return true;
          const overseasLastName = o.split(" ").pop();
          if (
            overseasLastName.length >= 6 &&
            playerLastName === overseasLastName
          )
            return true;
        }
        return false;
      }

        return sel.filter((name) => isOverseas(name)).length;

        if (PLAYER_CREDITS[playerName]) return PLAYER_CREDITS[playerName];

        for (const [key, val] of Object.entries(PLAYER_CREDITS)) {
          const k = key.toLowerCase();
          const lastName = k.split(" ").pop();
          if (

            n.includes(lastName) &&

      function bindMember(bodyOnly = false) {
        triggerCountUp();
        bindModeToggle();
        if (!bodyOnly)
          document
            .getElementById("logoutBtn")
            ?.addEventListener("click", () => {
              stopAR();
              session = { name: null, isAdmin: false };
              sessionClear();
              history.replaceState({}, "", location.pathname);
              showScreen("login");
            });

        const tab = new URLSearchParams(location.search).get("tab") || "team";
        if (tab !== "team") return;

        // Always use the match the member is currently viewing
        const viewMid = memberSelectedMatchId || currentMatchId;
        const viewMatch = getMatch(viewMid);
        if (viewMatch.finalized || viewMatch.locked) return;
        const pool = viewMatch.players?.length
          ? viewMatch.players
          : matchPlayers;
        // Reset filters only on fresh page load (not reRender)
        if (!document.getElementById("pgrid")) {
          curRole = "ALL";
          curSearch = "";

        let _reRenderPending = false;
        function reRender() {
          if (_reRenderPending) return;

          // Surgical patch: only update elements that change on player toggle.
          // Avoids full tab-body replacement which causes scroll jumps on mobile.
          const pgridEl = document.getElementById("pgrid");
          if (pgridEl) {
            const sel2 = localTeam.players;
            // 1. Re-render player grid
            pgridEl.innerHTML = renderGrid(sel2, curRole, curSearch, pool);
            // 2. Counter badge

            // 3. Budget bar
            const bwEl = document.getElementById("budgetBarWrap");
            if (bwEl) {
              const spent = teamSpend(sel2);
              const left = BUDGET - spent;
              const pct = Math.min(100, (spent / BUDGET) * 100);
              bwEl.querySelector(".budget-num").className = `budget-num${left < 10 ? " budget-low" : ""}`;
              bwEl.querySelector(".budget-num").textContent = `${left} left`;
              const fill = bwEl.querySelector(".budget-fill");
              fill.className = `budget-fill${spent / BUDGET > 0.9 ? " budget-fill-warn" : ""}`;
              fill.style.width = `${pct}%`;
              bwEl.querySelector(".budget-spent").textContent = `${spent} / ${BUDGET} used`;
              const ovs = bwEl.querySelector(".ovs-counter");
              if (ovs && isIPLMatch()) {
                const cnt = overseasCount(sel2);
                ovs.className = `ovs-counter${cnt >= MAX_OVERSEAS ? " ovs-full" : ""}`;
                ovs.textContent = `✈ ${cnt}/${MAX_OVERSEAS} foreign`;

              ).join("");
            }
            const xiBudgetBadge = document.querySelector(".xi-budget-badge");
            if (xiBudgetBadge) {
              const sp = teamSpend(sel2);
              xiBudgetBadge.className = `xi-budget-badge${sp > BUDGET ? " xi-budget-over" : ""}`;
              xiBudgetBadge.textContent = `${sp}/${BUDGET}CR`;
            }
            // 6. Cap/VC selects + lock button area
            const xiBottomEl = document.getElementById("xiBottom");
            if (xiBottomEl) {
              const submitted2 = !!(allTeams[session.name] || {}).submitted;
              let bottomHTML = "";
              if (sel2.length > 0) {
                bottomHTML += `<div class="cap-grid" style="margin-top:10px">
                  <div class="cs"><label>Captain (2×)</label><select id="capSel">${sel2.map((p) => `<option value="${p}" ${p === localTeam.captain ? "selected" : ""}>${fmtName(p)}</option>`).join("")}</select></div>
                  <div class="cs"><label>Vice-Captain (1.5×)</label><select id="vcSel">${sel2.map((p) => `<option value="${p}" ${p === localTeam.vc ? "selected" : ""}>${fmtName(p)}</option>`).join("")}</select></div>
                </div>`;
              }
              bottomHTML += sel2.length === 11
                ? `<button class="btn-gold btn-lock" id="lockTeamBtn" style="margin-top:10px">${submitted2 ? "🔄 UPDATE MY TEAM" : "🔒 LOCK IN MY TEAM"}</button>`
                : `<div class="need-more" style="margin-top:10px">Need ${11 - sel2.length} more player${11 - sel2.length !== 1 ? "s" : ""}</div>`;
              xiBottomEl.innerHTML = bottomHTML;
            }

            bindRemove();

            document.getElementById("capSel")?.addEventListener("change", (e) => { localTeam.captain = e.target.value; if (localTeam.vc === e.target.value) localTeam.vc = ""; reRender(); });
            document.getElementById("vcSel")?.addEventListener("change", (e) => { localTeam.vc = e.target.value; if (localTeam.captain === e.target.value) localTeam.captain = ""; reRender(); });
            bindLockBtn();
            return;
          }

          // Fallback: full re-render (used on initial load or if builder not mounted)
          const sy = window.scrollY;
          const tabBody = document.getElementById("tab-body");
          if (tabBody) {
            tabBody.innerHTML = renderTeamTab();
            requestAnimationFrame(() => {
              _reRenderPending = false;
              bindMember(true);
              window.scrollTo(0, sy);

          } else {
            const memberBody = document.getElementById("member-body");
            if (memberBody) {
              const activeTabs = `<div class="view-tabs">
        <button class="vtab active" onclick="switchTab('team')">My Team</button>
        <button class="vtab" onclick="switchTab('live')">Live Scores</button>
        <button class="vtab" onclick="switchTab('stats')">Player Stats</button>
        <button class="vtab" onclick="switchTab('season')">Season Table</button>
        <button class="vtab" onclick="switchTab('history')">History</button>
      </div>`;
              memberBody.innerHTML =
                activeTabs + renderMemberMatchSelector() + `<div id="tab-body">${renderTeamTab()}</div>`;
              requestAnimationFrame(() => {
                _reRenderPending = false;
                bindMember(true);
                window.scrollTo(0, sy);
              });
            } else {
              _reRenderPending = false;
              showScreen("member");
              requestAnimationFrame(() => window.scrollTo(0, sy));
            }
          }
        }
        function bindRemove() {
          document.querySelectorAll(".xi-remove").forEach((btn) => {
            btn.onclick = (e) => {
              e.stopPropagation();
              const p = btn.dataset.p;
              localTeam.players = localTeam.players.filter((x) => x !== p);
              if (localTeam.captain === p) localTeam.captain = "";
              if (localTeam.vc === p) localTeam.vc = "";
              reRender();
            };
          });
        }
        function bindCards() {
          document.querySelectorAll(".pcard:not(.pcard-dis)").forEach((c) => {
            c.onclick = () => {
              const p = c.dataset.p;
              const pTeam = c.dataset.team;
              if (localTeam.players.includes(p)) {
                // Deselect
                localTeam.players = localTeam.players.filter((x) => x !== p);
                if (localTeam.captain === p) localTeam.captain = "";
                if (localTeam.vc === p) localTeam.vc = "";
              } else if (localTeam.players.length >= 11) {
                toast("Already have 11 players", "err");
                return;
              } else {
                // Check 6-per-team cap
                const counts = teamCounts(localTeam.players, pool);
                if ((counts[pTeam] || 0) >= MAX_PER_TEAM) {
                  toast(`Max ${MAX_PER_TEAM} players from ${pTeam}`, "err");
                  return;
                }
                // Check foreign cap (IPL only)
                if (
                  isIPLMatch() &&
                  isOverseas(p) &&
                  overseasCount(localTeam.players) >= MAX_OVERSEAS
                ) {
                  toast(`Max ${MAX_OVERSEAS} foreign players in XI`, "err");
                  return;
                }
                // Check role cap
                const pObj = pool.find((x) => x.name === p);
                const mappedRole = mapRole(pObj?.role);
                if (pObj && ROLE_LIMITS[mappedRole] && isIPLMatch()) {
                  const rc = roleCounts(localTeam.players, pool);
                  if (rc[mappedRole] >= ROLE_LIMITS[mappedRole].max) {
                    toast(
                      `Max ${ROLE_LIMITS[mappedRole].max} ${mappedRole} players allowed`,
                      "err",
                    );
                    return;
                  }
                }
                // Check budget cap
                const newSpend = teamSpend(localTeam.players) + getCredits(p);
                if (newSpend > BUDGET) {
                  toast(
                    `Not enough credits — would cost ${newSpend}/${BUDGET}`,
                    "err",
                  );
                  return;
                }
                localTeam.players.push(p);
                if (!localTeam.captain) localTeam.captain = p;
                else if (!localTeam.vc && p !== localTeam.captain)
                  localTeam.vc = p;
              }
              reRender();
            };
          });
        }
        bindCards();
        bindRemove();
        document.querySelectorAll(".rtab").forEach((b) => {
          b.onclick = () => {
            document
              .querySelectorAll(".rtab")
              .forEach((x) => x.classList.remove("active"));
            b.classList.add("active");
            curRole = b.dataset.r;
            reRender();
          };
        });
        document.getElementById("pSearch")?.addEventListener("input", (e) => {
          curSearch = e.target.value;
          reRender();
        });
        document.getElementById("capSel")?.addEventListener("change", (e) => {
          localTeam.captain = e.target.value;
          if (localTeam.vc === e.target.value) localTeam.vc = "";
          reRender();
        });
        document.getElementById("vcSel")?.addEventListener("change", (e) => {
          localTeam.vc = e.target.value;
          if (localTeam.captain === e.target.value) localTeam.captain = "";
          reRender();
        });
        function bindLockBtn() {
          document
            .getElementById("lockTeamBtn")
            ?.addEventListener("click", handleLockTeam);
        }
        async function handleLockTeam() {
          // Guard: re-check lock state in case match was locked while member was picking
          const freshMatch = getMatch(memberSelectedMatchId || currentMatchId);
          if (freshMatch.locked || freshMatch.finalized) {
            toast("Match is locked — no more changes allowed", "err");
            refreshView();
            return;
          }
          if (localTeam.players.length !== 11) {
            toast("Select exactly 11 players", "err");
            return;
          }
          if (!localTeam.captain) {
            toast("Pick a Captain", "err");
            return;
          }
          if (!localTeam.vc || localTeam.vc === localTeam.captain) {
            toast("Pick a different Vice-Captain", "err");
            return;
          }
          // Enforce 6-per-team cap
          const finalCounts = teamCounts(localTeam.players, pool);
          const breached = Object.entries(finalCounts).find(
            ([, c]) => c > MAX_PER_TEAM,
          );
          if (breached) {
            toast(
              `Too many players from ${breached[0]} (max ${MAX_PER_TEAM})`,
              "err",
            );
            return;
          }
          // Enforce foreign cap (IPL only)
          if (isIPLMatch()) {
            const totalOvs = overseasCount(localTeam.players);
            if (totalOvs > MAX_OVERSEAS) {
              toast(
                `Too many foreign players (${totalOvs}/${MAX_OVERSEAS} max)`,
                "err",
              );
              return;
            }
          }
          // Enforce role minimums
          if (isIPLMatch()) {
            const rc = roleCounts(localTeam.players, pool);
            for (const [role, limits] of Object.entries(ROLE_LIMITS)) {
              if (rc[role] < limits.min) {
                toast(
                  `Need at least ${limits.min} ${role} player${limits.min > 1 ? "s" : ""}`,
                  "err",
                );
                return;
              }
              if (rc[role] > limits.max) {
                toast(`Max ${limits.max} ${role} players allowed`, "err");
                return;
              }
            }
          }
          // Enforce budget cap
          const totalSpend = teamSpend(localTeam.players);
          if (totalSpend > BUDGET) {
            toast(`Over budget! ${totalSpend}/${BUDGET} credits used`, "err");
            return;
          }
          const btn = document.getElementById("lockTeamBtn");
          const wasSubmitted = !!(allTeams[session.name] || {}).submitted;
          const restoreLabel = wasSubmitted ? "🔄 UPDATE MY TEAM" : "🔒 LOCK IN MY TEAM";
          if (btn) { btn.textContent = "Saving…"; btn.disabled = true; }
          try {
            // Always save to the match the member is currently viewing
            const saveMid = memberSelectedMatchId || currentMatchId;
            const matchRef = doc(db, "matches", saveMid);
            await updateDoc(matchRef, {
              [`teams.${session.name}`]: {
                players: localTeam.players,
                captain: localTeam.captain,
                vc: localTeam.vc,
                submitted: true,
                updatedAt: Date.now(),
              },
            });
            allTeams[session.name] = { ...localTeam, submitted: true };
            toast("Team saved! ✅");
            refreshView();
          } catch (e) {
            toast("Error: " + e.message, "err");
            const b = document.getElementById("lockTeamBtn"); // re-query in case DOM refreshed
            if (b) { b.textContent = restoreLabel; b.disabled = false; }
          }
        }
        bindLockBtn();
      }

      function renderMatchSelectorTabs() {
        const allIds = [
          ...new Set(
            [...(metaGame.activeMatchIds || []), currentMatchId].filter(
              Boolean,
            ),
          ),
        ];
        if (allIds.length <= 1) return "";
        return `
  <div class="match-selector-tabs">
    <div class="mst-label">SELECT MATCH</div>
    <div class="mst-tabs">
      ${allIds
        .map((mid) => {
          const m = getMatch(mid);
          const isSelected = mid === (adminSelectedMatchId || currentMatchId);
          const status = m.finalized
            ? "Final"
            : m.locked
              ? "Locked"
              : m.revealed
                ? "Revealed"
                : "Open";
          const statusClass = m.finalized
            ? "mst-final"
            : m.locked
              ? "mst-locked"
              : m.revealed
                ? "mst-revealed"
                : "mst-open";
          const label = m.label && m.label.trim() ? m.label : null;
          // Skip ghost matches — raw match IDs with no label
          if (!label) return "";
          return `<button class="mst-tab ${isSelected ? "mst-active" : ""}" onclick="selectMatchTab('${mid}')">
          <div class="mst-flags">
            ${m.t1img ? `<img src="${m.t1img}" class="mst-flag">` : ""}
            ${m.t2img ? `<img src="${m.t2img}" class="mst-flag">` : ""}
          </div>
          <span class="mst-name">${shortName(label)}</span>
          <span class="mst-status ${statusClass}">${status}</span>
        </button>`;
        })
        .join("")}
    </div>
  </div>`;
      }

      function renderAdminMatch() {
        const activeMid = getActiveMid();
        const viewMatch = getMatch(activeMid);
        const hasMatch = !!viewMatch.label;
        const locked = viewMatch.locked || viewMatch.finalized;
        const revealed = viewMatch.revealed || viewMatch.finalized;
        const finalized = viewMatch.finalized;
        const xiReady = Object.keys(viewMatch.playerStatus || {}).length > 0;
        const members = Object.keys(allMembers);
        const subs = members.filter(
          (n) => (getTeams(activeMid)[n] || {}).submitted,
        ).length;
        const ranked = members
          .map((n) => ({
            name: n,
            total: memberMatchTotal(getTeams(activeMid)[n] || {}, getStats(activeMid)),
            submitted: !!(getTeams(activeMid)[n] || {}).submitted,

      window.parseSquadList = async function() {
        const activeMid = getActiveMid();
        if (!activeMid) { toast("Create a match first", "err"); return; }
        const text = document.getElementById("bulkSquadBox").value;
        if (!text.trim()) { toast("Paste a list of names first", "err"); return; }

        const pool = getPlayers(activeMid);
        const poolNames = pool.map(p => {
          const lower = p.name.toLowerCase().replace(/[^a-z\s]/g, '').trim();
          const words = lower.split(/\s+/).filter(w => w.length > 0);
          return { name: p.name, clean: lower.replace(/\s/g, ''), words };
        });

        // 1-char edit distance (same length names only, e.g. Ahmad↔Ahmed)
        function nearMatch(a, b) {
          if (a === b) return true;
          if (Math.abs(a.length - b.length) > 1 || a.length < 4) return false;
          let diffs = 0;
          const [shorter, longer] = a.length <= b.length ? [a, b] : [b, a];
          let si = 0, li = 0;
          while (si < shorter.length && li < longer.length) {
            if (shorter[si] !== longer[li]) {
              diffs++;
              if (diffs > 1) return false;
              if (shorter.length === longer.length) { si++; li++; } else li++;
            } else { si++; li++; }
          }
          return diffs <= 1;
        }

        const update = {};
        let foundCount = 0;
        let currentStatus = "playing"; // Default mode

        // Split text into lines to detect headers dynamically
        const lines = text.split(/\n/);

        lines.forEach(line => {
          const lowerLine = line.toLowerCase();

          // Header detection: Switch modes based on what we find in the line
          const isImpactLine = lowerLine.includes("impact") || lowerLine.includes("substitutes");
          const isPlayingLine = lowerLine.includes("playing xi") || lowerLine.includes("(playing xi)") || lowerLine.includes("starting xi");

          // Strip the header prefix so the first player name on the same line isn't swallowed.
          // e.g. "LSG Impact Subs - Manimaran Siddharth, George Linde" → "Manimaran Siddharth, George Linde"
          let nameLine = line;
          if (isImpactLine && !isPlayingLine) {
            currentStatus = "impact";
            nameLine = nameLine.replace(/^[^,]*?(?:impact\s*sub(?:stitute)?s?|substitutes)\s*[-:–—]?\s*/i, '');
          } else if (isPlayingLine) {
            currentStatus = "playing";
            nameLine = nameLine.replace(/^[^,]*?(?:playing\s*xi|starting\s*xi)\s*[-:–—]?\s*/i, '');
          }

          // Split line by common separators
          const namesInLine = nameLine.split(/[,;\t:]|(?:\s+vs\s+)/i).map(n => n.trim()).filter(n => n.length > 2);

          namesInLine.forEach(raw => {
            // Clean markers and ignore parentheses
            const cleanRaw = raw.toLowerCase().replace(/\(.*?\)/g, "").replace(/[^a-z\s]/gi, "").trim();
            const search = cleanRaw.replace(/[^a-z]/g, "");
            const inputWords = cleanRaw.split(/\s+/).filter(w => w.length > 0);
            const inputLast = inputWords[inputWords.length - 1] || "";
            if (!search || search.length < 3) return;

            // 1. Exact / contains match (space-stripped)
            let hit = poolNames.find(p => p.clean === search || p.clean.includes(search) || search.includes(p.clean));

            // 2. Last-name match with 1-char edit distance tolerance (handles Ahmad↔Ahmed etc.)
            if (!hit && inputLast.length >= 4) {
              hit = poolNames.find(p => {
                const poolLast = p.words[p.words.length - 1] || '';
                return nearMatch(poolLast, inputLast);
              });
            }

            // 3. Last-5-char suffix fallback
            if (!hit && search.length >= 5) {
              const lastFive = search.substring(search.length - 5);
              hit = poolNames.find(p => p.clean.endsWith(lastFive));
            }

            if (hit) {
              // PROTECTION: If player is already "playing" in this paste or DB, don't let "impact" downgrade them
              if (currentStatus === "impact" && (update[`playerStatus.${hit.name}`] === "playing" || playerStatus[hit.name] === "playing")) return;

              const isActuallyPlaying = (currentStatus === "playing");
              update[`playerStatus.${hit.name}`] = currentStatus;
              update[`stats.${hit.name}.playingXI`] = isActuallyPlaying;
              update[`stats.${hit.name}.isImpact`] = (currentStatus === "impact");
              
              if (!playerStats[hit.name]) playerStats[hit.name] = {};
              playerStats[hit.name].playingXI = isActuallyPlaying;
              playerStats[hit.name].isImpact = (currentStatus === "impact");
              foundCount++;
            }
          });
        });

        if (foundCount > 0) {
          skipNextRefresh = true;
          await updateDoc(doc(db, "matches", activeMid), update).catch((e) => {
            skipNextRefresh = false;
            throw e;
          });
          toast(`Bulk marked ~${foundCount} players! ⚡`);
          document.getElementById("bulkSquadBox").value = "";
          const grid = document.getElementById("statsGrid");
          if (grid) {
            grid.innerHTML = renderStatsGrid("");
            bindSave();
            bindAvailSelects();
            triggerCountUp();
          }
        } else {
          toast("No players from your pool matched the text.", "err");
        }
      };

      window.parseScorecardText = function() {
        if (!getActiveMid()) { toast("Create a match first", "err"); return; }
        const text = document.getElementById("pasteScorecardBox").value;
        if (!text.trim()) { toast("Paste scorecard text first", "err"); return; }

        const activeMid = getActiveMid();
        const pool = activeMid ? getPlayers(activeMid) : [];
        if (!pool.length) { toast("No players in pool — load match first", "err"); return; }

        const lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);
        let updatedCount = 0;

        // ── Name matching ──
        const findMatch = function(rawName) {
          if (!rawName) return null;
          var clean = rawName.toLowerCase().replace(/[^a-z\s]/g, '').trim();
          if (!clean) return null;
          var hit = pool.find(function(p) { return p.name.toLowerCase() === clean; });
          if (hit) return hit;
          hit = pool.find(function(p) {
            var pn = p.name.toLowerCase();
            return pn.includes(clean) || clean.includes(pn);
          });
          if (hit) return hit;
          var parts = clean.split(/\s+/);
          if (parts.length >= 2) {
            var firstInitial = parts[0][0];
            var lastName = parts[parts.length - 1];
            hit = pool.find(function(p) {
              var pp = p.name.toLowerCase().split(/\s+/);
              return pp.length >= 2 && pp[0][0] === firstInitial && pp[pp.length - 1] === lastName;
            });
            if (hit) return hit;
          }
          var lastWord = parts[parts.length - 1];
          if (lastWord.length >= 4) {
            hit = pool.find(function(p) { return p.name.toLowerCase().endsWith(lastWord); });
            if (hit) return hit;
          }
          return null;
        };

        const initStat = function(name) {
          if (!playerStats[name]) playerStats[name] = {};
          playerStats[name].playingXI = true;
          return playerStats[name];
        };

        // ── Regex definitions ──
        // BOWL_RE: Name  O  M  R  W  NB  WD  ECO  (8 numeric groups — structurally distinct from batting)
        var BOWL_RE = /^(.+?)\s+([\d.]+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+([\d.]+|0\.00|-)$/;
        // BAT_RE:  Name [dismissal]  R  B  4s  6s  SR  (5 numeric groups)
        var BAT_RE  = /^(.+?)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+([\d.]+|0\.00|-)$/;

        // ── PHASE 1: DISCOVERY SCAN ──
        // Find every player referenced in this paste (own row + dismissal mentions).
        // We only reset stats for these players — everyone else keeps their existing data.
        // This preserves 1st innings scores when pasting 2nd innings.
        var playersInPaste = new Set();

        lines.forEach(function(line) {
          var ll = line.toLowerCase();
          // Skip pure header lines (no 2-digit numbers)
          if (/\b(bowler|bowling|batter|batting)\b/.test(ll) && line.trim().split(/\s+/).length <= 8 && !/\d{2,}/.test(line)) return;

          var bwScan = BOWL_RE.exec(line);
          if (bwScan) {
            var p = findMatch(bwScan[1]);
            if (p) playersInPaste.add(p.name);
            return;
          }

          var btScan = BAT_RE.exec(line);
          if (btScan) {
            var fullName = btScan[1];
            var batterName = fullName.split(/(?:\s+c\s+|\s+b\s+|\s+lbw\s+|\s+st\s+|\s+run\s+out|\s+not\s+out|\s+\(c\)|\s+\(wk\))/i)[0].trim();
            var bp = findMatch(batterName);
            if (bp) playersInPaste.add(bp.name);

            // Also detect fielders mentioned in dismissal text
            var dis = fullName.toLowerCase();
            var dm;
            dm = dis.match(/c\s+(?:&|and)\s+b\s+(.+)/i);
            if (dm) { var fx = findMatch(dm[1]); if (fx) playersInPaste.add(fx.name); }
            dm = dis.match(/c\s+(.+?)\s+b\s+/i);
            if (dm) { var fy = findMatch(dm[1]); if (fy) playersInPaste.add(fy.name); }
            dm = dis.match(/st\s+(.+?)\s+b\s+/i);
            if (dm) { var fz = findMatch(dm[1]); if (fz) playersInPaste.add(fz.name); }
            dm = dis.match(/run\s+out\s+\((.+?)\)/i);
            if (dm) {
              dm[1].split(/[/+&]|and/i).forEach(function(rf) {
                var fw = findMatch(rf.trim()); if (fw) playersInPaste.add(fw.name);
              });
            }
          }
        });

        // ── PHASE 2: TARGETED RESET ──
        // Only zero out stats for players found in this paste.
        // Players NOT in this paste (other innings) are untouched.
        pool.forEach(function(p) {
          if (!playersInPaste.has(p.name)) return;
          if (!playerStats[p.name]) playerStats[p.name] = {};
          Object.assign(playerStats[p.name], {
            batted: false, runs: 0, balls: 0, fours: 0, sixes: 0, notOut: false,
            overs: 0, maidens: 0, runsConceded: 0, wickets: 0, lbwBowled: 0,
            catches: 0, stumpings: 0, runOutDirect: 0, runOutIndirect: 0,
          });
        });

        // ── PHASE 3: REGEX-FIRST PARSE ──
        // Bowling (8 cols) tried first — structurally can't match a batting row.
        // If bowling matches, return immediately — batting block never runs for that line.
        lines.forEach(function(line) {
          var ll = line.toLowerCase();
          if (/\b(bowler|bowling|batter|batting)\b/.test(ll) && line.trim().split(/\s+/).length <= 8 && !/\d{2,}/.test(line)) return;

          var bowlMatch = BOWL_RE.exec(line);
          if (bowlMatch) {
            var bp = findMatch(bowlMatch[1]);
            if (bp) {
              if (!playerStats[bp.name]) playerStats[bp.name] = {};
              playerStats[bp.name].playingXI = true;
              var ov = parseFloat(bowlMatch[2]) || 0;
              // Normalise cricket overs notation: 1.6 → 2.0, 3.7 → 4.1 etc.
              if (parseFloat((ov % 1).toFixed(1)) >= 0.6) {
                var full = Math.floor(ov);
                var bb = Math.round((ov - full) * 10);
                ov = full + Math.floor(bb / 6) + (bb % 6) / 10;
              }
              // ONLY bowling fields written — batting fields never touched
              Object.assign(playerStats[bp.name], {
                overs:        ov,
                maidens:      parseInt(bowlMatch[3], 10) || 0,
                runsConceded: parseInt(bowlMatch[4], 10) || 0,
                wickets:      parseInt(bowlMatch[5], 10) || 0,
              });
              updatedCount++;
            }
            return; // hard stop — do not fall through to batting check
          }

          var batMatch = BAT_RE.exec(line);
          if (batMatch) {
            var fullName = batMatch[1];
            var batterName = fullName.split(/(?:\s+c\s+|\s+b\s+|\s+lbw\s+|\s+st\s+|\s+run\s+out|\s+not\s+out|\s+\(c\)|\s+\(wk\))/i)[0].trim();
            var batp = findMatch(batterName);
            var p = batp;
            if (p) {
              // ONLY batting fields written — bowling fields never touched
              var s = initStat(p.name);
              s.batted = true;
              s.notOut = /not\s+out/i.test(fullName);
              s.runs  = parseInt(batMatch[2], 10) || 0;
              s.balls = parseInt(batMatch[3], 10) || 0;
              s.fours = parseInt(batMatch[4], 10) || 0;
              s.sixes = parseInt(batMatch[5], 10) || 0;
              updatedCount++;

              // Dismissal → fielding & bowling bonuses
              var dis = fullName.toLowerCase();
              var m;
              m = dis.match(/c\s+(?:&|and)\s+b\s+(.+)/i);
              if (m) {
                var bowler = findMatch(m[1]);
                if (bowler) { var bs = initStat(bowler.name); bs.catches = (bs.catches || 0) + 1; }
              } else {
                m = dis.match(/c\s+(.+?)\s+b\s+(.+)/i);
                if (m) { var fi = findMatch(m[1]); if (fi) { var fs = initStat(fi.name); fs.catches = (fs.catches || 0) + 1; } }
                m = dis.match(/st\s+(.+?)\s+b\s+(.+)/i);
                if (m) { var fi2 = findMatch(m[1]); if (fi2) { var fs2 = initStat(fi2.name); fs2.stumpings = (fs2.stumpings || 0) + 1; } }
                var isLBW    = dis.includes("lbw b ");
                var isBowled = /(?:\s|^)b\s+/.test(dis) && !dis.includes(" c ") && !dis.includes(" st ") && !dis.includes("run out");
                if (isLBW || isBowled) {
                  var bParts = dis.split(/\s+b\s+/);
                  var bwl = findMatch(bParts[bParts.length - 1].trim());
                  if (bwl) { var bws = initStat(bwl.name); bws.lbwBowled = (bws.lbwBowled || 0) + 1; }
                }
              }
              m = dis.match(/run\s+out\s+\((.+?)\)/i);
              if (m) {
                m[1].split(/[/+&]|and/i).forEach(function(rf) {
                  var fielder = findMatch(rf.trim());
                  if (fielder) {
                    var fld = initStat(fielder.name);
                    if (m[1].split(/[/+&]|and/i).length === 1) fld.runOutDirect = (fld.runOutDirect || 0) + 1;
                    else fld.runOutIndirect = (fld.runOutIndirect || 0) + 1;
                  }
                });
              }
            }
          }
        });

        // ── PHASE 4: SAVE & SYNC ──
        if (updatedCount === 0) { toast("No stats matched. Check scorecard format.", "err"); return; }

        var activeMid2 = getActiveMid();
        if (!activeMid2) { toast("Match ID lost — please reload", "err"); return; }

        // Build Firestore payload — only write players in this paste + preserve everyone else
        var statsUpdate2 = {};
        Object.keys(playerStats).forEach(function(pName) {
          var s = playerStats[pName];
          if (!s) return;
          delete s.eco; // force calcPoints to recalculate economy from overs/runsConceded
          statsUpdate2['stats.' + pName] = s;
        });

        cleanupGhostStats(activeMid2, true); // fix ghost stats in-memory; main write below handles Firestore
        skipNextRefresh = true; // suppress onSnapshot re-render — we do our own below
        updateDoc(doc(db, "matches", activeMid2), statsUpdate2)
          .then(function() {
            skipNextRefresh = false;
            return getDoc(doc(db, "matches", activeMid2));
          })
          .then(function(snap) {
            if (!snap.exists()) return;
            var fresh = snap.data();
            playerStats = fresh.stats || {};
            // calcPoints runs inside renderStatsGrid for every player
            var grid = document.getElementById("statsGrid");
            if (grid) {
              grid.innerHTML = renderStatsGrid(document.getElementById("statsSearch") ? document.getElementById("statsSearch").value : "");
              if (typeof bindSave === "function") bindSave();
              if (typeof bindAvailSelects === "function") bindAvailSelects();
              triggerCountUp();
            }
            toast("Parsed & saved " + updatedCount + " players! ✨");
            var box = document.getElementById("pasteScorecardBox");
            if (box) box.value = "";
          })
          .catch(function(e) { toast("Save error: " + e.message, "err"); });
      };

      window.parseJsonScorecard = async function() {
        const activeMid = getActiveMid();
        if (!activeMid) { toast("Create a match first", "err"); return; }
        const raw = document.getElementById("pasteJsonScorecardBox").value.trim();
        if (!raw) { toast("Paste CricAPI JSON first", "err"); return; }

        let data;
        try { data = JSON.parse(raw); } catch(e) { toast("Invalid JSON — check paste", "err"); return; }

        // Accept both a full API response envelope or just the .data payload
        const payload = data.data || data;
        const sc = payload.scorecard || payload.score_card || [];
        if (!sc.length) { toast("No scorecard found in JSON", "err"); return; }

        const pool = getPlayers(activeMid);
        if (!pool.length) { toast("No players in pool — load match first", "err"); return; }

        // Build name lookup (same as autoFetchStats poller)
        const nl = {};
        pool.forEach(p => {
          const clean = p.name.toLowerCase().replace(/[^a-z\s]/g, '').trim();
          nl[clean] = p.name;
          (p.altnames || []).forEach(alt => { nl[alt.toLowerCase().replace(/[^a-z\s]/g, '').trim()] = p.name; });
        });
        const nlKeys = Object.keys(nl);

        function robustMatch(name) {
          if (!name) return null;
          const clean = name.toLowerCase().replace(/[^a-z\s]/g, '').trim();
          if (!clean) return null;
          if (nl[clean]) return clean;
          const hit = nlKeys.find(k => k.includes(clean) || clean.includes(k));
          if (hit) return hit;
          const parts = clean.split(/\s+/);
          if (parts.length >= 2) {
            const fi = parts[0][0], last = parts[parts.length - 1];
            const ih = nlKeys.find(k => { const kp = k.split(/\s+/); return kp.length >= 2 && kp[0][0] === fi && kp[kp.length-1] === last; });
            if (ih) return ih;
          }
          const lastWord = parts[parts.length - 1];
          if (lastWord.length >= 4) { const lh = nlKeys.find(k => k.endsWith(lastWord)); if (lh) return lh; }
          return null;
        }

        function toRealOvers(o) { const w = Math.floor(o), b = Math.round((o - w) * 10); return w + b / 6; }

        const batAcc = {}, bowlAcc = {}, catchAcc = {};
        const statsUpdate = {};

        sc.forEach(inn => {
          (inn.batting || []).forEach(b => {
            const m = robustMatch(b.batsman?.name || b.name || "");
            if (!m) return;
            const n = nl[m];
            if (playerStatus[n] !== "playing") statsUpdate[`playerStatus.${n}`] = "playing";
            const balls = b.b || 0, runs = b.r || 0;
            const dismissed = b.dismissal && !["not out","retired hurt","retired ill"].includes((b.dismissal||"").toLowerCase());
            if (balls === 0 && runs === 0 && !dismissed) return;
            if (!batAcc[n]) batAcc[n] = { runs:0, balls:0, fours:0, sixes:0, batted:false, notOut:false };
            batAcc[n].runs += runs; batAcc[n].balls += balls;
            batAcc[n].fours += b["4s"] || 0; batAcc[n].sixes += b["6s"] || 0;
            batAcc[n].batted = true; batAcc[n].notOut = !dismissed;
          });
          (inn.bowling || []).forEach(bw => {
            const m = robustMatch(bw.bowler?.name || bw.name || "");
            if (!m) return;
            const n = nl[m];
            if (!bowlAcc[n]) bowlAcc[n] = { wickets:0, overs:0, runsConceded:0, maidens:0, lbwBowled:0 };
            bowlAcc[n].wickets += bw.w || 0;
            bowlAcc[n].overs = Math.round((bowlAcc[n].overs + toRealOvers(parseFloat(bw.o||bw.ov)||0)) * 1000) / 1000;
            bowlAcc[n].runsConceded += bw.r || 0;
            bowlAcc[n].maidens += bw.m || 0;
            if (bw.eco != null) bowlAcc[n]._lastEco = bw.eco;
            if (playerStatus[n] !== "playing") statsUpdate[`playerStatus.${n}`] = "playing";
          });
          (inn.catching || []).forEach(c => {
            if (c.catcher?.name) {
              const mC = robustMatch(c.catcher.name);
              if (mC) {
                const nC = nl[mC];
                if (!catchAcc[nC]) catchAcc[nC] = { catches:0, stumpings:0, runOutIndirect:0 };
                catchAcc[nC].catches += (c.catch||0) + (c.cb||0);
                catchAcc[nC].stumpings += c.stumped||0;
                catchAcc[nC].runOutIndirect += c.runout||0;
              }
            }
            if (c.bowler?.name && (c.lbw || c.bowled)) {
              const mB = robustMatch(c.bowler.name);
              if (mB) {
                const nB = nl[mB];
                if (!bowlAcc[nB]) bowlAcc[nB] = { wickets:0, overs:0, runsConceded:0, maidens:0, lbwBowled:0 };
                bowlAcc[nB].lbwBowled += (c.lbw||0) + (c.bowled||0);
              }
            }
          });
        });

        let updated = 0;
        Object.entries(batAcc).forEach(([n, s]) => {
          playerStats[n] = { ...(playerStats[n]||{}), ...s, playingXI: true };
          statsUpdate[`stats.${n}.runs`] = s.runs; statsUpdate[`stats.${n}.balls`] = s.balls;
          statsUpdate[`stats.${n}.fours`] = s.fours; statsUpdate[`stats.${n}.sixes`] = s.sixes;
          statsUpdate[`stats.${n}.batted`] = s.batted; statsUpdate[`stats.${n}.notOut`] = s.notOut;
          statsUpdate[`stats.${n}.playingXI`] = true; updated++;
        });
        Object.entries(bowlAcc).forEach(([n, s]) => {
          const eco = s._lastEco != null ? s._lastEco : (s.overs >= 2 ? Math.round((s.runsConceded/s.overs)*10)/10 : null);
          const { _lastEco, ...clean } = s;
          playerStats[n] = { ...(playerStats[n]||{}), ...clean, eco, playingXI: true };
          statsUpdate[`stats.${n}.wickets`] = clean.wickets; statsUpdate[`stats.${n}.overs`] = clean.overs;
          statsUpdate[`stats.${n}.runsConceded`] = clean.runsConceded; statsUpdate[`stats.${n}.maidens`] = clean.maidens;
          statsUpdate[`stats.${n}.lbwBowled`] = clean.lbwBowled; if (eco != null) statsUpdate[`stats.${n}.eco`] = eco;
          statsUpdate[`stats.${n}.playingXI`] = true; updated++;
        });
        Object.entries(catchAcc).forEach(([n, s]) => {
          playerStats[n] = { ...(playerStats[n]||{}), playingXI: true };
          if (s.catches > 0) { playerStats[n].catches = s.catches; statsUpdate[`stats.${n}.catches`] = s.catches; }
          if (s.stumpings > 0) { playerStats[n].stumpings = s.stumpings; statsUpdate[`stats.${n}.stumpings`] = s.stumpings; }
          if (s.runOutIndirect > 0) { playerStats[n].runOutIndirect = s.runOutIndirect; statsUpdate[`stats.${n}.runOutIndirect`] = s.runOutIndirect; }
          statsUpdate[`stats.${n}.playingXI`] = true; updated++;
        });

        // Score + status
        const scoreArr = payload.score || payload.scores || [];
        const matchStatus = payload.status || payload.matchStatus || "";
        if (scoreArr.length) statsUpdate["score"] = scoreArr;
        if (matchStatus) statsUpdate["matchStatus"] = matchStatus;

        if (!updated) { toast("No matching players found in JSON", "err"); return; }

        try {
          skipNextRefresh = true;
          await updateDoc(doc(db, "matches", activeMid), statsUpdate);
          toast(`✅ JSON parsed — ${updated} players updated. Hit Save All to confirm.`);
          document.getElementById("pasteJsonScorecardBox").value = "";
          const grid = document.getElementById("statsGrid");
          if (grid) { grid.innerHTML = renderStatsGrid(""); bindSave(); bindAvailSelects(); triggerCountUp(); }
        } catch(e) {
          skipNextRefresh = false;
          toast("Save error: " + e.message, "err");
        }
      };

      // Fix 3 — Ghost-stat sanitization helper
      // Cleans up Firestore corruption where bowling rows were previously mis-parsed as batting.
      // skipWrite=true when called from parser (main write follows immediately, making this write redundant)
      window.cleanupGhostStats = function(mid, skipWrite) {
        mid = mid || getActiveMid();
        if (!mid) return;
        const pool = getPlayers(mid);
        const statsUpdate = {};
        let cleaned = 0;
        pool.forEach(p => {
          const s = playerStats[p.name];
          if (!s) return;
          // Ghost: batted=true but 0 balls faced — was never actually a batter
          if (s.batted && (s.balls === 0 || s.balls == null)) {
            s.batted = false;
            statsUpdate[`stats.${p.name}.batted`] = false;
            cleaned++;
          }
          // Ghost: runs > 0 but 0 balls — runs conceded bled into batting runs
          if ((s.runs || 0) > 0 && (s.balls === 0 || s.balls == null) && !s.batted) {
            s.runs = 0;
            statsUpdate[`stats.${p.name}.runs`] = 0;
            cleaned++;
          }
        });
        if (cleaned > 0 && !skipWrite) {
          updateDoc(doc(db, "matches", mid), statsUpdate)
            .then(() => toast(`🧹 Cleaned ${cleaned} ghost stat(s)`))
            .catch(e => console.warn("cleanupGhostStats error:", e.message));
        }
        return cleaned;
      };

            }).join('');
            return `

              : '<span class="muted-s">No matches</span>'}

      function renderStatsGrid(search) {
        const ri = { BAT: "🏏", BOWL: "🔴", AR: "⚡", WK: "🧤" };
        const pool = matchPlayers.filter(
          (p) =>
            p.name.toLowerCase().includes(search.toLowerCase()) ||
            p.team.toLowerCase().includes(search.toLowerCase()),
        );
        
        let warning = "";
        if (currentMatch.fantasyEnabled === false) {
          warning = `<div style="margin: 0 16px 16px; padding: 12px 16px; background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.3); border-radius: var(--radius); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
            <span style="color:var(--gold);">⏳ Fantasy scorecard not yet available from CricAPI — will auto-unlock when match goes live</span>
            <button onclick="window.autoFetchStats(true)" style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);color:var(--gold);padding:5px 12px;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;white-space:nowrap;">RETRY NOW</button>
          </div>`;
        }

        if (!pool.length)
          return warning + `<div class="muted" style="padding:20px;text-align:center">${matchPlayers.length ? "No players match" : "Load today's match players first (in Current Match tab)"}</div>`;

        return warning + pool
          .map((p, i) => {
            const s = playerStats[p.name] || {},
              pts = calcPoints(s);
            const pStatus = (currentMatch.playerStatus || {})[p.name] || "";
            const outBadge = s.batted && !s.notOut ? '<span class="out-badge">†</span>' : "";
            const stagger = Math.min(i * 15, 120);
            const _adRoleClass = { BAT: "sc-role-bat", BOWL: "sc-role-bowl", AR: "sc-role-ar", WK: "sc-role-wk" }[p.role] || "";
            const _adPtsHtml = pts > 0
              ? `<span class="sc-pts-num" data-count-up="${pts}">0</span><span class="sc-pts-unit">pts</span>`
              : `<span style="color:var(--muted2);font-size:18px">–</span>`;
            return `<div class="stat-card ${_adRoleClass}" style="animation-delay:${stagger}ms">
      <div class="sc-hd">
        <div><div class="sc-nm">${p.name}${outBadge}</div><div class="sc-tm">${ri[p.role] || ""} ${p.role} · ${normalizeTeam(p.team)}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <select class="avail-sel" data-p="${p.name}" title="Availability">
            <option value="" ${!pStatus ? "selected" : ""}>⚪</option>
            <option value="playing" ${pStatus === "playing" ? "selected" : ""}>🟢 Playing</option>
            <option value="notplaying" ${pStatus === "notplaying" ? "selected" : ""}>🔴 Not Playing</option>
            <option value="impact" ${pStatus === "impact" ? "selected" : ""}>🔵 Impact</option>
          </select>
          <div class="sc-pts ${pts > 0 ? "sc-pts-on" : ""}">${_adPtsHtml}</div>
        </div>
      </div>
      <div class="sc-section-label">🏏 Batting</div>
      <div class="sc-inp">
        <div class="si-g"><label>Runs</label><input type="number" class="si" data-f="runs" data-p="${p.name}" value="${s.runs || 0}" min="0"></div>
        <div class="si-g"><label>Balls</label><input type="number" class="si" data-f="balls" data-p="${p.name}" value="${s.balls || 0}" min="0"></div>
        <div class="si-g"><label>4s</label><input type="number" class="si" data-f="fours" data-p="${p.name}" value="${s.fours || 0}" min="0"></div>
        <div class="si-g"><label>6s</label><input type="number" class="si" data-f="sixes" data-p="${p.name}" value="${s.sixes || 0}" min="0"></div>
      </div>
      <div class="sc-chk">
        <label><input type="checkbox" class="sic" data-f="batted" data-p="${p.name}" ${s.batted ? "checked" : ""}> Batted</label>
        <label><input type="checkbox" class="sic" data-f="notOut" data-p="${p.name}" ${s.notOut ? "checked" : ""}> Not Out</label>
      </div>
      <div class="sc-section-label" style="margin-top:8px">🔴 Bowling</div>
      <div class="sc-inp">
        <div class="si-g"><label>Wkts</label><input type="number" class="si" data-f="wickets" data-p="${p.name}" value="${s.wickets || 0}" min="0"></div>
        <div class="si-g"><label>Ovrs</label><input type="number" class="si" data-f="overs" data-p="${p.name}" value="${s.overs || 0}" min="0" step="0.1"></div>
        <div class="si-g"><label>RC</label><input type="number" class="si" data-f="runsConceded" data-p="${p.name}" value="${s.runsConceded || 0}" min="0"></div>
        <div class="si-g"><label>Mdns</label><input type="number" class="si" data-f="maidens" data-p="${p.name}" value="${s.maidens || 0}" min="0"></div>
        <div class="si-g"><label>LBW+B</label><input type="number" class="si" data-f="lbwBowled" data-p="${p.name}" value="${s.lbwBowled || 0}" min="0"></div>
      </div>
      <div class="sc-section-label" style="margin-top:8px">🧤 Fielding</div>
      <div class="sc-inp">
        <div class="si-g"><label>Ctch</label><input type="number" class="si" data-f="catches" data-p="${p.name}" value="${s.catches || 0}" min="0"></div>
        <div class="si-g"><label>St</label><input type="number" class="si" data-f="stumpings" data-p="${p.name}" value="${s.stumpings || 0}" min="0"></div>
        <div class="si-g"><label>RO↑</label><input type="number" class="si" data-f="runOutDirect" data-p="${p.name}" value="${s.runOutDirect || 0}" min="0"></div>
        <div class="si-g"><label>RO↗</label><input type="number" class="si" data-f="runOutIndirect" data-p="${p.name}" value="${s.runOutIndirect || 0}" min="0"></div>
      </div>
      <div class="sc-chk" style="margin-top:6px">
        <label><input type="checkbox" class="sic" data-f="playingXI" data-p="${p.name}" ${s.playingXI ? "checked" : ""}> Playing XI</label>
      </div>
      <button class="btn-save" data-p="${p.name}">Save</button>
    </div>`;
          })
          .join("");
      }

      function bindModeToggle() {
        // Use .onclick (not addEventListener) so repeated bodyOnly refreshes
        // replace the handler rather than stacking duplicate listeners on the
        // persistent nav element.
        const btn = document.getElementById("modeToggleBtn");
        if (!btn) return;
        btn.onclick = () => {
          const profile = metaGame.adminProfile || {};
          if (!profile.name) { toast("Set up your player profile in League Setup first", "err"); return; }
          if (session.name) {
            // Player mode → back to admin
            session.name = null;
            sessionSave();
            history.replaceState({}, "", `${location.pathname}?atab=match`);
            showScreen("admin");
          } else {
            // Admin mode → switch to player
            session.name = profile.name;
            const mid = memberSelectedMatchId || currentMatchId;
            if (mid) {
              const t = getTeams(mid)[profile.name] || {};
              localTeam = { players: t.players || [], captain: t.captain || "", vc: t.vc || "" };
            }
            sessionSave();
            history.replaceState({}, "", `${location.pathname}?tab=team`);
            showScreen("member");
          }
        };
      }

      function bindAdmin(bodyOnly = false) {
        triggerCountUp();
        bindModeToggle();
        if (!bodyOnly)
          document
            .getElementById("logoutBtn")
            ?.addEventListener("click", () => {
              stopAR();
              session = { name: null, isAdmin: false };
              sessionClear();
              history.replaceState({}, "", location.pathname);
              showScreen("login");
            });
        const tab = new URLSearchParams(location.search).get("atab") || "match";

        if (tab === "match") {
          // Load finalized matches list for restore feature
          getDocs(collection(db, "matches")).then(snap => {
            const list = document.getElementById("finalizedMatchesList");
            if (!list) return;
            const finalized = snap.docs
              .map(d => ({ id: d.id, ...d.data() }))
              .filter(m => m.finalized)
              .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            
            if (finalized.length === 0) {
              list.innerHTML = '<p class="muted" style="font-size:11px">No finalized matches found.</p>';
            } else {
              list.innerHTML = finalized.map(m => `
                <div class="aa-row" style="opacity:0.75">
                  <div class="aa-name" style="color:var(--gold)">✓ ${shortName(m.label || m.id)}</div>
                  <button class="btn-sm btn-restore-match" data-mid="${m.id}" style="color:var(--accent);border-color:rgba(0,123,255,.3)">Restore</button>
                </div>
              `).join("");
              
              list.querySelectorAll(".btn-restore-match").forEach(btn => {
                btn.onclick = async () => {
                  const mid = btn.dataset.mid;
                  const currentIds = metaGame.activeMatchIds || [];
                  if (currentIds.includes(mid)) {
                    toast("Already in active list");
                  } else {
                    const newIds = [...new Set([...currentIds, mid])];
                    await updateDoc(doc(db, "meta", "game"), { activeMatchIds: newIds, currentMatchId: mid });
                    adminSelectedMatchId = mid;
                    toast("Match restored to active list for editing");
                  }
                };
              });
            }
          });

          _addingAnotherMatch = false; // reset on every match-tab load
          document
            .getElementById("createMatchBtn")
            ?.addEventListener("click", createOrUpdateMatch);
          // Match type synced in setMatchType below
          function setMatchType(type) {
            _matchType = type;
            ["btnIPL", "btnIntl", "btnDom"].forEach((id) =>
              document.getElementById(id)?.classList.remove("mt-active"),
            );
            const activeBtn =
              type === "ipl"
                ? "btnIPL"
                : type === "international"
                  ? "btnIntl"
                  : "btnDom";
            document.getElementById(activeBtn)?.classList.add("mt-active");
            const hint =
              type === "ipl"
                ? "Max 4 foreign · role limits apply"
                : type === "domestic"
                  ? "No caps · domestic leagues & tournaments"
                  : "No foreign player cap · all roles allowed";
            const hintEl = document.querySelector(".mt-hint");
            if (hintEl) hintEl.textContent = hint;
            const fb = document.getElementById("fetchMatchBtn");
            if (fb)
              fb.textContent =
                type === "ipl"
                  ? "🏏 Find IPL Matches"
                  : type === "domestic"
                    ? "🏟️ Find Domestic"
                    : "🌍 Find International";
          }
          // Sync _matchType from current match on load
          _matchType = getMatch(getActiveMid()).matchType || "ipl";
          document
            .getElementById("btnIPL")
            ?.addEventListener("click", () => setMatchType("ipl"));
          document
            .getElementById("btnIntl")
            ?.addEventListener("click", () => setMatchType("international"));
          document
            .getElementById("btnDom")
            ?.addEventListener("click", () => setMatchType("domestic"));
          document
            .getElementById("fetchXIBtn")
            ?.addEventListener("click", async () => {
              if (
                !confirm(
                  "Toss happened? This will fetch the playing XI and show 🟢/🔴 to members. Teams stay private until you start the match.",
                )
              )
                return;
              // --- PRE-WEEKEND FIX: Closure-based Polling ---
              const startAutomatedFetch = (targetMid) => {
                let retryCount = 0;
                
                const poll = async () => {
                  const matchData = getMatch(targetMid);
                  const liveId = matchData.liveMatchId;
                  const key = metaGame.cricApiKey;
                  
                  if (!key || !liveId) return;

                  try {
                    const res = await _cricFetch(`https://api.cricapi.com/v1/match_scorecard?apikey=${key}&id=${liveId}`);
                    const json = await res.json();
                    if (json.status !== "success") return;

                    const data = json.data;
                    const allPlayers = data.players || [];
                    const starters = allPlayers.filter(p => p.status === "playing");

                    // 1. PINNED ID CHECK: Only proceed if we have 22 players
                    if (starters.length < 22 && retryCount < 10) {
                      // Stop retrying if match has since been finalized
                      const matchNow = getMatch(targetMid);
                      if (matchNow?.finalized || matchNow?.matchEnded) {
                        console.log(`[Poller] Match ${targetMid}: finalized/ended, stopping retries.`);
                        return;
                      }
                      retryCount++;
                      console.log(`[Poller] Match ${targetMid}: XI not ready. Retry ${retryCount}/10 in 60s.`);
                      setTimeout(poll, 60000);
                      return;
                    }

                    // 2. TOSS RESOLVER: Map Full Name to Short Name
                    const rawToss = data.tossWinner || "";
                    const shortToss = resolveTeamKey(rawToss) || rawToss;
                    const tossResult = rawToss ? `${shortToss} won toss & opted to ${data.tossChoice}` : "";

                    const statusUpdate = { tossResult, xiReady: true };
                    allPlayers.forEach(p => {
                      const isStarter = p.status === "playing";
                      const isSub = p.status === "substitute";
                      statusUpdate[`playerStatus.${p.name}`] = isStarter ? "playing" : (isSub ? "impact" : "notplaying");
                      statusUpdate[`stats.${p.name}.playingXI`] = isStarter;
                      statusUpdate[`stats.${p.name}.isImpact`] = isSub;
                    });

                    // Update the SPECIFIC match, not the 'active' one
                    await updateDoc(doc(db, "matches", targetMid), statusUpdate);
                    toast(`✅ [${shortToss}] Lineups Locked!`);
                  } catch (e) {
                    console.error(`Poller Error (${targetMid}):`, e.message);
                  }
                };
                poll();
              };

              const midToFetch = getActiveMid();
              toast("Lineup Poller Started...");
              startAutomatedFetch(midToFetch);
            });
          document
            .getElementById("startMatchBtn")
            ?.addEventListener("click", async () => {
              if (
                !confirm(
                  "Start match? This locks all teams and reveals everyone's picks simultaneously — no more edits.",
                )
              )
                return;
              const activeMid = getActiveMid();
              await updateDoc(doc(db, "matches", activeMid), {
                revealed: true,
                locked: true,
              });
              // Optimistically update in-memory so startAR's lock check passes
              // (onSnapshot fires async — without this, startAR sees locked=false and exits)
              if (activeMatches[activeMid]?.match) {
                activeMatches[activeMid].match.locked = true;
                activeMatches[activeMid].match.revealed = true;
              }
              toast("Match started! 🚀 Teams locked and leaderboard live.");

              // Auto-start refresh if not already running
              if (!arInterval) {
                const secs = parseInt(
                  document.getElementById("arInterval")?.value || "30",
                );
                if (secs > 0) {
                  startAR(secs);
                  toast(
                    `Auto-refresh started: every ${secs >= 60 ? secs / 60 + " min" : secs + "s"} 🟢`,
                  );
                }
              }
            });
          document
            .getElementById("finalizeBtn")
            ?.addEventListener("click", finalizeMatch);
          document
            .getElementById("abandonBtn")
            ?.addEventListener("click", abandonMatch);
          document
            .getElementById("newMatchBtn")
            ?.addEventListener("click", async () => {
              if (
                !confirm(
                  "Start a new match? The current match stays in history.",
                )
              )
                return;
              const allIds = metaGame.activeMatchIds || [];
              const remaining = allIds.filter((id) => id !== getActiveMid());
              const newPrimary = remaining[0] || "";
              adminSelectedMatchId = newPrimary || null;
              localTeam = { players: [], captain: "", vc: "" };
              await updateDoc(doc(db, "meta", "game"), {
                currentMatchId: newPrimary,
                activeMatchIds: remaining,
              });
            });
          document
            .getElementById("saveApiBtn")
            ?.addEventListener("click", async () => {
              try {
                await updateDoc(doc(db, "meta", "game"), {
                  cricApiKey: document.getElementById("cricKey").value.trim(),
                });
                toast("API key saved");
              } catch(e) { toast("Save failed: " + e.message, "err"); }
            });
          document
            .getElementById("fetchMatchBtn")
            ?.addEventListener("click", fetchMatches);
          document
            .getElementById("searchSeriesBtn")
            ?.addEventListener("click", searchSeriesMatches);
          document
            .getElementById("seriesSearchInp")
            ?.addEventListener("keydown", (e) => {
              if (e.key === "Enter") searchSeriesMatches();
            });
          document
            .getElementById("nukeBtn")
            ?.addEventListener("click", nukeEverything);
          document
            .getElementById("addPlayerBtn")
            ?.addEventListener("click", addPlayerManually);
          document
            .getElementById("clearPoolBtn")
            ?.addEventListener("click", clearPool);
          document
            .getElementById("addAnotherMatchBtn")
            ?.addEventListener("click", () => {
              _addingAnotherMatch = true;
              // Clear form fields for new match entry
              if (document.getElementById("matchLbl"))
                document.getElementById("matchLbl").value = "";
              if (document.getElementById("t1"))
                document.getElementById("t1").value = "";
              if (document.getElementById("t2"))
                document.getElementById("t2").value = "";
              toast("Fill in the new match details and click Update Match");
            });
          // Remove match buttons
          document.querySelectorAll(".btn-remove-match").forEach((btn) => {
            btn.addEventListener("click", () =>
              removeActiveMatch(btn.dataset.mid),
            );
          });
          // Allow Enter key on player name input
          document
            .getElementById("manualName")
            ?.addEventListener("keydown", (e) => {
              if (e.key === "Enter") addPlayerManually();
            });
          document
            .getElementById("manualTeam")
            ?.addEventListener("keydown", (e) => {
              if (e.key === "Enter") addPlayerManually();
            });
          // Role change on pool chips
          document.querySelectorAll(".pool-role-sel").forEach((sel) => {
            sel.addEventListener("change", async (e) => {
              const name = sel.dataset.p;
              const activeMid = getActiveMid();
              const currentPlayers = getPlayers(activeMid);
              const updated = currentPlayers.map((p) =>
                p.name === name ? { ...p, role: e.target.value } : p,
              );
              await updateDoc(doc(db, "matches", activeMid), {
                players: updated,
              });
              // Update local cache
              if (activeMatches[activeMid]) {
                activeMatches[activeMid].players = updated;
              }
              syncDerivedState();
              toast(`✓ ${name} → ${e.target.value}`);
            });
          });
        }

        if (tab === "stats") {
          document
            .getElementById("autoStatsBtn")
            ?.addEventListener("click", () => autoFetchStats(true));
          document
            .getElementById("saveAllStatsBtn")
            ?.addEventListener("click", saveAllStats);
          document
            .getElementById("arToggleBtn")
            ?.addEventListener("click", () => {
              if (arInterval) {
                stopAR();
                toast("Auto-refresh stopped");
              } else {
                const secs = parseInt(
                  document.getElementById("arInterval")?.value || "30",
                );
                if (!secs) {
                  toast("Select interval", "err");
                  return;
                }
                startAR(secs);
                toast(
                  `Auto-refresh every ${secs >= 60 ? secs / 60 + " min" : secs + "s"} — ON 🟢`,
                );
              }
              refreshView();
            });
          document
            .getElementById("statsSearch")
            ?.addEventListener("input", (e) => {
              document.getElementById("statsGrid").innerHTML = renderStatsGrid(
                e.target.value,
              );
              bindSave();
              bindAvailSelects();
            });
          bindSave();
          bindAvailSelects();
        }

        if (tab === "season") {
          document
            .getElementById("exportBtn")
            ?.addEventListener("click", exportCSV);
        }

        if (tab === "league") {
          document
            .getElementById("saveLeagueBtn")
            ?.addEventListener("click", async () => {
              const _pin = document.getElementById("adminPinInp").value.trim();
              if (_pin.length !== 4 || !/^\d{4}$/.test(_pin)) { toast("PIN must be exactly 4 digits", "err"); return; }
              try {
                await updateDoc(doc(db, "meta", "game"), { adminPin: _pin });
                toast("Saved ✓");
              } catch(e) { toast("Save failed: " + e.message, "err"); }
            });
          const gen = () =>
            Math.random().toString(36).substring(2, 5).toUpperCase() +
            Math.random().toString(36).substring(2, 5).toUpperCase();
          document
            .getElementById("genCodeBtn")
            ?.addEventListener("click", async () => {
              try {
                const c = gen();
                await updateDoc(doc(db, "meta", "game"), { joinCode: c });
                toast("Join link created!");
              } catch(e) { toast("Error: " + e.message, "err"); }
            });
          document
            .getElementById("regenCodeBtn")
            ?.addEventListener("click", async () => {
              if (!confirm("New code? Old link stops working.")) return;
              try {

      // ── Create / Update Match ──
      let _addingAnotherMatch = false; // flag for adding a second match

      async function createOrUpdateMatch() {
        const label = document.getElementById("matchLbl").value.trim();
        const liveMatchId = document.getElementById("liveMatchId").value.trim();
        const t1 = document.getElementById("t1").value.trim();
        const t2 = document.getElementById("t2").value.trim();
        if (!label) {
          toast("Enter a match label", "err");
          return;
        }
        const isIPL = _matchType === "ipl";

        const activeMid = getActiveMid();

        try {
          if (_addingAnotherMatch) {
            await createNewMatch(label, t1, t2, isIPL, false, matchType, liveMatchId);
            _addingAnotherMatch = false;
          } else if (activeMid && !currentMatch.finalized) {
            await updateDoc(doc(db, "matches", activeMid), {
              label,
              liveMatchId,
              t1,
              t2,

              matchType,
            });
            toast("Match updated");
