      rel="stylesheet"

    <script type="module">
      // ═══════════════════════════════════════════════
      //  ONLY EDIT THIS — paste your Firebase config
      // ═══════════════════════════════════════════════
      const FIREBASE_CONFIG = {
        apiKey: "AIzaSyCsI8GxIFuTSbMiZP6oJzr6u72Q9V00gVk",
        authDomain: "ipl-ssmb-fantasy-league.firebaseapp.com",
        projectId: "ipl-ssmb-fantasy-league",
        storageBucket: "ipl-ssmb-fantasy-league.firebasestorage.app",
        messagingSenderId: "106945225260",
        appId: "1:106945225260:web:7e8a79b9ff0518b0e92789",
        measurementId: "G-E734QYCQGZ",
      };
      // ═══════════════════════════════════════════════

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        updateDoc,
        deleteDoc,
        onSnapshot,
        collection,
        getDocs,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // ─────────────────────────────────────────────
      //  DATA MODEL (Firestore structure)
      //
      //  /meta/game          — current match state
      //  /meta/members       — { name: { pin, teamName } }
      //  /matches/{matchId}  — { label, teams:{t1,t2}, status, players[], stats:{}, revealed, locked, finalized, matchNum }
      //  /season/totals      — { memberName: { total, matches:[{matchId,label,pts}] } }
      // ─────────────────────────────────────────────

      // ── IPL Team Color System ──
      const IPL_TEAM_COLORS = {
        'RCB':  { primary:'#cc0000', secondary:'#f59e0b', gradient:'135deg, rgba(204,0,0,.2), rgba(245,158,11,.1)' },
        'MI':   { primary:'#004ba0', secondary:'#00d4ff', gradient:'135deg, rgba(0,75,160,.2), rgba(0,212,255,.1)' },
        'CSK':  { primary:'#f5a623', secondary:'#1a1a2e', gradient:'135deg, rgba(245,166,35,.2), rgba(26,26,46,.1)' },
        'KKR':  { primary:'#3a0ca3', secondary:'#f59e0b', gradient:'135deg, rgba(58,12,163,.2), rgba(245,158,11,.1)' },
        'SRH':  { primary:'#ff6b00', secondary:'#1a1a2e', gradient:'135deg, rgba(255,107,0,.2), rgba(26,26,46,.1)' },
        'RR':   { primary:'#EA1A85', secondary:'#1e3a5f', gradient:'135deg, rgba(234,26,133,.2), rgba(30,58,95,.1)' },
        'DC':   { primary:'#0066cc', secondary:'#cc0000', gradient:'135deg, rgba(0,102,204,.2), rgba(204,0,0,.1)' },
        'PBKS': { primary:'#b91c1c', secondary:'#c0c0c0', gradient:'135deg, rgba(185,28,28,.2), rgba(192,192,192,.1)' },
        'LSG':  { primary:'#00bfff', secondary:'#f59e0b', gradient:'135deg, rgba(0,191,255,.2), rgba(245,158,11,.1)' },
        'GT':   { primary:'#1B2133', secondary:'#f59e0b', gradient:'135deg, rgba(27,33,51,.2), rgba(245,158,11,.1)' },
      };

      const IPL_TEAM_LOGOS = {
        'RCB':  'https://scores.iplt20.com/ipl/teamlogos/RCB.png',
        'MI':   'https://scores.iplt20.com/ipl/teamlogos/MI.png',
        'CSK':  'https://scores.iplt20.com/ipl/teamlogos/CSK.png',
        'KKR':  'https://scores.iplt20.com/ipl/teamlogos/KKR.png',
        'SRH':  'https://scores.iplt20.com/ipl/teamlogos/SRH.png',
        'RR':   'https://scores.iplt20.com/ipl/teamlogos/RR.png',
        'DC':   'https://scores.iplt20.com/ipl/teamlogos/DC.png',
        'PBKS': 'https://scores.iplt20.com/ipl/teamlogos/PBKS.png',
        'LSG':  'https://scores.iplt20.com/ipl/teamlogos/LSG.png',
        'GT':   'https://scores.iplt20.com/ipl/teamlogos/GT.png',
      };

      function resolveTeamKey(teamName) {
        if (!teamName) return '';
        const tn = teamName.toUpperCase();
        if (IPL_TEAM_COLORS[tn]) return tn; 
        if (tn.includes('BANGALORE') || tn.includes('BENGALURU') || tn.includes('RCB')) return 'RCB';
        if (tn.includes('MUMBAI') || tn.includes('MI')) return 'MI';
        if (tn.includes('CHENNAI') || tn.includes('CSK')) return 'CSK';
        if (tn.includes('KOLKATA') || tn.includes('KKR')) return 'KKR';
        if (tn.includes('HYDERABAD') || tn.includes('SRH')) return 'SRH';
        if (tn.includes('RAJASTHAN') || tn.includes('RR')) return 'RR';
        if (tn.includes('DELHI') || tn.includes('DC')) return 'DC';
        if (tn.includes('PUNJAB') || tn.includes('PBKS')) return 'PBKS';
        if (tn.includes('LUCKNOW') || tn.includes('LSG')) return 'LSG';
        if (tn.includes('GUJARAT') || tn.includes('GT')) return 'GT';
        return '';
      }

      function getTeamColor(matchData) {
        if (!matchData) return { primary:'#2563ff', secondary:'#f59e0b', gradient:'135deg, rgba(37,99,255,.15), rgba(245,158,11,.05)' };
        const t1Key = resolveTeamKey(matchData.t1 || matchData.label || '');
        if (t1Key && IPL_TEAM_COLORS[t1Key]) return IPL_TEAM_COLORS[t1Key];
        return { primary:'#2563ff', secondary:'#f59e0b', gradient:'135deg, rgba(37,99,255,.15), rgba(245,158,11,.05)' };
      }

      function toRealOvers(ov) {
        const full = Math.floor(ov);
        const balls = Math.round((ov - full) * 10);
        return full + balls / 6;
      }

      // ── Points calculator ──
      function calcPoints(s) {
        if (!s) return 0;
        let p = 0;
        const runs = s.runs || 0,
          balls = s.balls || 0,
          wkts = s.wickets || 0,
          overs = toRealOvers(s.overs || 0);
        p += runs + (s.fours || 0) + (s.sixes || 0) * 2;
        if (runs >= 100) p += 16;
        else if (runs >= 50) p += 8;
        else if (runs >= 30) p += 4;
        if (s.batted && runs === 0 && !s.notOut) p -= 2;
        if (balls >= 10) {
          const sr = (runs / balls) * 100;
          if (sr >= 170) p += 6;
          else if (sr >= 150) p += 4;
          else if (sr >= 130) p += 2;
          else if (sr < 50) p -= 6;
          else if (sr < 60) p -= 4;
          else if (sr < 70) p -= 2;
        }
        p += wkts * 25 + (s.maidens || 0) * 8;
        if (wkts >= 5) p += 16;
        else if (wkts >= 4) p += 8;
        else if (wkts >= 3) p += 4;
        p += (s.lbwBowled || 0) * 8;
        if (overs >= 2) {
          const er = s.eco != null ? s.eco : (s.runsConceded || 0) / overs;
          // If 0 runs conceded, ER is 0, should get max bonus (+6)
          if (er < 5) p += 6;
          else if (er < 6) p += 4;
          else if (er < 7) p += 2;
          else if (er > 10) p -= 6;
          else if (er > 9) p -= 4;
          else if (er > 8) p -= 2;
        }
        p += (s.catches || 0) * 8;
        if ((s.catches || 0) >= 3) p += 4;
        p +=
          (s.runOutDirect || 0) * 12 +
          (s.runOutIndirect || 0) * 6 +
          (s.stumpings || 0) * 12;
        if (s.playingXI) {
          p += s.isImpact ? 2 : 4;
        }
        return Math.round(p);
      }

      function memberMatchTotal(team, stats) {
        return Math.round(
          (team.players || []).reduce((acc, p) => {
            let pts = calcPoints(stats[p]);
            if (p === team.captain) pts *= 2;
            else if (p === team.vc) pts *= 1.5;
            return acc + pts;
          }, 0),
        );
      }

      // ── State ──
      let db;
      let session = { name: null, isAdmin: false };
      let metaGame = {}; // /meta/game  { currentMatchId, activeMatchIds, adminPin, joinCode }
      let allMembers = {}; // /meta/members
      let seasonTotals = {}; // /season/totals
      let matchHistory = [];
      let localTeam = { players: [], captain: "", vc: "" };
      let prevScores = {}; // { memberName: pts } for points flash animation

      let urlJoinCode = null;

      // ── Multi-match state ──
      // activeMatches: { [matchId]: { match, players, stats, teams } }
      let activeMatches = {};
      let currentMatchId = null; // primary / selected match for admin
      let adminSelectedMatchId = null; // which match tab admin is viewing
      let memberSelectedMatchId = null; // which match member is viewing

      // Derived helpers — always read from activeMatches
      function getMatch(mid) {
        return activeMatches[mid]?.match || {};
      }
      function getPlayers(mid) {
        return activeMatches[mid]?.players || [];
      }
      function getStats(mid) {
        return activeMatches[mid]?.stats || {};
      }
      function getTeams(mid) {
        return activeMatches[mid]?.teams || {};
      }

      // Backward-compat globals (point to adminSelectedMatchId or currentMatchId)
      function getActiveMid() {
        if (session.isAdmin && !session.name)
          return adminSelectedMatchId || currentMatchId;
        return memberSelectedMatchId || currentMatchId;
      }
      let currentMatch = {}; // kept in sync below
      let matchPlayers = [];
      let playerStats = {};
      let allTeams = {};

      function syncDerivedState() {
        const mid = getActiveMid();
        currentMatch = getMatch(mid);
        matchPlayers = getPlayers(mid);
        playerStats = getStats(mid);
        allTeams = getTeams(mid);
        playerStatus = currentMatch.playerStatus || {};
      }

      // Auto-refresh
      let arInterval = null,
        arTimer = null,
        arSecs = 0;
      // CricAPI quota tracker (resets daily; persisted in localStorage to survive reloads)
      const _QUOTA_KEY = "cric_api_calls_" + new Date().toDateString();
      let _cricApiCalls = parseInt(localStorage.getItem(_QUOTA_KEY) || "0");
      function _trackApiCall() {
        if (_cricApiCalls >= 2000) { stopAR(); return false; } // already exhausted — don't increment further
        _cricApiCalls++;
        try { localStorage.setItem(_QUOTA_KEY, String(_cricApiCalls)); } catch(e) {}
        if (_cricApiCalls === 1800) toast("⚠️ CricAPI quota: 1800/2000 calls used today", "err");
        if (_cricApiCalls >= 2000) { toast("🚫 CricAPI daily quota reached. Auto-refresh stopped.", "err"); stopAR(); }
        return _cricApiCalls < 2000;
      }
      async function _cricFetch(url, opts) {
        if (!_trackApiCall()) throw new Error("CricAPI daily quota exhausted (2000 calls)");
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000); // 12s timeout
        try {
          const res = await fetch(url, { ...opts, signal: controller.signal });
          clearTimeout(timeout);
          return res;
        } catch (e) {
          clearTimeout(timeout);
          if (e.name === 'AbortError') throw new Error("CricAPI request timed out");
          throw e;
        }
      }
      let playerStatus = {}; // { playerName: 'playing'|'notplaying'|'impact' }
      let matchUnsubs = {}; // { [matchId]: unsubFn }
      let curRole = "ALL",
        curSearch = ""; // persist across member re-renders
      let xiRetryCount = 0; // reset on each match switch
      let _pitchViewActive = false; // toggles between leaderboard and pitch view
      let _pvPrevPts = {}; // previous pts snapshot for delta animation
      let _pvMatchCache = {}; // matchId → match data for member pitch overlay
      let skipNextRefresh = false; // flag to prevent refresh after manual player add
      let _matchType = "ipl"; // 'ipl' | 'international' | 'domestic'

      // ── Session persistence ──
      function sessionSave() {
        try {
          localStorage.setItem(
            "ipl_session",
            JSON.stringify({
              name: session.name,
              isAdmin: session.isAdmin,
              memberSelectedMatchId,
            }),
          );
        } catch (e) {}
      }
      function sessionClear() {
        try {
          localStorage.removeItem("ipl_session");
          sessionStorage.removeItem("_adminOk");
        } catch (e) {}
        session = { name: null, isAdmin: false };
        stopAR();
        // Unsubscribe all Firestore listeners so stale data doesn't bleed into next session
        try { if (window._unsubGame) { window._unsubGame(); window._unsubGame = null; } } catch(e) {}
        try { if (window._unsubMembers) { window._unsubMembers(); window._unsubMembers = null; } } catch(e) {}
        try { if (window._unsubSeason) { window._unsubSeason(); window._unsubSeason = null; } } catch(e) {}
        Object.keys(matchUnsubs).forEach(mid => { try { matchUnsubs[mid](); } catch(e) {} });
        matchUnsubs = {};
      }

      // ── Boot ──
      async function boot() {
        urlJoinCode = new URLSearchParams(location.search).get("join");
        if (FIREBASE_CONFIG.apiKey === "REPLACE_apiKey") {
          showConfigError();
          return;
        }
        try {
          const app = initializeApp(FIREBASE_CONFIG);
          db = getFirestore(app);
          showScreen("loading");

          // Init meta/game if needed
          const mgSnap = await getDoc(doc(db, "meta", "game"));
          if (!mgSnap.exists()) {
            await setDoc(doc(db, "meta", "game"), {
              currentMatchId: "",
              activeMatchIds: [],
              adminPin: "0000",
              joinCode: "",
            });
          }

          window._snapErr = (e) => {
            console.warn("Firestore listener error:", e.message);
            toast(
              "Connection issue — data may be stale. Refresh if needed.",
              "err",
            );
          };

          // Real-time listeners — store unsub handles for cleanup on logout
          window._unsubGame = null;
          window._unsubMembers = null;
          window._unsubSeason = null;

          // Real-time: meta/game
          window._unsubGame = onSnapshot(
            doc(db, "meta", "game"),
            (snap) => {
              metaGame = snap.data() || {};
              const primary = metaGame.currentMatchId || "";
              const ids = [
                ...new Set(
                  [...(metaGame.activeMatchIds || []), primary].filter(Boolean),
                ),
              ];

              // Subscribe to each active match
              ids.forEach((mid) => subscribeMatch(db, mid));

              // Unsubscribe from removed matches
              Object.keys(matchUnsubs).forEach((mid) => {
                if (!ids.includes(mid)) {
                  matchUnsubs[mid]();
                  delete matchUnsubs[mid];
                  delete activeMatches[mid];
                }
              });

              currentMatchId = primary || null;
              if (
                !adminSelectedMatchId ||
                !ids.includes(adminSelectedMatchId)
              ) {
                adminSelectedMatchId = primary || null;
              }
              if (
                memberSelectedMatchId &&
                !ids.includes(memberSelectedMatchId)
              ) {
                memberSelectedMatchId = primary || null;
                localTeam = { players: [], captain: "", vc: "" };
              }
              syncDerivedState();
              if (session.name || session.isAdmin) refreshView();
            },
            window._snapErr,
          );

          // Real-time: members
          window._unsubMembers = onSnapshot(
            doc(db, "meta", "members"),
            (snap) => {
              allMembers = snap.data() || {};
            },
            window._snapErr,
          );

          // Real-time: season totals
          window._unsubSeason = onSnapshot(
            doc(db, "season", "totals"),
            (snap) => {
              seasonTotals = snap.data() || {};
              if (session.name || session.isAdmin) refreshView();
            },
            window._snapErr,
          );

          // Restore session from localStorage (survives page refresh)
          try {
            const saved = JSON.parse(
              localStorage.getItem("ipl_session") || "null",
            );
            if (saved && (saved.name || saved.isAdmin)) {
              // isAdmin only restored if PIN was verified in this browser session (not just in localStorage)
              const _adminOk = !!saved.isAdmin && sessionStorage.getItem("_adminOk") === "1";
              session = { name: saved.name || null, isAdmin: _adminOk };
              if (saved.memberSelectedMatchId)
                memberSelectedMatchId = saved.memberSelectedMatchId;
              // refreshView() will be called once the meta/game snapshot fires
            }
          } catch (e) {}

          if (urlJoinCode) showScreen("join");
          else if (session.name || session.isAdmin)
            showScreen("loading"); // wait for Firebase data
          else showScreen("login");
        } catch (e) {
          showError("Firebase error: " + e.message);
        }
      }

      function subscribeMatch(db, mid) {
        if (matchUnsubs[mid]) return; // already subscribed
        matchUnsubs[mid] = onSnapshot(
          doc(db, "matches", mid),
          (snap) => {
            if (!snap.exists()) return;
            const data = snap.data() || {};
            const wasRevealed = activeMatches[mid]?.match?.revealed;
            activeMatches[mid] = {
              match: data,
              players: data.players || [],
              stats: data.stats || {},
              teams: data.teams || {},
            };
            // Restore localTeam after page refresh (session restored from localStorage)
            if (
              session.name &&
              localTeam.players.length === 0 &&
              mid === (memberSelectedMatchId || currentMatchId)
            ) {
              const myT = (data.teams || {})[session.name] || {};
              if (myT.players?.length)
                localTeam = {
                  players: myT.players,
                  captain: myT.captain || "",
                  vc: myT.vc || "",
                };
            }
            syncDerivedState();
            // Auto-redirect member to Live Scores when toss is revealed
            if (
              session.name &&
              !wasRevealed &&
              data.revealed &&
              mid === (memberSelectedMatchId || currentMatchId)
            ) {
              const tab =
                new URLSearchParams(location.search).get("tab") || "team";
              if (tab === "team")
                history.replaceState({}, "", `${location.pathname}?tab=live`);
            }
            // Skip refresh if we just manually added a player (DOM already updated)
            if (skipNextRefresh) {
              skipNextRefresh = false;
              return;
            }
            if (session.name || session.isAdmin) refreshView();
          },
          window._snapErr,
        );
      }

      boot();

      // ── Router ──
      function showScreen(n) {
        const map = {
          loading: renderLoading,
          login: renderLogin,
          join: renderJoin,
          member: renderMember,
          admin: renderAdmin,
        };
        document.getElementById("app").innerHTML = (map[n] || renderLoading)();
        requestAnimationFrame(() => bindEvents(n));
      }
      let _refreshTimer = null;
      function refreshView() {
        if (_refreshTimer) clearTimeout(_refreshTimer);
        _refreshTimer = setTimeout(_doRefresh, 80);
      }
      function _doRefresh() {
        _refreshTimer = null;
        const sy = window.scrollY;
        // Refresh score pill — wrapper always exists in nav so we update innerHTML, not outerHTML
        const _spWrap = document.getElementById("scorePillWrap");
        if (_spWrap) _spWrap.innerHTML = renderScorePill();
        injectTeamAmbient(getMatch(getActiveMid()));

        if (session.isAdmin && !session.name) {
          const adminBody = document.getElementById("admin-body");
          if (adminBody) {
            const t =
              new URLSearchParams(location.search).get("atab") || "match";
            const tabs = `<div class="view-tabs">
        <button class="vtab ${t === "match" ? "active" : ""}" onclick="switchAdminTab('match')">Current Match</button>
        <button class="vtab ${t === "stats" ? "active" : ""}" onclick="switchAdminTab('stats')">Player Stats</button>
        <button class="vtab ${t === "season" ? "active" : ""}" onclick="switchAdminTab('season')">Season Table</button>
        <button class="vtab ${t === "league" ? "active" : ""}" onclick="switchAdminTab('league')">League Setup</button>
        <button class="vtab ${t === "history" ? "active" : ""}" onclick="switchAdminTab('history')">History</button>
      </div>`;
            let body = "";
            if (t === "match") body = renderAdminMatch();
            if (t === "stats") body = renderAdminStats();
            if (t === "season") body = renderAdminSeason();
            if (t === "league") body = renderAdminLeague();
            if (t === "history") body = renderHistoryTab();
            adminBody.innerHTML = tabs + renderMatchSelectorTabs() + `<div class="tab-content">${body}</div>`;
            requestAnimationFrame(() => {
              bindAdmin(true);
              window.scrollTo(0, sy);
            });
            return;
          }
          showScreen("admin");
        } else if (session.name) {
          const memberBody = document.getElementById("member-body");
          if (memberBody) {
            const t = new URLSearchParams(location.search).get("tab") || "team";
            const tabs = `<div class="view-tabs">
        <button class="vtab ${t === "team" ? "active" : ""}" onclick="switchTab('team')">My Team</button>
        <button class="vtab ${t === "live" ? "active" : ""}" onclick="switchTab('live')">Live Scores</button>
        <button class="vtab ${t === "stats" ? "active" : ""}" onclick="switchTab('stats')">Player Stats</button>
        <button class="vtab ${t === "season" ? "active" : ""}" onclick="switchTab('season')">Season Table</button>
        <button class="vtab ${t === "history" ? "active" : ""}" onclick="switchTab('history')">History</button>
      </div>`;
            let body = "";
            if (t === "team") body = renderTeamTab();
            if (t === "live") body = renderLiveTab();
            if (t === "stats") body = renderMemberStatsTab();
            if (t === "season") body = renderSeasonTab();
            if (t === "history") body = renderHistoryTab();
            memberBody.innerHTML = tabs + renderMemberMatchSelector() + `<div id="tab-body" class="tab-content">${body}</div>`;
            requestAnimationFrame(() => {
              bindMember(true);
              window.scrollTo(0, sy);
            });
            return;
          }
          showScreen("member");
        }
        requestAnimationFrame(() => window.scrollTo(0, sy));
      }

      // ─────────────────────────────────────────────
      //  LOGIN
      // ─────────────────────────────────────────────
      function renderLogin() {
        const forceAdmin =
          new URLSearchParams(location.search).get("admin") === "1";
        const adminHidden = forceAdmin ? "" : 'style="display:none"';
        const memberHidden = forceAdmin ? 'style="display:none"' : "";
        return `<div class="screen-center"><div class="blob"></div><div class="blob2"></div>
  <div class="login-hero">
    <div class="hero-ipl-sm">IPL</div>
    <div class="hero-divider"></div>
    <div class="hero-right-text">
      <div class="hero-title-sm">FANTASY LEAGUE</div>
      <div class="hero-sub">PRIVATE · FRIENDS ONLY</div>
    </div>
  </div>
  <div class="card">
    <div class="seg">
      <button class="seg-btn ${forceAdmin ? "active" : ""}" data-p="admin">⚙️ Admin</button>
      <button class="seg-btn ${!forceAdmin ? "active" : ""}" data-p="member">🏏 Player</button>
    </div>
    <div id="panel-admin" ${adminHidden}>
      <p class="fhint">League admin? Enter your 4-digit PIN.</p>
      <div class="field"><label>Admin PIN</label>
        <div class="pin-row">${'<input class="pd" maxlength="1" type="password" inputmode="numeric">'.repeat(4)}</div>
      </div>
      <div class="err" id="adminErr"></div>
      <button class="btn-gold" id="adminLoginBtn">ADMIN LOGIN →</button>
      <p class="admin-tip">💡 Bookmark <b>${location.origin}${location.pathname}?admin=1</b> on your phone to always land on this screen.</p>
    </div>
    <div id="panel-member" ${memberHidden}>
      <p class="fhint">Already in the league? Log in below.<br>New player? Use the join link your admin sent.</p>
      <div class="field"><label>Your Name</label>
        <input id="memberNameInp" type="text" placeholder="e.g. Rahul" autocomplete="off">
      </div>
      <div class="field"><label>Your PIN</label>

      function renderReturnLogin() {
        return `<div class="screen-center"><div class="blob"></div><div class="blob2"></div>
  <div class="login-hero">
    <div class="hero-ipl-sm">IPL</div>
    <div class="hero-divider"></div>
    <div class="hero-right-text">
      <div class="hero-title-sm">FANTASY LEAGUE</div>
      <div class="hero-sub">PRIVATE · FRIENDS ONLY</div>
    </div>
  </div>
  <div class="card">
    <p class="brand-sub" style="text-align:center;margin-bottom:14px">Welcome back 👋</p>

      function bindEvents(screen) {
        setupPins();
        if (screen === "login") {
          document.querySelectorAll(".seg-btn").forEach((b) => {
            b.onclick = () => {
              document
                .querySelectorAll(".seg-btn")
                .forEach((x) => x.classList.remove("active"));
              b.classList.add("active");
              document.getElementById("panel-admin").style.display =
                b.dataset.p === "admin" ? "" : "none";
              document.getElementById("panel-member").style.display =
                b.dataset.p === "member" ? "" : "none";
            };
          });
          document.getElementById("adminLoginBtn").onclick = doAdminLogin;
          // Player login from main screen
          document
            .getElementById("memberLoginBtn")
            ?.addEventListener("click", doMemberLogin);
          document.getElementById("goJoinBtn").onclick = () => {
            const code = document
              .getElementById("joinCodeInput")
              .value.trim()
              .toUpperCase();
            if (!code) {
              toast("Enter a join code", "err");
              return;
            }
            window.location.href = `${location.pathname}?join=${code}`;
          };
        }
        if (screen === "join") {
          document.getElementById("joinSubmitBtn").onclick = doJoin;
          document.getElementById("joinReturnBtn").onclick = () => {
            document.getElementById("app").innerHTML = renderReturnLogin();
            requestAnimationFrame(() => {
              setupPins();
              bindReturn();
            });
          };
        }
        if (screen === "member") bindMember();
        if (screen === "admin") bindAdmin();
      }

      function setupPins() {
        [".pd", ".pj", ".pr", ".pm"].forEach((sel) => {
          const ds = [...document.querySelectorAll(sel)];
          ds.forEach((d, i) => {
            d.oninput = () => {
              d.value = d.value.replace(/\D/, "");
              if (d.value && i < ds.length - 1) ds[i + 1].focus();
            };
            d.onkeydown = (e) => {
              if (e.key === "Backspace" && !d.value && i > 0) ds[i - 1].focus();
            };
          });
        });
      }
      function pinVal(sel) {
        return [...document.querySelectorAll(sel)].map((d) => d.value).join("");
      }

      // Member login directly from main login screen
      async function doMemberLogin() {
        const name = (
          document.getElementById("memberNameInp")?.value || ""
        ).trim();
        const pin = pinVal(".pm");
        const err = document.getElementById("memberErr");
        if (!name) {
          err.textContent = "Enter your name";
          return;
        }
        if (pin.length !== 4) {
          err.textContent = "Enter your 4-digit PIN";
          return;
        }
        const snap = await getDoc(doc(db, "meta", "members"));
        const members = snap.data() || {};
        if (!members[name]) {
          err.textContent = "Name not found — use your join link to register";
          return;
        }
        if (members[name].pin !== pin) {
          err.textContent = "Wrong PIN";
          return;
        }
        session = { name, isAdmin: false };
        // Set selected match to primary, load their team for it
        memberSelectedMatchId = currentMatchId;
        const t1snap = currentMatchId
          ? getTeams(currentMatchId)[name] || {}
          : {};
        localTeam = {
          players: t1snap.players || [],
          captain: t1snap.captain || "",
          vc: t1snap.vc || "",
        };
        sessionSave();
        showScreen("member");
      }

      function bindReturn() {
        document.getElementById("returnLoginBtn").onclick = async () => {
          const name = document.getElementById("returnName").value.trim(),
            pin = pinVal(".pr"),
            err = document.getElementById("returnErr");
          if (!name) {
            err.textContent = "Enter your name";
            return;
          }
          if (pin.length !== 4) {
            err.textContent = "Enter 4-digit PIN";
            return;
          }
          const snap = await getDoc(doc(db, "meta", "members"));
          const members = snap.data() || {};
          if (!members[name]) {
            err.textContent = "Name not found — use your join link";
            return;
          }
          if (members[name].pin !== pin) {
            err.textContent = "Wrong PIN";
            return;
          }
          session = { name, isAdmin: false };
          memberSelectedMatchId = currentMatchId;
          const t2snap = currentMatchId
            ? getTeams(currentMatchId)[name] || {}
            : {};
          localTeam = {
            players: t2snap.players || [],
            captain: t2snap.captain || "",
            vc: t2snap.vc || "",
          };
          sessionSave();
          showScreen("member");
        };
        document.getElementById("backBtn").onclick = () => showScreen("join");
      }

      async function doAdminLogin() {
        const pin = pinVal(".pd"),
          err = document.getElementById("adminErr");
        const snap = await getDoc(doc(db, "meta", "game"));
        const gd = snap.data() || {};
        if (pin === (gd.adminPin || "0000")) {
          session = { name: null, isAdmin: true };
          sessionStorage.setItem("_adminOk", "1"); // marks PIN verified this browser session
          sessionSave();
          showScreen("admin");
        } else err.textContent = "Wrong PIN";
      }

      async function doJoin() {
        const name = (document.getElementById("joinName")?.value || "").trim();
        const teamName = (
          document.getElementById("joinTeamName")?.value || ""
        ).trim();
        const pin = pinVal(".pj"),
          code = (urlJoinCode || "").toUpperCase(),
          err = document.getElementById("joinErr");
        if (!name) {
          err.textContent = "Enter your name";
          return;
        }
        if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
          err.textContent = "Choose a 4-digit PIN";
          return;
        }
        const snap = await getDoc(doc(db, "meta", "game"));
        const gd = snap.data() || {};
        if ((gd.joinCode || "").toUpperCase() !== code) {
          err.textContent = "Invalid join code";
          return;
        }
        const mSnap = await getDoc(doc(db, "meta", "members"));
        const members = mSnap.data() || {};
        // Case-insensitive duplicate check — "Rohit" and "rohit" would collide in the leaderboard
        const _nameLower = name.toLowerCase();
        const _collision = Object.keys(members).find(k => k.toLowerCase() === _nameLower && k !== name);
        if (_collision) {
          err.textContent = `Name already taken as "${_collision}" — choose a different name`;
          return;
        }
        if (members[name] && members[name].pin !== pin) {
          err.textContent = "Name taken — use a different name or your correct PIN";
          return;
        }
        members[name] = {
          pin,
          teamName: teamName || name + "'s Team",
          joinedAt: Date.now(),
        };
        await setDoc(doc(db, "meta", "members"), members);
        allMembers = members;
        session = { name, isAdmin: false };
        localTeam = { players: [], captain: "", vc: "" };
        memberSelectedMatchId = currentMatchId;
        sessionSave();
        history.replaceState({}, "", location.pathname);
        showScreen("member");
      }

      // ─────────────────────────────────────────────
      //  MEMBER VIEW
      // ─────────────────────────────────────────────
      function renderMemberMatchSelector() {
        const allIds = [
          ...new Set(
            [...(metaGame.activeMatchIds || []), currentMatchId].filter(
              Boolean,
            ),
          ),
        ];
        if (allIds.length <= 1) return "";
        const activeMid = memberSelectedMatchId || currentMatchId;
        return `
  <div class="match-selector-tabs">
    <div class="mst-label">SELECT MATCH</div>
    <div class="mst-tabs">
      ${allIds
        .map((mid) => {
          const m = getMatch(mid);
          const isSelected = mid === activeMid;
          const myT = (m.teams || {})[session.name] || {};
          const xiRdy = Object.keys(m.playerStatus || {}).length > 0;
          const status = myT.submitted
            ? "✓ Submitted"
            : m.locked
              ? "Locked"
              : xiRdy
                ? "Toss Done"
                : "Open";
          const statusClass = myT.submitted
            ? "mst-final"
            : m.locked
              ? "mst-locked"
              : xiRdy
                ? "mst-revealed"
                : "mst-open";
          const _mtc = getTeamColor(m);
          const _mStyle = isSelected
            ? `background:linear-gradient(${_mtc.gradient}); border-color:${_mtc.primary}; box-shadow:0 0 20px rgba(0,0,0,.3);`
            : '';
          return `<button class="mst-tab ${isSelected ? "mst-active" : ""}" onclick="selectMemberMatch('${mid}')" style="${_mStyle}">
          <div class="mst-flags">
            ${m.t1img ? `<img src="${m.t1img}" class="mst-flag">` : ""}
            ${m.t2img ? `<img src="${m.t2img}" class="mst-flag">` : ""}
          </div>
          <span class="mst-name">${shortName(m.label || mid)}</span>
          <span class="mst-status ${statusClass}">${status}</span>
        </button>`;
        })
        .join("")}
    </div>
  </div>`;
      }

      window.selectMemberMatch = function (mid) {
        stopAR();
        memberSelectedMatchId = mid;
        playerStatus = {};
        curRole = "ALL";
        curSearch = "";
        xiRetryCount = 0;
        const t = getTeams(mid)[session.name] || {};
        localTeam = {
          players: t.players || [],
          captain: t.captain || "",
          vc: t.vc || "",
        };
        syncDerivedState();
        sessionSave();

        // Update score pill and ambient colors immediately
        const scorePillEl = document.getElementById("scorePillWrap");
        if (scorePillEl) scorePillEl.innerHTML = renderScorePill();
        injectTeamAmbient(getMatch(mid));

        // Preserve current tab (e.g. history) unless it's a detail view; default to team
        const _curTab = new URLSearchParams(location.search).get("tab") || "team";
        const _safeTab = ["team","live","stats","season","history"].includes(_curTab) ? _curTab : "team";
        history.replaceState({}, "", `${location.pathname}?tab=${_safeTab}`);
        const memberBody = document.getElementById("member-body");
        if (memberBody) {
          const _tabBody = _safeTab === "history" ? renderHistoryTab()
            : _safeTab === "live" ? renderLiveTab()
            : _safeTab === "stats" ? renderMemberStatsTab()
            : _safeTab === "season" ? renderSeasonTab()
            : renderTeamTab();
          const tabs = `<div class="view-tabs">
      <button class="vtab${_safeTab==='team'?' active':''}" onclick="switchTab('team')">My Team</button>
      <button class="vtab${_safeTab==='live'?' active':''}" onclick="switchTab('live')">Live Scores</button>
      <button class="vtab${_safeTab==='stats'?' active':''}" onclick="switchTab('stats')">Player Stats</button>
      <button class="vtab${_safeTab==='season'?' active':''}" onclick="switchTab('season')">Season Table</button>
      <button class="vtab${_safeTab==='history'?' active':''}" onclick="switchTab('history')">History</button>
    </div>`;
          memberBody.innerHTML =
            tabs + renderMemberMatchSelector() + `<div id="tab-body">${_tabBody}</div>`;
          requestAnimationFrame(() => bindMember(true));
        } else {
          showScreen("member");
        }
      };

      function renderMember() {
        const tab = new URLSearchParams(location.search).get("tab") || "team";

        const tabs = `
  <div class="view-tabs">
    <button class="vtab ${tab === "team" ? "active" : ""}" onclick="switchTab('team')">My Team</button>
    <button class="vtab ${tab === "live" ? "active" : ""}" onclick="switchTab('live')">Live Scores</button>
    <button class="vtab ${tab === "stats" ? "active" : ""}" onclick="switchTab('stats')">Player Stats</button>
    <button class="vtab ${tab === "season" ? "active" : ""}" onclick="switchTab('season')">Season Table</button>
    <button class="vtab ${tab === "history" ? "active" : ""}" onclick="switchTab('history')">History</button>
  </div>`;

        const matchSelector = renderMemberMatchSelector();

        let body = "";
        if (tab === "team") body = renderTeamTab();
        if (tab === "live") body = renderLiveTab();
        if (tab === "stats") body = renderMemberStatsTab();
        if (tab === "season") body = renderSeasonTab();
        if (tab === "history") body = renderHistoryTab();

        return `<div class="screen-main">${nav()}<div id="member-body">${tabs}${matchSelector}<div id="tab-body">${body}</div></div></div>`;
      }

      // expose for onclick
      window.autoFetchStats = (fb) => autoFetchStats(fb);
      window.switchTab = function (t) {
        history.replaceState({}, "", `${location.pathname}?tab=${t}`);
        // Reset scroll before swapping content so viewport is stable
        window.scrollTo({ top: 0, behavior: "instant" });
        const tabBody = document.getElementById("tab-body");
        if (tabBody) {
          // Only swap content — leave view-tabs and match-selector untouched
          document.querySelectorAll("#member-body .vtab").forEach(b => {
            const m = b.getAttribute("onclick")?.match(/switchTab\('(\w+)'\)/);
            b.classList.toggle("active", !!(m && m[1] === t));
          });
          let body = "";
          if (t === "team") body = renderTeamTab();
          if (t === "live") body = renderLiveTab();
          if (t === "stats") body = renderMemberStatsTab();
          if (t === "season") body = renderSeasonTab();
          if (t === "history") body = renderHistoryTab();
          tabBody.innerHTML = body;
          requestAnimationFrame(() => bindMember(true));
        } else {
          const memberBody = document.getElementById("member-body");
          if (memberBody) {
            const tabs = `<div class="view-tabs">
      <button class="vtab ${t === "team" ? "active" : ""}" onclick="switchTab('team')">My Team</button>
      <button class="vtab ${t === "live" ? "active" : ""}" onclick="switchTab('live')">Live Scores</button>
      <button class="vtab ${t === "stats" ? "active" : ""}" onclick="switchTab('stats')">Player Stats</button>
      <button class="vtab ${t === "season" ? "active" : ""}" onclick="switchTab('season')">Season Table</button>
      <button class="vtab ${t === "history" ? "active" : ""}" onclick="switchTab('history')">History</button>
    </div>`;
            let body = "";
            if (t === "team") body = renderTeamTab();
            if (t === "live") body = renderLiveTab();
            if (t === "stats") body = renderMemberStatsTab();
            if (t === "season") body = renderSeasonTab();
            if (t === "history") body = renderHistoryTab();
            memberBody.innerHTML = tabs + renderMemberMatchSelector() + `<div id="tab-body">${body}</div>`;
            requestAnimationFrame(() => bindMember(true));
          } else {
            showScreen("member");
          }
        }
      };

      function renderTeamTab() {
        // Always use the match the member is currently viewing
        const activeMid = memberSelectedMatchId || currentMatchId;
        const viewMatch = getMatch(activeMid);
        const noMatch = !activeMid || !viewMatch.label;
        if (noMatch)
          return `<div class="empty-state"><div class="es-icon">🏏</div><p>No match set up yet.</p><p class="muted">Your admin will set up the next match soon.</p></div>`;
        const locked = viewMatch.locked || viewMatch.finalized;
        const revealed = viewMatch.revealed || viewMatch.finalized;
        const xiReady = Object.keys(viewMatch.playerStatus || {}).length > 0;
        const myTeam = getTeams(activeMid)[session.name] || {};
        const submitted = myTeam.submitted;
        const sel = localTeam.players;
        const pool = viewMatch.players?.length
          ? viewMatch.players
          : matchPlayers;

        // Show leaderboard only after match started (locked + revealed simultaneously)
        if (locked && revealed) {
          return renderMatchLeaderboard(
            { ...viewMatch, stats: playerStats, teams: allTeams },
            activeMid,
            session.name,
          );
        }

        const _tc = getTeamColor(viewMatch);
        return `
  <div class="match-bar" style="background:linear-gradient(${_tc.gradient}); border-left:3px solid ${_tc.primary};">
    <div class="match-bar-header">
      <div class="match-label-sm">CURRENT MATCH</div>
      <span class="pill ${locked ? "pill-red" : xiReady ? "pill-amber" : "pill-green"}">${locked ? "🔒 Locked" : xiReady ? "🏏 Toss done" : "🟢 Open"}</span>
    </div>
    <div class="match-bar-content">
      <div class="match-flags">
        ${viewMatch.t1img ? `<img src="${viewMatch.t1img}" class="match-flag">` : ""}
        ${viewMatch.t2img ? `<img src="${viewMatch.t2img}" class="match-flag">` : ""}
      </div>
      <div class="match-title">${viewMatch.label || "–"}</div>
    </div>
  </div>

  ${
    xiReady && !locked
      ? `
  <div class="info-banner warn">
    <div class="ib-icon">🏏</div>
    <div>
      <div class="ib-title">Toss done — playing XI announced!</div>
      <div class="ib-sub">Check 🟢/🔴 below and update your team before the match starts.</div>
    </div>
  </div>`
      : ""
  }

  ${
    locked && submitted
      ? renderMyTeamCard(myTeam, viewMatch)
      : locked && !submitted
        ? `
  <div class="info-banner red">
    <div class="ib-icon">⚠️</div>
    <div><div class="ib-title">Deadline passed</div><div class="ib-sub">You didn't submit for this match.</div></div>
  </div>`
        : !pool.length
          ? `
  <div class="info-banner warn">⏳ Admin hasn't loaded today's player pool yet.</div>`
          : `
  <div class="builder">
    <div class="bh">
      <div class="bh-top">
        <h2>Pick Your XI <span class="ctr" id="xiCtr">${sel.length}/11</span></h2>
        <div class="budget-bar-wrap" id="budgetBarWrap">
          <div class="budget-label">
            <span>CREDITS</span>
            <span class="budget-num ${BUDGET - teamSpend(sel) < 10 ? "budget-low" : ""}">${BUDGET - teamSpend(sel)} left</span>
          </div>
          <div class="budget-bar">
            <div class="budget-fill ${teamSpend(sel) / BUDGET > 0.9 ? "budget-fill-warn" : ""}" style="width:${Math.min(100, (teamSpend(sel) / BUDGET) * 100)}%"></div>
          </div>
          <div class="budget-footer">
            <span class="budget-spent">${teamSpend(sel)} / ${BUDGET} used</span>
            ${isIPLMatch() ? `<span class="ovs-counter ${overseasCount(sel) >= MAX_OVERSEAS ? "ovs-full" : ""}">✈ ${overseasCount(sel)}/${MAX_OVERSEAS} foreign</span>` : '<span class="ovs-counter">🌍 International</span>'}
          </div>
        </div>
      </div>
      <p>${xiReady ? `🏏 Toss done — update your team before first ball! ${isIPLMatch() ? "Max 4 foreign." : ""}` : `100 CR budget · ${isIPLMatch() ? "Max 4 foreign · Role limits apply · " : ""}C=2× VC=1.5×`}</p>
    </div>

    <div class="builder-layout">

      <!-- LEFT: player grid -->
      <div class="builder-grid-col">
        <div class="filter-bar">
          <input class="sinp" id="pSearch" placeholder="🔍 Search player or team…" value="${curSearch}" onfocus="this.setSelectionRange(this.value.length, this.value.length)">
          <div class="rtabs">${["ALL", "BAT", "BOWL", "AR", "WK"].map((r) => `<button class="rtab ${r === curRole ? "active" : ""}" data-r="${r}">${r}</button>`).join("")}</div>
        </div>
        <div class="pgrid" id="pgrid">${renderGrid(sel, curRole, curSearch, pool)}</div>
      </div>

      <!-- RIGHT: sticky selected XI panel -->
      <div class="builder-xi-col">
        <div class="xi-sticky">
          <div class="xi-panel-hd">
            <div class="xi-title">YOUR XI</div>
            <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              <div class="role-summary">
                ${(() => {
                  const rc = roleCounts(sel, pool);
                  return Object.entries(ROLE_LIMITS)
                    .map(
                      ([r, l]) =>
                        `<span class="rs-pill ${isIPLMatch() && (rc[r] > l.max || (rc[r] < l.min && sel.length === 11)) ? "rs-err" : isIPLMatch() && rc[r] === l.max ? "rs-full" : ""}">${r} ${rc[r]}</span>`,
                    )
                    .join("");

                ${teamSpend(sel)}/${BUDGET}CR
              </div>
            </div>
          </div>

          <!-- Selected players list -->
          <div class="xi-list" id="xiList">
            ${sel.length === 0 ? `<div class="xi-empty">Tap players to add them →</div>` : ""}
            ${sel
              .map((p, i) => {
                const pObj = matchPlayers.find((x) => x.name === p) || {
                  role: "BAT",
                  team: "",
                };
                const isC = p === localTeam.captain,
                  isV = p === localTeam.vc;
                const cr = getCredits(p);
                const ri = { BAT: "🏏", BOWL: "🔴", AR: "⚡", WK: "🧤" };
                return `<div class="xi-row ${isC ? "xi-row-c" : isV ? "xi-row-v" : ""}">
                <span class="xi-num">${i + 1}</span>
                <div class="xi-row-info">
                  <div class="xi-row-name">${p} ${isC ? '<span class="xi-badge-c">C</span>' : isV ? '<span class="xi-badge-v">VC</span>' : ""}</div>
                  <div class="xi-row-meta">${isOverseas(p) ? '<span style="color:#7eb8f7;font-size:10px">✈</span> ' : ''}${ri[pObj.role] || ""} ${pObj.role} · ${normalizeTeam(pObj.team)} · <span style="color:var(--gold)">${cr}CR</span></div>
                </div>

          <div id="xiBottom">

      function renderMyTeamCard(team, match) {
        const players = team.players || [];
        const cap = team.captain,
          vc = team.vc;
        const stats = match.stats || {};
        const isRevealed = match.revealed || match.finalized;
        const ri = { BAT: "🏏", BOWL: "🔴", AR: "⚡", WK: "🧤" };

        // Group by role for display
        const byRole = { WK: [], BAT: [], AR: [], BOWL: [] };
        players.forEach((p) => {
          const pObj = matchPlayers.find((x) => x.name === p) || {
            role: "BAT",
            team: "",
          };
          const role = pObj.role || "BAT";
          byRole[role] = byRole[role] || [];
          byRole[role].push({
            name: p,
            role,
            team: pObj.team,
            cr: getCredits(p),
            isC: p === cap,
            isV: p === vc,
          });
        });

        const totalCR = teamSpend(players);
        const totalPts = isRevealed
          ? players.reduce((acc, p) => {
              let pts = calcPoints(stats[p] || {});
              if (p === cap) pts *= 2;
              else if (p === vc) pts *= 1.5;
              return acc + pts;
            }, 0)
          : 0;

        const playerRow = (p) => {
          const pts = isRevealed ? calcPoints(stats[p.name] || {}) : null;
          const finalPts =
            pts !== null ? (p.isC ? pts * 2 : p.isV ? pts * 1.5 : pts) : null;
          const avail = (match.playerStatus || {})[p.name];
          const badgeClass =
            avail === "playing"
              ? "badge-playing"
              : avail === "impact"
                ? "badge-sub"
                : "";
          const badgeLabel =
            avail === "playing"
              ? "P"
              : avail === "impact"
                ? "SUB"
                : "";
          return `<div class="mtc-row ${p.isC ? "mtc-c" : p.isV ? "mtc-v" : ""}">
      <div class="mtc-role">${ri[p.role] || ""}</div>
      <div class="mtc-info">
        <div class="mtc-name">
          ${badgeClass ? `<span class="badge-status ${badgeClass}">${badgeLabel}</span>` : ""}
          ${p.name}
          ${p.isC ? '<span class="mtc-badge mtc-badge-c">C</span>' : ""}
          ${p.isV ? '<span class="mtc-badge mtc-badge-v">VC</span>' : ""}
        </div>
        <div class="mtc-meta">${normalizeTeam(p.team)} · <span style="color:var(--gold)">${p.cr}CR</span>${avail === "notplaying" ? '<span style="color:var(--red);margin-left:6px;font-size:10px">NOT PLAYING</span>' : avail === "impact" ? '<span style="color:#f59e0b;margin-left:6px;font-size:10px;font-weight:800">⚡ IMPACT</span>' : ""}</div>
      </div>
      ${finalPts !== null ? `<div class="mtc-pts">${Math.round(finalPts)}<span>pts</span></div>` : ""}
    </div>`;
        };

        return `
  <div class="my-team-card">
    <div class="mtc-header">
      <div>
        <div class="mtc-match">${match.label || "Current Match"}</div>
        <div class="mtc-teamname">${allMembers[session.name]?.teamName || session.name}</div>
      </div>
      <div class="mtc-summary">
        <div class="mtc-stat"><span>${totalCR}</span><em>CR used</em></div>
        ${isRevealed ? `<div class="mtc-stat mtc-pts-total"><span>${Math.round(totalPts)}</span><em>total pts</em></div>` : ""}
      </div>
    </div>

    <div class="mtc-status-bar">
      <span class="pill pill-green">✅ Team Submitted</span>
      <span class="muted" style="font-size:12px">${match.locked ? "🔒 Locked — match underway" : "🥁 Toss done · can still edit"}</span>
    </div>

    ${["WK", "BAT", "AR", "BOWL"]
      .map((role) =>
        byRole[role]?.length
          ? `
    <div class="mtc-section">
      <div class="mtc-section-label">${ri[role]} ${role}</div>
      ${byRole[role].map(playerRow).join("")}
    </div>`
          : "",
      )
      .join("")}

    ${
      !(match.locked || match.finalized)
        ? `
    <button class="btn-ghost" style="width:100%;margin-top:14px" onclick="window.location.href=window.location.pathname+'?tab=team'">
      ✏️ Edit Team
    </button>`
        : ""
    }
  </div>`;
      }

      // --- PHASE SCORE LOGIC ---
      function calculatePhaseScore(overSummaries, start, end) {
        let runs = 0, wkts = 0;
        (overSummaries || []).forEach(ov => {
          const oNum = parseFloat(ov.over) || 0;
          if (oNum > (start - 1) && oNum <= end) {
            runs += (ov.runs || 0);
            wkts += (ov.wickets || 0);
          }
        });
        return { runs, wkts };
      }

      function renderScoreBar(match) {
        if (!match) return "";
        const scores = match?.score || [];
        const status = match?.matchStatus || "";
        const isLive = match?.locked && !match?.finalized;
        if (!scores.length && !isLive) return "";

        const batsmen = match.currentBatsmen || [];
        const bowler = match.currentBowler;

        const t1Key = resolveTeamKey(match.t1 || match.label?.split('vs')[0]);
        const t2Key = resolveTeamKey(match.t2 || match.label?.split('vs')[1]);
        const homeColor = IPL_TEAM_COLORS[t1Key]?.primary || '#2563ff';
        const awayColor = IPL_TEAM_COLORS[t2Key]?.primary || '#f59e0b';

        let contextLine = status || "Live Updates";
        if (match.finalized) {
          contextLine = `Final Result: ${match.matchResult || status || 'Match Over'}`;
        } else if (match.matchEnded) {
          // Match concluded but not yet finalized — show winner from matchResult, not the hardcoded "Match Concluded"
          contextLine = match.matchResult || status || "Match Concluded";
        } else if (isLive && scores.length === 2) {
          // Build team-key lookup early so RRR uses correct innings regardless of API order
          const _rrScoreByTeam = {};
          scores.forEach(s => {
            const k = resolveTeamKey((s.inning || '').replace(/\s*Inning\s*\d+/i, '').trim());
            if (k) _rrScoreByTeam[k] = s;
          });
          const _rrCurKey = resolveTeamKey((scores[scores.length - 1].inning || '').replace(/\s*Inning\s*\d+/i, '').trim());
          const _rrLookup = Object.keys(_rrScoreByTeam).length > 0;
          const inn2Score = _rrLookup && _rrCurKey ? (_rrScoreByTeam[_rrCurKey] || scores[1]) : scores[1];
          const firstInnKey = _rrLookup && _rrCurKey ? Object.keys(_rrScoreByTeam).find(k => k !== _rrCurKey) : null;
          const inn1Score = firstInnKey ? _rrScoreByTeam[firstInnKey] : scores[0];
          const target = (inn1Score?.r || 0) + 1;
          const current = inn2Score?.r || 0;
          const oversDone = toRealOvers(parseFloat(inn2Score?.o) || 0);
          const ballsLeft = (20 * 6) - (oversDone * 6);
          if (ballsLeft > 0 && target > current) {
            const rrr = ((target - current) / (ballsLeft / 6)).toFixed(2);
            contextLine = `REQ RATE: ${rrr} | NEED ${target - current} OFF ${Math.floor(ballsLeft)} BALLS`;
          }
        }

        // Build team-key → score lookup by parsing inning strings
        const scoreByTeam = {};
        scores.forEach(s => {
          const k = resolveTeamKey((s.inning || '').replace(/\s*Inning\s*\d+/i, '').trim());
          if (k) scoreByTeam[k] = s;
        });
        const lookupWorked = Object.keys(scoreByTeam).length > 0;

        // Current batting team key (from last score entry)
        const curInnKey = scores.length > 0
          ? resolveTeamKey((scores[scores.length - 1].inning || '').replace(/\s*Inning\s*\d+/i, '').trim())
          : null;

        const zones = [
          { key: t1Key, fallbackScore: scores[0], color: homeColor, zoneClass: 'csb-home-zone' },
          { key: t2Key, fallbackScore: scores[1], color: awayColor, zoneClass: 'csb-away-zone' },
        ].map(({ key, fallbackScore, color, zoneClass }, idx) => {
          // Primary: match score by team key.
          // When lookup worked, only use that team's actual score — don't bleed another team's score in.
          // When lookup failed entirely, fall back to positional index.
          const s = lookupWorked && key
            ? (scoreByTeam[key] || { r: 0, w: 0, o: 0 })
            : (fallbackScore || { r: 0, w: 0, o: 0 });
          const isBatting = isLive && (
            lookupWorked && key ? key === curInnKey : idx === scores.length - 1
          );
          const zoneColor = IPL_TEAM_COLORS[key]?.primary || color;
          const label = key || (s.inning || '').replace(/\s*Inning\s*\d+/i, '').trim().split(' ').pop().substring(0, 3).toUpperCase() || (idx === 0 ? 'T1' : 'T2');

          return `
            <div class="csb-team-zone ${zoneClass} ${isBatting ? 'is-batting' : ''}" data-team-key="${key}" style="--batting-color:${zoneColor}; background:linear-gradient(135deg, ${zoneColor}1a 0%, transparent 65%);">
              <div class="csb-inn-team">${label}${isBatting ? ' · LIVE' : ''}</div>
              <div class="csb-big-score">${s.r || 0}<span class="csb-wkts-sep">-${s.w || 0}</span></div>
              <div class="csb-overs">${parseFloat(s.o || 0).toFixed(1)} <span class="csb-ov-label">ov</span></div>
            </div>`;
        }).join('');

        // Crease Logic — Dynamic Striker Block
        let creaseHtml = "";
        if (isLive && (batsmen.length > 0 || bowler)) {
          // Identify striker — set by poller heuristic or manual override
          const strikerIdx = batsmen.findIndex(b => b.strike);
          const activeStrikerIdx = strikerIdx !== -1 ? strikerIdx : 0;

          const batsmenHtml = batsmen.slice(0, 2).map((b, idx) => {
            const isStr = (idx === activeStrikerIdx);
            return `
              <div class="csb-player-row ${isStr ? 'striker-active' : ''}" onclick="setStrikerOverride('${b.name.replace(/'/g, "\\'")}')" style="cursor:pointer">
                <div class="csb-ns-info">
                  <span class="csb-ns-dot">${isStr ? '🏏' : '·'}</span>
                  <span class="csb-ns-name">${b.name}</span>
                </div>
                <div class="csb-ns-score">${b.r}<span class="csb-score-balls">(${b.b})</span></div>
              </div>`;
          }).join("");

          const bowlerHtml = bowler ? `
            <div class="csb-bowler-box">
              <div class="csb-bowler-label">BOWLING</div>
              <div class="csb-bowler-row">
                <span class="csb-bowler-name">${bowler.name}</span>
                <span class="csb-bowler-figures">${bowler.w}/${bowler.r} <span class="csb-bowler-ov">${parseFloat(bowler.o || 0).toFixed(1)}ov</span></span>
              </div>
            </div>` : "";

          creaseHtml = `<div class="csb-crease-stylized">
            <div class="csb-batsmen-section">${batsmenHtml}</div>
            ${bowlerHtml}
          </div>`;
        }

        return `
          <div class="cricket-score-bar" style="--team-home-primary:${homeColor}; --team-away-primary:${awayColor}">
            <div class="csb-zones-row">${zones}</div>
            ${creaseHtml}
            <div class="csb-context-bar">${contextLine}</div>
          </div>`;
      }

      // ── Pitch View ──────────────────────────────────────────
      function renderPitchView(match, userTeam) {
        const stats   = match.stats  || {};
        const players = match.players || [];
        const pStatus = match.playerStatus || {};

        const cap     = userTeam?.captain || '';
        const vc      = userTeam?.vc || '';
        const myPicks = new Set(userTeam?.players || []);

        // Show only this user's fantasy picks
        const xi = myPicks.size > 0
          ? players.filter(p => myPicks.has(p.name))
          : players.filter(p => pStatus[p.name] === 'playing' || pStatus[p.name] === 'impact');

        function getPts(name) {
          let p = calcPoints(stats[name] || {});
          if (name === cap) p *= 2;
          else if (name === vc) p *= 1.5;
          return Math.round(p);
        }

        const totalPts = xi.reduce((sum, p) => sum + getPts(p.name), 0);

        // Live active players
        const batsmen    = match.currentBatsmen || [];
        const bowler     = match.currentBowler  || null;
        const strikerName = batsmen.find(b => b.strike)?.name || batsmen[0]?.name || '';
        const bowlerName  = bowler?.name || '';

        // Snapshot prev pts for delta; update after render
        const prevPts = { ..._pvPrevPts };

        function playerCard(p) {
          const isCap = p.name === cap;
          const isVC  = p.name === vc;
          const pts_val = getPts(p.name);

          // Points delta animation
          const prev  = prevPts[p.name] ?? null;
          const delta = prev !== null ? pts_val - prev : 0;
          const deltaAttr  = delta > 0 ? `data-delta="+${delta}"` : '';
          const risingClass = delta > 0 ? ' pv2-pts-rising' : '';

          // Live role highlights
          const isStriker = p.name === strikerName;
          const isBowling = p.name === bowlerName;
          const avatarExtra = isStriker ? ' pv2-av-striker' : isBowling ? ' pv2-av-bowler' : '';

          // "Virat Kohli" → "V. Kohli"
          const parts = p.name.trim().split(/\s+/);
          const displayName = parts.length > 1
            ? parts[0][0] + '. ' + parts.slice(1).join(' ')
            : p.name;

          // Initials for avatar circle
          const initials = parts.length > 1
            ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
            : p.name.substring(0, 2).toUpperCase();

          const capBadge = isCap
            ? '<span class="pv2-badge pv2-cap">C</span>'
            : isVC
              ? '<span class="pv2-badge pv2-vc">VC</span>'
              : '';
          const multiplierLabel = isCap ? ' <span class="pv2-mult">2x</span>' : isVC ? ' <span class="pv2-mult">1.5x</span>' : '';

          return `
            <div class="pv2-player">
              <div class="pv2-avatar-wrap">
                <div class="pv2-avatar${avatarExtra}">${initials}</div>
                ${capBadge}
              </div>
              <div class="pv2-name">${displayName}</div>
              <div class="pv2-pts${risingClass}" ${deltaAttr}>${pts_val} pts${multiplierLabel}</div>
            </div>`;
        }

        const wks   = xi.filter(p => p.role === 'WK');
        const bats  = xi.filter(p => p.role === 'BAT');
        const ars   = xi.filter(p => p.role === 'AR');
        const bowls = xi.filter(p => p.role === 'BOWL');

        function roleSection(label, group) {
          if (!group.length) return '';
          return `
            <div class="pv2-section">
              <div class="pv2-role-label">${label}</div>
              <div class="pv2-row">${group.map(playerCard).join('')}</div>
            </div>`;
        }

        // Update prev pts snapshot for next render's delta detection
        xi.forEach(p => { _pvPrevPts[p.name] = getPts(p.name); });

        return `
          <div class="pv2-outer">
            <div class="pv2-ground">
              <!-- realistic pitch in center -->
              <div class="pv2-pitch-strip">
                <div class="pv2-pitch-inner">
                  <div class="pv2-stumps pv2-stumps-top"></div>
                  <div class="pv2-stumps pv2-stumps-bot"></div>
                  <div class="pv2-return-crease pv2-rc-tl"></div>
                  <div class="pv2-return-crease pv2-rc-tr"></div>
                  <div class="pv2-return-crease pv2-rc-bl"></div>
                  <div class="pv2-return-crease pv2-rc-br"></div>
                </div>
              </div>
              <!-- player rows on top -->
              <div class="pv2-content">
                <div class="pv2-total-bar">Total: <b>${totalPts} pts</b></div>
                ${roleSection('WICKET KEEPERS', wks)}
                ${roleSection('BATTERS', bats)}
                ${roleSection('ALL ROUNDERS', ars)}
                ${roleSection('BOWLERS', bowls)}
              </div>
            </div>
          </div>`;
      }

      function renderLiveTab() {
        const liveMid = memberSelectedMatchId || currentMatchId;
        const liveMatch = getMatch(liveMid);
        const noMatch = !liveMid || !liveMatch.label;
        if (noMatch)
          return `<div class="empty-state"><div class="es-icon">📺</div><p class="muted">No match in progress.</p></div>`;
        const scoreBar = renderScoreBar(liveMatch);
        if (!liveMatch.revealed)
          return (
            scoreBar +
            `<div class="empty-state"><div class="es-icon">🔒</div><p>Fantasy leaderboard appears once the match starts.</p></div>`
          );

        const userTeam = (liveMatch.teams || {})[session.name] || {};
        const toggleBtn = `
          <div class="pv-toggle-row">
            <button class="pv-toggle-btn ${_pitchViewActive ? '' : 'pv-toggle-active'}"
              onclick="window._setPitchView(false)">📊 Leaderboard</button>
            <button class="pv-toggle-btn ${_pitchViewActive ? 'pv-toggle-active' : ''}"
              onclick="window._setPitchView(true)">🏟 Pitch View</button>
          </div>`;

        const body = _pitchViewActive
          ? renderPitchView(liveMatch, userTeam)
          : renderMatchLeaderboard(liveMatch, liveMid, session.name);

        return scoreBar + toggleBtn + body;
      }

      window._setPitchView = function(active) {
        _pitchViewActive = active;
        refreshView();
      };

      window._viewMemberPitch = function(mid, memberName) {
        const match = _pvMatchCache[mid] || getMatch(mid);
        if (!match || !match.label) { toast('Match data not available', 'err'); return; }
        const memberTeam = (match.teams || {})[memberName] || {};
        if (!memberTeam.players?.length) { toast('No team found for ' + memberName, 'err'); return; }

        const overlay = document.createElement('div');
        overlay.className = 'history-overlay';
        overlay.innerHTML = `
          <div class="history-modal">
            <div class="hm-header">
              <div class="hm-title">${memberName}'s Pitch</div>
              <button class="hm-close" onclick="this.closest('.history-overlay').remove()">×</button>
            </div>
            <div class="hm-body">
              ${renderPitchView(match, memberTeam)}
            </div>
          </div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
        requestAnimationFrame(() => {
          const modal = overlay.querySelector('.history-modal');
          if (modal) modal.classList.add('sheet-open');
        });
      };

      function renderMatchLeaderboard(match, mid, highlightName) {
        const stats = match.stats || {};
        const teams = match.teams || {};
        const members = Object.keys(allMembers);
        const ranked = members
          .map((name) => {
            const t = teams[name] || {};
            return {
              name,
              total: memberMatchTotal(t, stats),
              team: t,
              teamName: allMembers[name]?.teamName || name,
            };
          })
          .sort((a, b) => b.total - a.total);
        const medals = ["🥇", "🥈", "🥉"];
        const _lbtc = getTeamColor(match);

        const bannerHtml = match.finalized ? `
  <div class="winner-banner">
    <div class="wb-confetti">🎊</div>
    <div class="wb-label">MATCH FINAL</div>
    <div class="wb-winner">🏆 ${ranked[0]?.name} wins!</div>
    <div class="wb-score">${ranked[0]?.total} pts</div>
    <div class="wb-match">${match.label || ""}</div>
  </div>` : `
  <div class="reveal-banner" style="border-top-color:${_lbtc.primary}; background:linear-gradient(${_lbtc.gradient}), var(--glass);">
    <div class="rb-flags">
      ${match.t1img ? `<img src="${match.t1img}" class="rb-flag">` : ""}

    </div>
    <div class="rb-eye">🏏 ${match.locked ? "LIVE SCORES" : "TEAMS REVEALED"}</div>
    <div class="rb-title">${match.label || "Match"}</div>
    <div class="rb-sub">${match.locked ? "Updates every few minutes" : "Toss done · teams locked shortly"}</div>
    ${match.locked ? '<div class="rb-live-badge">LIVE</div>' : ""}
  </div>`;

        // Cache match data so _viewMemberPitch can access it
        if (mid) _pvMatchCache[mid] = match;

        return `${bannerHtml}
  <div class="lb-list">
    ${ranked
      .map(
        (r, i) => {
          const rankClass = match.finalized ? (i===0?'lb-top-1 lb-top':i===1?'lb-top-2':i===2?'lb-top-3':'') : (i===0?'lb-top':'');
          const medalClass = i===0 ? 'lb-med-1' : '';
          const delay = match.finalized ? `animation-delay:${0.5 + i * 0.15}s` : `animation-delay:${i * 0.08}s`;

          // Points flash check
          const scoreKey = mid + "_" + r.name;
          const prevPts = prevScores[scoreKey];
          const hasChanged = match.locked && !match.finalized && prevPts !== undefined && r.total !== prevPts;
          if (match.locked && !match.finalized) prevScores[scoreKey] = r.total;
          const flashClass = hasChanged ? 'animation: ptsFlash 1.5s ease both;' : '';

          const safeN = r.name.replace(/'/g, "\\'");
          return `
    <div class="lb-card ${r.name === highlightName ? "lb-me" : ""} ${rankClass}" style="${delay}">
      <div class="lb-med ${medalClass}">${medals[i] || "#" + (i + 1)}</div>
      <div class="lb-body">
        <div class="lb-name-row">
          <div>
            <div class="lb-name">${r.name}${r.name === highlightName ? ' <span class="you">YOU</span>' : ""}</div>
            <div class="lb-tname">${r.teamName}</div>
          </div>
          ${r.team.players?.length ? `<button class="lb-pitch-btn" onclick="window._viewMemberPitch('${mid}','${safeN}')" title="View ${r.name}'s pitch">🏟</button>` : ''}
        </div>
        <div class="lb-chips">
          ${
            (r.team.players || [])
              .map((p) => {
                let pts = calcPoints(stats[p]);
                const isC = p === r.team.captain,
                  isV = p === r.team.vc;
                if (isC) pts *= 2;
                else if (isV) pts *= 1.5;
                const _no = stats[p]?.batted && stats[p]?.notOut ? "*" : "";
                return `<span class="lchip ${isC ? "lchip-c" : isV ? "lchip-vc" : ""}">${isC ? '<span class="lchip-badge">C</span>' : isV ? '<span class="lchip-badge lchip-badge-v">VC</span>' : ''}${isOverseas(p) ? '<span class="lchip-flag">✈</span>' : ''}${fmtName(p)}${_no} <em>${Math.round(pts)}</em></span>`;
              })
              .join("") || '<span class="muted-s">No team submitted</span>'
          }
        </div>
      </div>
      <div class="lb-score" style="${flashClass}">${r.total}<span>pts</span></div>
    </div>`;
        })
      .join("")}
  </div>`;
      }

      function renderSeasonTab() {
        const members = Object.keys(allMembers);
        if (!members.length)
          return `<div class="empty-state"><div class="es-icon">🏆</div><p class="muted">No season data yet.</p></div>`;

        // Build season rows
        const rows = members
          .map((name) => {
            const sd = seasonTotals[name] || { total: 0, matches: [] };
            return {
              name,
              teamName: allMembers[name]?.teamName || name,
              total: sd.total || 0,
              matches: sd.matches || [],
            };
          })
          .sort((a, b) => b.total - a.total);

        // Get all unique match IDs from history (filter out legacy entries without matchId)
        const matchCols = [
          ...new Set(rows.flatMap((r) => r.matches.map((m) => m.matchId).filter(Boolean))),
        ];

        const medals = ["🥇", "🥈", "🥉"];

        // Per-match top scorer
        const matchWinners = {}; // matchId → member name with highest pts in that match
        matchCols.forEach((mid) => {
          let topName = null, topPts = -1;
          rows.forEach((r) => {
            const m = r.matches.find((x) => x.matchId === mid);
            if (m && m.pts > topPts) { topPts = m.pts; topName = r.name; }
          });
          if (topName) matchWinners[mid] = topName;
        });

        // Season high score — highest single-match pts across the entire season
        let seasonHighPts = null;
        rows.forEach((r) => r.matches.forEach((m) => {
          if (seasonHighPts === null || (m.pts || 0) > seasonHighPts) seasonHighPts = (m.pts || 0);
        }));

        return `
  <div class="season-header">
    <div class="sh-title">Season Leaderboard</div>
    <div class="sh-sub">${matchCols.length} match${matchCols.length !== 1 ? "es" : ""} played</div>
  </div>

  <!-- Summary cards -->
  <div class="season-cards">
    ${rows
      .map(
        (r, i) => {
          const pillId = `mpills-${r.name.replace(/\s+/g,'_')}`;
          const matchPills = r.matches.map((m) => {
            const isSeasonHigh = seasonHighPts !== null && m.pts === seasonHighPts;
            const isWinner = !isSeasonHigh && m.matchId && matchWinners[m.matchId] === r.name;
            const winTag = isSeasonHigh ? ' sc-pill-season-high' : isWinner ? ' sc-pill-winner' : '';
            const badge = isSeasonHigh ? ' 👑' : isWinner ? ' ★' : '';
            const shortLabel = (m.label||'').split(',')[0].substring(0,12);
            if (m.matchId) {
              return `<span class="sc-mpill sc-mpill-click${winTag}" onclick="viewMatchHistory('${m.matchId}')" title="${escAttr(m.label)}">${shortLabel}: <b>${m.pts}pts</b>${badge}</span>`;
            }
            return `<span class="sc-mpill${winTag}" title="${escAttr(m.label)}">${shortLabel}: <b>${m.pts}pts</b>${badge}</span>`;
          }).join('');

          return `
    <div class="sc-card ${r.name === session.name ? "sc-me" : ""} ${i === 0 ? "sc-first" : ""}">
      <div class="sc-rank">${medals[i] || "#" + (i + 1)}</div>
      <div class="sc-body">
        <div class="sc-name">${r.name}${r.name === session.name ? ' <span class="you">YOU</span>' : ""}</div>
        <div class="sc-tname">${r.teamName}</div>
        <div class="sc-history">
          ${r.matches.length
            ? `<span class="sc-mpill sc-mpill-toggle sc-mpill-click" onclick="(function(el){const t=document.getElementById('${pillId}');if(!t)return;const open=t.style.display!=='none';t.style.display=open?'none':'flex';el.textContent=open?'${r.matches.length} Matches ▾':'${r.matches.length} Matches ▴';})(this)">${r.matches.length} Matches ▾</span>
              <div id="${pillId}" class="sc-pills-drop" style="display:none">${matchPills}</div>`
            : '<span class="muted-s">No matches yet</span>'}
        </div>
      </div>
      <div class="sc-total">${r.total}<span>total pts</span></div>
    </div>`;
        }
      )
      .join("")}
  </div>

  <!-- Per-match breakdown table -->
  ${
    matchCols.length
      ? `
  <div class="history-section">
    <div class="hs-title">Match-by-Match Breakdown</div>
    <div class="table-wrap">
      <table class="hist-table">
        <thead>
          <tr>
            <th>Player</th>
            ${matchCols
              .map((id) => {
                const mObj = rows.flatMap((r) => r.matches).find((m) => m.matchId === id) || {};
                const label = mObj.label || id;
                // Get a very clean name: "RCB vs SRH, Match 1..." -> "RCB v SRH"
                let clean = shortName(label).split(/[,–-]/)[0].trim();
                clean = clean.replace(/\s+vs\s+/i, ' v ');
                return `<th class="th-match"><div class="th-match-wrap" title="${escAttr(label)}">${clean}</div></th>`;
              })
              .join("")}
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${rows
            .map(
              (r) => `
          <tr class="${r.name === session.name ? "tr-me" : ""}">
            <td class="td-name">${r.name}</td>
            ${matchCols
              .map((id) => {
                const m = r.matches.find((x) => x.matchId === id);
                return `<td class="td-pts">${m ? m.pts : "–"}</td>`;
              })
              .join("")}
            <td class="td-total">${r.total}</td>
          </tr>`,
            )
            .join("")}
        </tbody>
      </table>
    </div>
  </div>`
      : ""
  }`;
      }

      window.viewMatchHistory = async function(matchId) {

        const match = { ...snap.data(), stats: snap.data().stats || {}, teams: snap.data().teams || {} };
        _pvMatchCache[matchId] = match; // cache so lb-card pitch buttons work

        function _renderHistoryBody(pitchActive) {

            </div>

              ${_renderHistoryBody(false)}
            </div>
          </div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
          requestAnimationFrame(() => {

      // ── Shared helper: build player points cards from any players+stats ──
      function _buildPlayerStatCards(players, stats, { animate = true } = {}) {
        const ri = { BAT: "🏏", BOWL: "🎯", AR: "⚡", WK: "🧤" };
        const roleClass = { BAT: "sc-role-bat", BOWL: "sc-role-bowl", AR: "sc-role-ar", WK: "sc-role-wk" };
        return players.map((p, i) => {
          const s = stats[p.name] || {};
          const pts = calcPoints(s);
          const stagger = animate ? Math.min(i * 15, 120) : 0;

          let xiBadge = "";
          if (s.playingXI && s.isImpact) xiBadge = `<span class="mstat-xi mstat-xi-impact">⚡ Impact</span>`;
          else if (s.playingXI)           xiBadge = `<span class="mstat-xi mstat-xi-play">● Playing XI</span>`;
          else if (s.playingXI === false)  xiBadge = `<span class="mstat-xi mstat-xi-out">● Not Playing</span>`;

          // Batting chips
          const batChips = [];
          if (s.batted || s.runs) {
            const notOut = s.notOut ? "*" : "";
            batChips.push(`<span class="mstat-chip mstat-chip-bat">🏏 ${s.runs||0}${notOut} (${s.balls||0}b)</span>`);
            if (s.fours)  batChips.push(`<span class="mstat-chip mstat-chip-bat">${s.fours}×4</span>`);
            if (s.sixes)  batChips.push(`<span class="mstat-chip mstat-chip-bat">${s.sixes}×6</span>`);
            if ((s.balls||0) >= 10) batChips.push(`<span class="mstat-chip mstat-chip-bat">SR ${((s.runs||0)/(s.balls||1)*100).toFixed(0)}</span>`);
          }
          // Bowling chips
          const bowlChips = [];
          if (s.overs || s.wickets) {
            const eco = s.eco != null ? s.eco : (s.overs && s.runsConceded != null ? ((s.runsConceded||0)/toRealOvers(s.overs||0)).toFixed(1) : null);
            bowlChips.push(`<span class="mstat-chip mstat-chip-bowl">🎯 ${s.wickets||0}/${s.runsConceded||0}</span>`);
            bowlChips.push(`<span class="mstat-chip mstat-chip-bowl">${s.overs||0} ov</span>`);
            if (eco != null) bowlChips.push(`<span class="mstat-chip mstat-chip-bowl">ER ${eco}</span>`);
            if (s.maidens)   bowlChips.push(`<span class="mstat-chip mstat-chip-bowl">${s.maidens}md</span>`);
          }
          // Fielding chips
          const fieldChips = [];
          if (s.catches)        fieldChips.push(`<span class="mstat-chip mstat-chip-field">🧤 ${s.catches}ct</span>`);
          if (s.stumpings)      fieldChips.push(`<span class="mstat-chip mstat-chip-field">🧤 ${s.stumpings}st</span>`);
          if (s.runOutDirect)   fieldChips.push(`<span class="mstat-chip mstat-chip-field">RO↑ ${s.runOutDirect}</span>`);
          if (s.runOutIndirect) fieldChips.push(`<span class="mstat-chip mstat-chip-field">RO↗ ${s.runOutIndirect}</span>`);
          if (s.lbwBowled)      fieldChips.push(`<span class="mstat-chip mstat-chip-field">LBW/B ${s.lbwBowled}</span>`);
          const allChips = [...batChips, ...bowlChips, ...fieldChips];

          const ptsHtml = pts > 0
            ? animate
              ? `<span class="sc-pts-num" data-count-up="${pts}">0</span><span class="sc-pts-unit">pts</span>`
              : `<span class="sc-pts-num">${pts}</span><span class="sc-pts-unit">pts</span>`
            : `<span style="color:var(--muted2);font-size:18px">–</span>`;

          return `
          <div class="stat-card ${roleClass[p.role] || ""}" style="animation-delay:${stagger}ms">
            <div class="sc-hd">
              <div>
                <div class="sc-nm">${p.name}</div>
                <div class="sc-tm">${ri[p.role] || ""} ${p.role} · ${normalizeTeam(p.team)}</div>
              </div>
              <div class="sc-pts ${pts > 0 ? "sc-pts-on" : ""}">${ptsHtml}</div>
            </div>
            ${xiBadge ? `<div class="mstat-badges">${xiBadge}</div>` : ""}
            ${allChips.length ? `<div class="mstat-chips">${allChips.join("")}</div>` : ""}
          </div>`;
        }).join("");
      }

      // ── Member Player Stats Tab (read-only, current/selected match) ─────
