      /* ── NEW ANIMATIONS ── */
      @keyframes glowPulse {
        /* GPU-safe: animate opacity only, not box-shadow */
        0%, 100% { border-bottom-color: var(--accent); opacity: 1; }
        50% { border-bottom-color: var(--gold); opacity: 0.82; }
      }
      @keyframes breathingBlue {
        /* GPU-safe: animate border-color + opacity, not box-shadow */
        0%, 100% { border-color: rgba(37,99,255,0.4); opacity: 1; }
        50% { border-color: rgba(37,99,255,0.9); opacity: 0.85; }
      }
      @keyframes spinBorder {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes bounceDrop {
        0% { transform: translateY(-100px); opacity: 0; }
        60% { transform: translateY(10px); opacity: 1; }
        80% { transform: translateY(-5px); }
        100% { transform: translateY(0); }
      }
      @keyframes ptsFlash {
        0% { transform: scale(1); color: var(--white); }
        30% { transform: scale(1.3); color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        100% { transform: scale(1); color: var(--gold); }
      }
      @keyframes slideUpIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ── TABULAR NUMERICS — prevents jitter on live updates ── */
      .pts, .csb-big-score, .csb-stat-pill, .pc-cr, .season-pts, .lb-pts, .lb-total, .stat-val, .astat-val {
        font-family: var(--font-num);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }

      /* ══════════════════════════════════════════════
         STICKY SCORE PILL — Google-style quick score
      ══════════════════════════════════════════════ */
      .score-pill {
        position: -webkit-sticky;
        position: sticky;
        top: 0;
        top: env(safe-area-inset-top, 0px); /* iPhone notch / Dynamic Island */
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 7px 14px;
        padding-left: max(14px, env(safe-area-inset-left));
        padding-right: max(14px, env(safe-area-inset-right));
        background: rgba(8, 14, 28, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(99,102,241,.35);
        box-shadow: 0 0 20px rgba(59,130,246,.12), 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        overflow: hidden;
        min-height: 42px;
        will-change: transform;
      }
      .score-pill::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, var(--team-glow-a), transparent 50%);
        pointer-events: none;
      }
      .sp-team {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
        min-width: 0;
      }
      .sp-logo {
        width: 24px;
        height: 24px;
        object-fit: contain;
        flex-shrink: 0;
      }
      .sp-abbr {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--white);
        flex-shrink: 0;
      }
      .sp-score {
        font-family: var(--font-num);
        font-variant-numeric: tabular-nums;
        font-size: 13px;
        font-weight: 700;
        color: var(--gold);
        flex-shrink: 0;
      }
      .sp-vs {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted2);
        letter-spacing: 1px;
        flex-shrink: 0;
      }
      .sp-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        color: var(--text2);
        letter-spacing: 0.3px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .sp-badge {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        padding: 3px 8px;
        border-radius: 20px;
        text-transform: uppercase;
        flex-shrink: 0;
        margin-left: auto;
        white-space: nowrap;
      }
      .sp-badge-live {
        background: rgba(0,230,118,.12);
        color: var(--green);
        border: 1px solid rgba(0,230,118,.3);
        animation: livePulse 2s ease-in-out infinite;
        filter: drop-shadow(0 0 5px var(--team-primary));
      }
      .sp-badge-open {
        background: rgba(37,99,255,.12);
        color: #7aabff;
        border: 1px solid rgba(37,99,255,.3);
      }
      .sp-badge-done {
        background: rgba(90,110,144,.12);
        color: var(--muted2);
        border: 1px solid rgba(90,110,144,.2);
      }

      /* ── RESET ── */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        /* Suppress grey tap flash on iOS/Android */
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        min-height: 100vh;
        min-height: 100svh; /* iOS Safari: excludes browser chrome */
        overflow-x: hidden;
      }
      /* Global: remove 300ms tap delay on all interactive elements */
      button, a, input, select, textarea, [onclick], label {
        touch-action: manipulation;
      }
      body {
        background: var(--bg);
        background-image:
          radial-gradient(ellipse 70% 50% at 15% 10%, rgba(59,130,246,.38) 0%, transparent 55%),
          radial-gradient(ellipse 60% 60% at 85% 85%, rgba(99,102,241,.30) 0%, transparent 55%),
          radial-gradient(ellipse 40% 40% at 50% 50%, rgba(245,158,11,.12) 0%, transparent 60%);
        background-attachment: fixed;
        color: var(--text);
        font-family: "Barlow", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        transition: background-color 0.8s ease;
        position: relative;
        overflow-x: hidden;
      }

      /* Stadium Aura — Dynamic underglow blobs */
      .stadium-aura {
        position: fixed;
        inset: 0;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
        background: var(--bg);
      }
      .aura-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.55;
        transition: background-color 1.8s ease-in-out;
        will-change: transform, background-color;
      }
      .aura-1 {
        width: 75vw; height: 75vw;
        top: -15vw; left: -15vw;
        background: var(--team-glow-a, rgba(59,130,246,0.6));
        animation: auraFloat1 20s infinite alternate ease-in-out;
      }
      .aura-2 {
        width: 65vw; height: 65vw;
        bottom: -15vw; right: -15vw;
        background: var(--team-glow-b, rgba(99,102,241,0.5));
        animation: auraFloat2 26s infinite alternate-reverse ease-in-out;
      }
      @keyframes auraFloat1 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(6vw, 8vh) scale(1.08); }
        66%  { transform: translate(-4vw, 12vh) scale(0.96); }
        100% { transform: translate(10vw, 4vh) scale(1.12); }
      }
      @keyframes auraFloat2 {
        0%   { transform: translate(0, 0) scale(1); }
        33%  { transform: translate(-8vw, -6vh) scale(1.06); }
        66%  { transform: translate(5vw, -10vh) scale(0.94); }
        100% { transform: translate(-12vw, -4vh) scale(1.1); }
      }

      /* Subtle noise texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        background-size: 256px 256px;
        pointer-events: none;
        z-index: 0;
        opacity: 0.3;
      }
      /* Accent orb */
      body::after {
        content: '';
        position: fixed;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(59,130,246,.28) 0%, transparent 70%);
        border-radius: 50%;
        top: -150px; right: -150px;
        animation: orb 10s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes orb {
        from { transform: translate(0, 0) scale(1); opacity: 0.8; }
        to   { transform: translate(-40px, 40px) scale(1.15); opacity: 1; }
      }

      #app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100svh;
      }
      .screen-center {
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }
      .screen-main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 16px 80px;
      }
      .blob,
      .blob2 {
        display: none;
      }

      /* ── LOADING ── */
      .spinner {
        width: 40px;
        height: 40px;
        border: 2px solid var(--bd2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-bottom: 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* ── CRICKET BALL LOADER ── */
      .cricket-ball-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .cricket-ball {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #cc0000;
        position: relative;
        box-shadow: 0 0 16px rgba(204,0,0,0.5);
        animation: ballSwing 1.2s cubic-bezier(0.45,0,0.55,1) infinite alternate;
      }
      .cricket-ball::before,
      .cricket-ball::after {
        content: '';
        position: absolute;
        border: 1.5px solid rgba(255,255,255,0.85);
        border-radius: 50%;
        top: 50%;
        left: 50%;
      }
      .cricket-ball::before {
        width: 100%;
        height: 60%;
        border-left-color: transparent;
        border-right-color: transparent;
        transform: translate(-50%,-50%) rotate(20deg);
      }
      .cricket-ball::after {
        width: 60%;
        height: 100%;
        border-top-color: transparent;
        border-bottom-color: transparent;
        transform: translate(-50%,-50%) rotate(20deg);
      }
      @keyframes ballSwing {
        from {
          transform: translateX(-60px) translateY(0px);
          box-shadow: -8px 0 12px rgba(204,0,0,0.6), -16px 0 20px rgba(204,0,0,0.3);
        }
        25% { transform: translateX(-30px) translateY(-18px); }
        50% { transform: translateX(0px) translateY(-24px); }
        75% { transform: translateX(30px) translateY(-18px); }
        to {
          transform: translateX(60px) translateY(0px);
          box-shadow: 8px 0 12px rgba(204,0,0,0.6), 16px 0 20px rgba(204,0,0,0.3);
        }
      }
      .ball-loading-text {
        font-family: "Barlow Condensed", sans-serif;
        color: var(--gold);
        font-size: 15px;
        letter-spacing: 3px;
        font-weight: 700;
        text-transform: uppercase;
      }
      /* ── TAP FEEDBACK ── */
      .tap-feedback:active {
        animation: tapSquish 200ms cubic-bezier(0.36,0.07,0.19,0.97) forwards;
      }
      @keyframes tapSquish {
        0%   { transform: scale(1); }
        40%  { transform: scale(0.94); }
        70%  { transform: scale(1.04); }
        100% { transform: scale(1); }
      }
      button:active:not(:disabled) {
        animation: tapSquish 200ms cubic-bezier(0.36,0.07,0.19,0.97) forwards;
      }
      .pcard:active:not(.pcard-dis) {
        animation: tapSquish 200ms cubic-bezier(0.36,0.07,0.19,0.97) forwards;
      }
      .mst-tab:active {
        animation: tapSquish 200ms cubic-bezier(0.36,0.07,0.19,0.97) forwards;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ═══════════════════════════════════════════
   HERO BANNER — broadcast lower-third style
═══════════════════════════════════════════ */
      .hero-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0;
        background: linear-gradient(135deg, rgba(6,10,24,.96) 0%, rgba(12,18,44,.94) 50%, rgba(6,10,24,.96) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(99,102,241,.45);
        box-shadow:
          0 0 0 1px rgba(59,130,246,.18),
          0 4px 40px rgba(59,130,246,.22),
          inset 0 1px 0 rgba(139,148,255,.25);
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.4s ease both;
      }
      /* Flowing gradient sweep */
      .hero-banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg,
          rgba(59,130,246,.22) 0%,
          rgba(99,102,241,.28) 30%,
          rgba(139,148,255,.14) 60%,
          transparent 100%);
        animation: heroFlow 6s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }
      @keyframes heroFlow {
        0%   { opacity: 0.7; transform: translateX(-5%); }
        100% { opacity: 1;   transform: translateX(5%); }
      }
      /* Bottom accent glow line */
      .hero-banner::after {
        content: "";
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(59,130,246,.6) 25%,
          rgba(99,102,241,.9) 50%,
          rgba(59,130,246,.6) 75%,
          transparent 100%);
        animation: heroLine 4s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 1;
      }
      @keyframes heroLine {
        0%   { opacity: 0.6; transform: scaleX(0.8); }
        100% { opacity: 1;   transform: scaleX(1); }
      }
      .hero-left {
        display: flex;
        align-items: stretch;
        gap: 0;
        position: relative;
        z-index: 1;
      }
      /* IPL block — solid accent background */
      .hero-ipl {
        font-family: "Bebas Neue", sans-serif;
        font-size: 32px;
        letter-spacing: 5px;
        color: var(--white);
        background: var(--accent);
        padding: 10px 20px;
        line-height: 1;
        clip-path: polygon(0 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
        padding-right: 28px;
      }
      .hero-divider {
        width: var(--bar);
        background: var(--gold);
        margin: 0 16px;
        flex-shrink: 0;
      }
      .hero-right-text {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        padding: 10px 0;
      }
      .hero-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 4px;
        color: var(--white);
        text-transform: uppercase;
        line-height: 1;
      }
      .hero-sub {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 3px;
        color: var(--gold);
        text-transform: uppercase;
      }
      .hero-season {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text2);
        border-left: var(--bar) solid var(--gold);
        padding: 10px 20px;
        position: relative;
        z-index: 1;
        text-transform: uppercase;
      }

      /* LOGIN SCREEN HERO */
      .login-hero {
        display: flex;
        align-items: stretch;
        gap: 0;
        width: 100%;
        max-width: 380px;
        background: rgba(255,255,255,.03);
        border: 1px solid var(--glass-border);
        border-bottom: var(--bar) solid var(--accent);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        margin-bottom: 0;
        overflow: hidden;
        animation: cardSlideUp 0.35s ease-out both;
        position: relative;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .login-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          100deg,
          rgba(59,130,246,.15),
          transparent 60%
        );
        clip-path: polygon(0 0, 180px 0, 150px 100%, 0 100%);
        pointer-events: none;
      }
      .hero-ipl-sm {
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        letter-spacing: 4px;
        color: var(--white);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        padding: 10px 18px;
        line-height: 1;
        clip-path: polygon(0 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        padding-right: 24px;
        position: relative;
        z-index: 1;
        flex-shrink: 0;
        box-shadow: 0 0 20px rgba(59,130,246,.4);
      }
      .hero-title-sm {
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        letter-spacing: 4px;
        color: var(--white);
        text-transform: uppercase;
        line-height: 1;
        position: relative;
        z-index: 1;
        background: linear-gradient(135deg, #fff 30%, var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ═══════════════════════════════════════════
   TOPNAV
═══════════════════════════════════════════ */
      .topnav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 16px;
        background: var(--nav-bg);
        border-bottom: 1px solid rgba(99,102,241,.3);
        box-shadow: 0 0 16px rgba(59,130,246,.08), 0 2px 12px rgba(0,0,0,.4);
        margin-bottom: 4px;
        position: -webkit-sticky;
        position: sticky;
        top: 42px; /* fallback: sits below the 42px score pill */
        top: calc(42px + env(safe-area-inset-top, 0px)); /* notch/Dynamic Island aware */
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        z-index: 10;
        /* will-change: transform intentionally removed — breaks position:sticky on iOS Safari */
      }
      .nav-brand {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-hi {
        color: var(--text2);
        font-size: 13px;
      }
      .admin-badge {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--white);
        background: var(--accent);
        padding: 3px 10px;
        border-radius: var(--radius);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      /* Admin ↔ Player mode toggle */
      .mode-toggle-wrap { display: flex; align-items: center; }
      .mode-toggle-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 20px;
        border: 1.5px solid;
        cursor: pointer;
        transition: all 0.2s;
        line-height: 1;
      }
      /* Shows the player name — click to go to player mode */
      .mode-toggle-btn.mtb-player {
        background: rgba(16,185,129,.12);
        border-color: rgba(16,185,129,.5);
        color: #10b981;
      }
      .mode-toggle-btn.mtb-player:hover {
        background: rgba(16,185,129,.25);
        border-color: #10b981;
        color: #fff;
        box-shadow: 0 0 12px rgba(16,185,129,.3);
      }
      /* Shows "Admin" — click to go back to admin panel */
      .mode-toggle-btn.mtb-admin {
        background: rgba(37,99,255,.12);
        border-color: rgba(37,99,255,.5);
        color: #60a5fa;
      }
      .mode-toggle-btn.mtb-admin:hover {
        background: rgba(37,99,255,.25);
        border-color: var(--accent);
        color: #fff;
        box-shadow: 0 0 12px rgba(37,99,255,.3);
      }
      .mtb-icon { font-size: 12px; }
      .nav-r {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .nav-u {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
        letter-spacing: 0.3px;
      }
      .btn-signout {
        padding: 6px 12px;
        font-size: 12px;
      }

      /* ═══════════════════════════════════════════
   LOGIN CARD
═══════════════════════════════════════════ */
      .card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-top: none;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        padding: 28px 26px 30px;
        width: 100%;
        max-width: 380px;
        position: relative;
        z-index: 1;
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        animation: cardSlideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        transition: border-color .2s ease;
      }
      .card:hover {
        border-color: rgba(255,255,255,.14);
      }
      /* Left accent bar */
      .card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: var(--bar);
        background: linear-gradient(180deg, var(--accent), var(--accent2));
        border-radius: 0 0 0 var(--radius-lg);
        box-shadow: 0 0 16px rgba(59,130,246,.4);
      }
      .brand {
        display: none;
      } /* hidden — login hero replaces it */
      .brand-sub {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text2);
        text-align: center;
        margin-bottom: 20px;
      }

      /* ═══════════════════════════════════════════
   SEGMENTED CONTROL
═══════════════════════════════════════════ */
      .seg {
        display: flex;
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 3px;
        gap: 3px;
        margin-bottom: 20px;
      }
      .seg-btn {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--muted2);
        padding: 9px 8px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .seg-btn.active {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: var(--white);
        box-shadow: 0 0 16px rgba(59,130,246,.3);
      }
      .seg-btn:hover:not(.active) {
        color: var(--text);
      }

      /* ═══════════════════════════════════════════
   FIELDS & INPUTS
═══════════════════════════════════════════ */
      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-bottom: 13px;
      }
      .field label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted2);
        letter-spacing: 1.2px;
        text-transform: uppercase;
      }
      .field input,
      .field select {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-bottom: 2px solid var(--bd2);
        color: var(--text);
        padding: 10px 13px;
        border-radius: var(--radius);
        font-family: "Barlow", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }
      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
        border-bottom-color: var(--accent);
        background: var(--s3);
      }
      .hint {
        color: var(--muted2);
        font-weight: 400;
        font-size: 11px;
        text-transform: none;
        letter-spacing: 0;
      }
      .fhint {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 14px;
        line-height: 1.6;
      }

      /* ── PIN INPUTS — broadcast number style ── */
      .pin-row {
        display: flex;
        gap: 6px;
      }
      .pd,
      .pj,
      .pr,
      .pm {
        flex: 1;
        height: 58px;
        background: var(--s1);
        border: 1px solid var(--bd);
        border-bottom: 3px solid var(--bd2);
        color: var(--white);
        font-size: 26px;
        text-align: center;
        border-radius: var(--radius);
        outline: none;
        font-family: "DM Mono", monospace;
        transition: border-color 0.15s;
        min-width: 0;
      }
      .pd:focus,
      .pj:focus,
      .pr:focus,
      .pm:focus {
        border-color: var(--accent);
        border-bottom-color: var(--accent);
      }

      /* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
      .btn-gold {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, #8b5cf6 100%);
        background-size: 200% 100%;
        box-shadow: 0 0 30px rgba(59,130,246,.4), 0 4px 16px rgba(99,102,241,.3), inset 0 1px 0 rgba(255,255,255,.2);
        color: var(--white);
        border: 1px solid rgba(139,148,255,.3);
        width: 100%;
        padding: 13px;
        border-radius: var(--radius-md);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        touch-action: manipulation;
        transition: background-position .3s ease, box-shadow .2s ease, transform .15s ease, border-color .15s ease;
        margin-top: 4px;
        position: relative;
        overflow: hidden;
      }
      .btn-gold::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
        transform: skewX(-20deg);
        transition: left 0.5s ease;
        pointer-events: none;
      }
      .btn-gold:hover {
        background-position: 100% 0;
        box-shadow: 0 0 45px rgba(59,130,246,.6), 0 6px 24px rgba(99,102,241,.4), inset 0 1px 0 rgba(255,255,255,.25);
        transform: translateY(-2px);
        border-color: rgba(139,148,255,.5);
      }
      .btn-gold:hover::after {
        left: 150%;
      }
      .btn-gold:active {
        transform: scale(0.96);
        box-shadow: 0 0 16px rgba(59,130,246,.3);
      }
      .btn-gold:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-ghost {
        background: transparent;
        border: 1px solid var(--bd2);
        color: var(--text2);
        padding: 9px 14px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--white);
      }

      .btn-sm {
        background: transparent;
        border: 1px solid var(--bd2);
        color: var(--text2);
        padding: 6px 13px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-sm:hover {
        border-color: var(--accent);
        color: var(--white);
      }

      .btn-warn {
        background: rgba(255, 68, 68, 0.08);
        border: 1px solid rgba(255, 68, 68, 0.3);
        color: var(--red);
        padding: 11px 16px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: all 0.15s;
      }
      .btn-warn:hover {
        background: rgba(255, 68, 68, 0.14);
      }
      .btn-warn.btn-warn-muted {
        opacity: 0.5;
        border-style: dashed;
      }

      /* ── REVEAL BUTTON — big broadcast moment ── */
      .btn-reveal {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        box-shadow: 0 4px 24px rgba(245,158,11,.5);
        color: #0a0a0a;
        border: none;
        clip-path: none;
        border-radius: var(--radius-md);
        padding: 14px 18px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: all 0.15s;
        animation: revealPulse 2s ease-in-out infinite;
      }
      @keyframes revealPulse {
        0%,
        100% {
          box-shadow: 0 4px 24px rgba(245,158,11,.5);
        }
        50% {
          box-shadow: 0 4px 24px rgba(245,158,11,.5), 0 0 0 6px rgba(245,158,11,.2);
        }
      }
      .btn-reveal:hover {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        box-shadow: 0 6px 32px rgba(245,158,11,.7);
        transform: translateY(-2px);
      }

      .btn-nuke {
        background: transparent;
        border: 1px dashed rgba(255, 68, 68, 0.3);
        color: rgba(255, 68, 68, 0.5);
        padding: 8px 14px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        width: 100%;
        transition: all 0.15s;
      }
      .btn-nuke:hover {
        background: rgba(255, 68, 68, 0.06);
        color: var(--red);
        border-color: rgba(255, 68, 68, 0.5);
      }

      .err {
        color: var(--red);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.3px;
        min-height: 18px;
        margin-bottom: 6px;
        animation: shake 0.25s ease;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-4px);
        }
        75% {
          transform: translateX(4px);
        }
      }

      /* ── JOIN BADGE ── */
      .join-badge {
        font-family: "DM Mono", monospace;
        font-size: 42px;
        font-weight: 500;
        letter-spacing: 8px;
        color: var(--white);
        text-align: center;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-left: var(--bar) solid var(--accent);
        border-radius: var(--radius-md);
        padding: 14px;
        margin: 8px 0 18px;
        animation: cardSlideUp 0.3s ease both;
        box-shadow: 0 0 16px rgba(59,130,246,.2);
      }

      .admin-tip {
        font-size: 11px;
        color: var(--muted2);
        margin-top: 12px;
        line-height: 1.6;
        padding: 10px 12px;
        background: var(--s1);
        border-radius: var(--radius);
        border-left: var(--bar) solid var(--bd2);
      }
      .admin-tip b {
        color: var(--text2);
        word-break: break-all;
      }

      /* ═══════════════════════════════════════════
   VIEW TABS — broadcast tab bar
═══════════════════════════════════════════ */
      .view-tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--bd);
        margin-bottom: 20px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .view-tabs::-webkit-scrollbar {
        display: none;
      }
      .vtab {
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted2);
        padding: 10px 18px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        white-space: nowrap;
        margin-bottom: -2px;
        transition: all 0.15s;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      .vtab.active {
        color: var(--white);
        border-bottom-color: var(--accent);
        text-shadow: 0 0 16px rgba(59,130,246,.5);
        animation: glowPulse 3s infinite ease-in-out;
      }
      .tab-content {
        animation: slideUpIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      .vtab:hover:not(.active) {
        color: var(--text);
      }

      /* ═══════════════════════════════════════════
   MATCH BAR — broadcast score header style
═══════════════════════════════════════════ */
      .match-bar {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-left: var(--bar) solid var(--accent);
        border-radius: var(--radius-lg);
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        margin-bottom: 16px;
        gap: 8px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0,0,0,.35);
      }
      .match-bar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding-right: 20px; /* Clear the diagonal cut */
      }
      .match-bar-content {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }
      /* Right diagonal cut */
      .match-bar::after {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0 22px 22px 0;
        border-color: transparent var(--bg) transparent transparent;
        z-index: 5;
        pointer-events: none;
      }
      .match-label-sm {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--muted2);
        text-transform: uppercase;
      }
      .match-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: clamp(1.1rem, 4vw, 1.5rem);
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--white);
        line-height: 1.2;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }

      /* ── FLAGS ── */
      .mst-flag {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--bd);
        flex-shrink: 0;
        background: var(--s3);
      }
      .mst-flags {
        display: flex;
        gap: 4px;
        align-items: center;
        margin-bottom: 4px;
      }
      .match-flag {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        aspect-ratio: 1 / 1;
        border: 2px solid var(--bd);
        background: var(--s3);
      }
      .match-flags {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .rb-flag {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        aspect-ratio: 1 / 1;
        border: 2px solid var(--gold);
        background: var(--s3);
      }
      .rb-flags {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 12px;
      }

      @media (max-width: 600px) {
        .match-flag { width: 32px; height: 32px; }
        .rb-flag { width: 40px; height: 40px; }
        .match-flags { gap: 4px; }
      }

      /* ── PILLS ── */
      .pill {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: var(--radius);
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }
      .pill-green {
        background: rgba(34,197,94,.12);
        color: var(--green);
        border: 1px solid rgba(34,197,94,.3);
        box-shadow: 0 0 12px rgba(34,197,94,.1);
      }
      .pill-red {
        background: rgba(239,68,68,.12);
        color: var(--red);
        border: 1px solid rgba(239,68,68,.3);
        box-shadow: 0 0 12px rgba(239,68,68,.1);
      }
      .pill-amber {
        background: rgba(245,158,11,.12);
        color: var(--gold);
        border: 1px solid rgba(245,158,11,.3);
        box-shadow: 0 0 12px rgba(245,158,11,.1);
      }

      /* ═══════════════════════════════════════════
   INFO BANNERS
═══════════════════════════════════════════ */
      .info-banner {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 18px;
        border-radius: var(--radius-md);
        margin-bottom: 16px;
        font-size: 14px;
        animation: fadeUp 0.3s ease both;
      }
      .info-banner.green {
        background: rgba(0, 230, 118, 0.05);
        border: 1px solid rgba(0, 230, 118, 0.2);
        border-left: var(--bar) solid var(--green);
      }
      .info-banner.red {
        background: rgba(255, 68, 68, 0.05);
        border: 1px solid rgba(255, 68, 68, 0.2);
        border-left: var(--bar) solid var(--red);
      }
      .info-banner.warn {
        background: rgba(201, 168, 76, 0.05);
        border: 1px solid rgba(201, 168, 76, 0.2);
        border-left: var(--bar) solid var(--gold);
        color: var(--gold);
      }
      .ib-icon {
        font-size: 24px;
        flex-shrink: 0;
      }
      .ib-title {
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
        color: var(--white);
      }
      .ib-sub {
        font-size: 12px;
        color: var(--text2);
      }

      /* ── PLAYER CHIPS ── */
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 18px;
        animation: fadeUp 0.3s ease both;
      }
      .pchip {
        background: var(--s2);
        border: 1px solid var(--bd);
        padding: 4px 10px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .pchip-c {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(201, 168, 76, 0.08);
      }
      .pchip-vc {
        border-color: rgba(201, 168, 76, 0.4);
        color: rgba(201, 168, 76, 0.8);
      }

      /* ═══════════════════════════════════════════
   PLAYER PICKER
═══════════════════════════════════════════ */
      .builder {
      }
      .bh {
        margin-bottom: 14px;
      }
      .bh h2 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 10px;
        text-transform: uppercase;
      }
      .ctr {
        font-family: "DM Mono", monospace;
        font-size: 14px;
        color: var(--gold);
        background: rgba(201, 168, 76, 0.1);
        padding: 2px 10px;
        border-radius: var(--radius);
        border: 1px solid rgba(201, 168, 76, 0.2);
      }
      .bh p {
        font-size: 13px;
        color: var(--text2);
        margin-top: 3px;
      }

      .filter-bar {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .sinp {
        background: var(--s2);
        border: 1px solid var(--bd);
        color: var(--text);
        padding: 9px 13px;
        border-radius: var(--radius);
        font-family: "Barlow", sans-serif;
        font-size: 16px; /* ≥16px prevents iOS Safari auto-zoom on focus */
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
        margin-bottom: 7px;
      }
      .sinp:focus {
        border-color: var(--accent);
      }

      .rtabs {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .rtab {
        background: var(--s2);
        border: 1px solid var(--bd);
        color: var(--muted2);
        padding: 6px 13px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .rtab.active,
      .rtab:hover {
        border-color: var(--accent);
        color: var(--white);
        background: rgba(26, 86, 255, 0.12);
      }

      /* ── PLAYER CARDS — broadcast stat card style ── */

      /* ── Status-driven visibility rules ──
         Not-playing: always heavily dimmed regardless of selection state
         Playing / Impact: always full brightness — never dim these
         Unknown status when XI has picks: slight dim only */
      .pcard-notplaying {
        opacity: 0.32 !important;
        filter: grayscale(0.5);
        cursor: default;
      }
      .pgrid:has(.pcard-on) .pcard:not(.pcard-on):not(.pcard-dis):not(.pcard-playing):not(.pcard-impact):not(.pcard-notplaying) {
        opacity: 0.6;
      }
      /* Playing/impact stay fully visible even when other cards are selected */
      .pgrid:has(.pcard-on) .pcard-playing:not(.pcard-on),
      .pgrid:has(.pcard-on) .pcard-impact:not(.pcard-on) {
        opacity: 1 !important;
      }

      /* ── Playing card — green left glow ── */
      .pcard-playing:not(.pcard-on) {
        border-left: 3px solid #00e676 !important;
        box-shadow: -4px 0 14px rgba(0,230,118,0.35), 0 8px 32px rgba(0,0,0,0.37);
      }

      /* ── Impact card — amber treatment ── */
      .pcard-impact:not(.pcard-on) {
        border-left: 3px solid #f59e0b !important;
        box-shadow: -4px 0 14px rgba(245,158,11,0.4), 0 8px 32px rgba(0,0,0,0.37);
        background: rgba(245,158,11,0.06) !important;
        padding-top: 20px; /* make room for impact bar */
      }

      /* ── Impact bar — top strip across card ── */
      .pcard-impact-bar {
        position: absolute;
        top: 0; left: 0; right: 0;
        background: linear-gradient(90deg, rgba(245,158,11,0.9) 0%, rgba(251,191,36,0.75) 100%);
        color: #000;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 8.5px;
        font-weight: 900;
        letter-spacing: 1.5px;
        text-align: center;
        padding: 2px 0 2px;
        z-index: 6;
        border-radius: 9px 9px 0 0;
        text-shadow: none;
      }

      /* ── Playing dot — pulsing green indicator ── */
      .pcard-playing-dot {
        position: absolute;
        top: 8px; left: 8px;
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #00e676;
        box-shadow: 0 0 8px #00e676;
        z-index: 6;
        animation: playingPulse 2s ease-in-out infinite;
      }
      @keyframes playingPulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 6px #00e676; }
        50% { opacity: 0.55; box-shadow: 0 0 14px #00e676; }
      }

      /* ── Not-playing label ── */
      .pcard-np-label {
        margin-top: 5px;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 1px;
        color: #ff5252;
        text-align: center;
        text-transform: uppercase;
      }
      .pgrid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
        gap: 6px;
        margin-bottom: 18px;
      }
      .pcard {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-top-color: var(--card-top, rgba(99,102,241,.4));
        border-left: 2px solid var(--pc-team-color, var(--accent));
        box-shadow: 0 4px 20px rgba(0,0,0,.4);
        border-radius: var(--radius-md);
        padding: 12px 10px;
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        position: relative;
        user-select: none;
        overflow: hidden;
      }
      .pcard:active:not(.pcard-dis) {
        transform: scale(0.96);
        background: rgba(99,102,241,.12);
      }
      .pcard:hover:not(.pcard-dis) {
        background: linear-gradient(145deg, rgba(99,102,241,.12) 0%, rgba(59,130,246,.06) 100%);
        border-color: rgba(99,102,241,.45);
        border-top-color: rgba(139,148,255,.6);
        border-left-color: var(--pc-team-color, var(--accent));
        box-shadow: 0 0 0 1px rgba(99,102,241,.15), 0 0 24px rgba(59,130,246,.2), 0 8px 28px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.1);
        transform: translateY(-2px) scale(1.02);
      }
      .pcard-on {
        background: linear-gradient(145deg, rgba(16,185,129,.2) 0%, rgba(16,185,129,.08) 100%) !important;
        border: 1px solid rgba(16,185,129,.5) !important;
        border-top: 1px solid rgba(52,211,153,.7) !important;
        border-left: 3px solid #10b981 !important;
        box-shadow: 0 0 0 1px rgba(16,185,129,.15), 0 0 20px rgba(16,185,129,.2), 0 6px 20px rgba(0,0,0,.4) !important;
        outline: none !important;
      }
      .pcard-dis {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .pchk {
        position: absolute;
        top: 6px;
        right: 6px;
        background: #10b981;
        color: #fff;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 900;
        animation: checkPop 0.15s ease both;
      }
      @keyframes checkPop {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }
      .team-cap-badge {
        position: absolute;
        top: 5px;
        right: 5px;
        background: var(--red);
        color: var(--white);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 1px 5px;
        border-radius: 2px;
      }
      .team-cnt {
        font-family: "DM Mono", monospace;
        color: var(--gold);
        font-size: 10px;
        margin-left: 3px;
      }
      .pc-role {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--muted2);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .pc-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--white);
        line-height: 1.2;
        margin-bottom: 2px;
      }
      .pc-team {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted2);
      }
      .empty-hint {
        text-align: center;
        color: var(--muted2);
        padding: 36px 0;
        font-size: 14px;
      }
      .need-more {
        text-align: center;
        color: var(--text2);
        font-size: 14px;
        padding: 12px;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* ── XI PANEL ── */
      .xi-panel {
        background: var(--s2);
        border: 1px solid var(--bd);
        border-top: 2px solid var(--accent);
        border-radius: 0 0 var(--radius-md) var(--radius-md);
        padding: 18px;
        margin-bottom: 18px;
        animation: fadeUp 0.3s ease both;
      }
      .xi-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--gold);
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .xi-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 13px;
      }
      .xchip {
        background: var(--s1);
        border: 1px solid var(--bd);
        padding: 4px 9px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }
      .xchip b {
        font-size: 10px;
        font-weight: 900;
      }
      .xchip-c {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(201, 168, 76, 0.07);
      }
      .xchip-vc {
        border-color: rgba(201, 168, 76, 0.35);
        color: rgba(201, 168, 76, 0.8);
      }
      .cap-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 13px;
      }
      .cs {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .cs label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .cs select {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-bottom: 2px solid var(--bd2);
        color: var(--text);
        padding: 8px 10px;
        border-radius: var(--radius);
        font-family: "Barlow", sans-serif;
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s;
      }
      .cs select:focus {
        border-color: var(--accent);
      }
      .btn-lock {
        font-size: 17px;
        padding: 13px;
        margin-top: 2px;
      }

      /* ═══════════════════════════════════════════
   LIVE SCORECARD — 2026 Broadcast Design
   Star Sports x Google aesthetic
═══════════════════════════════════════════ */
      .cricket-score-bar {
        --team-home-primary: #2563ff;
        --team-away-primary: #f59e0b;
        position: relative;
        border-radius: var(--radius-md);
        margin-bottom: 12px;
        overflow: hidden;
        background: var(--s1);
        border: 1px solid var(--bd3);
        box-shadow: 0 4px 20px rgba(0,0,0,.4);
        display: flex;
        flex-direction: column;
      }

      .csb-zones-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0;
        border-bottom: 1px solid var(--bd3);
      }

      .csb-team-zone {
        flex: 1 1 180px;
        padding: 12px 16px;
        position: relative;
        display: flex;
        flex-direction: column;
        transition: border-color 0.3s ease, background 0.3s ease;
      }

      .csb-home-zone { border-bottom: 3px solid var(--team-home-primary); }
      .csb-away-zone { border-bottom: 3px solid var(--team-away-primary); }

      .csb-team-zone.is-batting {
        background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.06)); /* fallback */
        background: linear-gradient(to bottom, transparent, color-mix(in srgb, var(--batting-color), transparent 92%));
        box-shadow: inset 0 -15px 25px -15px rgba(255,255,255,0.08); /* fallback */
        box-shadow: inset 0 -15px 25px -15px color-mix(in srgb, var(--batting-color), transparent 70%);
      }

      /* ── Team Name Label — theme-agnostic pill ── */
      .csb-inn-team {
        display: inline-block;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #ffffff;
        padding: 3px 10px;
        border-radius: 4px;
        margin-bottom: 6px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.18);
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      .csb-big-score {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: clamp(42px, 9vw, 56px);
        font-weight: 800;
        letter-spacing: -0.5px;
        color: #ffffff; /* fallback: older Android/iOS without color-mix */
        color: color-mix(in srgb, var(--batting-color, #ffffff), white 45%);
        text-shadow: 0 2px 8px rgba(0,0,0,0.75);
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      /* Wickets: same color, slightly smaller */
      .csb-wkts-sep {
        font-size: 0.75em;
        font-weight: 800;
        opacity: 0.92;
        letter-spacing: 0;
      }

      /* Non-batting team during live play: dimmed — only fires when some team IS batting */
      .csb-zones-row:has(.is-batting) .csb-team-zone:not(.is-batting) .csb-big-score {
        opacity: 0.52;
      }

      .csb-overs {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.88);
        letter-spacing: 0.5px;
        margin-top: 2px;
      }

      .csb-ov-label {
        font-weight: 600;
        opacity: 0.72;
        font-size: 0.85em;
      }

      .csb-context-bar {
        background: rgba(0,0,0,0.35);
        padding: 7px 16px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--gold);
        text-transform: uppercase;
        border-top: 1px solid var(--bd3);
        text-align: center;
      }

      /* Live badge in team zone */
      .csb-live-badge {
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: #ff4444;
        text-shadow: 0 0 8px rgba(255,68,68,0.6);
        animation: livePulse 1.5s infinite ease-in-out;
      }
      @keyframes livePulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* ── Stylized Crease Section ── */
      .csb-crease-stylized {
        display: flex;
        flex-direction: column;
        border-top: 1px solid var(--bd3);
        background: rgba(0,0,0,0.25);
      }

      .reveal-banner {
        position: relative;
        overflow: hidden;
        /* Solid dark base — always readable regardless of theme (color-mix() fallback) */
        background:
          radial-gradient(ellipse at 10% 50%, rgba(37,99,255,0.22), transparent 50%),
          radial-gradient(ellipse at 90% 50%, rgba(245,158,11,0.18), transparent 50%),
          rgba(8, 12, 24, 0.88);

      }

      @supports (background: color-mix(in srgb, red, transparent)) {
        .reveal-banner {

            radial-gradient(ellipse at 10% 50%, color-mix(in srgb, var(--team-home-primary, #2563ff), transparent 78%), transparent 50%),

      /* Leaderboard — glass cards */
      .lb-list {

      .lb-card:nth-child(3) { animation-delay: 100ms; }
      .lb-card:nth-child(4) { animation-delay: 150ms; }
      .lb-card:nth-child(5) { animation-delay: 200ms; }
      .lb-card:nth-child(6) { animation-delay: 250ms; }
      .lb-card:nth-child(7) { animation-delay: 300ms; }
      .lb-card:nth-child(8) { animation-delay: 350ms; }
      .lb-card:nth-child(n+9) { animation-delay: 400ms; }

      /* Podium animations for finalized matches */
      .lb-top-1 {
        animation: podium1 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
        border-color: rgba(245,158,11,.6) !important;
        border-top-color: rgba(255,200,50,.85) !important;
        background: linear-gradient(135deg, rgba(245,158,11,.18), rgba(245,158,11,.06)) !important;
        box-shadow: 0 0 0 1px rgba(245,158,11,.2), 0 0 40px rgba(245,158,11,.25), 0 8px 32px rgba(0,0,0,.5) !important;

        from { opacity: 0; transform: translateY(-30px) scale(0.9); }
        to   { opacity: 1; transform: none; }

      .lb-top-2 {
        animation: podium2 0.8s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
        border-color: rgba(148,163,184,.4) !important;
        border-top-color: rgba(200,210,220,.6) !important;
        background: linear-gradient(135deg, rgba(148,163,184,.14), rgba(148,163,184,.04)) !important;
        box-shadow: 0 0 0 1px rgba(148,163,184,.12), 0 0 24px rgba(148,163,184,.15), 0 8px 28px rgba(0,0,0,.45) !important;
      }
      @keyframes podium2 {
        from { opacity: 0; transform: translateY(-20px) scale(0.95); }
        to   { opacity: 1; transform: none; }
      }
      .lb-top-3 {
        animation: podium3 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
        border-color: rgba(205,127,50,.4) !important;
        border-top-color: rgba(235,160,80,.6) !important;

      .lb-med-1 {

      .wb-winner {

      .lb-name {

   SEASON TABLE
═══════════════════════════════════════════ */
      .season-header {

        min-width: 0;
      }

      }
      .hlist-title {
        font-family: 'Barlow Condensed', sans-serif; font-size: 22px;
