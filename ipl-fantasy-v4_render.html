      .hlist-card {
        display: flex; align-items: center; gap: 12px;
        background: var(--s2); border: 1px solid var(--bd);
        border-radius: var(--radius); padding: 12px 14px;
        cursor: pointer; transition: background 0.15s, border-color 0.15s;
        touch-action: manipulation;
      }
      .hlist-card:active { background: rgba(255,255,255,.06); }
      .hlist-card:hover  { border-color: var(--accent); background: rgba(255,255,255,.04); }
      .hlc-logos { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
      .hlc-logo  { width: 28px; height: 28px; object-fit: contain; }
      .hlc-logo-ph { width: 28px; height: 28px; background: var(--s1); border-radius: 4px; }
      .hlc-info  { flex: 1; min-width: 0; }
      .hlc-label { font-family: 'Barlow Condensed', sans-serif; font-size: 15px;
                   font-weight: 700; color: var(--white); white-space: nowrap;
                   overflow: hidden; text-overflow: ellipsis; }
      .hlc-myscore { font-size: 12px; color: var(--text2); margin-top: 2px; }
      .hlc-myscore b { color: var(--gold); }
      .hlc-badge {
        font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800;
        letter-spacing: 0.8px; color: var(--green); background: rgba(0,230,118,.1);
        border: 1px solid rgba(0,230,118,.25); border-radius: 4px; padding: 2px 6px;
        flex-shrink: 0;
      }
      .hlc-arrow { color: var(--muted2); font-size: 20px; flex-shrink: 0; }

      /* ── MATCH SUMMARY VIEW ──────────────────────────────────────── */
      .msv {
        padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      .msv-back {
        display: inline-flex; align-items: center; gap: 4px;
        background: transparent; border: 1px solid var(--bd);
        color: var(--text2); font-family: 'Barlow', sans-serif; font-size: 13px;
        padding: 6px 12px; border-radius: var(--radius); cursor: pointer;
        margin-bottom: 14px; transition: color 0.15s, border-color 0.15s;
        touch-action: manipulation;
      }
      .msv-back:hover { color: var(--white); border-color: var(--accent); }

      /* ── MSV sub-tabs: Scorecard / Fantasy Points ── */
      .msv-subtabs {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        border-bottom: 1px solid var(--bd);
        padding-bottom: 0;
      }
      .msv-stab {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted2);
        padding: 6px 14px;
        cursor: pointer;
        margin-bottom: -1px;
        transition: color 0.15s, border-color 0.15s;
        touch-action: manipulation;
      }
      .msv-stab:hover { color: var(--text); }
      .msv-stab-active {
        color: var(--white);
        border-bottom-color: var(--accent);
      }
      .msv-pts-grid { margin-top: 8px; }

      /* ── HSC: MATCH HEADER ───────────────────────────────────────── */
      .hsc-match-hd {
        text-align: center; padding: 16px 0 20px; margin-bottom: 4px;
      }
      .hsc-match-teams {
        display: flex; align-items: center; justify-content: center; gap: 14px;
        margin-bottom: 8px;
      }
      .hsc-match-logo { width: 48px; height: 48px; object-fit: contain; }
      .hsc-match-vs {
        font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800;
        letter-spacing: 2px; color: var(--muted2); text-transform: uppercase;
      }
      .hsc-match-label {
        font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800;
        letter-spacing: 1px; color: var(--white); text-transform: uppercase;
        line-height: 1.1; margin-bottom: 3px;
      }
      .hsc-match-sub {
        font-size: 12px; color: var(--muted2); font-family: 'Barlow', sans-serif;
      }
      .hsc-so-divider {
        text-align: center; font-family: 'Barlow Condensed', sans-serif;
        font-size: 11px; font-weight: 800; letter-spacing: 2px;
        color: var(--gold); text-transform: uppercase;
        padding: 10px 0 4px; margin-top: 8px;
      }
      .hsc-result {
        display: inline-block; margin-top: 10px;
        background: linear-gradient(135deg,
          color-mix(in srgb, var(--res-col, #f59e0b), transparent 75%),
          color-mix(in srgb, var(--res-col, #f59e0b), transparent 90%));
        background-color: rgba(245,158,11,0.18); /* fallback */
        border: 1px solid color-mix(in srgb, var(--res-col, #f59e0b), transparent 55%);
        border-color: rgba(245,158,11,0.45); /* fallback */
        color: var(--white);
        font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 800;
        letter-spacing: 0.5px; text-transform: uppercase;
        padding: 5px 14px; border-radius: 20px;
      }

      /* ── HSC: INNINGS BLOCK ──────────────────────────────────────── */
      .hsc-inn {
        margin-bottom: 20px;
        border-radius: var(--radius-md);
        overflow: hidden;
        border: 1px solid var(--bd);
        border-left: 3px solid var(--inn-col, var(--accent));
        box-shadow: 0 2px 16px rgba(0,0,0,.25);
      }
      .hsc-inn-hd {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px;
        background: rgba(255,255,255,0.05);
        background: linear-gradient(135deg,
          color-mix(in srgb, var(--inn-col, var(--accent)), transparent 78%),
          color-mix(in srgb, var(--inn-col, var(--accent)), transparent 96%));
        border-bottom: 1px solid var(--bd);
      }
      .hsc-inn-left {
        display: flex; align-items: center; gap: 12px;
      }
      .hsc-inn-logo { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
      .hsc-inn-team {
        font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800;
        letter-spacing: 2px; color: var(--white); text-transform: uppercase;
      }
      .hsc-inn-right {
        display: flex; flex-direction: column; align-items: flex-end;
      }
      .hsc-big-score {
        font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif;
        font-size: 34px; font-weight: 400; letter-spacing: 2px;
        color: var(--inn-col, var(--white)); line-height: 1;
        text-shadow: 0 0 20px color-mix(in srgb, var(--inn-col, var(--accent)), transparent 50%);
      }
      .hsc-inn-ov {
        font-family: 'DM Mono', monospace; font-size: 11px;
        color: var(--muted2); margin-top: 2px;
      }

      /* ── HSC: TABLE HEADER ROW ───────────────────────────────────── */
      .hsc-tbl-hd {
        display: flex; align-items: center;
        padding: 5px 16px;
        background: rgba(255,255,255,.03);
        border-bottom: 1px solid var(--bd);
        font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 800;
        letter-spacing: 1.5px; color: var(--muted2); text-transform: uppercase;
      }
      .hsc-tbl-hd-bowl { border-top: 1px solid var(--bd); }

      /* ── HSC: ROW LAYOUT ─────────────────────────────────────────── */
      .hsc-bat-body, .hsc-bowl-body { background: var(--s1); }
      .hsc-bat-row, .hsc-bowl-row {
        display: flex; align-items: center;
        padding: 8px 16px;
        border-bottom: 1px solid rgba(255,255,255,.04);
        transition: background 0.1s;
      }
      .hsc-bat-row:last-child, .hsc-bowl-row:last-child { border-bottom: none; }
      .hsc-bat-row:hover, .hsc-bowl-row:hover { background: rgba(255,255,255,.05); }
      .hsc-row-duck { opacity: 0.6; }

      /* ── HSC: COLUMNS ────────────────────────────────────────────── */
      .hsc-col-name {
        flex: 1; min-width: 100px;
        font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--white);
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      }
      .hsc-batter-name { display: inline; }
      .hsc-col-r {
        width: 48px; text-align: right; flex-shrink: 0;
        display: flex; align-items: center; justify-content: flex-end; gap: 4px;
        font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700;
      }
      .hsc-col-b {
        width: 34px; text-align: right; flex-shrink: 0;
        font-family: 'DM Mono', monospace; font-size: 13px;
      }
      .hsc-col-sm {
        width: 28px; text-align: right; flex-shrink: 0;
        font-family: 'DM Mono', monospace; font-size: 13px;
      }
      .hsc-col-sr {
        width: 44px; text-align: right; flex-shrink: 0;
        font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2);
      }
      /* header column alignment matches row columns */
      .hsc-tbl-hd .hsc-col-r  { font-family: 'Barlow Condensed', sans-serif; width: 48px; }
      .hsc-tbl-hd .hsc-col-b  { font-family: 'Barlow Condensed', sans-serif; }
      .hsc-tbl-hd .hsc-col-sm { font-family: 'Barlow Condensed', sans-serif; }
      .hsc-tbl-hd .hsc-col-sr { font-family: 'Barlow Condensed', sans-serif; }

      /* ── HSC: VALUE MODIFIERS ────────────────────────────────────── */
      .hsc-runs     { color: var(--white); }
      .hsc-r-duck   { color: var(--muted2); }
      .hsc-r-warm   { color: #fde68a; }
      .hsc-r-fifty  { color: #fbbf24; font-weight: 700; }
      .hsc-r-ton    { color: #f59e0b; font-weight: 700; }
      .hsc-dim      { color: var(--muted2); }
      .hsc-wkt      { color: #f87171; font-weight: 700; }
      .hsc-wkt-haul { color: #fb923c; font-size: 15px; }
      .hsc-no       { color: #4ade80; margin-left: 1px; font-size: 15px; }
      .hsc-fld      { font-size: 10px; color: var(--muted2); font-family: 'Barlow', sans-serif; }
      .hsc-hi       { color: #34d399; font-weight: 700; }
      .hsc-lo       { color: #f87171; font-weight: 700; }

      /* ── HSC: MILESTONE / HAUL BADGES ───────────────────────────── */
      .hsc-badge {
        display: inline-flex; align-items: center;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
        padding: 1px 5px; border-radius: 3px; text-transform: uppercase;
        flex-shrink: 0;
      }
      .hsc-badge-fifty { background: rgba(251,191,36,.18); color: #fbbf24; border: 1px solid rgba(251,191,36,.35); }
      .hsc-badge-ton   { background: rgba(245,158,11,.22); color: #f59e0b; border: 1px solid rgba(245,158,11,.45); font-size: 13px; padding: 0; background: none; border: none; }
      .hsc-badge-haul  { background: rgba(251,146,60,.18); color: #fb923c; border: 1px solid rgba(251,146,60,.35); }
      .hsc-badge-fifer { background: rgba(239,68,68,.2);   color: #f87171; border: 1px solid rgba(239,68,68,.4);  }

      @media (max-width: 400px) {
        .hsc-col-name { min-width: 80px; font-size: 12px; }
        .hsc-col-r              { width: 38px; font-size: 12px; }
        .hsc-tbl-hd .hsc-col-r  { width: 38px; }
        .hsc-col-b    { width: 28px; font-size: 12px; }
        .hsc-col-sm   { width: 24px; font-size: 12px; }
        .hsc-col-sr   { width: 38px; font-size: 11px; }
        .hsc-tbl-hd   { padding: 5px 10px; }
        .hsc-bat-row, .hsc-bowl-row { padding: 6px 10px; }
        .hsc-badge    { display: none; }
      }
      /* ── END HISTORY TAB ─────────────────────────────────────────── */

      .history-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.8);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 100;
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
        animation: fadeIn .2s ease both;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .history-modal {
        background: var(--glass);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-lg);
        max-width: 500px; width: 100%;
        max-height: 85vh; overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        transform: translateY(100%); transition: transform 420ms cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 20px 60px rgba(0,0,0,.6);
      }
      .history-modal.sheet-open {
        transform: translateY(0);
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: none; }
      }
      .hm-header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 18px;
        border-bottom: 1px solid var(--bd);
        font-family: 'Barlow Condensed'; font-size: 14px;
        font-weight: 800; letter-spacing: 1px; color: var(--white);
        text-transform: uppercase;
      }
      .hm-close {
        background: transparent; border: none; color: var(--muted2);
        font-size: 22px; cursor: pointer; line-height: 1;
      }
      .hm-close:hover { color: var(--white); }
      .hm-body { padding: 16px; }
      .sc-total {
        font-family: "DM Mono", monospace;
        font-size: 36px;
        font-weight: 500;
        color: var(--gold);
        text-shadow: 0 0 20px rgba(245,158,11,.5);
        text-align: right;
        min-width: 84px;
        line-height: 1;
      }
      .sc-total span {
        font-size: 11px;
        color: var(--text2);
        display: block;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      /* History table — ICC scorecard table */
      .history-section {
        margin-top: 22px;
      }
      .hs-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--white);
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--bd);
        border-radius: var(--radius-md);
      }
      .hist-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .hist-table th {
        background: var(--s1);
        padding: 9px 14px;
        text-align: left;
        font-family: "Barlow Condensed", sans-serif;
        color: var(--muted2);
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-bottom: 2px solid var(--bd2);
      }
      .th-match {
        text-align: center !important;
        min-width: 80px;
      }
      .th-match-wrap {
        display: inline-block;
        white-space: nowrap;
      }
      .hist-table td {
        padding: 9px 14px;
        border-bottom: 1px solid rgba(30, 45, 72, 0.5);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 500;
      }
      .hist-table tr:last-child td {
        border-bottom: none;
      }
      .hist-table tr:nth-child(even) td {
        background: rgba(255, 255, 255, 0.015);
      }
      .hist-table tr:hover td {
        background: rgba(26, 86, 255, 0.04);
      }
      .tr-me td {
        background: rgba(201, 168, 76, 0.04) !important;
      }
      .td-name {
        font-weight: 700;
        color: var(--white);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .td-pts {
        text-align: center;
        font-family: "DM Mono", monospace;
        color: var(--gold);
        font-size: 14px;
      }
      .td-total {
        text-align: center;
        font-family: "DM Mono", monospace;
        font-size: 18px;
        color: var(--gold);
        font-weight: 500;
      }

      /* ═══════════════════════════════════════════
   ADMIN LAYOUT
═══════════════════════════════════════════ */
      .admin-2col {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .admin-2col {
          grid-template-columns: 1fr;
        }
      }
      /* 3-column admin layout */
      .admin-3col {
        display: grid;
        grid-template-columns: 280px 1fr 260px;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 1100px) {
        .admin-3col {
          grid-template-columns: 280px 1fr;
        }
        .admin-3col .acol:nth-child(3) {
          grid-column: 1 / -1;
        }
      }
      @media (max-width: 760px) {
        .admin-3col {
          grid-template-columns: 1fr;
        }
      }
      .acol {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .acard {
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-top: 2px solid rgba(139,148,255,.65);
        border-radius: 20px;
        padding: 18px;
        animation: cardSlideUp 0.22s ease-out both;
        position: relative;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(59,130,246,.18),
          0 0 24px rgba(59,130,246,.12),
          0 8px 32px rgba(0,0,0,.7),
          inset 0 1px 0 rgba(255,255,255,.1);
        transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
        will-change: transform;
      }
      .acard::after {
        content: '';
        position: absolute;
        top: 0; left: -60%; right: -60%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(139,148,255,.6), rgba(59,130,246,.8), rgba(139,148,255,.6), transparent);
        animation: cardShimmerLine 4s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes cardShimmerLine {
        0%, 100% { opacity: 0.5; transform: scaleX(0.6); }
        50% { opacity: 1; transform: scaleX(1); }
      }
      .acard:hover {
        background: linear-gradient(145deg, rgba(16,24,52,.96) 0%, rgba(10,16,38,.92) 100%);
        border-color: rgba(99,102,241,.65);
        border-top-color: rgba(139,148,255,.9);
        transform: translateY(-3px);
        box-shadow:
          0 0 0 1px rgba(99,102,241,.35),
          0 0 40px rgba(59,130,246,.25),
          0 16px 48px rgba(0,0,0,.7),
          inset 0 1px 0 rgba(255,255,255,.15);
      }
      @keyframes cardSlideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .acard::before { display: none; }
      .acard-t {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #93c5fd 0%, #c4b5fd 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 14px;
        text-transform: uppercase;
      }
      .acard-hrow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      .acard-hrow .acard-t {
        margin-bottom: 0;
      }
      .alink {
        color: var(--gold);
        font-size: 11px;
        text-decoration: none;
        margin-left: 5px;
        opacity: 0.8;
      }
      .alink:hover {
        opacity: 1;
      }
      .srow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 0;
        border-bottom: 1px solid rgba(30, 45, 72, 0.6);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 500;
      }
      .srow:last-of-type {
        border-bottom: none;
      }
      .ctrl-btns {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .ctrl-hint {
        font-size: 11px;
        color: var(--muted2);
        margin-top: 2px;
        margin-bottom: 2px;
      }
      .mrow {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(30, 45, 72, 0.4);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
      }
      .mrow:last-child {
        border-bottom: none;
      }
      .mrow-r {
        min-width: 22px;
        font-family: "DM Mono", monospace;
        font-size: 13px;
      }
      .mrow-n {
        flex: 1;
        font-weight: 700;
        color: var(--white);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .mrow-s {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .s-yes {
        color: var(--green);
      }
      .s-no {
        color: var(--muted2);
      }
      .mrow-p {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        color: var(--gold);
      }
      .subs-list {
        max-height: 240px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        margin: 0 -4px;
        padding: 0 4px;
      }
      .subs-list::-webkit-scrollbar {
        width: 3px;
      }
      .subs-list::-webkit-scrollbar-thumb {
        background: var(--bd2);
        border-radius: 2px;
      }
      .subs-divider {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted2);
        padding: 6px 0 3px;
        border-top: 1px solid var(--bd);
        margin-top: 2px;
      }
      .muted {
        color: var(--muted2);
        font-size: 13px;
      }
      .match-group-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--muted2);
        text-transform: uppercase;
        padding: 8px 0 4px;
        margin-top: 4px;
        border-bottom: 1px solid var(--bd);
        margin-bottom: 6px;
      }
      .mopt {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 10px 12px;
        margin-bottom: 7px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: border-color 0.15s;
      }
      .mopt-warn {
        font-size: 11px;
        color: var(--gold);
        margin-top: 3px;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
      }
      .mopt:hover {
        border-color: var(--accent);
      }
      .mopt-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 2px;
        color: var(--white);
      }
      .mopt-st {
        font-size: 11px;
        color: var(--text2);
      }
      .pool-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        max-height: 148px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding-right: 2px;
      }
      .manual-add-player {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 12px;
      }
      .map-row {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      .map-row .sinp {
        margin-bottom: 0;
      }
      .pool-role-sel {
        background: var(--s2);
        border: 1px solid var(--bd);
        color: var(--text2);
        font-size: 10px;
        padding: 1px 3px;
        border-radius: 3px;
        cursor: pointer;
        margin-left: 3px;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 700;
      }
      .pool-chip {
        background: var(--s1);
        border: 1px solid var(--bd);
        padding: 3px 8px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 600;
      }
      .pool-chip em {
        color: var(--muted2);
        font-style: normal;
        font-size: 11px;
        margin-left: 3px;
      }

      /* ── MATCH CONTROL CARD ── */
      .mc-card { position: relative; }
      .mc-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .mc-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted2);
      }
      .mc-badge {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 3px 9px;
        border-radius: 4px;
      }
      .mc-badge-open { background: rgba(37,99,255,.12); color: var(--accent); border: 1px solid rgba(37,99,255,.3); }
      .mc-badge-toss { background: rgba(245,158,11,.12); color: var(--gold); border: 1px solid rgba(245,158,11,.3); }
      .mc-badge-live { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.35); }
      .mc-badge-done { background: rgba(74,222,128,.1); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }

      /* Phase track */
      .mc-track {
        display: flex;
        align-items: flex-start;
        margin-bottom: 18px;
      }
      .mc-node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
      }
      .mc-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--s3);
        border: 1.5px solid var(--bd);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .mc-node-active .mc-dot {
        width: 10px;
        height: 10px;
        background: var(--accent);
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,255,.22);
      }
      .mc-node-done .mc-dot {
        background: #4ade80;
        border-color: #4ade80;
      }
      .mc-node-dim .mc-dot {
        background: var(--s3);
        border-color: var(--bd);
        opacity: 0.45;
      }
      .mc-lbl {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: var(--muted2);
        white-space: nowrap;
      }
      .mc-node-active .mc-lbl { color: var(--white); }
      .mc-node-done .mc-lbl  { color: #4ade80; opacity: 0.75; }
      .mc-line {
        flex: 1;
        height: 1.5px;
        background: var(--bd);
        margin-top: 4px;
        align-self: flex-start;
      }
      .mc-line-done { background: rgba(74,222,128,.35); }

      /* Action area */
      .mc-actions { margin-bottom: 4px; }
      .mc-action-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .mc-start-btn {
        background: rgba(239,68,68,.08);
        border: 1px solid rgba(239,68,68,.3);
        color: var(--red);
        padding: 11px 16px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: background 0.15s;
      }
      .mc-start-btn:hover { background: rgba(239,68,68,.15); }
      .mc-start-btn.mc-start-btn-muted { opacity: 0.4; border-style: dashed; }
      .mc-finalize-btn {
        background: rgba(74,222,128,.08);
        border: 1px solid rgba(74,222,128,.3);
        color: #4ade80;
        padding: 11px 16px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: background 0.15s;
      }
      .mc-finalize-btn:hover { background: rgba(74,222,128,.14); }
      .mc-abandon-btn {
        background: transparent;
        border: 1px dashed rgba(245,158,11,.3);
        color: rgba(245,158,11,.55);
        padding: 8px 12px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: all 0.15s;
      }
      .mc-abandon-btn:hover { color: var(--gold); border-color: rgba(245,158,11,.5); background: rgba(245,158,11,.05); }
      .mc-hint {
        font-size: 10px;
        color: var(--muted2);
        text-align: center;
        letter-spacing: 0.3px;
        margin: 0;
      }

      /* Danger zone — collapsed by default */
      .mc-danger-wrap {
        margin-top: 14px;
        border-top: 1px solid var(--bd);
        padding-top: 10px;
      }
      .mc-danger-summary {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(255,68,68,.35);
        cursor: pointer;
        list-style: none;
        user-select: none;
        outline: none;
      }
      .mc-danger-summary:hover { color: rgba(255,68,68,.6); }
      .mc-danger-summary::-webkit-details-marker { display: none; }
      .mc-danger-wrap[open] .mc-danger-summary { color: rgba(255,68,68,.55); margin-bottom: 2px; }

      /* ── STATS GRID ── */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
        gap: 10px;
        max-height: min(660px, calc(100vh - 200px));
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding-right: 4px;
        margin-top: 10px;
      }
      @keyframes statCardIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .stat-card {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-left: 3px solid var(--bd2);
        border-radius: var(--radius-md);
        padding: 13px 13px 13px 12px;
        transition: border-color 0.2s, box-shadow 0.2s;
        animation: statCardIn 0.18s ease-out both;
      }
      .stat-card:hover {
        border-color: rgba(99,102,241,.35);
        box-shadow: 0 4px 20px rgba(0,0,0,.25);
      }
      /* Role-coloured left strip */
      .sc-role-bat  { border-left-color: #60a5fa; }
      .sc-role-bowl { border-left-color: #f87171; }
      .sc-role-ar   { border-left-color: #fbbf24; }
      .sc-role-wk   { border-left-color: #c084fc; }

      /* ── Member read-only stats tab ── */
      .mstat-badges {
        margin-bottom: 8px;
      }
      .mstat-xi {
        display: inline-block;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 3px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.3);
        color: rgba(255,255,255,0.6);
      }
      .mstat-xi-play   { color: #4ade80; border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.08); }
      .mstat-xi-impact { color: #fbbf24; border-color: rgba(251,191,36,.3); background: rgba(251,191,36,.08); }
      .mstat-xi-out    { color: #f87171; border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }

      /* Stat chips */
      .mstat-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding-top: 9px;
        border-top: 1px solid var(--bd);
      }
      .mstat-chip {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        border-radius: 5px;
        padding: 3px 8px;
        font-size: 12px;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        letter-spacing: 0.2px;
        border: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.04);
        color: var(--text2);
      }
      .mstat-chip-bat   { border-color: rgba(96,165,250,.3);  background: rgba(96,165,250,.08);  color: #93c5fd; }
      .mstat-chip-bowl  { border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); color: #fca5a5; }
      .mstat-chip-field { border-color: rgba(192,132,252,.3); background: rgba(192,132,252,.08); color: #d8b4fe; }

      .sc-hd {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 10px;
      }
      .sc-nm {
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: var(--white);
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .sc-tm {
        font-size: 11px;
        color: var(--muted2);
      }
      .sc-pts {
        font-family: "DM Mono", monospace;
        font-size: 20px;
        color: var(--muted2);
        text-align: right;
        line-height: 1;
      }
      .sc-pts-on .sc-pts-num {
        display: block;
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #fb923c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
      }
      .sc-pts-on .sc-pts-unit {
        display: block;
        font-size: 10px;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: rgba(251,191,36,.5);
        text-align: right;
        margin-top: 1px;
      }
      .sc-section-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--muted2);
        border-bottom: 1px solid var(--bd);
        padding-bottom: 4px;
        margin-bottom: 6px;
      }
      .sc-inp {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
        margin-bottom: 7px;
      }
      .si-g {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .si-g label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        color: var(--muted2);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .si {
        background: var(--s2);
        border: 1px solid var(--bd);
        color: var(--text);
        padding: 5px 3px;
        border-radius: var(--radius);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        width: 100%;
        outline: none;
        text-align: center;
        transition: border-color 0.15s;
      }
      .si:focus {
        border-color: var(--accent);
      }
      .sc-chk {
        display: flex;
        gap: 12px;
        font-size: 12px;
        color: var(--muted2);
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .out-badge {
        font-size: 11px;
        color: #ff6b6b;
        font-weight: 700;
        margin-left: 3px;
        vertical-align: middle;
        opacity: 0.85;
      }
      .sc-chk label {
        display: flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .btn-save {
        background: rgba(26, 86, 255, 0.08);
        border: 1px solid rgba(26, 86, 255, 0.25);
        color: var(--white);
        padding: 7px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        cursor: pointer;
        width: 100%;
        transition: all 0.15s;
      }
      .btn-save:hover {
        background: rgba(26, 86, 255, 0.16);
      }

      /* ── AUTO REFRESH ── */
      .ar-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 5px 11px;
        flex-wrap: wrap;
      }
      .ar-lbl {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted2);
        white-space: nowrap;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .ar-sel {
        background: transparent;
        border: none;
        color: var(--text);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        outline: none;
        cursor: pointer;
        padding: 2px 4px;
      }
      .ar-sel option {
        background: var(--s2);
      }
      .ar-btn {
        border: none;
        border-radius: var(--radius);
        padding: 3px 10px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .ar-on {
        background: rgba(0, 230, 118, 0.1);
        color: var(--green);
        border: 1px solid rgba(0, 230, 118, 0.25);
      }
      .ar-off {
        background: rgba(58, 78, 112, 0.2);
        color: var(--muted2);
        border: 1px solid var(--bd);
      }
      .ar-cd {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted2);
        white-space: nowrap;
        min-width: 72px;
      }

      /* ── ADMIN PROFILE ── */
      .admin-profile-status {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
        padding: 10px 12px;
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
      }
      .ap-name {
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 700;
        font-size: 14px;
        color: var(--white);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .ap-team {
        font-size: 12px;
        color: var(--text2);
        flex: 1;
      }

      /* ── JOIN LINK ── */
      .login-divider {
        text-align: center;
        color: var(--muted2);
        font-size: 12px;
        margin: 14px 0;
        position: relative;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .login-divider::before,
      .login-divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: var(--bd);
      }
      .login-divider::before {
        left: 0;
      }
      .login-divider::after {
        right: 0;
      }
      .jlink-box {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 10px 12px;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        word-break: break-all;
        color: var(--text2);
      }
      .jlink-box span {
        flex: 1;
      }
      .btn-copy {
        background: var(--accent);
        color: var(--white);
        border: none;
        padding: 5px 12px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.15s;
      }
      .btn-copy:hover {
        background: var(--accent2);
      }

      /* ── EMPTY STATE ── */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        animation: fadeUp 0.4s ease both;
      }
      .es-icon {
        font-size: 44px;
        margin-bottom: 12px;
        opacity: 0.3;
        display: block;
      }
      .empty-state p {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--text2);
        margin-bottom: 5px;
      }

      /* ── CONFIG ERROR ── */
      .cfg-err {
        background: var(--s2);
        border: 1px solid var(--bd);
        border-top: 3px solid var(--red);
        border-radius: var(--radius-lg);
        padding: 32px;
        max-width: 480px;
        text-align: center;
        z-index: 1;
      }
      .cfg-err h2 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 1px;
        color: var(--white);
        text-transform: uppercase;
        margin: 12px 0 10px;
      }
      .cfg-err p {
        color: var(--text2);
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }
      .cfg-err code {
        background: var(--s1);
        padding: 2px 6px;
        border-radius: var(--radius);
        color: var(--gold);
        font-family: "DM Mono", monospace;
        font-size: 13px;
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 20px;
        right: 16px;
        padding: 10px 18px;
        border-radius: var(--radius-md);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        z-index: 999;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.2s ease;
        pointer-events: none;
        background: var(--s3);
        border: 1px solid var(--bd2);
        box-shadow: var(--shadow);
        max-width: 280px;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .toast-ok {
        border-left: 3px solid var(--green);
        color: var(--green);
      }
      .toast-err {
        border-left: 3px solid var(--red);
        color: var(--red);
      }

      /* ── CREDIT SYSTEM ── */

      /* ── MATCH SELECTOR TABS ── */
      .match-selector-tabs {
        background: var(--s1);
        border-bottom: 1px solid var(--bd);
        padding: 10px 20px;
      }
      .mst-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--muted2);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .mst-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .mst-tab {
        background: var(--glass);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 8px 14px;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s;
        min-width: 180px;
        flex: 1;
      }
      .mst-tab:hover {
        background: var(--glass-hover);
        border-color: rgba(37,99,255,.4);
        box-shadow: 0 0 16px rgba(37,99,255,.15);
      }
      .mst-tab.mst-active {
        background: linear-gradient(145deg, rgba(37,99,255,.28) 0%, rgba(99,102,241,.18) 100%);
        border-color: rgba(37,99,255,.7);
        box-shadow: 0 0 28px rgba(37,99,255,.30), 0 0 0 1px rgba(37,99,255,.2);
        animation: glowPulse 4s infinite ease-in-out;
      }
      .mst-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--white);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 3px;
      }
      .mst-status {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 2px 6px;
        border-radius: 2px;
      }
      .mst-open {
        background: rgba(0, 230, 118, 0.15);
        color: var(--green);
      }
      .mst-revealed {
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
      }
      .mst-locked {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .mst-final {
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted2);
      }

      /* ── ALSO ACTIVE SECTION ── */
      .also-active-section {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 8px 10px;
        margin-bottom: 8px;
      }
      .aa-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        color: var(--muted2);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      #finalizedMatchesList {
        max-height: 120px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
      .aa-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 4px 0;
        border-bottom: 1px solid var(--bd);
      }
      .aa-row:last-child {
        border-bottom: none;
      }
      .aa-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
        flex: 1;
        min-width: 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── SEARCH SERIES ── */
      .search-series-wrap {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--bd);
      }
      .ss-label {
        font-size: 11px;
        color: var(--muted2);
        margin-bottom: 6px;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
      }
      .ss-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .ss-result-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--muted2);
        text-transform: uppercase;
        padding: 6px 0;
        border-bottom: 1px solid var(--bd);
        margin-bottom: 8px;
      }
      .ss-result-label em {
        color: var(--text2);
        font-style: normal;
      }

      .no-matches-hint {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 16px;
        margin-top: 8px;
      }
      .nmh-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 6px;
      }
      .nmh-body {
        font-size: 12px;
        color: var(--muted2);
        margin-bottom: 12px;
        line-height: 1.5;
      }
      .nmh-body b {
        color: var(--text2);
      }
      .nmh-examples {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .nmh-ex {
        background: rgba(26, 86, 255, 0.12);
        border: 1px solid rgba(26, 86, 255, 0.3);
        color: #7eb8f7;
        padding: 5px 10px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
      }
      .nmh-ex:hover {
        background: rgba(26, 86, 255, 0.25);
        color: var(--white);
      }

      /* ── PLAYER AVAILABILITY DOTS ── */
      /* ── STATUS INDICATORS — Broadcast Neon System ── */
      .avail-dot {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        z-index: 10;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Playing XI — neon green pulse */
      .dot-green {
        width: 10px;
        height: 10px;
        background: #00ff41;
        border: 1px solid rgba(255,255,255,0.75);
        /* outer halo ring for contrast, inner glow */
        box-shadow: 0 0 0 2.5px rgba(0,0,0,0.55), 0 0 7px #00ff41;
        animation: neonPulse 2s ease-in-out infinite;
      }
      @keyframes neonPulse {
        0%,100% { box-shadow: 0 0 0 2.5px rgba(0,0,0,0.55), 0 0 4px #00ff41; }
        50%      { box-shadow: 0 0 0 2.5px rgba(0,0,0,0.55), 0 0 12px #00ff41, 0 0 22px rgba(0,255,65,.35); }
      }
      /* Not Playing — muted red, no pulse */
      .dot-red {
        width: 10px;
        height: 10px;
        background: #ef4444;
        border: 1px solid rgba(255,255,255,0.5);
        box-shadow: 0 0 0 2.5px rgba(0,0,0,0.55), 0 0 6px rgba(239,68,68,.7);
      }
      /* Impact Sub — orange badge with bolt icon */
      .dot-blue {
        width: 16px;
        height: 16px;
        top: 4px;
        left: 4px;
        background: #ff822e;
        border: 1px solid rgba(255,255,255,0.55);
        box-shadow: 0 0 0 2px rgba(0,0,0,0.55), 0 0 10px rgba(255,130,46,.55);
        font-size: 9px;
        line-height: 1;
        color: #fff;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        animation: impactPulse 1.8s ease-in-out infinite;
      }
      @keyframes impactPulse {
        0%,100% { box-shadow: 0 0 0 2px rgba(0,0,0,0.55), 0 0 6px rgba(255,130,46,.4); }
        50%      { box-shadow: 0 0 0 2px rgba(0,0,0,0.55), 0 0 14px rgba(255,130,46,.8), 0 0 24px rgba(255,130,46,.25); }
      }
      /* Inline variant for My Team card player rows */
      .mtc-status-dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-right: 5px;
        vertical-align: middle;
        position: relative;
        top: -1px;
      }
      /* dot-green / dot-red / dot-blue modifiers apply to both .avail-dot and .mtc-status-dot */
      .mtc-status-dot.dot-blue {
        width: 14px;
        height: 14px;
        font-size: 8px;
      }

      .avail-dot::after {
        content: attr(title);
        position: absolute;
        bottom: 120%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--s3);
        border: 1px solid var(--bd);
        color: var(--text);
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 3px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity .2s;
        z-index: 10;
      }
      .avail-dot:hover::after { opacity: 1; }
      .pcard {
        position: relative;
      }

      /* Availability select in stats */
      .avail-sel {
        background: var(--s1);
        border: 1px solid var(--bd);
        color: var(--text2);
        font-size: 11px;
        padding: 4px 6px;
        border-radius: var(--radius);
        cursor: pointer;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 700;
      }

      /* ── SETUP STEPS ── */
      .setup-step {
        display: flex;
        gap: 12px;
        margin-bottom: 18px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--bd);
      }
      .setup-step:last-child {
        border-bottom: none;
        margin-bottom: 0;
        padding-bottom: 0;
      }
      .step-num {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--accent);
        color: var(--white);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .step-body {
        flex: 1;
        min-width: 0;
      }
      .step-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        color: var(--text2);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .step-done {
        font-size: 11px;
        color: var(--green);
        margin-top: 6px;
        font-family: "DM Mono", monospace;
      }
      .step-done-inline {
        font-size: 11px;
        color: var(--green);
        font-family: "DM Mono", monospace;
        font-weight: 400;
      }

      /* ── SETUP STEPS ── */
      .match-type-toggle {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: var(--radius);
        padding: 10px 12px;
        margin-bottom: 12px;
      }
      .mt-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--muted2);
        text-transform: uppercase;
        display: block;
        margin-bottom: 7px;
      }
      .mt-opts {
        display: flex;
        gap: 6px;
        margin-bottom: 6px;
      }
      .match-group-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--muted2);
        text-transform: uppercase;
        padding: 8px 0 4px;
        margin-top: 4px;
        border-top: 1px solid var(--bd);
      }
      .match-group-label:first-child {
        border-top: none;
        margin-top: 0;
      }
      .mt-btn {
        flex: 1;
        background: var(--s2);
        border: 1px solid var(--bd);
        color: var(--muted2);
        padding: 8px;
        border-radius: var(--radius);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .mt-btn.mt-active {
        background: var(--accent);
        color: var(--white);
        border-color: var(--accent);
      }
      .mt-hint {
        font-size: 11px;
        color: var(--muted2);
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 500;
      }

      /* ── ROLE SUMMARY in XI panel ── */
      .role-summary {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .rs-pill {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 2px 7px;
        border-radius: var(--radius);
        background: var(--s1);
        border: 1px solid var(--bd);
        color: var(--muted2);
        text-transform: uppercase;
      }
      .rs-full {
        border-color: var(--gold);
        color: var(--gold);
      }
      .rs-err {
        border-color: var(--red);
        color: var(--red);
        background: rgba(255, 68, 68, 0.08);
      }

      /* Overseas tag on player card */
      .pc-overseas-tag {
        display: inline-block;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 1px;
        color: #7eb8f7;
        border: 1px solid rgba(126, 184, 247, 0.3);
        background: rgba(126, 184, 247, 0.08);
        padding: 1px 5px;
        border-radius: 2px;
        margin-bottom: 3px;
        text-transform: uppercase;
      }
      .ovs-cap {
        background: rgba(126, 184, 247, 0.7) !important;
      }
      .budget-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 2px;
      }
      .ovs-counter {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted2);
      }
      .ovs-full {
        color: #7eb8f7 !important;
      }

      /* Credit badge on player card */
      .pc-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
      }
      .pc-cr {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        padding: 1px 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .cr-elite {
        background: rgba(201, 168, 76, 0.2);
        color: var(--gold);
        border: 1px solid rgba(201, 168, 76, 0.4);
      }
      .cr-premium {
        background: rgba(26, 86, 255, 0.15);
        color: #7eb8f7;
        border: 1px solid rgba(26, 86, 255, 0.3);
      }
      .cr-standard {
        background: rgba(0, 230, 118, 0.1);
        color: #4ade80;
        border: 1px solid rgba(0, 230, 118, 0.2);
      }
      .cr-stdB {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text2);
        border: 1px solid var(--bd);
      }
      .cr-budget {
        background: rgba(255, 68, 68, 0.08);
        color: #fca5a5;
        border: 1px solid rgba(255, 68, 68, 0.2);
      }

      /* Budget meter in builder header */
      .bh-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      .budget-bar-wrap {
        min-width: 140px;
        flex-shrink: 0;
      }
      .budget-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted2);
        margin-bottom: 4px;
      }
      .budget-num {
        color: var(--white);
        font-family: "DM Mono", monospace;
        font-size: 13px;
      }
      .budget-low {
        color: var(--red) !important;
        animation: pulse 0.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .budget-bar {
        height: 4px;
        background: var(--bd);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 3px;
      }
      .budget-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s ease;
      }
      .budget-fill-warn {
        background: var(--red);
      }
      .budget-spent {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted2);
        text-align: right;
      }

      /* XI panel credit badge */
      .xi-panel-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .xi-title {
        margin-bottom: 0 !important;
      }
      .xi-budget-badge {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: var(--gold);
        background: rgba(201, 168, 76, 0.1);
        border: 1px solid rgba(201, 168, 76, 0.25);
        padding: 3px 10px;
        border-radius: 3px;
      }
      .xi-budget-over {
        color: var(--red);
        background: rgba(255, 68, 68, 0.1);
        border-color: rgba(255, 68, 68, 0.3);
      }

      /* Credit on locked chip */
      .chip-cr {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--muted2);
        margin-left: 2px;
      }
      .team-credit-total {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--muted2);
        margin-bottom: 14px;
        text-transform: uppercase;
      }
      .team-credit-total b {
        color: var(--gold);
        font-family: "DM Mono", monospace;
      }

      /* ── MY TEAM CARD ── */
      .my-team-card {
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-top: 3px solid var(--accent);
        border-radius: var(--radius-lg);
        overflow: hidden;
        animation: cardSlideUp 0.3s ease-out both;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .mtc-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 18px;
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.1),
          transparent
        );
        border-bottom: 1px solid var(--glass-border);
      }
      .mtc-match {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--muted2);
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .mtc-teamname {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--white);
      }
      .mtc-summary {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .mtc-stat {
        text-align: right;
      }
      .mtc-stat span {
        font-family: "DM Mono", monospace;
        font-size: 22px;
        color: var(--gold);
        display: block;
        line-height: 1;
      }
      .mtc-stat em {
        font-style: normal;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted2);
      }
      .mtc-pts-total span {
        color: var(--green) !important;
      }
      .mtc-status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 18px;
        border-bottom: 1px solid var(--bd);
        background: var(--s1);
      }
      .mtc-section {
        padding: 10px 18px;
      }
      .mtc-section-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--muted2);
        text-transform: uppercase;
        margin-bottom: 6px;
        padding-bottom: 5px;
        border-bottom: 1px solid var(--bd);
      }
      .mtc-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(30, 45, 72, 0.4);
      }
      .mtc-row:last-child {
        border-bottom: none;
      }
      .mtc-c {
        background: rgba(201, 168, 76, 0.05);
        margin: 0 -18px;
        padding: 8px 18px;
      }
      .mtc-v {
        background: rgba(201, 168, 76, 0.02);
        margin: 0 -18px;
        padding: 8px 18px;
      }
      .mtc-role {
        font-size: 16px;
        width: 22px;
        text-align: center;
        flex-shrink: 0;
      }
      .mtc-info {
        flex: 1;
        min-width: 0;
      }
      .mtc-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .mtc-badge {
        font-size: 10px;
        font-weight: 900;
        padding: 1px 6px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .mtc-badge-c {
        background: var(--gold);
        color: #000;
      }
      .mtc-badge-v {
        background: rgba(201, 168, 76, 0.2);
        color: var(--gold);
        border: 1px solid rgba(201, 168, 76, 0.4);
      }
      .mtc-meta {
        font-size: 11px;
        color: var(--muted2);
        margin-top: 1px;
      }
      .mtc-pts {
        font-family: "DM Mono", monospace;
        font-size: 18px;
        font-weight: 500;
        color: var(--gold);
        text-shadow: 0 0 12px rgba(245,158,11,.4);
        text-align: right;
        flex-shrink: 0;
      }
      .mtc-pts span {
        font-size: 10px;
        color: var(--muted2);
        display: block;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
        text-transform: uppercase;
      }

      /* ── BUILDER TWO-COLUMN LAYOUT ── */
      .builder-layout {
        display: grid;
        grid-template-columns: 1fr 260px;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 700px) {
        .builder-layout {
          grid-template-columns: 1fr;
        }
        .builder-xi-col {
          position: static;
          top: auto;
        }
      }
      .builder-grid-col {
        min-width: 0;
      }
      .builder-xi-col {
        position: -webkit-sticky;
        position: sticky;
        top: 130px; /* score-pill(42) + topnav(42) + view-tabs(46) */
      }

      /* Sticky XI panel */
      .xi-sticky {
        background: var(--s2);
        border: 1px solid var(--bd);
        border-top: 2px solid var(--accent);
        border-radius: var(--radius-md);
        padding: 14px;
      }
      .xi-empty {
        text-align: center;
        color: var(--muted2);
        font-size: 13px;
        padding: 20px 0;
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      /* XI player rows */
      .xi-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin: 10px 0 4px;
      }
      .xi-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--s1);
        border: 1px solid var(--bd);

      }
      .xi-row-c {
        border-left: 4px solid var(--gold);

        background: rgba(201, 168, 76, 0.08);
      }
      .xi-row-v {
        border-left: 4px solid var(--accent);

        background: rgba(26, 86, 255, 0.08);
      }
      .xi-num {
        font-family: "DM Mono", monospace;
        font-size: 11px;

        text-align: center;
      }
      .xi-row-info {
        flex: 1;
        min-width: 0;
      }
      .xi-row-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        overflow: hidden;

      .xi-badge-c {
        font-size: 10px;
        font-weight: 900;
        background: var(--gold);
        color: #000;
        padding: 1px 6px;
        border-radius: 2px;
        flex-shrink: 0;

      .xi-badge-v {
        font-size: 10px;
        font-weight: 900;
        background: var(--accent);
        color: #fff;
        padding: 1px 6px;
        border-radius: 2px;
        flex-shrink: 0;
      }      .xi-row-meta {
        font-size: 11px;
        color: var(--muted2);
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 500;
        margin-top: 1px;
      }
      .xi-remove {
        background: transparent;
        border: none;
        color: var(--muted2);
        font-size: 16px;
        cursor: pointer;
        padding: 0 2px;
        line-height: 1;
        flex-shrink: 0;
        transition: color 0.15s;
      }

        color: var(--red);
