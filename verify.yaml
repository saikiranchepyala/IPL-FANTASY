name: Verify IPL Dashboard
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # 1. Check for basic HTML errors
      - name: HTML Hint
        run: npx htmlhint ipl-fantasy-v4_render.html

      # 2. Check for JS syntax errors
      - name: JS Syntax Check
        run: node --check ipl-fantasy-v4_render.html 
        # Note: This works if your JS is inside <script> tags
