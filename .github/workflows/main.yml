name: Verify IPL Dashboard
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install eslint@10.2.0 eslint-plugin-html globals --save-dev

      - name: Run HTML Validation
        run: npx htmlhint ipl-fantasy-v4_render.html

      - name: Run JS Syntax Check
        # Since the config is in the root, we don't even need the --config flag!
        run: npx eslint ipl-fantasy-v4_render.html
