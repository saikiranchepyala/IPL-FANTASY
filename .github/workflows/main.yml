name: Verify IPL Dashboard
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm install eslint@10.2.0 eslint-plugin-html globals --save-dev

      - name: Run HTML Validation
        run: npx htmlhint ipl-fantasy-v4_render.html

      - name: Run JS Syntax Check
        # We add --config to leave no room for doubt
        run: npx eslint ipl-fantasy-v4_render.html --config eslint.config.mjs
