name: Verify IPL Dashboard
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Linting Tools
        run: npm install eslint eslint-plugin-html htmlhint --save-dev

      - name: Run HTML Validation
        run: npx htmlhint ipl-fantasy-v4_render.html

      - name: Run JS Syntax Check (v10 Flat Config)
        run: npx eslint ipl-fantasy-v4_render.html
