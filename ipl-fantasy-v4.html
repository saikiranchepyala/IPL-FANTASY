  animation:shake .25s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  75%{transform:translateX(4px)}
}

/* ── JOIN BADGE ── */
.join-badge{
  font-family:'DM Mono',monospace;
  font-size:42px;font-weight:500;
  letter-spacing:8px;color:var(--white);
  text-align:center;
  background:var(--s1);
  border:1px solid var(--bd2);
  border-left:var(--bar) solid var(--accent);
  border-radius:var(--radius);
  padding:14px;margin:8px 0 18px;
  animation:cardIn .3s ease both;
}

.admin-tip{
  font-size:11px;color:var(--muted2);
  margin-top:12px;line-height:1.6;
  padding:10px 12px;
  background:var(--s1);
  border-radius:var(--radius);
  border-left:var(--bar) solid var(--bd2);
}
.admin-tip b{color:var(--text2);word-break:break-all}

/* ═══════════════════════════════════════════
   VIEW TABS — broadcast tab bar
═══════════════════════════════════════════ */
.view-tabs{
  display:flex;gap:0;
  border-bottom:2px solid var(--bd);
  margin-bottom:20px;overflow-x:auto;
  scrollbar-width:none;
}
.view-tabs::-webkit-scrollbar{display:none}
.vtab{
  background:transparent;border:none;
  border-bottom:2px solid transparent;
  color:var(--muted2);padding:10px 18px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;
  margin-bottom:-2px;transition:all .15s;
}
.vtab.active{color:var(--white);border-bottom-color:var(--accent)}
.vtab:hover:not(.active){color:var(--text)}

/* ═══════════════════════════════════════════
   MATCH BAR — broadcast score header style
═══════════════════════════════════════════ */
.match-bar{
  background:var(--s2);
  border:1px solid var(--bd);
  border-left:var(--bar) solid var(--accent);
  border-radius:0 var(--radius-md) var(--radius-md) 0;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;gap:12px;
  animation:fadeUp .35s ease both;
  position:relative;
}
/* Right diagonal cut */
.match-bar::after{
  content:'';position:absolute;
  top:0;right:0;width:0;height:0;
  border-style:solid;
  border-width:0 22px 22px 0;
  border-color:transparent var(--bg) transparent transparent;
}
.match-label-sm{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:2px;color:var(--muted2);
  text-transform:uppercase;margin-bottom:3px;
}
.match-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:800;
  letter-spacing:1px;color:var(--white);line-height:1;
}

/* ── PILLS ── */
.pill{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:var(--radius);
  letter-spacing:.8px;text-transform:uppercase;
}
.pill-green{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.pill-red{background:rgba(255,68,68,.1);color:var(--red);border:1px solid rgba(255,68,68,.25)}
.pill-amber{background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.25)}

/* ═══════════════════════════════════════════
   INFO BANNERS
═══════════════════════════════════════════ */
.info-banner{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  border-radius:var(--radius-md);
  margin-bottom:16px;font-size:14px;
  animation:fadeUp .3s ease both;
}
.info-banner.green{
  background:rgba(0,230,118,.05);
  border:1px solid rgba(0,230,118,.2);
  border-left:var(--bar) solid var(--green);
}
.info-banner.red{
  background:rgba(255,68,68,.05);
  border:1px solid rgba(255,68,68,.2);
  border-left:var(--bar) solid var(--red);
}
.info-banner.warn{
  background:rgba(201,168,76,.05);
  border:1px solid rgba(201,168,76,.2);
  border-left:var(--bar) solid var(--gold);
  color:var(--gold);
}
.ib-icon{font-size:24px;flex-shrink:0}
.ib-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:15px;letter-spacing:.5px;
  margin-bottom:2px;color:var(--white);
}
.ib-sub{font-size:12px;color:var(--text2)}

/* ── PLAYER CHIPS ── */
.chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;animation:fadeUp .3s ease both}
.pchip{
  background:var(--s2);border:1px solid var(--bd);
  padding:4px 10px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:600;letter-spacing:.3px;
}
.pchip-c{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.pchip-vc{border-color:rgba(201,168,76,.4);color:rgba(201,168,76,.8)}

/* ═══════════════════════════════════════════
   PLAYER PICKER
═══════════════════════════════════════════ */
.builder{animation:fadeUp .35s ease both}
.bh{margin-bottom:14px}
.bh h2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:800;
  letter-spacing:1px;color:var(--white);
  display:flex;align-items:center;gap:10px;
  text-transform:uppercase;
}
.ctr{
  font-family:'DM Mono',monospace;
  font-size:14px;color:var(--gold);
  background:rgba(201,168,76,.1);
  padding:2px 10px;border-radius:var(--radius);
  border:1px solid rgba(201,168,76,.2);
}
.bh p{font-size:13px;color:var(--text2);margin-top:3px}

.filter-bar{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.sinp{
  background:var(--s2);border:1px solid var(--bd);
  color:var(--text);padding:9px 13px;
  border-radius:var(--radius);
  font-family:'Barlow',sans-serif;font-size:14px;
  outline:none;transition:border-color .15s;
  width:100%;margin-bottom:7px;
}
.sinp:focus{border-color:var(--accent)}

.rtabs{display:flex;gap:4px;flex-wrap:wrap}
.rtab{
  background:var(--s2);border:1px solid var(--bd);
  color:var(--muted2);padding:6px 13px;
  border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:all .15s;text-transform:uppercase;
}
.rtab.active,.rtab:hover{
  border-color:var(--accent);
  color:var(--white);
  background:rgba(26,86,255,.12);
}

/* ── PLAYER CARDS — broadcast stat card style ── */
.pgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:6px;margin-bottom:18px;
}
.pcard{
  background:var(--s2);
  border:1px solid var(--bd);
  border-top:2px solid var(--bd);
  border-radius:var(--radius);
  padding:12px 10px;cursor:pointer;
  transition:all .15s;
  position:relative;overflow:hidden;
  user-select:none;
}
.pcard:hover:not(.pcard-dis){
  border-color:var(--accent);
  border-top-color:var(--accent);
  background:rgba(26,86,255,.06);
  transform:translateY(-2px);
}
.pcard-on{
  border-color:var(--gold) !important;
  border-top-color:var(--gold) !important;
  background:rgba(201,168,76,.06) !important;
}
.pcard-dis{opacity:.3;cursor:not-allowed}
.pchk{
  position:absolute;top:6px;right:6px;
  background:var(--gold);color:#000;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;
  animation:checkPop .15s ease both;
}
@keyframes checkPop{from{transform:scale(0)}to{transform:scale(1)}}
.team-cap-badge{
  position:absolute;top:5px;right:5px;
  background:var(--red);color:var(--white);
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:700;letter-spacing:.5px;
  padding:1px 5px;border-radius:2px;
}
.team-cnt{
  font-family:'DM Mono',monospace;
  color:var(--gold);font-size:10px;margin-left:3px;
}
.pc-role{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;
  color:var(--muted2);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:4px;
}
.pc-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--white);line-height:1.2;margin-bottom:2px;
}
.pc-team{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted2);
}
.empty-hint{text-align:center;color:var(--muted2);padding:36px 0;font-size:14px}
.need-more{
  text-align:center;color:var(--text2);font-size:14px;padding:12px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;
}

/* ── XI PANEL ── */
.xi-panel{
  background:var(--s2);
  border:1px solid var(--bd);
  border-top:2px solid var(--accent);
  border-radius:0 0 var(--radius-md) var(--radius-md);
  padding:18px;margin-bottom:18px;
  animation:fadeUp .3s ease both;
}
.xi-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;letter-spacing:2px;
  color:var(--gold);margin-bottom:10px;text-transform:uppercase;
}
.xi-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.xchip{
  background:var(--s1);border:1px solid var(--bd);
  padding:4px 9px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:3px;
}
.xchip b{font-size:10px;font-weight:900}
.xchip-c{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07)}
.xchip-vc{border-color:rgba(201,168,76,.35);color:rgba(201,168,76,.8)}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.cs{display:flex;flex-direction:column;gap:4px}
.cs label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;color:var(--muted2);
  text-transform:uppercase;letter-spacing:1px;
}
.cs select{
  background:var(--s1);border:1px solid var(--bd);
  border-bottom:2px solid var(--bd2);
  color:var(--text);padding:8px 10px;
  border-radius:var(--radius);
  font-family:'Barlow',sans-serif;font-size:13px;
  outline:none;transition:border-color .15s;
}
.cs select:focus{border-color:var(--accent)}
.btn-lock{font-size:17px;padding:13px;margin-top:2px}

/* ═══════════════════════════════════════════
   LEADERBOARD — ICC scorecard style
═══════════════════════════════════════════ */
.reveal-banner{
  background:var(--s2);
  border:1px solid var(--bd);
  border-top:3px solid var(--gold);
  border-radius:0 0 var(--radius-md) var(--radius-md);
  padding:20px 24px;text-align:center;margin-bottom:16px;
  animation:fadeUp .3s ease both;
  position:relative;
}
.reveal-banner::before{
  content:'LIVE';
  position:absolute;top:12px;right:16px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:900;letter-spacing:2px;
  color:var(--white);background:var(--red);
  padding:2px 7px;border-radius:2px;
}
.rb-eye{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:3px;
  color:var(--gold);margin-bottom:6px;text-transform:uppercase;
}
.rb-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:800;letter-spacing:1px;
  color:var(--white);text-transform:uppercase;
}
.rb-sub{font-size:12px;color:var(--text2);margin-top:5px}

/* Leaderboard — ICC scorecard rows */
.lb-list{
  border:1px solid var(--bd);
  border-radius:var(--radius-md);
  overflow:hidden;
}
.lb-card{
  background:var(--s2);
  border-bottom:1px solid var(--bd);
  padding:14px 18px;
  display:flex;align-items:flex-start;gap:14px;
  transition:background .15s;
  animation:fadeUp .3s ease both;
}
.lb-card:last-child{border-bottom:none}
.lb-card:nth-child(even){background:rgba(255,255,255,.015)}
.lb-card:hover{background:rgba(26,86,255,.05)}
.lb-me{
  background:rgba(201,168,76,.05) !important;
  border-left:var(--bar) solid var(--gold) !important;
}
.lb-top{border-left:var(--bar) solid var(--accent)}
.lb-med{
  font-family:'DM Mono',monospace;
  font-size:20px;min-width:32px;text-align:center;
  padding-top:3px;color:var(--text2);
}
.lb-body{flex:1;min-width:0}
.lb-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:17px;letter-spacing:.3px;
  color:var(--white);
  display:flex;align-items:center;gap:8px;margin-bottom:2px;
  text-transform:uppercase;
}
.you{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;letter-spacing:1px;
  color:var(--white);background:var(--accent);
  padding:1px 7px;border-radius:2px;
}
.lb-tname{font-size:12px;color:var(--text2);margin-bottom:8px}
.lb-chips{display:flex;flex-wrap:wrap;gap:4px}
.lchip{
  background:var(--s1);border:1px solid var(--bd);
  padding:3px 7px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:3px;
}
.lchip-c{border-color:var(--gold);color:var(--gold)}
.lchip-vc{border-color:rgba(201,168,76,.35)}
.lchip em{
  font-style:normal;color:var(--gold);
  font-family:'DM Mono',monospace;
  font-size:11px;font-weight:500;
}
.lb-score{
  font-family:'DM Mono',monospace;
  font-size:36px;font-weight:500;
  color:var(--gold);text-align:right;
  min-width:84px;line-height:1;
}
.lb-score span{
  font-size:11px;color:var(--text2);display:block;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;letter-spacing:.8px;text-transform:uppercase;
}
.muted-s{color:var(--muted2);font-size:12px}

/* ═══════════════════════════════════════════
   SEASON TABLE
═══════════════════════════════════════════ */
.season-header{margin-bottom:18px;animation:fadeUp .3s ease both}
.sh-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:800;letter-spacing:1px;
  color:var(--white);text-transform:uppercase;
  border-left:4px solid var(--gold);padding-left:12px;
}
.sh-sub{color:var(--text2);font-size:13px;margin-top:3px;padding-left:16px}

.season-cards{
  border:1px solid var(--bd);
  border-radius:var(--radius-md);overflow:hidden;
}
.sc-card{
  background:var(--s2);
  border-bottom:1px solid var(--bd);
  padding:14px 18px;
  display:flex;align-items:flex-start;gap:14px;
  transition:background .15s;animation:fadeUp .3s ease both;
}
.sc-card:last-child{border-bottom:none}
.sc-card:nth-child(even){background:rgba(255,255,255,.015)}
.sc-card:hover{background:rgba(26,86,255,.04)}
.sc-me{
  background:rgba(201,168,76,.05) !important;
  border-left:var(--bar) solid var(--gold) !important;
}
.sc-first{border-left:var(--bar) solid var(--accent)}
.sc-rank{
  font-family:'DM Mono',monospace;
  font-size:20px;min-width:32px;text-align:center;padding-top:3px;
}
.sc-body{flex:1;min-width:0}
.sc-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:17px;color:var(--white);
  display:flex;align-items:center;gap:8px;margin-bottom:2px;
  text-transform:uppercase;letter-spacing:.3px;
}
.sc-tname{font-size:12px;color:var(--text2);margin-bottom:8px}
.sc-history{display:flex;flex-wrap:wrap;gap:4px}
.sc-mpill{
  background:var(--s1);border:1px solid var(--bd);
  padding:2px 8px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;color:var(--text2);
}
.sc-mpill b{
  font-family:'DM Mono',monospace;
  color:var(--gold);font-weight:500;
}
.sc-total{
  font-family:'DM Mono',monospace;
  font-size:36px;font-weight:500;
  color:var(--gold);text-align:right;min-width:84px;line-height:1;
}
.sc-total span{
  font-size:11px;color:var(--text2);display:block;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;letter-spacing:.8px;text-transform:uppercase;
}

/* History table — ICC scorecard table */
.history-section{margin-top:22px}
.hs-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:800;letter-spacing:1px;
  color:var(--white);text-transform:uppercase;
  margin-bottom:12px;
}
.table-wrap{overflow-x:auto;border:1px solid var(--bd);border-radius:var(--radius-md)}
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{
  background:var(--s1);padding:9px 14px;text-align:left;
  font-family:'Barlow Condensed',sans-serif;
  color:var(--muted2);font-weight:700;
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  border-bottom:2px solid var(--bd2);
}
.hist-table td{
  padding:9px 14px;
  border-bottom:1px solid rgba(30,45,72,.5);
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:500;
}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.hist-table tr:hover td{background:rgba(26,86,255,.04)}
.tr-me td{background:rgba(201,168,76,.04) !important}
.td-name{font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:.3px}
.td-pts{
  text-align:center;
  font-family:'DM Mono',monospace;
  color:var(--gold);font-size:14px;
}
.td-total{
  text-align:center;
  font-family:'DM Mono',monospace;
  font-size:18px;color:var(--gold);font-weight:500;
}

/* ═══════════════════════════════════════════
   ADMIN LAYOUT
═══════════════════════════════════════════ */
.admin-2col{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
@media(max-width:860px){.admin-2col{grid-template-columns:1fr}}
.acol{display:flex;flex-direction:column;gap:14px}
.acard{
  background:var(--s2);
  border:1px solid var(--bd);
  border-top:2px solid var(--bd2);
  border-radius:var(--radius-md);
  padding:18px;
  animation:fadeUp .3s ease both;
  position:relative;
}
.acard::before{
  content:'';position:absolute;
  top:0;left:0;bottom:0;width:var(--bar);
  background:var(--accent);opacity:.4;
  border-radius:var(--radius-md) 0 0 var(--radius-md);
}
.acard-t{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;letter-spacing:2px;
  color:var(--white);margin-bottom:14px;text-transform:uppercase;
}
.acard-hrow{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.acard-hrow .acard-t{margin-bottom:0}
.alink{color:var(--gold);font-size:11px;text-decoration:none;margin-left:5px;opacity:.8}
.alink:hover{opacity:1}
.srow{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(30,45,72,.6);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;
}
.srow:last-of-type{border-bottom:none}
.ctrl-btns{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.ctrl-hint{font-size:11px;color:var(--muted2);margin-top:2px;margin-bottom:2px}
.mrow{
  display:flex;align-items:center;gap:8px;
  padding:7px 0;border-bottom:1px solid rgba(30,45,72,.4);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;
}
.mrow:last-child{border-bottom:none}
.mrow-r{min-width:26px;font-family:'DM Mono',monospace;font-size:14px}
.mrow-n{flex:1;font-weight:700;color:var(--white);text-transform:uppercase;letter-spacing:.3px}
.mrow-s{font-size:12px;font-weight:700;letter-spacing:.5px}
.s-yes{color:var(--green)}.s-no{color:var(--muted2)}
.mrow-p{font-family:'DM Mono',monospace;font-size:16px;color:var(--gold)}
.muted{color:var(--muted2);font-size:13px}
.match-group-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--muted2);text-transform:uppercase;
  padding:8px 0 4px;margin-top:4px;
  border-bottom:1px solid var(--bd);margin-bottom:6px;
}
.mopt{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:10px 12px;
  margin-bottom:7px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;
  transition:border-color .15s;
}
.mopt-warn{
  font-size:11px;color:var(--gold);margin-top:3px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
}
.mopt:hover{border-color:var(--accent)}
.mopt-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;margin-bottom:2px;color:var(--white);
}
.mopt-st{font-size:11px;color:var(--text2)}
.pool-chips{display:flex;flex-wrap:wrap;gap:4px}
.manual-add-player{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:12px;
}
.map-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.map-row .sinp{margin-bottom:0}
.pool-role-sel{
  background:var(--s2);border:1px solid var(--bd);
  color:var(--text2);font-size:10px;padding:1px 3px;
  border-radius:3px;cursor:pointer;margin-left:3px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
}
.pool-chip{
  background:var(--s1);border:1px solid var(--bd);
  padding:3px 8px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
}
.pool-chip em{color:var(--muted2);font-style:normal;font-size:11px;margin-left:3px}

/* ── FLOW STEPS ── */
.flow-steps{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  margin-bottom:14px;padding:9px 12px;
  background:var(--s1);border-radius:var(--radius);border:1px solid var(--bd);
}
.fs{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  padding:3px 8px;border-radius:var(--radius);white-space:nowrap;
  text-transform:uppercase;
}
.fs-active{background:rgba(26,86,255,.15);color:var(--white);border:1px solid var(--accent)}
.fs-done{color:var(--green)}
.fs-dim{color:var(--muted2)}
.fs-arrow{color:var(--muted2);font-size:11px}

/* ── STATS GRID ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));
  gap:10px;max-height:660px;overflow-y:auto;
  padding-right:4px;margin-top:10px;
}
.stat-card{
  background:var(--s1);border:1px solid var(--bd);
  border-top:2px solid var(--bd2);
  border-radius:var(--radius-md);padding:13px;
  transition:border-color .15s;
}
.stat-card:hover{border-top-color:var(--accent)}
.sc-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sc-nm{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:14px;color:var(--white);
  margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px;
}
.sc-tm{font-size:11px;color:var(--muted2)}
.sc-pts{
  font-family:'DM Mono',monospace;
  font-size:20px;color:var(--muted2);
}
.sc-pts-on{color:var(--gold)}
.sc-inp{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:7px}
.si-g{display:flex;flex-direction:column;gap:2px}
.si-g label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;color:var(--muted2);font-weight:700;
  text-transform:uppercase;letter-spacing:.8px;
}
.si{
  background:var(--s2);border:1px solid var(--bd);
  color:var(--text);padding:5px 3px;border-radius:var(--radius);
  font-family:'DM Mono',monospace;font-size:12px;
  width:100%;outline:none;text-align:center;
  transition:border-color .15s;
}
.si:focus{border-color:var(--accent)}
.sc-chk{display:flex;gap:12px;font-size:12px;color:var(--muted2);margin-bottom:8px}
.sc-chk label{display:flex;align-items:center;gap:4px;cursor:pointer}
.btn-save{
  background:rgba(26,86,255,.08);
  border:1px solid rgba(26,86,255,.25);
  color:var(--white);padding:7px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  cursor:pointer;width:100%;transition:all .15s;
}
.btn-save:hover{background:rgba(26,86,255,.16)}

/* ── AUTO REFRESH ── */
.ar-wrap{
  display:flex;align-items:center;gap:6px;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:5px 11px;flex-wrap:wrap;
}
.ar-lbl{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;color:var(--muted2);white-space:nowrap;
  letter-spacing:.5px;text-transform:uppercase;
}
.ar-sel{
  background:transparent;border:none;color:var(--text);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;
  outline:none;cursor:pointer;padding:2px 4px;
}
.ar-sel option{background:var(--s2)}
.ar-btn{
  border:none;border-radius:var(--radius);
  padding:3px 10px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.ar-on{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.ar-off{background:rgba(58,78,112,.2);color:var(--muted2);border:1px solid var(--bd)}
.ar-cd{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--muted2);white-space:nowrap;min-width:72px;
}

/* ── ADMIN PROFILE ── */
.admin-profile-status{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:12px;padding:10px 12px;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--radius);
}
.ap-name{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:14px;color:var(--white);
  text-transform:uppercase;letter-spacing:.3px;
}
.ap-team{font-size:12px;color:var(--text2);flex:1}

/* ── JOIN LINK ── */
.login-divider{
  text-align:center;color:var(--muted2);font-size:12px;
  margin:14px 0;position:relative;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;
}
.login-divider::before,.login-divider::after{
  content:'';position:absolute;top:50%;width:35%;height:1px;background:var(--bd);
}
.login-divider::before{left:0}.login-divider::after{right:0}
.jlink-box{
  display:flex;align-items:center;gap:8px;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:10px 12px;
  font-family:'DM Mono',monospace;font-size:11px;
  word-break:break-all;color:var(--text2);
}
.jlink-box span{flex:1}
.btn-copy{
  background:var(--accent);color:var(--white);border:none;
  padding:5px 12px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:all .15s;
}
.btn-copy:hover{background:var(--accent2)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;animation:fadeUp .4s ease both}
.es-icon{font-size:44px;margin-bottom:12px;opacity:.3;display:block}
.empty-state p{
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:600;color:var(--text2);margin-bottom:5px;
}

/* ── CONFIG ERROR ── */
.cfg-err{
  background:var(--s2);border:1px solid var(--bd);
  border-top:3px solid var(--red);
  border-radius:var(--radius-lg);padding:32px;
  max-width:480px;text-align:center;z-index:1;
}
.cfg-err h2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:800;letter-spacing:1px;
  color:var(--white);text-transform:uppercase;margin:12px 0 10px;
}
.cfg-err p{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:8px}
.cfg-err code{
  background:var(--s1);padding:2px 6px;border-radius:var(--radius);
  color:var(--gold);font-family:'DM Mono',monospace;font-size:13px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;right:16px;
  padding:10px 18px;border-radius:var(--radius-md);
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;z-index:999;
  opacity:0;transform:translateY(10px);
  transition:all .2s ease;pointer-events:none;
  background:var(--s3);border:1px solid var(--bd2);
  box-shadow:var(--shadow);max-width:280px;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast-ok{border-left:3px solid var(--green);color:var(--green)}
.toast-err{border-left:3px solid var(--red);color:var(--red)}

/* ── CREDIT SYSTEM ── */

/* ── MATCH SELECTOR TABS ── */
.match-selector-tabs{
  background:var(--s1);border-bottom:1px solid var(--bd);
  padding:10px 20px;
}
.mst-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--muted2);text-transform:uppercase;margin-bottom:8px;
}
.mst-tabs{display:flex;gap:8px;flex-wrap:wrap}
.mst-tab{
  background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--radius);padding:8px 14px;
  cursor:pointer;text-align:left;transition:all .15s;
  min-width:180px;flex:1;
}
.mst-tab:hover{border-color:var(--accent)}
.mst-tab.mst-active{border-color:var(--accent);background:rgba(26,86,255,.1)}
.mst-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;color:var(--white);
  display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;
}
.mst-status{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;letter-spacing:1px;
  padding:2px 6px;border-radius:2px;
}
.mst-open{background:rgba(0,230,118,.15);color:var(--green)}
.mst-revealed{background:rgba(251,191,36,.15);color:#fbbf24}
.mst-locked{background:rgba(239,68,68,.15);color:var(--red)}
.mst-final{background:rgba(255,255,255,.08);color:var(--muted2)}

/* ── ALSO ACTIVE SECTION ── */
.also-active-section{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;
}
.aa-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;letter-spacing:1.5px;
  color:var(--muted2);text-transform:uppercase;margin-bottom:8px;
}
.aa-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;padding:6px 0;border-bottom:1px solid var(--bd);
}
.aa-row:last-child{border-bottom:none}
.aa-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:600;color:var(--text2);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── SEARCH SERIES ── */
.search-series-wrap{
  margin-top:12px;padding-top:12px;
  border-top:1px solid var(--bd);
}
.ss-label{
  font-size:11px;color:var(--muted2);margin-bottom:6px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
}
.ss-row{display:flex;gap:6px;align-items:center}
.ss-result-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  color:var(--muted2);text-transform:uppercase;
  padding:6px 0;border-bottom:1px solid var(--bd);margin-bottom:8px;
}
.ss-result-label em{color:var(--text2);font-style:normal}

.no-matches-hint{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:16px;
  margin-top:8px;
}
.nmh-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px;
}
.nmh-body{font-size:12px;color:var(--muted2);margin-bottom:12px;line-height:1.5}
.nmh-body b{color:var(--text2)}
.nmh-examples{display:flex;gap:6px;flex-wrap:wrap}
.nmh-ex{
  background:rgba(26,86,255,.12);border:1px solid rgba(26,86,255,.3);
  color:#7eb8f7;padding:5px 10px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.nmh-ex:hover{background:rgba(26,86,255,.25);color:var(--white)}

/* ── PLAYER AVAILABILITY DOTS ── */
.avail-dot{
  position:absolute;top:7px;left:7px;
  width:9px;height:9px;border-radius:50%;
  border:2px solid var(--bg);
  z-index:2;flex-shrink:0;
}
.dot-green{background:#22c55e}
.dot-red{background:#ef4444}
.dot-blue{background:#60a5fa}
.pcard{position:relative}

/* Availability select in stats */
.avail-sel{
  background:var(--s1);border:1px solid var(--bd);
  color:var(--text2);font-size:11px;padding:4px 6px;
  border-radius:var(--radius);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
}

/* ── TRANSFER SYSTEM ── */
.transfer-banner{
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(26,86,255,.1);border:1px solid rgba(26,86,255,.3);
  border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;
  flex-wrap:wrap;gap:8px;
}
.tb-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;letter-spacing:.5px;color:var(--white);
}
.tb-sub{font-size:11px;color:var(--muted2);margin-top:2px}
.tb-right{text-align:right;display:flex;flex-direction:column;gap:3px}
.tb-free{
  font-family:'DM Mono',monospace;
  font-size:13px;color:var(--green);font-weight:600;
}
.tb-pending{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;color:#60a5fa;
}
.tb-deduction{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;color:var(--red);
}
/* Highlight player marked for transfer out */
.pcard-transfer-out{
  border-color:var(--red) !important;
  background:rgba(239,68,68,.08) !important;
}
.pcard-transfer-out .pc-name::after{
  content:' OUT';font-size:9px;color:var(--red);
  font-weight:800;letter-spacing:1px;margin-left:4px;
}

/* ── SETUP STEPS ── */
.setup-step{
  display:flex;gap:12px;margin-bottom:18px;
  padding-bottom:18px;border-bottom:1px solid var(--bd);
}
.setup-step:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.step-num{
  width:24px;height:24px;border-radius:50%;
  background:var(--accent);color:var(--white);
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
}
.step-body{flex:1;min-width:0}
.step-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.5px;
  color:var(--text2);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.step-done{
  font-size:11px;color:var(--green);
  margin-top:6px;font-family:'DM Mono',monospace;
}
.step-done-inline{
  font-size:11px;color:var(--green);
  font-family:'DM Mono',monospace;font-weight:400;
}

/* ── SETUP STEPS ── */
.match-type-toggle{
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;
}
.mt-label{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1px;color:var(--muted2);text-transform:uppercase;
  display:block;margin-bottom:7px;
}
.mt-opts{display:flex;gap:6px;margin-bottom:6px}
.match-group-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:800;letter-spacing:2px;
  color:var(--muted2);text-transform:uppercase;
  padding:8px 0 4px;margin-top:4px;
  border-top:1px solid var(--bd);
}
.match-group-label:first-child{border-top:none;margin-top:0}
.mt-btn{
  flex:1;background:var(--s2);border:1px solid var(--bd);
  color:var(--muted2);padding:8px;border-radius:var(--radius);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.5px;cursor:pointer;transition:all .15s;
}
.mt-btn.mt-active{background:var(--accent);color:var(--white);border-color:var(--accent)}
.mt-hint{font-size:11px;color:var(--muted2);font-family:'Barlow Condensed',sans-serif;font-weight:500}

/* ── ROLE SUMMARY in XI panel ── */
.role-summary{display:flex;gap:4px;flex-wrap:wrap}
.rs-pill{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;
  padding:2px 7px;border-radius:var(--radius);
  background:var(--s1);border:1px solid var(--bd);
  color:var(--muted2);text-transform:uppercase;
}
.rs-full{border-color:var(--gold);color:var(--gold)}
.rs-err{border-color:var(--red);color:var(--red);background:rgba(255,68,68,.08)}

/* Overseas tag on player card */
.pc-overseas-tag{
  display:inline-block;
  font-family:'Barlow Condensed',sans-serif;
  font-size:9px;font-weight:800;letter-spacing:1px;
  color:#7eb8f7;
  border:1px solid rgba(126,184,247,.3);
  background:rgba(126,184,247,.08);
  padding:1px 5px;border-radius:2px;
  margin-bottom:3px;text-transform:uppercase;
}
.ovs-cap{background:rgba(126,184,247,.7) !important}
.budget-footer{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.ovs-counter{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted2);
}
.ovs-full{color:#7eb8f7 !important}

/* Credit badge on player card */
.pc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.pc-cr{
  font-family:'DM Mono',monospace;
  font-size:12px;font-weight:500;
  padding:1px 6px;border-radius:3px;
  flex-shrink:0;
}
.cr-elite{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.cr-premium{background:rgba(26,86,255,.15);color:#7eb8f7;border:1px solid rgba(26,86,255,.3)}
.cr-standard{background:rgba(0,230,118,.1);color:#4ade80;border:1px solid rgba(0,230,118,.2)}
.cr-stdB{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--bd)}
.cr-budget{background:rgba(255,68,68,.08);color:#fca5a5;border:1px solid rgba(255,68,68,.2)}

/* Budget meter in builder header */
.bh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.budget-bar-wrap{min-width:140px;flex-shrink:0}
.budget-label{
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted2);margin-bottom:4px;
}
.budget-num{color:var(--white);font-family:'DM Mono',monospace;font-size:13px}
.budget-low{color:var(--red) !important;animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.budget-bar{
  height:4px;background:var(--bd);
  border-radius:2px;overflow:hidden;
  margin-bottom:3px;
}
.budget-fill{
  height:100%;background:var(--accent);
  border-radius:2px;transition:width .3s ease;
}
.budget-fill-warn{background:var(--red)}
.budget-spent{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted2);text-align:right;
}

/* XI panel credit badge */
.xi-panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.xi-title{margin-bottom:0 !important}
.xi-budget-badge{
  font-family:'DM Mono',monospace;
  font-size:13px;font-weight:500;
  color:var(--gold);
  background:rgba(201,168,76,.1);
  border:1px solid rgba(201,168,76,.25);
  padding:3px 10px;border-radius:3px;
}
.xi-budget-over{color:var(--red);background:rgba(255,68,68,.1);border-color:rgba(255,68,68,.3)}

/* Credit on locked chip */
.chip-cr{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted2);margin-left:2px;
}
.team-credit-total{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:.5px;
  color:var(--muted2);margin-bottom:14px;
  text-transform:uppercase;
}
.team-credit-total b{color:var(--gold);font-family:'DM Mono',monospace}

/* ── MY TEAM CARD ── */
.my-team-card{
  background:var(--s2);border:1px solid var(--bd);
  border-top:3px solid var(--accent);
  border-radius:var(--radius-md);
  overflow:hidden;
  animation:fadeUp .35s ease both;
}
.mtc-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:16px 18px;
  background:linear-gradient(135deg,rgba(26,86,255,.12),transparent);
  border-bottom:1px solid var(--bd);
}
.mtc-match{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1.5px;
  color:var(--muted2);text-transform:uppercase;margin-bottom:4px;
}
.mtc-teamname{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:800;letter-spacing:.5px;
  color:var(--white);
}
.mtc-summary{display:flex;gap:16px;align-items:center}
.mtc-stat{text-align:right}
.mtc-stat span{
  font-family:'DM Mono',monospace;
  font-size:22px;color:var(--gold);display:block;line-height:1;
}
.mtc-stat em{
  font-style:normal;font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted2);
}
.mtc-pts-total span{color:var(--green) !important}
.mtc-status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;border-bottom:1px solid var(--bd);
  background:var(--s1);
}
.mtc-section{padding:10px 18px}
.mtc-section-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:800;letter-spacing:2px;
  color:var(--muted2);text-transform:uppercase;
  margin-bottom:6px;padding-bottom:5px;
  border-bottom:1px solid var(--bd);
}
.mtc-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(30,45,72,.4);
}
.mtc-row:last-child{border-bottom:none}
.mtc-c{background:rgba(201,168,76,.05);margin:0 -18px;padding:8px 18px}
.mtc-v{background:rgba(201,168,76,.02);margin:0 -18px;padding:8px 18px}
.mtc-role{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.mtc-info{flex:1;min-width:0}
.mtc-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;color:var(--white);
  display:flex;align-items:center;gap:6px;
}
.mtc-badge{
  font-size:10px;font-weight:900;
  padding:1px 6px;border-radius:2px;flex-shrink:0;
}
.mtc-badge-c{background:var(--gold);color:#000}
.mtc-badge-v{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.mtc-meta{font-size:11px;color:var(--muted2);margin-top:1px}
.mtc-pts{
  font-family:'DM Mono',monospace;
  font-size:18px;font-weight:500;color:var(--gold);
  text-align:right;flex-shrink:0;
}
.mtc-pts span{font-size:10px;color:var(--muted2);display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase}

/* ── BUILDER TWO-COLUMN LAYOUT ── */
.builder-layout{
  display:grid;
  grid-template-columns:1fr 260px;
  gap:16px;
  align-items:start;
}
@media(max-width:700px){
  .builder-layout{grid-template-columns:1fr}
}
.builder-grid-col{min-width:0}
.builder-xi-col{position:sticky;top:110px}

/* Sticky XI panel */
.xi-sticky{
  background:var(--s2);
  border:1px solid var(--bd);
  border-top:2px solid var(--accent);
  border-radius:var(--radius-md);
  padding:14px;
}
.xi-empty{
  text-align:center;color:var(--muted2);
  font-size:13px;padding:20px 0;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:600;letter-spacing:.3px;
}

/* XI player rows */
.xi-list{display:flex;flex-direction:column;gap:4px;margin:10px 0 4px}
.xi-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 8px;
  background:var(--s1);
  border:1px solid var(--bd);
  border-radius:var(--radius);
  transition:border-color .15s;
}
.xi-row-c{border-color:var(--gold);background:rgba(201,168,76,.06)}
.xi-row-v{border-color:rgba(201,168,76,.35)}
.xi-num{
  font-family:'DM Mono',monospace;
  font-size:11px;color:var(--muted2);
  min-width:16px;text-align:center;
}
.xi-row-info{flex:1;min-width:0}
.xi-row-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--white);
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.xi-badge-c{
  font-size:10px;font-weight:900;
  background:var(--gold);color:#000;
  padding:1px 5px;border-radius:2px;
  flex-shrink:0;
}
.xi-badge-v{
  font-size:10px;font-weight:900;
  background:rgba(201,168,76,.2);color:var(--gold);
  padding:1px 5px;border-radius:2px;
  border:1px solid rgba(201,168,76,.4);
  flex-shrink:0;
}
.xi-row-meta{
  font-size:11px;color:var(--muted2);
  font-family:'Barlow Condensed',sans-serif;font-weight:500;
  margin-top:1px;
}
.xi-remove{
  background:transparent;border:none;
  color:var(--muted2);font-size:16px;
  cursor:pointer;padding:0 2px;line-height:1;
  flex-shrink:0;transition:color .15s;
}
.xi-remove:hover{color:var(--red)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .card{padding:22px 18px}
  .cap-grid{grid-template-columns:1fr}
  .pgrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .lb-score,.sc-total{font-size:28px;min-width:64px}
  .view-tabs{gap:0}
  .vtab{padding:9px 13px;font-size:13px}
  .hero-title{font-size:17px;letter-spacing:3px}
  .hero-ipl{font-size:26px;letter-spacing:4px}
  .hero-ipl-sm{font-size:24px;letter-spacing:3px}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
</body>
</html>
