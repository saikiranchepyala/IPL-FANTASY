// ─────────────────────────────────────────────
//  DATA MODEL (Firestore structure)
//
//  /meta/game          — current match state
//  /meta/members       — { name: { pin, teamName } }
//  /matches/{matchId}  — { label, teams:{t1,t2}, status, players[], stats:{}, revealed, locked, finalized, matchNum }
//  /season/totals      — { memberName: { total, matches:[{matchId,label,pts}] } }
// ─────────────────────────────────────────────

// ── Points calculator ──
function calcPoints(s) {
  if (!s) return 0;
  let p = 0;
  const runs=s.runs||0, balls=s.balls||0, wkts=s.wickets||0, overs=s.overs||0;
  p += runs + (s.fours||0) + (s.sixes||0)*2;
  if (runs>=100) p+=16; else if (runs>=50) p+=8; else if (runs>=30) p+=4;
  if (s.batted && runs===0) p-=2;
  if (balls>=10) { const sr=runs/balls*100; if(sr>=170)p+=6;else if(sr>=150)p+=4;else if(sr>=130)p+=2;else if(sr<50)p-=6;else if(sr<60)p-=4;else if(sr<70)p-=2; }
  p += wkts*25 + (s.maidens||0)*8;
  if (wkts>=5) p+=16; else if (wkts>=4) p+=8; else if (wkts>=3) p+=4;
  p += (s.lbwBowled||0)*8;
  if (overs>=2) { const er=(s.runsConceded||0)/overs; if(er<5)p+=6;else if(er<6)p+=4;else if(er<7)p+=2;else if(er>10)p-=2;else if(er>9)p-=4;else if(er>8)p-=6; }
  p += (s.catches||0)*8; if((s.catches||0)>=3) p+=4;
  p += (s.runOutDirect||0)*12 + (s.runOutIndirect||0)*6 + (s.stumpings||0)*12;
  if (s.playingXI) p+=4;
  return Math.round(p);
}

function memberMatchTotal(team, stats) {
  const raw = (team.players||[]).reduce((acc, p) => {
    let pts = calcPoints(stats[p]);
    if (p===team.captain) pts*=2; else if (p===team.vc) pts*=1.5;
    return acc+pts;
  }, 0);
  return Math.round(raw - (team.transferDeduction||0));
}

// ── State ──
let db;
let session = { name:null, isAdmin:false };
let metaGame = {};          // /meta/game  { currentMatchId, activeMatchIds, adminPin, joinCode }
let allMembers = {};        // /meta/members
let seasonTotals = {};      // /season/totals
let matchHistory = [];
let localTeam = { players:[], captain:'', vc:'' };
let transferMode = false;      // true when member has an existing team and is making changes
let pendingTransfers = [];     // [{ out: playerName, in: playerName }]
let transfersUsed = 0;         // transfers used this match (from Firestore)
let urlJoinCode = null;

// ── Multi-match state ──
// activeMatches: { [matchId]: { match, players, stats, teams } }
let activeMatches = {};
let currentMatchId = null;   // primary / selected match for admin
let adminSelectedMatchId = null; // which match tab admin is viewing
let memberSelectedMatchId = null; // which match member is viewing

// Derived helpers — always read from activeMatches
function getMatch(mid) { return activeMatches[mid]?.match || {}; }
function getPlayers(mid) { return activeMatches[mid]?.players || []; }
function getStats(mid) { return activeMatches[mid]?.stats || {}; }
function getTeams(mid) { return activeMatches[mid]?.teams || {}; }

// Backward-compat globals (point to adminSelectedMatchId or currentMatchId)
function getActiveMid() {
  if (session.isAdmin && !session.name) return adminSelectedMatchId || currentMatchId;
  return memberSelectedMatchId || currentMatchId;
}
let currentMatch = {};   // kept in sync below
let matchPlayers = [];
let playerStats  = {};
let allTeams     = {};

function syncDerivedState() {
  const mid = getActiveMid();
  currentMatch  = getMatch(mid);
  matchPlayers  = getPlayers(mid);
  playerStats   = getStats(mid);
  allTeams      = getTeams(mid);
  playerStatus  = currentMatch.playerStatus||{};
}

// Auto-refresh
let arInterval=null, arTimer=null, arSecs=0;
let playerStatus = {}; // { playerName: 'playing'|'notplaying'|'impact' }
let matchUnsubs = {};  // { [matchId]: unsubFn }

// ── Boot ──
async function boot() {
  urlJoinCode = new URLSearchParams(location.search).get('join');
  if (FIREBASE_CONFIG.apiKey==='REPLACE_apiKey') { showConfigError(); return; }
  try {
    const app = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(app);
    showScreen('loading');

    // Init meta/game if needed
    const mgSnap = await getDoc(doc(db,'meta','game'));
    if (!mgSnap.exists()) {
      await setDoc(doc(db,'meta','game'), { currentMatchId:'', activeMatchIds:[], adminPin:'0000', joinCode:'' });
    }

    // Real-time: meta/game
    onSnapshot(doc(db,'meta','game'), snap => {
      metaGame = snap.data()||{};
      const primary = metaGame.currentMatchId||'';
      const ids = [...new Set([...(metaGame.activeMatchIds||[]), primary].filter(Boolean))];

      // Subscribe to each active match
      ids.forEach(mid => subscribeMatch(db, mid));

      // Unsubscribe from removed matches
      Object.keys(matchUnsubs).forEach(mid => {
        if (!ids.includes(mid)) {
          matchUnsubs[mid](); delete matchUnsubs[mid];
          delete activeMatches[mid];
        }
      });

      currentMatchId = primary || null;
      if (!adminSelectedMatchId || !ids.includes(adminSelectedMatchId)) {
        adminSelectedMatchId = primary || null;
      }
      syncDerivedState();
      if (session.name||session.isAdmin) refreshView();
    });

    // Real-time: members
    onSnapshot(doc(db,'meta','members'), snap => { allMembers=snap.data()||{}; });

    // Real-time: season totals
    onSnapshot(doc(db,'season','totals'), snap => {
      seasonTotals=snap.data()||{};
      if (session.name||session.isAdmin) refreshView();
    });

    if (urlJoinCode) showScreen('join');
    else showScreen('login');
  } catch(e) { showError('Firebase error: '+e.message); }
}

function subscribeMatch(db, mid) {
  if (matchUnsubs[mid]) return; // already subscribed
  matchUnsubs[mid] = onSnapshot(doc(db,'matches',mid), snap => {
    if (!snap.exists()) return;
    const data = snap.data()||{};
    activeMatches[mid] = {
      match: data,
      players: data.players||[],
      stats: data.stats||{},
      teams: data.teams||{}
    };
    syncDerivedState();
    if (session.name||session.isAdmin) refreshView();
  });
}

boot();

// ── Router ──
function showScreen(n) {
  const map={loading:renderLoading,login:renderLogin,join:renderJoin,member:renderMember,admin:renderAdmin};
  document.getElementById('app').innerHTML=(map[n]||renderLoading)();
  requestAnimationFrame(()=>bindEvents(n));
}
function refreshView() {
  if (session.isAdmin) showScreen('admin');
  else if (session.name) showScreen('member');
}

      </div>

      <button class="btn-gold" id="memberLoginBtn">LOG IN →</button>

      <div class="field">

function bindEvents(screen) {
  setupPins();
  if (screen==='login') {
    document.querySelectorAll('.seg-btn').forEach(b=>{
      b.onclick=()=>{
        document.querySelectorAll('.seg-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active');
        document.getElementById('panel-admin').style.display=b.dataset.p==='admin'?'':'none';
        document.getElementById('panel-member').style.display=b.dataset.p==='member'?'':'none';
      };
    });
    document.getElementById('adminLoginBtn').onclick=doAdminLogin;
    // Player login from main screen
    document.getElementById('memberLoginBtn')?.addEventListener('click', doMemberLogin);
    document.getElementById('goJoinBtn').onclick=()=>{
      const code=document.getElementById('joinCodeInput').value.trim().toUpperCase();
      if(!code){toast('Enter a join code','err');return;}
      window.location.href=`${location.pathname}?join=${code}`;
    };
  }
  if (screen==='join') {
    document.getElementById('joinSubmitBtn').onclick=doJoin;
    document.getElementById('joinReturnBtn').onclick=()=>{ document.getElementById('app').innerHTML=renderReturnLogin(); requestAnimationFrame(()=>{setupPins();bindReturn();}); };
  }
  if (screen==='member') bindMember();
  if (screen==='admin')  bindAdmin();
}

function setupPins() {
  ['.pd','.pj','.pr','.pm'].forEach(sel=>{
    const ds=[...document.querySelectorAll(sel)];
    ds.forEach((d,i)=>{ d.oninput=()=>{d.value=d.value.replace(/\D/,'');if(d.value&&i<ds.length-1)ds[i+1].focus();}; d.onkeydown=e=>{if(e.key==='Backspace'&&!d.value&&i>0)ds[i-1].focus();}; });
  });
}
function pinVal(sel){return[...document.querySelectorAll(sel)].map(d=>d.value).join('');}

// Member login directly from main login screen
async function doMemberLogin() {
  const name=(document.getElementById('memberNameInp')?.value||'').trim();
  const pin=pinVal('.pm');
  const err=document.getElementById('memberErr');
  if(!name){err.textContent='Enter your name';return;}
  if(pin.length!==4){err.textContent='Enter your 4-digit PIN';return;}
  const snap=await getDoc(doc(db,'meta','members'));
  const members=snap.data()||{};
  if(!members[name]){err.textContent='Name not found — use your join link to register';return;}
  if(members[name].pin!==pin){err.textContent='Wrong PIN';return;}
  session={name,isAdmin:false};
  if(currentMatchId){
    const matchSnap=await getDoc(doc(db,'matches',currentMatchId));
    if(matchSnap.exists()){
      const mdata=matchSnap.data();
      const t=(mdata.teams||{})[name]||{};
      localTeam={players:t.players||[],captain:t.captain||'',vc:t.vc||''};
      // Check if member has existing submitted team → transfer mode
      transferMode = !!(t.submitted && t.players?.length === 11);
      transfersUsed = (mdata.transfersUsed||{})[name]||0;
      pendingTransfers = [];
    }
  }
  showScreen('member');
}

function bindReturn() {
  document.getElementById('returnLoginBtn').onclick=async()=>{
    const name=document.getElementById('returnName').value.trim(), pin=pinVal('.pr'), err=document.getElementById('returnErr');
    if(!name){err.textContent='Enter your name';return;}
    if(pin.length!==4){err.textContent='Enter 4-digit PIN';return;}
    const snap=await getDoc(doc(db,'meta','members')); const members=snap.data()||{};
    if(!members[name]){err.textContent='Name not found — use your join link';return;}
    if(members[name].pin!==pin){err.textContent='Wrong PIN';return;}
    session={name,isAdmin:false};
    if (currentMatchId) {
      const matchSnap=await getDoc(doc(db,'matches',currentMatchId));
      if(matchSnap.exists()){
        const mdata=matchSnap.data();
        const t=(mdata.teams||{})[name]||{};
        localTeam={players:t.players||[],captain:t.captain||'',vc:t.vc||''};
        transferMode = !!(t.submitted && t.players?.length === 11);
        transfersUsed = (mdata.transfersUsed||{})[name]||0;
        pendingTransfers = [];
      }
    }
    showScreen('member');
  };
  document.getElementById('backBtn').onclick=()=>showScreen('join');
}

async function doAdminLogin() {
  const pin=pinVal('.pd'), err=document.getElementById('adminErr');
  const snap=await getDoc(doc(db,'meta','game')); const gd=snap.data()||{};
  if(pin===(gd.adminPin||'0000')){session={name:null,isAdmin:true};showScreen('admin');}
  else err.textContent='Wrong PIN';
}

async function doJoin() {
  const name=(document.getElementById('joinName')?.value||'').trim();
  const teamName=(document.getElementById('joinTeamName')?.value||'').trim();
  const pin=pinVal('.pj'), code=(urlJoinCode||'').toUpperCase(), err=document.getElementById('joinErr');
  if(!name){err.textContent='Enter your name';return;}
  if(pin.length!==4||!/^\d{4}$/.test(pin)){err.textContent='Choose a 4-digit PIN';return;}
  const snap=await getDoc(doc(db,'meta','game')); const gd=snap.data()||{};
  if((gd.joinCode||'').toUpperCase()!==code){err.textContent='Invalid join code';return;}
  const mSnap=await getDoc(doc(db,'meta','members')); const members=mSnap.data()||{};
  if(members[name]&&members[name].pin!==pin){err.textContent='Name taken — use a different name or correct PIN';return;}
  members[name]={pin,teamName:teamName||name+"'s Team",joinedAt:Date.now()};
  await setDoc(doc(db,'meta','members'),members); allMembers=members;
  session={name,isAdmin:false}; localTeam={players:[],captain:'',vc:''};
  history.replaceState({},'',location.pathname);
  showScreen('member');
}

// ─────────────────────────────────────────────
//  MEMBER VIEW
// ─────────────────────────────────────────────
function renderMemberMatchSelector() {
  const allIds = [...new Set([...(metaGame.activeMatchIds||[]), currentMatchId].filter(Boolean))];
  if (allIds.length <= 1) return '';
  const activeMid = memberSelectedMatchId || currentMatchId;
  return `
  <div class="match-selector-tabs">
    <div class="mst-label">SELECT MATCH</div>
    <div class="mst-tabs">
      ${allIds.map(mid => {
        const m = getMatch(mid);
        const isSelected = mid === activeMid;
        const myT = (m.teams||{})[session.name]||{};
        const status = myT.submitted ? '✓ Submitted' : m.locked ? 'Locked' : m.revealed ? 'Toss Done' : 'Open';
        const statusClass = myT.submitted ? 'mst-final' : m.locked ? 'mst-locked' : m.revealed ? 'mst-revealed' : 'mst-open';
        return `<button class="mst-tab ${isSelected?'mst-active':''}" onclick="selectMemberMatch('${mid}')">
          <span class="mst-name">${(m.label||mid).substring(0,45)}</span>
          <span class="mst-status ${statusClass}">${status}</span>
        </button>`;
      }).join('')}
    </div>
  </div>`;
}

window.selectMemberMatch = function(mid) {
  memberSelectedMatchId = mid;
  // Load the member's existing team for this match
  const t = (getTeams(mid)[session.name])||{};
  localTeam = { players: t.players||[], captain: t.captain||'', vc: t.vc||'' };
  syncDerivedState();
  history.replaceState({},'',`${location.pathname}?tab=team`);
  showScreen('member');
};

function renderMember() {
  const tab = (new URLSearchParams(location.search)).get('tab')||'team';

  const tabs = `
  <div class="view-tabs">
    <button class="vtab ${tab==='team'?'active':''}" onclick="switchTab('team')">My Team</button>
    <button class="vtab ${tab==='live'?'active':''}" onclick="switchTab('live')">Live Scores</button>
    <button class="vtab ${tab==='season'?'active':''}" onclick="switchTab('season')">Season Table</button>
  </div>`;

  const matchSelector = renderMemberMatchSelector();

  let body='';
  if (tab==='team')   body=renderTeamTab();
  if (tab==='live')   body=renderLiveTab();
  if (tab==='season') body=renderSeasonTab();

  return `<div class="screen-main">${nav()}${tabs}${matchSelector}${body}</div>`;
}

// expose for onclick
window.switchTab = function(t) {
  history.replaceState({},'',`${location.pathname}?tab=${t}`);
  showScreen('member');
};

function renderTeamTab() {
  const noMatch = !currentMatchId || !currentMatch.label;
  if (noMatch) return `<div class="empty-state"><div class="es-icon">🏏</div><p>No match set up yet.</p><p class="muted">Your admin will set up the next match soon.</p></div>`;

  const locked    = currentMatch.locked||currentMatch.finalized;
  const revealed  = currentMatch.revealed||currentMatch.finalized;
  const myTeam    = allTeams[session.name]||{};
  const submitted = myTeam.submitted;
  const sel       = localTeam.players;
  // Always read directly from currentMatch — source of truth from Firestore
  const pool      = currentMatch.players||matchPlayers||[];

  // Show leaderboard only after locked (game has started)
  if (locked && revealed) {
    return renderMatchLeaderboard(currentMatch, currentMatchId, session.name);
  }

  return `
  <div class="match-bar">
    <div><div class="match-label-sm">CURRENT MATCH</div><div class="match-title">${currentMatch.label||'–'}</div></div>
    <span class="pill ${locked?'pill-red':revealed?'pill-amber':'pill-green'}">${locked?'🔒 Locked':revealed?'🥁 Toss done — update your team!':'🟢 Open'}</span>
  </div>

  ${revealed && !locked ? `
  <div class="info-banner warn">
    <div class="ib-icon">🥁</div>
    <div>
      <div class="ib-title">Toss is done — teams are visible!</div>
      <div class="ib-sub">You can still change your XI and Captain/VC. Teams lock ~10 mins before play starts.</div>
    </div>
  </div>` : ''}

  ${locked && submitted ? renderMyTeamCard(myTeam, currentMatch)

  : locked && !submitted ? `
  <div class="info-banner red">
    <div class="ib-icon">⚠️</div>
    <div><div class="ib-title">Deadline passed</div><div class="ib-sub">You didn't submit for this match.</div></div>
  </div>`

  : !pool.length ? `
  <div class="info-banner warn">⏳ Admin hasn't loaded today's player pool yet.</div>`

  : `
  <div class="builder">
    <div class="bh">
      ${transferMode?`
      <div class="transfer-banner">
        <div class="tb-left">
          <div class="tb-title">🔄 TRANSFER MODE</div>
          <div class="tb-sub">Tap a player in your XI to swap them out</div>
        </div>
        <div class="tb-right">
          <div class="tb-free">${Math.max(0,FREE_TRANSFERS_PER_MATCH-transfersUsed-pendingTransfers.length)} free left</div>
          ${pendingTransfers.length>0?`<div class="tb-pending">${pendingTransfers.length} pending transfer${pendingTransfers.length>1?'s':''}</div>`:''}
          ${pendingTransfers.length>FREE_TRANSFERS_PER_MATCH-transfersUsed?`<div class="tb-deduction">-${(pendingTransfers.length-(FREE_TRANSFERS_PER_MATCH-transfersUsed))*TRANSFER_POINT_DEDUCTION} pts deduction</div>`:''}
        </div>
      </div>`:''}
      <div class="bh-top">
        <h2>${transferMode?'Manage Transfers':'Pick Your XI'} <span class="ctr">${sel.length}/11</span></h2>
        <div class="budget-bar-wrap">
          <div class="budget-label">

function renderMyTeamCard(team, match) {
  const players = team.players||[];
  const cap = team.captain, vc = team.vc;
  const stats = match.stats||{};
  const isRevealed = match.revealed||match.finalized;
  const ri = {BAT:'🏏',BOWL:'🎳',AR:'⚡',WK:'🧤'};

  // Group by role for display
  const byRole = {WK:[], BAT:[], AR:[], BOWL:[]};
  players.forEach(p=>{
    const pObj = matchPlayers.find(x=>x.name===p)||{role:'BAT',team:''};
    const role = pObj.role||'BAT';
    byRole[role] = byRole[role]||[];
    byRole[role].push({name:p, role, team:pObj.team, cr:getCredits(p), isC:p===cap, isV:p===vc});
  });

  const totalCR = teamSpend(players);
  const totalPts = isRevealed ? players.reduce((acc,p)=>{
    let pts = calcPoints(stats[p]||{});
    if(p===cap) pts*=2; else if(p===vc) pts*=1.5;
    return acc+pts;
  },0) : 0;

  const playerRow = (p) => {
    const pts = isRevealed ? calcPoints(stats[p.name]||{}) : null;
    const finalPts = pts!==null ? (p.isC?pts*2:p.isV?pts*1.5:pts) : null;
    const avail = (match.playerStatus||{})[p.name];
    const dotClass = avail==='playing'?'dot-green':avail==='notplaying'?'dot-red':avail==='impact'?'dot-blue':'';
    const dotLabel = avail==='playing'?'🟢':avail==='notplaying'?'🔴':avail==='impact'?'🔵':'';
    return `<div class="mtc-row ${p.isC?'mtc-c':p.isV?'mtc-v':''}">
      <div class="mtc-role">${ri[p.role]||''}</div>
      <div class="mtc-info">
        <div class="mtc-name">
          ${avail?`<span class="avail-dot ${dotClass}" style="width:8px;height:8px;display:inline-block;border-radius:50%;margin-right:5px;flex-shrink:0" title="${avail}"></span>`:''}
          ${p.name}
          ${p.isC?'<span class="mtc-badge mtc-badge-c">C</span>':''}
          ${p.isV?'<span class="mtc-badge mtc-badge-v">VC</span>':''}
        </div>
        <div class="mtc-meta">${normalizeTeam(p.team)} · <span style="color:var(--gold)">${p.cr}CR</span>${avail==='notplaying'?'<span style="color:var(--red);margin-left:6px;font-size:10px">NOT PLAYING</span>':avail==='impact'?'<span style="color:#60a5fa;margin-left:6px;font-size:10px">IMPACT SUB</span>':''}</div>
      </div>
      ${finalPts!==null?`<div class="mtc-pts">${Math.round(finalPts)}<span>pts</span></div>`:''}
    </div>`;
  };

  return `
  <div class="my-team-card">
    <div class="mtc-header">
      <div>
        <div class="mtc-match">${match.label||'Current Match'}</div>
        <div class="mtc-teamname">${allMembers[session.name]?.teamName||session.name}</div>
      </div>
      <div class="mtc-summary">
        <div class="mtc-stat"><span>${totalCR}</span><em>CR used</em></div>
        ${isRevealed?`<div class="mtc-stat mtc-pts-total"><span>${Math.round(totalPts)}</span><em>total pts</em></div>`:''}
      </div>
    </div>

    <div class="mtc-status-bar">
      <span class="pill pill-green">✅ Team Submitted</span>
      <span class="muted" style="font-size:12px">${match.locked?'🔒 Locked — match underway':'🥁 Toss done · can still edit'}</span>
    </div>

    ${['WK','BAT','AR','BOWL'].map(role=>byRole[role]?.length?`
    <div class="mtc-section">
      <div class="mtc-section-label">${ri[role]} ${role}</div>
      ${byRole[role].map(playerRow).join('')}
    </div>`:'').join('')}

    ${!match.locked?`
    <button class="btn-ghost" style="width:100%;margin-top:14px" onclick="window.location.href=window.location.pathname+'?tab=team'">
      ✏️ Edit Team
    </button>`:''}
  </div>`;
}

function renderLiveTab() {
  const noMatch = !currentMatchId || !currentMatch.label;
  if (noMatch) return `<div class="empty-state"><div class="es-icon">📺</div><p class="muted">No match in progress.</p></div>`;
  if (!currentMatch.revealed) return `<div class="empty-state"><div class="es-icon">🔒</div><p>Live scores appear after the toss reveal.</p></div>`;
  if (!currentMatch.locked) return `<div class="empty-state"><div class="es-icon">⏳</div><p>Toss is done — teams visible on My Team tab.</p><p class="muted">Leaderboard goes live once teams are locked (~10 mins before play).</p></div>`;
  return renderMatchLeaderboard(currentMatch, currentMatchId, session.name);
}

function renderMatchLeaderboard(match, mid, highlightName) {
  const stats   = match.stats||{};
  const teams   = match.teams||{};
  const members = Object.keys(allMembers);
  const ranked  = members.map(name=>{
    const t=teams[name]||{}; return {name,total:memberMatchTotal(t,stats),team:t,teamName:allMembers[name]?.teamName||name};
  }).sort((a,b)=>b.total-a.total);
  const medals=['🥇','🥈','🥉'];

  return `
  <div class="reveal-banner">
    <div class="rb-eye">🏏 ${match.finalized?'MATCH FINAL':'LIVE SCORES'}</div>
    <div class="rb-title">${match.label||'Match'}</div>
    <div class="rb-sub">${match.finalized?'Points saved to season table':'Updates every few minutes'}</div>
  </div>
  <div class="lb-list">
    ${ranked.map((r,i)=>`
    <div class="lb-card ${r.name===highlightName?'lb-me':''} ${i===0?'lb-top':''}">
      <div class="lb-med">${medals[i]||'#'+(i+1)}</div>
      <div class="lb-body">
        <div class="lb-name">${r.name}${r.name===highlightName?' <span class="you">YOU</span>':''}</div>
        <div class="lb-tname">${r.teamName}</div>
        <div class="lb-chips">
          ${(r.team.players||[]).map(p=>{
            let pts=calcPoints(stats[p]);
            const isC=p===r.team.captain,isV=p===r.team.vc;
            if(isC)pts*=2;else if(isV)pts*=1.5;
            return `<span class="lchip ${isC?'lchip-c':isV?'lchip-vc':''}">${isC?'©':isV?'ᵛ':''}${ln(p)} <em>${Math.round(pts)}</em></span>`;
          }).join('')||'<span class="muted-s">No team submitted</span>'}
        </div>
      </div>
      <div class="lb-score">${r.total}<span>pts</span></div>
    </div>`).join('')}
  </div>`;
}

function renderSeasonTab() {
  const members = Object.keys(allMembers);
  if (!members.length) return `<div class="empty-state"><div class="es-icon">🏆</div><p class="muted">No season data yet.</p></div>`;

  // Build season rows
  const rows = members.map(name=>{
    const sd=seasonTotals[name]||{total:0,matches:[]};
    return { name, teamName:allMembers[name]?.teamName||name, total:sd.total||0, matches:sd.matches||[] };
  }).sort((a,b)=>b.total-a.total);

  // Get all unique match labels from history
  const matchCols = [...new Set(rows.flatMap(r=>r.matches.map(m=>m.matchId)))];

  const medals=['🥇','🥈','🥉'];

  return `
  <div class="season-header">
    <div class="sh-title">Season Leaderboard</div>
    <div class="sh-sub">${matchCols.length} match${matchCols.length!==1?'es':''} played</div>
  </div>

  <!-- Summary cards -->
  <div class="season-cards">
    ${rows.map((r,i)=>`
    <div class="sc-card ${r.name===session.name?'sc-me':''} ${i===0?'sc-first':''}">
      <div class="sc-rank">${medals[i]||'#'+(i+1)}</div>
      <div class="sc-body">
        <div class="sc-name">${r.name}${r.name===session.name?' <span class="you">YOU</span>':''}</div>
        <div class="sc-tname">${r.teamName}</div>
        <div class="sc-history">
          ${r.matches.length?r.matches.map(m=>`<span class="sc-mpill" title="${m.label}">${m.pts}pts</span>`).join(''):'<span class="muted-s">No matches yet</span>'}
        </div>
      </div>
      <div class="sc-total">${r.total}<span>total pts</span></div>
    </div>`).join('')}
  </div>

  <!-- Per-match breakdown table -->
  ${matchCols.length?`
  <div class="history-section">
    <div class="hs-title">Match-by-Match Breakdown</div>
    <div class="table-wrap">
      <table class="hist-table">
        <thead>
          <tr>
            <th>Player</th>
            ${rows[0].matches.map(m=>`<th>${m.label.split('–')[0].trim().substring(0,8)}</th>`).join('')}

        </thead>
        <tbody>
          ${rows.map(r=>`
          <tr class="${r.name===session.name?'tr-me':''}">
            <td class="td-name">${r.name}</td>
            ${r.matches.map(m=>`<td class="td-pts">${m.pts}</td>`).join('')}
            <td class="td-total">${r.total}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}`;
}

// Normalize IPL team shortnames — CricAPI sometimes appends W (e.g. RCBW→RCB)
const IPL_SHORT_MAP = {'RCBW':'RCB','CSKW':'CSK','MIW':'MI','KKRW':'KKR','DCW':'DC','RRW':'RR','PBKSW':'PBKS','LSGW':'LSG','GTW':'GT','SRHW':'SRH'};
function normalizeTeam(t){ return IPL_SHORT_MAP[t] || t; }

function isOverseas(playerName) {
  return OVERSEAS_PLAYERS.has(playerName);
}

function overseasCount(sel) {
  return sel.filter(name => isOverseas(name)).length;
}

function getCredits(playerName) {
  return PLAYER_CREDITS[playerName] || 7;
}

function teamSpend(sel) {
  return sel.reduce((acc, name) => acc + getCredits(name), 0);
}

function teamCounts(sel, pool) {
  // Returns { teamName: count } for selected players
  const counts = {};
  sel.forEach(name => {
    const p = pool.find(x=>x.name===name);
    if (p) counts[p.team] = (counts[p.team]||0) + 1;
  });
  return counts;
}

function renderGrid(sel, role, search, pool) {
  const ri={BAT:'🏏',BOWL:'🎳',AR:'⚡',WK:'🧤'};
  const counts    = teamCounts(sel, pool);
  const spent     = teamSpend(sel);
  const remaining = BUDGET - spent;
  const fgnCnt    = overseasCount(sel);
  const filtered  = pool.filter(p=>(role==='ALL'||p.role===role)&&(p.name.toLowerCase().includes(search.toLowerCase())||p.team.toLowerCase().includes(search.toLowerCase())));
  if(!filtered.length) return `<div class="empty-hint" style="grid-column:1/-1">No players match</div>`;
  return filtered.map(p=>{
    const s          = sel.includes(p.name);
    const cr         = getCredits(p.name);
    const isFgn      = isOverseas(p.name);
    const teamFull   = !s && (counts[p.team]||0) >= MAX_PER_TEAM;
    const xiFull     = !s && sel.length >= 11;
    const overBudget = !s && cr > remaining;
    const fgnFull    = !s && isFgn && isIPLMatch() && fgnCnt >= MAX_OVERSEAS;
    const rCounts    = roleCounts(sel, pool);
    const roleFull   = !s && p.role && ROLE_LIMITS[p.role] && rCounts[p.role] >= ROLE_LIMITS[p.role].max;
    const d          = teamFull || xiFull || overBudget || fgnFull || roleFull;
    const reason     = teamFull   ? `Max ${MAX_PER_TEAM} from ${p.team}`
                     : fgnFull    ? `Max ${MAX_OVERSEAS} foreign players allowed`
                     : roleFull   ? `Max ${ROLE_LIMITS[p.role]?.max} ${p.role} players`
                     : overBudget ? `Not enough credits (${remaining} left)` : '';
    const tierClass  = cr>=11?'cr-elite':cr>=10?'cr-premium':cr>=9?'cr-standard':cr>=8?'cr-stdB':'cr-budget';
    const avail = playerStatus[p.name]; // 'playing'|'notplaying'|'impact'|undefined
    const dotClass = avail==='playing'?'dot-green':avail==='notplaying'?'dot-red':avail==='impact'?'dot-blue':'';
    const dotTitle = avail==='playing'?'Playing XI':avail==='notplaying'?'Not Playing':avail==='impact'?'Impact Sub':'';
    const isTransferOut = transferMode && pendingTransfers.some(t=>t.out===p.name&&!t.in);
    return `<div class="pcard ${s?'pcard-on':''} ${d?'pcard-dis':''} ${isTransferOut?'pcard-transfer-out':''}" data-p="${p.name}" data-team="${p.team}" ${d&&reason?'title="'+reason+'"':''}>
      ${s?'<div class="pchk">✓</div>':''}
      ${teamFull?'<div class="team-cap-badge">MAX</div>':''}
      ${fgnFull&&!teamFull&&!xiFull?'<div class="team-cap-badge" style="background:#2563eb">4/4</div>':''}
      ${overBudget&&!xiFull&&!teamFull&&!fgnFull?'<div class="team-cap-badge" style="background:var(--muted)">💸</div>':''}
      ${avail?`<div class="avail-dot ${dotClass}" title="${dotTitle}"></div>`:''}
      <div class="pc-role">${ri[p.role]||''} ${p.role}</div>

        <span class="pc-cr ${tierClass}">${cr} CR</span>

}

function bindMember() {
  document.getElementById('logoutBtn')?.addEventListener('click',()=>{stopAR();session={name:null,isAdmin:false};history.replaceState({},'',location.pathname);showScreen('login');});
  document.getElementById('backToAdminBtn')?.addEventListener('click',()=>{
    session.name=null; // drop player mode, keep isAdmin
    history.replaceState({},'',`${location.pathname}?atab=league`);
    showScreen('admin');
  });

  const tab=(new URLSearchParams(location.search)).get('tab')||'team';
  if(tab!=='team') return;
  if(currentMatch.finalized||(currentMatch.locked&&currentMatch.revealed)) return;

  const pool = currentMatch.players?.length ? currentMatch.players : matchPlayers;
  let curRole='ALL',curSearch='';

  function reRender(){
    // Update grid — preserves curRole/curSearch
    document.getElementById('pgrid').innerHTML=renderGrid(localTeam.players,curRole,curSearch,pool);
    bindCards();
    // Update XI right panel
    const xiList=document.getElementById('xiList');
    if(xiList){
      const sel=localTeam.players;
      const ri={BAT:'🏏',BOWL:'🎳',AR:'⚡',WK:'🧤'};
      xiList.innerHTML=sel.length===0?`<div class="xi-empty">Tap players to add them →</div>`:
        sel.map((p,i)=>{
          const pObj=matchPlayers.find(x=>x.name===p)||{role:'BAT',team:''};
          const isC=p===localTeam.captain,isV=p===localTeam.vc;
          const cr=getCredits(p);
          return `<div class="xi-row ${isC?'xi-row-c':isV?'xi-row-v':''}">
            <span class="xi-num">${i+1}</span>
            <div class="xi-row-info">
              <div class="xi-row-name">${p} ${isC?'<span class="xi-badge-c">C</span>':isV?'<span class="xi-badge-v">VC</span>':''}</div>
              <div class="xi-row-meta">${ri[pObj.role]||''} ${pObj.role} · ${normalizeTeam(pObj.team)} · <span style="color:var(--gold)">${cr}CR</span></div>
            </div>
            <button class="xi-remove" data-p="${p}" title="Remove">×</button>
          </div>`;
        }).join('');
    }
    bindRemove();
    // Restore active tab highlight
    document.querySelectorAll('.rtab').forEach(b=>{
      b.classList.toggle('active', b.dataset.r===curRole);
      b.onclick=()=>{document.querySelectorAll('.rtab').forEach(x=>x.classList.remove('active'));b.classList.add('active');curRole=b.dataset.r;reRender();};
    });
  }
  function bindRemove(){
    document.querySelectorAll('.xi-remove').forEach(btn=>{
      btn.onclick=(e)=>{
        e.stopPropagation();
        const p=btn.dataset.p;
        localTeam.players=localTeam.players.filter(x=>x!==p);
        if(localTeam.captain===p)localTeam.captain='';
        if(localTeam.vc===p)localTeam.vc='';
        reRender();
      };
    });
  }
  function bindCards(){
    document.querySelectorAll('.pcard:not(.pcard-dis)').forEach(c=>{
      c.onclick=()=>{
        const p=c.dataset.p;
        const pTeam=c.dataset.team;
        if(localTeam.players.includes(p)){
          if(transferMode){
            // In transfer mode — mark player for swapping out
            const existing = pendingTransfers.find(t=>!t.in);
            if(existing){
              // Cancel pending transfer
              pendingTransfers=pendingTransfers.filter(t=>t.out!==existing.out);
              toast(`Transfer of ${existing.out} cancelled`);
            } else {
              pendingTransfers.push({out:p, in:null});
              toast(`Select replacement for ${p}`);
            }
          } else {
            // Normal deselect
            localTeam.players=localTeam.players.filter(x=>x!==p);
            if(localTeam.captain===p)localTeam.captain='';
            if(localTeam.vc===p)localTeam.vc='';
          }
        } else if(localTeam.players.length>=11 && !transferMode){
          toast('Already have 11 players','err'); return;
        } else if(transferMode && localTeam.players.length>=11){
          // In transfer mode — this is the incoming player
          const pending = pendingTransfers.find(t=>!t.in);
          if(!pending){toast('First tap a player in your XI to swap out','err');return;}
        } else {
          // Check 6-per-team cap
          const counts=teamCounts(localTeam.players,pool);
          if((counts[pTeam]||0)>=MAX_PER_TEAM){
            toast(`Max ${MAX_PER_TEAM} players from ${pTeam}`,'err'); return;
          }
          // Check foreign cap (IPL only)
          if(isIPLMatch()&&isOverseas(p)&&overseasCount(localTeam.players)>=MAX_OVERSEAS){
            toast(`Max ${MAX_OVERSEAS} foreign players in XI`,'err'); return;
          }
          // Check role cap
          const pObj=pool.find(x=>x.name===p);
          if(pObj && ROLE_LIMITS[pObj.role]){
            const rc=roleCounts(localTeam.players,matchPlayers);
            if(rc[pObj.role]>=ROLE_LIMITS[pObj.role].max){
              toast(`Max ${ROLE_LIMITS[pObj.role].max} ${pObj.role} players allowed`,'err'); return;
            }
          }
          // Check budget cap
          const newSpend=teamSpend(localTeam.players)+getCredits(p);
          if(newSpend>BUDGET){
            toast(`Not enough credits — would cost ${newSpend}/${BUDGET}`,'err'); return;
          }
          if(transferMode && localTeam.players.length>=11){
            // Complete the transfer
            pending.in = p;
            localTeam.players = localTeam.players.map(x=>x===pending.out?p:x);
            if(localTeam.captain===pending.out) localTeam.captain=p;
            if(localTeam.vc===pending.out) localTeam.vc=p;
            toast(`✓ ${pending.out} → ${p}`);
          } else {
            localTeam.players.push(p);
            if(!localTeam.captain)localTeam.captain=p;
            else if(!localTeam.vc&&p!==localTeam.captain)localTeam.vc=p;
          }
        }
        reRender();
      };
    });
  }
  bindCards();
  bindRemove();
  document.querySelectorAll('.rtab').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.rtab').forEach(x=>x.classList.remove('active'));b.classList.add('active');curRole=b.dataset.r;reRender();};});
  document.getElementById('pSearch')?.addEventListener('input',e=>{curSearch=e.target.value;reRender();});
  document.getElementById('capSel')?.addEventListener('change',e=>{localTeam.captain=e.target.value;if(localTeam.vc===e.target.value)localTeam.vc='';document.getElementById('xiChips').innerHTML=renderXIChips(localTeam.players,localTeam.captain,localTeam.vc);});
  document.getElementById('vcSel')?.addEventListener('change',e=>{localTeam.vc=e.target.value;if(localTeam.captain===e.target.value)localTeam.captain='';document.getElementById('xiChips').innerHTML=renderXIChips(localTeam.players,localTeam.captain,localTeam.vc);});
  document.getElementById('lockTeamBtn')?.addEventListener('click',async()=>{
    if(localTeam.players.length!==11){toast('Select exactly 11 players','err');return;}
    if(!localTeam.captain){toast('Pick a Captain','err');return;}
    if(!localTeam.vc||localTeam.vc===localTeam.captain){toast('Pick a different Vice-Captain','err');return;}
    // Enforce 6-per-team cap
    const finalCounts=teamCounts(localTeam.players,matchPlayers);
    const breached=Object.entries(finalCounts).find(([,c])=>c>MAX_PER_TEAM);
    if(breached){toast(`Too many players from ${breached[0]} (max ${MAX_PER_TEAM})`,'err');return;}
    // Enforce foreign cap (IPL only)
    if(isIPLMatch()){
      const totalOvs=overseasCount(localTeam.players);
      if(totalOvs>MAX_OVERSEAS){toast(`Too many foreign players (${totalOvs}/${MAX_OVERSEAS} max)`,'err');return;}
    }
    // Enforce role minimums
    const rc=roleCounts(localTeam.players,matchPlayers);
    for(const [role,limits] of Object.entries(ROLE_LIMITS)){
      if(rc[role]<limits.min){toast(`Need at least ${limits.min} ${role} player${limits.min>1?'s':''}`,'err');return;}
      if(rc[role]>limits.max){toast(`Max ${limits.max} ${role} players allowed`,'err');return;}
    }
    // Enforce budget cap
    const totalSpend=teamSpend(localTeam.players);
    if(totalSpend>BUDGET){toast(`Over budget! ${totalSpend}/${BUDGET} credits used`,'err');return;}
    const btn=document.getElementById('lockTeamBtn');btn.textContent='Saving…';btn.disabled=true;
    try {
      const matchRef=doc(db,'matches',getActiveMid()||currentMatchId);
      const matchSnap=await getDoc(matchRef);
      const matchData=matchSnap.data()||{};
      const teams=matchData.teams||{};

      // Calculate transfer deductions
      let deduction = 0;
      if(transferMode && pendingTransfers.length>0){
        const freeLeft = Math.max(0, FREE_TRANSFERS_PER_MATCH - transfersUsed);
        const extraTransfers = Math.max(0, pendingTransfers.length - freeLeft);
        deduction = extraTransfers * TRANSFER_POINT_DEDUCTION;
        const newTransfersUsed = transfersUsed + pendingTransfers.length;
        // Save transfer history and used count
        const transferHistory = [...(teams[session.name]?.transferHistory||[]),
          ...pendingTransfers.map(t=>({...t,matchId:getActiveMid()||currentMatchId,deducted:deduction>0}))];
        teams[session.name]={
          players:localTeam.players,captain:localTeam.captain,vc:localTeam.vc,
          submitted:true,updatedAt:Date.now(),
          transferHistory,
          transferDeduction:(teams[session.name]?.transferDeduction||0)+deduction
        };
        // Track transfers used per member
        const transfersUsedMap = matchData.transfersUsed||{};
        transfersUsedMap[session.name] = newTransfersUsed;
        await updateDoc(matchRef,{teams, transfersUsed:transfersUsedMap});
        transfersUsed = newTransfersUsed;
        if(deduction>0) toast(`Transfers saved! -${deduction} pts deduction applied 🔒`);
        else toast(`Transfers confirmed! ${pendingTransfers.length} transfer${pendingTransfers.length>1?'s':''} used 🔒`);
      } else {
        teams[session.name]={players:localTeam.players,captain:localTeam.captain,vc:localTeam.vc,submitted:true,updatedAt:Date.now()};
        await updateDoc(matchRef,{teams});
        toast('Team locked! 🔒');
      }

      allTeams[session.name]={...localTeam,submitted:true};
      pendingTransfers=[];
      transferMode=true; // now in transfer mode for future changes
      showScreen('member');
    } catch(e){toast('Error: '+e.message,'err');btn.textContent='🔒 LOCK IN MY TEAM';btn.disabled=false;}
  });
}

function renderMatchSelectorTabs() {
  const allIds = [...new Set([...(metaGame.activeMatchIds||[]), currentMatchId].filter(Boolean))];
  if (allIds.length <= 1) return '';
  return `
  <div class="match-selector-tabs">
    <div class="mst-label">SELECT MATCH</div>
    <div class="mst-tabs">
      ${allIds.map(mid => {
        const m = getMatch(mid);
        const isSelected = mid === (adminSelectedMatchId||currentMatchId);
        const status = m.finalized?'Final':m.locked?'Locked':m.revealed?'Revealed':'Open';
        const statusClass = m.finalized?'mst-final':m.locked?'mst-locked':m.revealed?'mst-revealed':'mst-open';
        const label = m.label && m.label.trim() ? m.label : null;
        // Skip ghost matches — raw match IDs with no label
        if (!label) return '';
        return `<button class="mst-tab ${isSelected?'mst-active':''}" onclick="selectMatchTab('${mid}')">

          <span class="mst-status ${statusClass}">${status}</span>

      }).join('')}

}

function renderStatsGrid(search) {
  const ri={BAT:'🏏',BOWL:'🎳',AR:'⚡',WK:'🧤'};
  const pool=matchPlayers.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.team.toLowerCase().includes(search.toLowerCase()));
  if(!pool.length) return `<div class="muted" style="padding:20px;text-align:center">${matchPlayers.length?'No players match':'Load today\'s match players first (in Current Match tab)'}</div>`;

  // Role-appropriate stat fields
  const roleFields = {
    BAT:  [['runs','Runs'],['balls','Balls'],['fours','4s'],['sixes','6s'],['catches','Ctch']],
    BOWL: [['wickets','Wkts'],['overs','Ovrs'],['runsConceded','RC'],['catches','Ctch'],['lbwBowled','LBW']],
    AR:   [['runs','Runs'],['balls','Balls'],['fours','4s'],['sixes','6s'],['wickets','Wkts'],['overs','Ovrs'],['runsConceded','RC'],['catches','Ctch']],
    WK:   [['runs','Runs'],['balls','Balls'],['fours','4s'],['sixes','6s'],['catches','Ctch'],['stumpings','St']],
  };

  return pool.map(p=>{
    const s=playerStats[p.name]||{}, pts=calcPoints(s);
    const pStatus=(currentMatch.playerStatus||{})[p.name]||'';
    const fields = roleFields[p.role]||roleFields.BAT;
    return `<div class="stat-card">
      <div class="sc-hd">
        <div><div class="sc-nm">${p.name}</div><div class="sc-tm">${ri[p.role]||''} ${p.role} · ${normalizeTeam(p.team)}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <select class="avail-sel" data-p="${p.name}" title="Availability">
            <option value="" ${!pStatus?'selected':''}>⚪</option>
            <option value="playing" ${pStatus==='playing'?'selected':''}>🟢 Playing</option>
            <option value="notplaying" ${pStatus==='notplaying'?'selected':''}>🔴 Not Playing</option>
            <option value="impact" ${pStatus==='impact'?'selected':''}>🔵 Impact</option>
          </select>
          <div class="sc-pts ${pts>0?'sc-pts-on':''}">${pts>0?pts+' pts':'–'}</div>
        </div>
      </div>
      <div class="sc-inp">
        ${fields.map(([f,l])=>`
        <div class="si-g"><label>${l}</label><input type="number" class="si" data-f="${f}" data-p="${p.name}" value="${s[f]||0}" min="0"${f==='overs'?' step="0.1"':''}></div>`).join('')}
      </div>
      <div class="sc-chk">
        <label><input type="checkbox" class="sic" data-f="playingXI" data-p="${p.name}" ${s.playingXI?'checked':''}> Playing XI</label>
        ${p.role==='BAT'||p.role==='WK'||p.role==='AR'?`<label><input type="checkbox" class="sic" data-f="batted" data-p="${p.name}" ${s.batted?'checked':''}> Batted</label>`:''}
      </div>
      <button class="btn-save" data-p="${p.name}">Save</button>
    </div>`;
  }).join('');
}

function bindAdmin() {
  document.getElementById('logoutBtn')?.addEventListener('click',()=>{stopAR();session={name:null,isAdmin:false};history.replaceState({},'',location.pathname);showScreen('login');});
  const tab=(new URLSearchParams(location.search)).get('atab')||'match';

  if (tab==='match') {
    document.getElementById('createMatchBtn')?.addEventListener('click',createOrUpdateMatch);
    // Match type synced in setMatchType below
    function setMatchType(type) {
      _matchType = type;
      ['btnIPL','btnIntl','btnDom'].forEach(id=>document.getElementById(id)?.classList.remove('mt-active'));
      const activeBtn = type==='ipl'?'btnIPL':type==='international'?'btnIntl':'btnDom';
      document.getElementById(activeBtn)?.classList.add('mt-active');
      const hint = type==='ipl'?'Max 4 foreign · role limits apply':type==='domestic'?'No caps · domestic leagues & tournaments':'No foreign player cap · all roles allowed';
      const hintEl = document.querySelector('.mt-hint'); if(hintEl) hintEl.textContent=hint;
      const fb=document.getElementById('fetchMatchBtn');
      if(fb) fb.textContent=type==='ipl'?'🏏 Find IPL Matches':type==='domestic'?'🏟️ Find Domestic':'🌍 Find International';
    }
    // Sync _matchType from current match on load
    _matchType = getMatch(getActiveMid()).matchType||'ipl';
    document.getElementById('btnIPL')?.addEventListener('click',()=>setMatchType('ipl'));
    document.getElementById('btnIntl')?.addEventListener('click',()=>setMatchType('international'));
    document.getElementById('btnDom')?.addEventListener('click',()=>setMatchType('domestic'));
    document.getElementById('revealBtn')?.addEventListener('click',async()=>{
      if(!confirm('Reveal all teams now? Everyone will see each other\'s picks immediately.'))return;
      const activeMid = getActiveMid();
      await updateDoc(doc(db,'matches',activeMid),{revealed:true});
      toast('Teams revealed! 🥁 Fetching playing XI…');

      // Auto-fetch playing XI from match_info at toss time
      // This marks all 11 players per team as 🟢 instantly — not waiting for scorecard
      try {
        const key = metaGame.cricApiKey;
        const liveId = getMatch(activeMid).liveMatchId;
        if(key && liveId) {
          const res = await fetch(`https://api.cricapi.com/v1/match_info?apikey=${key}&id=${liveId}`);
          const data = await res.json();
          if(data.status==='success' && data.data) {
            const matchData = data.data;
            // Extract playing XI — CricAPI returns them in teamInfo[n].players or teams array
            const playingXI = new Set();
            // Try teams array first (most reliable post-toss)
            (matchData.teams||[]).forEach(teamName => {
              const teamInfo = (matchData.teamInfo||[]).find(t=>t.name===teamName);
              (teamInfo?.players||[]).forEach(p => { if(p.name) playingXI.add(p.name); });
            });
            // Fallback: check if matchData has a direct players array
            if(playingXI.size === 0) {
              (matchData.players||[]).forEach(p => { if(p.name) playingXI.add(p.name); });
            }

            if(playingXI.size > 0) {
              // Also extract impact sub nominees if available
              const impactSubs = new Set();
              (matchData.impactSubs||[]).forEach(s => { if(s.name) impactSubs.add(s.name); });
              (matchData.teamInfo||[]).forEach(t => {
                (t.impactSubs||t.impact_subs||[]).forEach(s => { if(s.name) impactSubs.add(s.name); });
              });

              // Mark playing XI 🟢, impact sub nominees 🔵, everyone else 🔴
              const statusUpdate = {};
              matchPlayers.forEach(p => {
                const nameLower = p.name.toLowerCase();
                const lastWord = nameLower.split(' ').pop();
                const isPlaying = [...playingXI].some(name =>
                  name.toLowerCase().includes(lastWord) || nameLower.includes(name.toLowerCase().split(' ').pop())
                );
                const isImpact = !isPlaying && [...impactSubs].some(name =>
                  name.toLowerCase().includes(lastWord) || nameLower.includes(name.toLowerCase().split(' ').pop())
                );
                statusUpdate[`playerStatus.${p.name}`] = isPlaying ? 'playing' : isImpact ? 'impact' : 'notplaying';
              });
              await updateDoc(doc(db,'matches',activeMid), statusUpdate);
              const playCount = Object.values(statusUpdate).filter(v=>v==='playing').length;
              const impactCount = Object.values(statusUpdate).filter(v=>v==='impact').length;
              toast(`Teams revealed! ✅ ${playCount} playing XI${impactCount>0?`, ${impactCount} impact sub nominees`:''}`);
            } else {
              toast('Teams revealed! 🥁 (Playing XI not available yet from API)');
            }
          }
        }
      } catch(e) {
        console.warn('Could not fetch playing XI:', e.message);
        // Reveal still worked — just no auto-marking
      }
      showScreen('admin');
    });
    document.getElementById('lockBtn')?.addEventListener('click',async()=>{
      if(!confirm('Lock teams? No more edits — about 10 mins to first ball.'))return;
      await updateDoc(doc(db,'matches',getActiveMid()),{locked:true});toast('Teams locked 🔒');showScreen('admin');
    });
    document.getElementById('finalizeBtn')?.addEventListener('click',finalizeMatch);
    document.getElementById('resetTransfersBtn')?.addEventListener('click',async()=>{
      if(!confirm('Reset transfer counts for all members? This gives everyone fresh free transfers.'))return;
      await updateDoc(doc(db,'matches',getActiveMid()),{transfersUsed:{}});
      toast('Transfer counts reset ✓');
    });
    document.getElementById('newMatchBtn')?.addEventListener('click',()=>{
      if(!confirm('Start a new match? The current match stays in history.'))return;
      const allIds = metaGame.activeMatchIds||[];
      const remaining = allIds.filter(id=>id!==getActiveMid());
      const newPrimary = remaining[0]||'';
      adminSelectedMatchId = newPrimary||null;
      localTeam={players:[],captain:'',vc:''};
      updateDoc(doc(db,'meta','game'),{currentMatchId:newPrimary,activeMatchIds:remaining}).then(()=>showScreen('admin'));
    });
    document.getElementById('saveApiBtn')?.addEventListener('click',async()=>{
      await updateDoc(doc(db,'meta','game'),{cricApiKey:document.getElementById('cricKey').value.trim()});
      toast('API key saved');
    });
    document.getElementById('fetchMatchBtn')?.addEventListener('click',fetchMatches);
    document.getElementById('searchSeriesBtn')?.addEventListener('click',searchSeriesMatches);
    document.getElementById('seriesSearchInp')?.addEventListener('keydown',e=>{ if(e.key==='Enter') searchSeriesMatches(); });
    document.getElementById('nukeBtn')?.addEventListener('click', nukeEverything);
    document.getElementById('addPlayerBtn')?.addEventListener('click', addPlayerManually);
    document.getElementById('clearPoolBtn')?.addEventListener('click', clearPool);
    document.getElementById('addAnotherMatchBtn')?.addEventListener('click', ()=>{
      _addingAnotherMatch = true;
      // Clear form fields for new match entry
      if(document.getElementById('matchLbl')) document.getElementById('matchLbl').value='';
      if(document.getElementById('t1')) document.getElementById('t1').value='';
      if(document.getElementById('t2')) document.getElementById('t2').value='';
      toast('Fill in the new match details and click Update Match');
    });
    // Remove match buttons
    document.querySelectorAll('.btn-remove-match').forEach(btn=>{
      btn.addEventListener('click', ()=> removeActiveMatch(btn.dataset.mid));
    });
    // Allow Enter key on player name input
    document.getElementById('manualName')?.addEventListener('keydown', e=>{ if(e.key==='Enter') addPlayerManually(); });
    document.getElementById('manualTeam')?.addEventListener('keydown', e=>{ if(e.key==='Enter') addPlayerManually(); });
    // Role change on pool chips
    document.querySelectorAll('.pool-role-sel').forEach(sel=>{
      sel.addEventListener('change', async e=>{
        const name = sel.dataset.p;
        const activeMid = getActiveMid();
        const updated = matchPlayers.map(p=>p.name===name?{...p,role:e.target.value}:p);
        await updateDoc(doc(db,'matches',activeMid),{players:updated});
        matchPlayers=updated; toast(`✓ ${name} → ${e.target.value}`);
      });
    });
  }

  if (tab==='stats') {
    document.getElementById('autoStatsBtn')?.addEventListener('click',()=>autoFetchStats(true));
    document.getElementById('saveAllStatsBtn')?.addEventListener('click', saveAllStats);
    document.getElementById('arToggleBtn')?.addEventListener('click',()=>{
      if(arInterval){stopAR();toast('Auto-refresh stopped');}
      else{const secs=parseInt(document.getElementById('arInterval')?.value||'300');if(!secs){toast('Select interval','err');return;}startAR(secs);toast(`Auto-refresh every ${secs>=60?secs/60+' min':secs+'s'} — ON 🟢`);}
      showScreen('admin');
    });
    document.getElementById('statsSearch')?.addEventListener('input',e=>{document.getElementById('statsGrid').innerHTML=renderStatsGrid(e.target.value);bindSave();});
    bindSave();
  }

  if (tab==='season') {
    document.getElementById('exportBtn')?.addEventListener('click',exportCSV);
  }

  if (tab==='league') {
    document.getElementById('saveLeagueBtn')?.addEventListener('click',async()=>{
      await updateDoc(doc(db,'meta','game'),{adminPin:document.getElementById('adminPinInp').value.trim()});toast('Saved ✓');
    });
    const gen=()=>Math.random().toString(36).substring(2,5).toUpperCase()+Math.random().toString(36).substring(2,5).toUpperCase();
    document.getElementById('genCodeBtn')?.addEventListener('click',async()=>{const c=gen();await updateDoc(doc(db,'meta','game'),{joinCode:c});toast('Join link created!');showScreen('admin');});
    document.getElementById('regenCodeBtn')?.addEventListener('click',async()=>{if(!confirm('New code? Old link stops working.'))return;const c=gen();await updateDoc(doc(db,'meta','game'),{joinCode:c});toast('New code generated');showScreen('admin');});
    document.getElementById('copyLinkBtn')?.addEventListener('click',()=>{navigator.clipboard.writeText(document.getElementById('jlinkText')?.textContent||'').then(()=>toast('Copied!')).catch(()=>toast('Copy failed','err'));});

    // ── Admin player profile ──
    document.getElementById('saveProfileBtn')?.addEventListener('click', async()=>{
      const name=(document.getElementById('adminPlayerName')?.value||'').trim();
      const teamName=(document.getElementById('adminTeamName')?.value||'').trim();
      if(!name){toast('Enter your player name','err');return;}
      // Register as a member too so they appear in leaderboard
      const mSnap=await getDoc(doc(db,'meta','members'));
      const members=mSnap.data()||{};
      members[name]={pin:'__admin__',teamName:teamName||name+"'s XI",joinedAt:Date.now(),isAdmin:true};
      await setDoc(doc(db,'meta','members'),members);
      await updateDoc(doc(db,'meta','game'),{adminProfile:{name,teamName:teamName||name+"'s XI"}});
      allMembers=members;
      toast('Profile saved! You\'re in the league ✓');
      showScreen('admin');

    document.getElementById('pickMyTeamBtn')?.addEventListener('click', ()=>{
      const profile=metaGame.adminProfile||{};

      localTeam={players:myTeam.players||[],captain:myTeam.captain||'',vc:myTeam.vc||''};
      // Switch to player mode temporarily, keeping isAdmin true
      session.name=profile.name;
      history.replaceState({},'',`${location.pathname}?tab=team`);
      showScreen('member');
    });
  }
}

// ── Create / Update Match ──
let _matchType = 'ipl'; // 'ipl' | 'international' | 'domestic'
let _addingAnotherMatch = false; // flag for adding a second match

async function createOrUpdateMatch() {
  const label=document.getElementById('matchLbl').value.trim();
  const t1=document.getElementById('t1').value.trim();
  const t2=document.getElementById('t2').value.trim();
  if(!label){toast('Enter a match label','err');return;}
  const isIPL = _matchType === 'ipl'; const matchType = _matchType;

  const activeMid = getActiveMid();

  if(_addingAnotherMatch) {
    // Create a brand new additional match
    await createNewMatch(label, t1, t2, isIPL, false, matchType);
    _addingAnotherMatch = false;
  } else if(activeMid && !currentMatch.finalized) {
    // Update the currently selected match
    await updateDoc(doc(db,'matches',activeMid),{label,t1,t2,isIPL,matchType});
    toast('Match updated');
  } else {
    // Create first/new primary match
    await createNewMatch(label, t1, t2, isIPL, true, matchType);
  }
  showScreen('admin');
}

async function createNewMatch(label, t1, t2, isIPL, setPrimary, matchType='ipl') {
  const mid='match_'+Date.now();
  const matchNum=(await getDocs(collection(db,'matches'))).size+1;
  const liveMatchId = window._pendingLiveMatchId || '';
  window._pendingLiveMatchId = null;
  await setDoc(doc(db,'matches',mid),{
    label,t1,t2,matchNum,isIPL,matchType,
    revealed:false,locked:false,finalized:false,
    players:[],stats:{},teams:{},liveMatchId,
    createdAt:serverTimestamp()
  });
  // Add to activeMatchIds and optionally set as primary
  const currentIds = metaGame.activeMatchIds||[];
  const newIds = [...new Set([...currentIds, mid])];
  const update = { activeMatchIds: newIds };
  if (setPrimary) update.currentMatchId = mid;
  await updateDoc(doc(db,'meta','game'), update);
  if (setPrimary) currentMatchId = mid;

}

async function removeActiveMatch(mid) {

  syncDerivedState();
  toast('Match removed from active list');
  showScreen('admin');
}

// ── Finalize match → save to season ──
async function finalizeMatch() {
  if(!confirm('Finalize this match? Points will be saved to the season leaderboard.'))return;
  const btn=document.getElementById('finalizeBtn');btn.textContent='Saving…';btn.disabled=true;
  const activeMid = getActiveMid();
  try {
    const stats=getStats(activeMid);
    const teams=getTeams(activeMid);
    const match=getMatch(activeMid);
    const members=Object.keys(allMembers);
    const stSnap=await getDoc(doc(db,'season','totals'));
    const totals=stSnap.exists()?stSnap.data():{};

    members.forEach(name=>{
      const t=teams[name]||{};
      const pts=memberMatchTotal(t,stats);
      if(!totals[name]) totals[name]={total:0,matches:[]};
      const alreadySaved=totals[name].matches.some(m=>m.matchId===activeMid);
      if(!alreadySaved){
        totals[name].total=(totals[name].total||0)+pts;
        totals[name].matches=[...(totals[name].matches||[]),{matchId:activeMid,label:match.label||'Match',pts}];
      }
    });

    await setDoc(doc(db,'season','totals'),totals);
    await updateDoc(doc(db,'matches',activeMid),{finalized:true});

    // Remove finalized match from activeMatchIds
    const remaining=(metaGame.activeMatchIds||[]).filter(id=>id!==activeMid);
    await updateDoc(doc(db,'meta','game'),{activeMatchIds:remaining});

    stopAR();
    toast('Match finalized! Points saved to season table ✅');
    showScreen('admin');
  } catch(e){toast('Error: '+e.message,'err');btn.textContent='✅ Finalize & Save to Season';btn.disabled=false;}
}

// ── Export CSV ──
function exportCSV() {
  const members=Object.keys(allMembers);
  const rows=members.map(name=>{
    const sd=seasonTotals[name]||{total:0,matches:[]};
    return {name,teamName:allMembers[name]?.teamName||name,total:sd.total||0,matches:sd.matches||[]};
  }).sort((a,b)=>b.total-a.total);
  if(!rows.length){toast('No data to export','err');return;}
  const matchCols=rows[0].matches.map(m=>m.label||'Match');
  const header=['Rank','Name','Team',...matchCols,'Total'];
  const lines=[header.join(','),...rows.map((r,i)=>[i+1,r.name,r.teamName,...r.matches.map(m=>m.pts),r.total].join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ipl_fantasy_season.csv';a.click();
  toast('CSV exported!');
}

const IPL_2026_SERIES_ID = '87c62aac-bc3c-4738-ab93-19da0690488f';
const IPL_TEAMS_LIST = ['Mumbai Indians','Chennai Super Kings','Royal Challengers','Kolkata Knight',
  'Delhi Capitals','Rajasthan Royals','Sunrisers Hyderabad','Punjab Kings',
  'Lucknow Super Giants','Gujarat Titans','MI','CSK','RCB','KKR','DC','RR','SRH','PBKS','LSG','GT'];
const isIPLName = n => (n||'').toLowerCase().includes('ipl') || IPL_TEAMS_LIST.some(t=>(n||'').toLowerCase().includes(t.toLowerCase()));

// ── Cricket API ──
async function fetchMatches() {
  const key=document.getElementById('cricKey')?.value.trim()||metaGame.cricApiKey;
  if(!key){toast('Enter API key first','err');return;}
  const isIPL = _matchType === 'ipl'; const isDomestic = _matchType === 'domestic'; const matchType = _matchType;
  const btn=document.getElementById('fetchMatchBtn');
  btn.textContent='Fetching…';btn.disabled=true;
  const list = document.getElementById('matchesList');
  list.innerHTML = '<p class="muted" style="font-size:12px">Fetching matches…</p>';

  try {
    // Step 1 — currentMatches (live + recent ~48hrs)
    const r1 = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${key}&offset=0`).then(r=>r.json());
    if(r1.status!=='success') throw new Error(r1.reason||'API error — check your key');
    const current = r1.data||[];

    // Step 2 — collect series IDs
    // KEY FIX: also load cached series IDs from Firebase so they persist
    // even after games drop out of the 48hr currentMatches window
    let seriesIds = [];
    if (isIPL) {
      const fromCurrent = current.filter(m=>isIPLName(m.name)).map(m=>m.series_id).filter(Boolean);
      seriesIds = [...new Set([...fromCurrent, IPL_2026_SERIES_ID])];
    } else {
      const fromCurrent = [...new Set(
        current.filter(m=>!isIPLName(m.name)).map(m=>m.series_id).filter(Boolean)
      )];

      // Load previously cached series IDs from Firebase
      const cachedIds = metaGame.cachedIntlSeriesIds || [];

      // Always-include series IDs — these are hardcoded so they survive the 48hr window
      // Add any series here that you want to always appear in Find Matches
      const knownActive = [
        '30845b53-91bc-4dbe-9e91-01319213e61f', // SA tour of NZ 2026 (NZ vs SA T20I series)
        '3124eb82-0ba8-4c90-9d1f-11dbdf2e5e42', // PAK tour of BAN 2026
        'efd776f5-506a-48eb-a97b-7d872537ed76', // AUS Women tour of WI 2026
        'd5c0239d-9840-417b-ad8f-865cc3927ff4', // NZ tour of BAN 2026
      ];

      // Merge new + cached + known active, save new ones back to Firebase
      const merged = [...new Set([...fromCurrent, ...cachedIds, ...knownActive])].slice(0,15);
      if (fromCurrent.length > 0) {
        // Save newly found series IDs so they survive the 48hr window
        const updated = [...new Set([...fromCurrent, ...cachedIds, ...knownActive])].slice(0,15);
        updateDoc(doc(db,'meta','game'), { cachedIntlSeriesIds: updated }).catch(()=>{});
      }
      seriesIds = merged;
    }

    // Step 3 — series_info for each series → full fixture list including upcoming
    const seriesData = await Promise.allSettled(
      seriesIds.map(sid =>
        fetch(`https://api.cricapi.com/v1/series_info?apikey=${key}&id=${sid}`).then(r=>r.json())
      )
    );

    // Merge + deduplicate
    const seen = new Set();
    const allMatches = [];
    current.forEach(m=>{ if(!seen.has(m.id)){seen.add(m.id);allMatches.push(m);} });
    seriesData.forEach(r=>{
      if(r.status==='fulfilled' && r.value.status==='success'){
        (r.value.data?.matchList||[]).forEach(m=>{
          if(!seen.has(m.id)){seen.add(m.id);allMatches.push(m);}
        });
      }
    });

    // Filter by match type — strict for IPL
    let filtered = isIPL
      ? allMatches.filter(m => (m.name||'').toLowerCase().includes('indian premier league') || (m.name||'').toLowerCase().includes('ipl'))
      : allMatches.filter(m => !isIPLName(m.name));

    const domesticKeywords = [
      'plunket shield','sheffield shield','ranji trophy',
      'csa provincial','legends league','kalahari',
      'super smash','vitality blast','the hundred',
      'ford trophy','four day franchise','county championship',
      'under-19','u19','invitational','provincial'
    ];

    if (!isIPL && !isDomestic) {
      // International — exclude domestic competitions, keep bilateral/ICC only
      filtered = filtered.filter(m => {
        const name = (m.name||'').toLowerCase();
        return !domesticKeywords.some(d => name.includes(d));
      });
    } else if (isDomestic) {
      // Domestic — keep only domestic/club/provincial competitions
      filtered = filtered.filter(m => {
        const name = (m.name||'').toLowerCase();
        return domesticKeywords.some(d => name.includes(d));
      });
    }

    filtered.sort((a,b)=>{
      const rank = m => m.matchStarted&&!m.matchEnded?0:!m.matchStarted?1:2;
      if(rank(a)!==rank(b)) return rank(a)-rank(b);
      const da=new Date(a.dateTimeGMT||0), db2=new Date(b.dateTimeGMT||0);
      return rank(a)===1 ? da-db2 : db2-da;
    });

    if(!filtered.length && !isIPL){
      // No results from series_info — auto-run series search with known active tours
      list.innerHTML='<p class="muted" style="font-size:12px">Searching current international tours…</p>';
      try {
        const autoQueries = ['South Africa tour of New Zealand 2026','Pakistan tour of Bangladesh 2026','West Indies Women Australia Women 2026'];
        const autoResults = await Promise.allSettled(
          autoQueries.map(q =>
            fetch(`https://api.cricapi.com/v1/series?apikey=${key}&offset=0&search=${encodeURIComponent(q)}`).then(r=>r.json())
          )
        );
        const autoSids = new Set();
        autoResults.forEach(r=>{
          if(r.status==='fulfilled'&&r.value.status==='success'){
            (r.value.data||[]).slice(0,2).forEach(s=>{ if(s.id) autoSids.add(s.id); });
          }
        });
        const autoSeriesData = await Promise.allSettled(
          [...autoSids].map(sid=>
            fetch(`https://api.cricapi.com/v1/series_info?apikey=${key}&id=${sid}`).then(r=>r.json())
          )
        );
        const autoSeen = new Set(allMatches.map(m=>m.id));
        const autoMatches = [...allMatches];
        autoSeriesData.forEach(r=>{
          if(r.status==='fulfilled'&&r.value.status==='success'){
            (r.value.data?.matchList||[]).forEach(m=>{
              if(!autoSeen.has(m.id)){autoSeen.add(m.id);autoMatches.push(m);}
            });
          }
        });
        let autoFiltered = autoMatches.filter(m=>!isIPLName(m.name));
        const dl=['plunket shield','sheffield shield','ranji trophy','csa provincial','legends league','kalahari','super smash','vitality blast','the hundred','ford trophy','under-19','u19','invitational','provincial'];
        autoFiltered = autoFiltered.filter(m=>!dl.some(d=>(m.name||'').toLowerCase().includes(d)));
        autoFiltered.sort((a,b)=>{
          const rank=m=>m.matchStarted&&!m.matchEnded?0:!m.matchStarted?1:2;
          if(rank(a)!==rank(b)) return rank(a)-rank(b);
          return new Date(a.dateTimeGMT||0)-new Date(b.dateTimeGMT||0);
        });
        if(autoFiltered.length){ renderMatchList(autoFiltered,list,key,false); return; }
      } catch(e2){ console.warn('Auto-search failed:',e2); }
      // Still nothing — show hint with quick search buttons
      list.innerHTML=`
        <div class="no-matches-hint">
          <div class="nmh-title">No international matches in live window</div>
          <div class="nmh-body">Use <b>Search Series</b> below to find upcoming games:</div>
          <div class="nmh-examples">
            <span class="nmh-ex" onclick="quickSearch('South Africa tour of New Zealand 2026')">NZ vs SA 2026</span>
            <span class="nmh-ex" onclick="quickSearch('Pakistan tour of Bangladesh 2026')">BAN vs PAK</span>
            <span class="nmh-ex" onclick="quickSearch('England tour 2026')">ENG tours</span>
            <span class="nmh-ex" onclick="quickSearch('India tour 2026')">IND tours</span>
          </div>
        </div>`;
      return;
    }

    if(!filtered.length && isIPL){
      list.innerHTML=`<div class="no-matches-hint"><div class="nmh-title">No IPL matches yet</div><div class="nmh-body">IPL 2026 starts <b>28 March</b>. Fixtures will appear here automatically.</div></div>`;
      return;
    }

    renderMatchList(filtered, list, key, isIPL);

  } catch(e){
    list.innerHTML=`<p style="color:var(--red);font-size:13px">${e.message}</p>`;
    toast('Error: '+e.message,'err');
  }
  finally{ btn.textContent=isIPL?'🏏 Find IPL Matches':isDomestic?'🏟️ Find Domestic':'🌍 Find International'; btn.disabled=false; }
}

async function searchSeriesMatches() {
  const key=document.getElementById('cricKey')?.value.trim()||metaGame.cricApiKey;
  if(!key){toast('Enter API key first','err');return;}
  const query=(document.getElementById('seriesSearchInp')?.value||'').trim();
  if(!query){toast('Enter a series name to search','err');return;}

  const btn=document.getElementById('searchSeriesBtn');
  btn.textContent='Searching…';btn.disabled=true;
  const list=document.getElementById('matchesList');
  list.innerHTML='<p class="muted" style="font-size:12px">Searching series…</p>';

  try {
    const r = await fetch(`https://api.cricapi.com/v1/series?apikey=${key}&offset=0&search=${encodeURIComponent(query)}`).then(r=>r.json());
    if(r.status!=='success') throw new Error(r.reason||'Series search failed');
    const series = r.data||[];
    if(!series.length) throw new Error(`No series found for "${query}"`);

    // Fetch series_info for top 5 results
    const results = await Promise.allSettled(
      series.slice(0,5).map(s =>
        fetch(`https://api.cricapi.com/v1/series_info?apikey=${key}&id=${s.id}`).then(r=>r.json())
      )
    );

    const seen=new Set(); const matches=[];
    results.forEach(r=>{
      if(r.status==='fulfilled'&&r.value.status==='success'){
        (r.value.data?.matchList||[]).forEach(m=>{
          if(!seen.has(m.id)){seen.add(m.id);matches.push(m);}
        });
      }
    });

    if(!matches.length) throw new Error('Series found but no matches listed yet');

    matches.sort((a,b)=>{
      const rank = m=>m.matchStarted&&!m.matchEnded?0:!m.matchStarted?1:2;
      if(rank(a)!==rank(b)) return rank(a)-rank(b);
      return new Date(a.dateTimeGMT||0)-new Date(b.dateTimeGMT||0);
    });

    const seriesNames = series.slice(0,5).map(s=>s.name).join(', ');
    list.innerHTML=`<div class="ss-result-label">Results for: <em>${seriesNames}</em></div>`;
    renderMatchList(matches, list, key, _matchType==='ipl', true);

  } catch(e){
    list.innerHTML=`<p style="color:var(--red);font-size:13px">${e.message}</p>`;
    toast('Error: '+e.message,'err');
  }
  finally{ btn.textContent='Search Series'; btn.disabled=false; }
}

function renderMatchList(filtered, list, key, isIPL, append=false) {
  if(!filtered.length){
    list.innerHTML=`
      <p class="muted">No ${isIPL?'IPL':'international'} matches found.</p>
      <p class="muted" style="font-size:12px;margin-top:6px">
        ${isIPL?'Try searching by series name below (e.g. "IPL 2026").':'Use "Search Series" below to find matches by name.'}
      </p>`;
    return;
  }

  const live     = filtered.filter(m=>m.matchStarted&&!m.matchEnded);
  const upcoming = filtered.filter(m=>!m.matchStarted);
  const ended    = filtered.filter(m=>m.matchEnded).slice(0,5);

  let html='';
  if(live.length)     html+=`<div class="match-group-label">🔴 LIVE NOW</div>`+live.map(matchOptHTML).join('');
  if(upcoming.length) html+=`<div class="match-group-label">🕐 UPCOMING</div>`+upcoming.map(matchOptHTML).join('');
  if(ended.length)    html+=`<div class="match-group-label">✓ RECENTLY ENDED</div>`+ended.map(matchOptHTML).join('');

  if(append) list.innerHTML += html;
  else list.innerHTML = html;

  const activeMid = getActiveMid();
  list.querySelectorAll('button[data-id]').forEach(b=>{
    b.onclick=async()=>{
      const mid=b.dataset.id, mname=b.dataset.name;
      const t1=b.dataset.t1||'', t2=b.dataset.t2||'';
      await updateDoc(doc(db,'meta','game'),{cricApiKey:key});

      // Always create a NEW match — never overwrite existing ones
      toast('Creating match and loading players…');
      const isIPL = _matchType === 'ipl'; const matchType = _matchType;
      const newMid = 'match_'+Date.now();
      const matchNum = (await getDocs(collection(db,'matches'))).size+1;
      await setDoc(doc(db,'matches',newMid),{
        label:mname, t1, t2, matchNum, isIPL,
        revealed:false, locked:false, finalized:false,
        players:[], stats:{}, teams:{}, liveMatchId:mid,
        createdAt:serverTimestamp()
      });
      // Add to activeMatchIds, set as current
      const currentIds = metaGame.activeMatchIds||[];
      const newIds = [...new Set([...currentIds, newMid])];
      await updateDoc(doc(db,'meta','game'),{
        currentMatchId:newMid,
        activeMatchIds:newIds
      });
      currentMatchId = newMid;
      adminSelectedMatchId = newMid;
      await loadMatchPlayers(key, mid);
    };
  });
}

function matchOptHTML(m) {
  const status = m.matchStarted&&!m.matchEnded ? '🔴 LIVE' : m.matchEnded ? '✓ Ended' : '🕐 Upcoming';
  let timeStr = '';
  if (m.dateTimeGMT) {
    // Append Z to ensure UTC parsing — API returns without timezone suffix
    const d = new Date(m.dateTimeGMT.endsWith('Z') ? m.dateTimeGMT : m.dateTimeGMT + 'Z');
    const tzShort = new Intl.DateTimeFormat('en', {timeZoneName:'short'}).formatToParts(d).find(p=>p.type==='timeZoneName')?.value||'';
    const dateStr = d.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
    const timeLocal = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    timeStr = ` · ${dateStr}, ${timeLocal} ${tzShort}`;
  }
  const hasSquad = m.hasSquad;
  return `<div class="mopt">
    <div>
      <div class="mopt-name">${m.name||'Match'}</div>
      <div class="mopt-st">${status}${timeStr}</div>
      ${!hasSquad&&!m.matchStarted?'<div class="mopt-warn">⚠ Squad not announced yet — you can still select and add players manually</div>':''}
    </div>
    <button class="btn-sm" data-id="${m.id}" data-name="${m.name||'Match'}" data-t1="${(m.teamInfo?.[0]?.name||m.teams?.[0]||'').replace(/"/g,'')}" data-t2="${(m.teamInfo?.[1]?.name||m.teams?.[1]||'').replace(/"/g,'')}">Select</button>
  </div>`;
}

async function loadMatchPlayers(key, mid) {
  try {
    // match_squad returns full player lists — works on free tier
    const res  = await fetch(`https://api.cricapi.com/v1/match_squad?apikey=${key}&id=${mid}`);
    const data = await res.json();

    if (data.status !== 'success') {
      throw new Error(data.reason || 'Squad not available yet for this match');
    }
    if (!data.data || !data.data.length) {
      throw new Error('Squad not announced yet — add players manually or try again closer to match time');
    }

    // Role mapping from CricAPI role strings → our app roles
    function mapRole(r) {
      if (!r) return 'BAT';
      const rl = r.toLowerCase();
      // Order matters — check compound roles first
      if (rl.includes('bowling all') || rl === 'bowling allrounder') return 'AR';
      if (rl.includes('batting all') || rl === 'batting allrounder') return 'AR';
      if (rl.includes('all')) return 'AR';
      if (rl.includes('wk') || rl.includes('wicket')) return 'WK';
      if (rl.includes('bowl')) return 'BOWL';
      if (rl.includes('bat')) return 'BAT';
      return 'BAT';
    }

    const seen = new Set();
    const players = [];

    (data.data || []).forEach(team => {
      if (!team) return;
      // Normalize IPL team shortnames — CricAPI sometimes appends W (e.g. RCBW→RCB)
      const rawShort = team.shortname || '';
      const knownIPLShorts = {'RCBW':'RCB','CSKW':'CSK','MIW':'MI','KKRW':'KKR','DCW':'DC','RRW':'RR','PBKSW':'PBKS','LSGW':'LSG','GTW':'GT','SRHW':'SRH'};
      const teamName = knownIPLShorts[rawShort] || normalizeTeam(rawShort) || team.teamName || '';
      (team.players || []).forEach(p => {
        if (!p || !p.name || seen.has(p.name)) return;
        seen.add(p.name);
        players.push({
          name: p.name,
          team: teamName,
          role: mapRole(p.role),
          country: p.country || ''
        });
      });
    });

    if (players.length < 5) throw new Error('Not enough players returned from squad API');

    await updateDoc(doc(db, 'matches', getActiveMid()), { players });
    matchPlayers = players;
    toast(`✓ ${players.length} players loaded from squad`);
    showScreen('admin');

  } catch(e) {
    toast(`Could not load squad: ${e.message}`, 'err');
    showScreen('admin');
  }
}

async function autoFetchStats(showFeedback=false) {
  const key=metaGame.cricApiKey;
  const activeMid = getActiveMid()||currentMatchId;
  const activeMatchData = getMatch(activeMid);
  const mid=activeMatchData.liveMatchId||currentMatch.liveMatchId;
  if(!key||!mid) return;
  try {
    const res=await fetch(`https://api.cricapi.com/v1/match_scorecard?apikey=${key}&id=${mid}`);
    const data=await res.json();
    if(data.status!=='success') throw new Error(data.reason||'Scorecard unavailable');
    const nl={};matchPlayers.forEach(p=>{nl[p.name.toLowerCase()]=p.name;});
    const sc=data.data?.scorecard||[];let updated=0;
    const statsUpdate={};
    sc.forEach(inn=>{
      (inn.batting||[]).forEach(b=>{
        const raw=(b.batsman?.name||b.name||'').toLowerCase();
        const m=Object.keys(nl).find(k=>k.includes(raw)||raw.includes(k));
        if(!m)return;
        playerStats[nl[m]]={...(playerStats[nl[m]]||{}),runs:b.r||0,balls:b.b||0,fours:b['4s']||0,sixes:b['6s']||0,batted:true,playingXI:true};
        // Always mark as playing if they appear in scorecard — handles impact subs
        if(playerStatus[nl[m]] !== 'playing') statsUpdate[`playerStatus.${nl[m]}`]='playing';
        updated++;
      });
      (inn.bowling||[]).forEach(bw=>{
        const raw=(bw.bowler?.name||bw.name||'').toLowerCase();
        const m=Object.keys(nl).find(k=>k.includes(raw)||raw.includes(k));
        if(!m)return;
        playerStats[nl[m]]={...(playerStats[nl[m]]||{}),wickets:bw.w||0,overs:parseFloat(bw.ov)||0,runsConceded:bw.r||0,maidens:bw.m||0,playingXI:true};
        // Always mark as playing if they appear in scorecard — handles impact subs
        if(playerStatus[nl[m]] !== 'playing') statsUpdate[`playerStatus.${nl[m]}`]='playing';
        updated++;
      });
    });
    if(updated>0){
      Object.entries(playerStats).forEach(([p,s])=>{statsUpdate[`stats.${p}`]=s;});
      await updateDoc(doc(db,'matches',getActiveMid()||currentMatchId),statsUpdate);
      const grid=document.getElementById('statsGrid');if(grid){grid.innerHTML=renderStatsGrid('');bindSave();bindAvailSelects();}
      const cd=document.getElementById('arCountdown');if(cd){const prev=cd.textContent;cd.textContent='✓ updated';setTimeout(()=>{cd.textContent=prev;},1500);}
      if(showFeedback) toast(`✓ Stats updated for ${updated} entries`);
    } else if(showFeedback) toast('No matching stats in scorecard yet','err');
  } catch(e){if(showFeedback) toast('Error: '+e.message,'err');console.warn('Auto-fetch failed:',e.message);}
}

// ── Auto-refresh ──
function startAR(secs){
  stopAR(); arSecs=secs;
  autoFetchStats();
  arInterval=setInterval(()=>{autoFetchStats();arSecs=secs;},secs*1000);
  arTimer=setInterval(()=>{arSecs=Math.max(0,arSecs-1);const el=document.getElementById('arCountdown');if(el)el.textContent=`next in ${arSecs}s`;},1000);
}
function stopAR(){
  if(arInterval){clearInterval(arInterval);arInterval=null;}
  if(arTimer){clearInterval(arTimer);arTimer=null;}arSecs=0;
}
